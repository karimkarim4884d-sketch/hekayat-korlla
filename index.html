<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة مرتدة | بث مباشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-green: #00ff62;
            --pitch-green: #2e7d32;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --live-red: #ff3e3e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
        }

        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: var(--main-green); margin: 0; font-size: 28px; }

        .tools-container {
            display: flex; gap: 10px; margin-bottom: 15px; max-width: 800px; margin: 0 auto 15px auto;
        }

        input[type="text"], input[type="date"] {
            background: var(--card-bg); border: 1px solid #333; color: white;
            padding: 12px; border-radius: 8px; outline: none; flex: 1;
        }

        .tabs { display: flex; gap: 5px; max-width: 800px; margin: 0 auto 20px auto; }
        .tab-btn {
            flex: 1; background: var(--card-bg); color: white; border: none;
            padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold;
        }
        .tab-btn.active { background: var(--main-green); color: black; }

        #matchesContainer { max-width: 800px; margin: 0 auto; }

        .match-card {
            background: var(--card-bg); border-radius: 15px; padding: 18px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px; border-bottom: 4px solid #222; cursor: pointer; transition: 0.3s;
        }

        .team { width: 35%; text-align: center; }
        .team img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 8px; }
        .team span { display: block; font-size: 14px; font-weight: 600; }

        .info { width: 30%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .score { font-size: 26px; font-weight: 900; letter-spacing: 2px; color: var(--main-green); }
        .status-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .live { background: var(--live-red); color: white; animation: blink 1.2s infinite; }
        .finished { background: #333; color: #aaa; }

        /* Modal Styles */
        #detailsModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto;
        }
        .modal-content {
            background: var(--dark-bg); max-width: 600px; margin: 20px auto;
            border-radius: 20px; padding: 20px; position: relative; border: 1px solid #333;
        }
        .close-btn { position: absolute; left: 20px; top: 20px; font-size: 24px; cursor: pointer; color: #888; }
        
        .detail-tabs { display: flex; border-bottom: 1px solid #333; margin-top: 20px; }
        .d-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #888; font-weight: bold; }
        .d-tab.active { color: var(--main-green); border-bottom: 2px solid var(--main-green); }
        
        /* Pitch Styles */
        .pitch {
            background: var(--pitch-green);
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100% 50px, 50px 100%;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 10px;
            position: relative; width: 100%; height: 480px; margin-top: 15px;
            display: flex; flex-direction: column; justify-content: space-around; padding: 10px 0;
        }
        .pitch-row { display: flex; justify-content: center; gap: 15px; width: 100%; }
        .player-circle { display: flex; flex-direction: column; align-items: center; width: 65px; }
        .player-img-wrapper { position: relative; width: 45px; height: 45px; }
        .player-img-wrapper img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid white; background: #222; }
        .rating-badge { position: absolute; bottom: -5px; right: -5px; background: #ffc107; color: black; font-size: 10px; font-weight: bold; padding: 1px 4px; border-radius: 4px; }
        .player-name { font-size: 10px; color: white; font-weight: bold; text-shadow: 1px 1px 2px black; margin-top: 4px; text-align: center; }

        .event-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #222; }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }

        @keyframes blink { 50% { opacity: 0.4; } }
        .wa-btn { position: fixed; bottom: 20px; left: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; text-decoration: none; z-index: 999; }
    </style>
</head>
<body>

<div class="header"><h1>هجمة مرتدة ⚽</h1></div>

<div class="tools-container">
    <input type="text" id="searchInput" placeholder="ابحث عن فريق..." onkeyup="searchMatches()">
    <input type="date" id="datePicker" onchange="fetchByDate(this.value)">
</div>

<div class="tabs">
    <button class="tab-btn" id="btn-yesterday" onclick="changeTab(-1, 'btn-yesterday')">أمس</button>
    <button class="tab-btn active" id="btn-today" onclick="changeTab(0, 'btn-today')">اليوم</button>
    <button class="tab-btn" id="btn-tomorrow" onclick="changeTab(1, 'btn-tomorrow')">غداً</button>
</div>

<div id="matchesContainer"></div>

<div id="detailsModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalHeader"></div>
        
        <div class="detail-tabs">
            <div class="d-tab active" id="tab-events" onclick="showSection('events', this)">الأحداث</div>
            <div class="d-tab" id="tab-stats" onclick="showSection('stats', this)">الإحصائيات</div>
            <div class="d-tab" id="tab-lineups" onclick="showSection('lineups', this)">التشكيلة</div>
        </div>

        <div id="modalBody"></div>
    </div>
</div>

<a href="https://wa.me/201040077271" class="wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script>
    const API_KEY = "Bf7d42ac856fecc0e1e6ad24debe9c5e";
    const IMPORTANT_LEAGUES = [2, 3, 39, 140, 78, 135, 61, 233, 848, 4, 301];
    let currentFixtureId = null;

    async function loadMatches(dateString) {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = '<p style="text-align: center;">جاري التحديث...</p>';
        try {
            const response = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateString}`, {
                "headers": { "x-rapidapi-host": "v3.football.api-sports.io", "x-rapidapi-key": API_KEY }
            });
            const data = await response.json();
            renderMatches(data.response.filter(m => IMPORTANT_LEAGUES.includes(m.league.id)));
        } catch (e) { container.innerHTML = 'خطأ في الاتصال'; }
    }

    function renderMatches(matches) {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = matches.map(m => {
            const status = m.fixture.status.short;
            let info = '';
            if (status === 'NS') {
                info = `<div class="score">VS</div><div style="font-size:12px">${new Date(m.fixture.date).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</div>`;
            } else {
                const elapsed = m.fixture.status.elapsed || 0;
                const badge = ['1H','2H','HT','ET','P'].includes(status) ? `<div class="status-badge live">مباشر | ${elapsed}'</div>` : `<div class="status-badge finished">منتهية</div>`;
                info = `<div class="score">${m.goals.home} - ${m.goals.away}</div>${badge}`;
            }
            return `
                <div class="match-card" onclick="openDetails(${m.fixture.id}, '${m.teams.home.name}', '${m.teams.away.name}', '${m.teams.home.logo}', '${m.teams.away.logo}')" data-name="${m.teams.home.name} ${m.teams.away.name}">
                    <div class="team"><img src="${m.teams.home.logo}"><span>${m.teams.home.name}</span></div>
                    <div class="info">${info}<div class="league">${m.league.name}</div></div>
                    <div class="team"><img src="${m.teams.away.logo}"><span>${m.teams.away.name}</span></div>
                </div>`;
        }).join('');
    }

    function openDetails(id, hN, aN, hL, aL) {
        currentFixtureId = id;
        document.getElementById('detailsModal').style.display = 'block';
        document.getElementById('modalHeader').innerHTML = `
            <div style="display:flex; justify-content:space-around; align-items:center; padding-top:20px;">
                <div class="team"><img src="${hL}" width="50"><br><span>${hN}</span></div>
                <div style="font-size:24px; font-weight:bold; color:var(--main-green);">VS</div>
                <div class="team"><img src="${aL}" width="50"><br><span>${aN}</span></div>
            </div>`;
        showSection('events', document.getElementById('tab-events'));
    }

    async function showSection(type, btn) {
        document.querySelectorAll('.d-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        const body = document.getElementById('modalBody');
        body.innerHTML = '<p style="text-align:center; padding:20px;">جاري التحميل...</p>';

        try {
            const res = await fetch(`https://v3.football.api-sports.io/fixtures/${type === 'events' ? 'events' : type === 'stats' ? 'statistics' : 'lineups'}?fixture=${currentFixtureId}`, {
                "headers": { "x-rapidapi-host": "v3.football.api-sports.io", "x-rapidapi-key": API_KEY }
            });
            const data = await res.json();

            if (type === 'events') {
                body.innerHTML = data.response.map(e => `
                    <div class="event-item">
                        <b style="color:var(--main-green)">${e.time.elapsed}'</b>
                        <i class="fas ${e.type === 'Goal' ? 'fa-futbol' : e.detail.includes('Yellow') ? 'fa-square' : 'fa-exchange-alt'}" 
                           style="color:${e.detail.includes('Yellow') ? '#ffeb3b' : e.detail.includes('Red') ? '#f44336' : '#fff'}"></i>
                        <span>${e.player.name} (${e.detail})</span>
                    </div>`).join('') || "لا توجد أحداث";
            } 
            else if (type === 'stats') {
                if (!data.response[0]) { body.innerHTML = "الإحصائيات غير متوفرة"; return; }
                const h = data.response[0].statistics, a = data.response[1].statistics;
                body.innerHTML = h.map((s, i) => `<div class="stat-row"><span>${s.value || 0}</span><span style="color:#888">${translateStat(s.type)}</span><span>${a[i].value || 0}</span></div>`).join('');
            } 
            else {
                if (!data.response[0]) { body.innerHTML = "التشكيلة تظهر قبل المباراة بـ 60 دقيقة"; return; }
                const team = data.response[0];
                const s = team.startXI;
                const rows = [s.filter(p=>p.player.pos==='F'), s.filter(p=>p.player.pos==='M'), s.filter(p=>p.player.pos==='D'), s.filter(p=>p.player.pos==='G')];
                let pitch = `<div style="text-align:center; margin:10px 0;">خطة ${team.formation}</div><div class="pitch">`;
                rows.forEach(row => {
                    pitch += `<div class="pitch-row">${row.map(p => `
                        <div class="player-circle">
                            <div class="player-img-wrapper">
                                <img src="https://media.api-sports.io/football/players/${p.player.id}.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/166/166124.png'">
                                <span class="rating-badge">${p.player.number}</span>
                            </div>
                            <span class="player-name">${p.player.name.split(' ').pop()}</span>
                        </div>`).join('')}</div>`;
                });
                body.innerHTML = pitch + `</div>`;
            }
        } catch (e) { body.innerHTML = "خطأ في التحميل"; }
    }

    function translateStat(t) {
        const m = {"Shots on Goal":"تسديدات مرمى","Total Shots":"إجمالي التسديدات","Fouls":"أخطاء","Corner Kicks":"ركنية","Offsides":"تسلل","Ball Possession":"استحواذ","Yellow Cards":"إنذارات","Goalkeeper Saves":"تصديات"};
        return m[t] || t;
    }

    function closeModal() { document.getElementById('detailsModal').style.display = 'none'; }
    function changeTab(o, id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const d = new Date(); d.setDate(d.getDate() + o);
        loadMatches(d.toISOString().split('T')[0]);
    }
    function fetchByDate(d) { loadMatches(d); }
    function searchMatches() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.match-card').forEach(c => c.style.display = c.getAttribute('data-name').toLowerCase().includes(q) ? "flex" : "none");
    }
    window.onload = () => loadMatches(new Date().toISOString().split('T')[0]);
</script>
</body>
        </html>
