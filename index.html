<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مونتاجو - محرر فيديو أونلاين</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0f0f0f; color: #fff; padding: 20px; }
       .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #00d4ff; }
       .upload-area {
            border: 2px dashed #00d4ff; border-radius: 15px; padding: 40px;
            text-align: center; cursor: pointer; margin-bottom: 20px;
        }
       .upload-area:hover { background: #1a1a1a; }
        #videoInput { display: none; }
        #videoPreview { width: 100%; border-radius: 10px; margin: 20px 0; display: none; }
       .controls { display: none; background: #1a1a1a; padding: 20px; border-radius: 10px; margin: 20px 0; }
       .time-inputs { display: flex; gap: 10px; margin: 15px 0; }
       .time-inputs input { flex: 1; padding: 10px; background: #0f0f0f; border: 1px solid #333; color: #fff; border-radius: 5px; }
        button {
            background: #00d4ff; color: #000; border: none; padding: 12px 25px;
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0;
        }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        #status { text-align: center; margin: 15px 0; color: #00d4ff; }
        #downloadLink { display: none; text-align: center; margin-top: 20px; }
        #downloadLink a { color: #00d4ff; text-decoration: none; font-size: 18px; }
    </style>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
</head>
<body>
    <div class="container">
        <h1>مونتاجو ✂️</h1>

        <div class="upload-area" onclick="document.getElementById('videoInput').click()">
            <p>اضغط هنا لاختيار فيديو</p>
            <small>MP4, MOV, WEBM</small>
        </div>
        <input type="file" id="videoInput" accept="video/*">

        <video id="videoPreview" controls></video>

        <div class="controls" id="controls">
            <h3>قص الفيديو</h3>
            <div class="time-inputs">
                <input type="number" id="startTime" placeholder="البداية بالثواني" min="0" step="0.1">
                <input type="number" id="endTime" placeholder="النهاية بالثواني" min="0" step="0.1">
            </div>
            <button id="trimBtn">قص وتصدير 1080p 60fps</button>
            <button id="exportBtn">تصدير الفيديو كامل 1080p 60fps</button>
        </div>

        <div id="status"></div>
        <div id="downloadLink"></div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({
            log: true,
            corePath: "https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js"
        });

        const videoInput = document.getElementById('videoInput');
        const videoPreview = document.getElementById('videoPreview');
        const controls = document.getElementById('controls');
        const status = document.getElementById('status');
        const trimBtn = document.getElementById('trimBtn');
        const exportBtn = document.getElementById('exportBtn');

        let videoFile;

        videoInput.addEventListener('change', (e) => {
            videoFile = e.target.files[0];
            if (videoFile) {
                videoPreview.src = URL.createObjectURL(videoFile);
                videoPreview.style.display = 'block';
                controls.style.display = 'block';
                videoPreview.onloadedmetadata = () => {
                    document.getElementById('endTime').value = videoPreview.duration.toFixed(1);
                };
            }
        });

        async function processVideo(isTrim) {
            if (!videoFile) return;

            trimBtn.disabled = true;
            exportBtn.disabled = true;
            status.innerHTML = 'جاري تحميل المحرك... هياخد دقيقة أول مرة بس';

            if (!ffmpeg.isLoaded()) {
                await ffmpeg.load();
            }

            status.innerHTML = 'جاري معالجة الفيديو... متقفلهاش';
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(videoFile));

            let args = [];
            if (isTrim) {
                const start = document.getElementById('startTime').value || 0;
                const end = document.getElementById('endTime').value;
                const duration = end - start;
                args = ['-ss', start, '-i', 'input.mp4', '-t', duration];
            } else {
                args = ['-i', 'input.mp4'];
            }

            // تصدير 1080p 60fps بأعلى جودة
            args.push(
                '-vf', 'scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2',
                '-r', '60',
                '-c:v', 'libx264',
                '-preset', 'slow',
                '-crf', '18',
                '-c:a', 'aac',
                '-b:a', '192k',
                'output.mp4'
            );

            await ffmpeg.run(...args);

            status.innerHTML = 'تم! جاري تجهيز التحميل...';
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));

            document.getElementById('downloadLink').innerHTML = `<a href="${url}" download="montago.mp4">⬇️ اضغط هنا لتحميل الفيديو</a>`;
            document.getElementById('downloadLink').style.display = 'block';
            status.innerHTML = 'خلصنا! ✅';

            trimBtn.disabled = false;
            exportBtn.disabled = false;
        }

        trimBtn.addEventListener('click', () => processVideo(true));
        exportBtn.addEventListener('click', () => processVideo(false));
    </script>
</body>
</html>
