<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هجمة ولقطة</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial;
}

/* HEADER */
header {
  background: #c40000;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-btn {
  font-size: 25px;
  cursor: pointer;
}

/* MENU */
.menu {
  display: none;
  background: #111;
  text-align: center;
}

.menu div {
  padding: 15px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.menu div:hover {
  background: #222;
}

/* LOGO */
.logo {
  display: none;
  text-align: center;
  margin: 20px;
}

.logo img {
  width: 150px;
}

/* CONTENT */
.page {
  display: none;
  padding: 15px;
}
</style>

</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div>🔥 هجمة ولقطة 🔥</div>
</header>

<!-- MENU -->
<div class="menu" id="menu">
  <div onclick="openPage('live')">📡 بث مباشر</div>
  <div onclick="openPage('matches')">📊 نتائج الماتشات</div>
  <div onclick="openPage('series')">📺 مسلسلات</div>
  <div onclick="openPage('movies')">🎬 أفلام مصرية</div>
  <div onclick="openPage('quran')">📖 القرآن الكريم</div>
</div>

<!-- LOGO -->
<div class="logo" id="logo">
  <img src="https://i.imgur.com/8Km9tLL.png">
</div>

<!-- CONTENT -->
<div id="live" class="page">
  📡 اختر السيرفر 👇<br><br>

  <iframe width="100%" height="200"
  src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig"
  allowfullscreen></iframe>

  <br><br>

  <iframe width="100%" height="200"
  src="https://player.vimeo.com/video/76979871"
  allowfullscreen></iframe>
</div>

<div id="matches" class="page">
  📊 نتائج الماتشات قريبًا ⚽
</div>

<div id="series" class="page">
  📺 مسلسلات قريبًا
</div>

<div id="movies" class="page">
  🎬 أفلام مصرية قريبًا
</div>

<div id="quran" class="page">
  📖 القرآن الكريم<br><br>
  <audio controls>
    <source src="https://download.quranicaudio.com/quran/mishary_rashid_alafasy/001.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
function toggleMenu() {
  let menu = document.getElementById("menu");
  let logo = document.getElementById("logo");

  if (menu.style.display === "block") {
    menu.style.display = "none";
    logo.style.display = "none";
  } else {
    menu.style.display = "block";
    logo.style.display = "block";
  }
}

function openPage(pageId) {
  let pages = document.querySelectorAll(".page");
  pages.forEach(p => p.style.display = "none");

  document.getElementById(pageId).style.display = "block";
}
</script>

</body>
</html>
