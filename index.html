<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>هجمة ولقطة - الجدول العالمي المترجم</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background: #001220; color: white; padding: 10px; }
    
    header { text-align: center; padding: 25px; background: #002a4d; border-radius: 20px; margin-bottom: 20px; border-bottom: 4px solid #ff6b35; }
    
    .match-container { max-width: 800px; margin: 0 auto; }
    
    .match-card {
      background: #003366; margin-bottom: 12px; padding: 15px;
      border-radius: 15px; display: flex; align-items: center;
      justify-content: space-between; border: 1px solid #004080;
    }

    .team { flex: 1; font-weight: bold; font-size: 1.1rem; text-align: center; }
    .vs-box { background: #ff6b35; padding: 5px 12px; border-radius: 8px; font-weight: bold; margin: 0 10px; }
    
    .status-box { min-width: 100px; text-align: center; font-size: 0.9rem; border-right: 2px solid #00bfff; padding-right: 10px; }
    
    .live-now { color: #ff0000; font-weight: bold; animation: blink 1s infinite; }
    @keyframes blink { 0% {opacity:1} 50% {opacity:0.4} 100% {opacity:1} }
    
    .league-name { font-size: 0.75rem; color: #aaa; text-align: center; margin-top: 5px; }
  </style>
</head>
<body>

<header>
    <h1>⚽ هجمة ولقطة</h1>
    <p>بث مباشر ونتائج كل دوريات العالم (مترجم)</p>
</header>

<div class="match-container" id="matches">
    <div style="text-align:center">⏳ جاري جلب وترجمة الماتشات...</div>
</div>

<script>
const API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e';

// 🛑 قاموس للأندية الكبيرة لضمان دقة الترجمة
const manualTranslate = {
    "Real Madrid": "ريال مدريد", "Barcelona": "برشلونة", "Al Ahly": "الأهلي",
    "Zamalek": "الزمالك", "Liverpool": "ليفربول", "Manchester City": "مانشستر سيتي",
    "Arsenal": "أرسنال", "Chelsea": "تشيلسي", "Bayern Munich": "بايرن ميونخ",
    "Paris Saint Germain": "باريس سان جيرمان", "Manchester United": "مانشستر يونايتد",
    "Pyramids": "بيراميدز", "Al Hilal": "الهلال", "Al Nassr": "النصر"
};

// 🌍 دالة ترجمة ذكية (تستخدم القاموس أو تحاول التعريب)
function smartTranslate(name) {
    if (manualTranslate[name]) return manualTranslate[name];
    // لو الفريق مش مشهور، بنعرض الاسم زي ما هو أو تقدر تستخدم خدمة ترجمة خارجية هنا
    return name; 
}

async function loadMatches() {
    const today = new Date().toISOString().split('T')[0];
    const url = `https://v3.football.api-sports.io/fixtures?date=${today}`;

    try {
        const response = await fetch(url, {
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const data = await response.json();
        const matches = data.response;
        const container = document.getElementById('matches');
        container.innerHTML = '';

        if (matches.length === 0) {
            container.innerHTML = "❌ لا توجد مباريات اليوم.";
            return;
        }

        matches.forEach(m => {
            const home = smartTranslate(m.teams.home.name);
            const away = smartTranslate(m.teams.away.name);
            const league = m.league.name;
            const status = m.fixture.status.short;
            let infoHTML = "";

            if (["1H", "2H", "HT"].includes(status)) {
                infoHTML = `<span class="live-now">🔴 مباشر<br>${m.goals.home} - ${m.goals.away}</span>`;
            } else if (status === "FT") {
                infoHTML = `🏁 انتهت<br><b>${m.goals.home} - ${m.goals.away}</b>`;
            } else {
                const matchTime = new Date(m.fixture.date).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
                infoHTML = `⏰ ${matchTime}`;
            }

            container.innerHTML += `
                <div class="match-card">
                    <div class="status-box">${infoHTML}</div>
                    <div class="team">${home}</div>
                    <div class="vs-box">VS</div>
                    <div class="team">${away}</div>
                </div>
                <div class="league-name">${league}</div>
                <hr style="opacity:0.1; margin-bottom:15px;">
            `;
        });

    } catch (e) {
        document.getElementById('matches').innerHTML = "⚠️ خطأ في جلب البيانات.";
    }
}

// تحديث تلقائي كل 2 دقيقة
loadMatches();
setInterval(loadMatches, 120000);
</script>

</body>
</html>
