<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Race UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --primary-blue: #0052ff;
            --border-color: #30363d;
            --text-main: #ffffff;
            --text-muted: #8b949e;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* حاوية الكارت الأساسي */
        .order-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            max-width: 500px;
            margin: 50px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: var(--text-main);
        }

        .header-title i {
            color: var(--primary-blue);
        }

        /* تنسيق الحقول */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        select, input {
            width: 100%;
            padding: 15px;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--primary-blue);
        }

        /* زر الطلب */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* زر واتساب العائم */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25d366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-decoration: none;
            z-index: 100;
        }

    </style>
</head>
<body>

    <div class="order-card">
        <div class="header-title">
            <i class="fas fa-tachometer-alt"></i>
            <span>إنشاء طلب جديد (Create an order)</span>
        </div>

        <div class="form-group">
            <label>الفئة</label>
            <select>
                <option>عروض ريسي</option>
                <option>خدمات تليجرام</option>
                <option>خدمات إنستقرام</option>
            </select>
        </div>

        <div class="form-group">
            <label>الخدمات</label>
            <select>
                <option>تفعيل واتساب ضمان 30 يوم - £ 35.0 لكل 1000</option>
                <option>زيادة متابعين تيك توك - ضمان سنة</option>
            </select>
        </div>

        <div class="form-group">
            <label>Username / Link</label>
            <input type="text" placeholder="أدخل الرابط أو اسم المستخدم هنا...">
        </div>

        <div class="form-group">
            <label>الكمية</label>
            <input type="number" placeholder="1000">
        </div>

        <button class="submit-btn">تأكيد الطلب</button>
    </div>

    <a href="https://wa.me/201040077271" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
