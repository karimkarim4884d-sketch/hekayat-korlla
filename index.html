<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIM KHALED - ZACK CINEMA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ffcc00; --bg: #0b0d17; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* 1. الثلاثة أقسام العلوية (شروطك) */
        .top-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; background: #1a1a1a; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .nav-item { padding: 12px; text-decoration: none; color: white; font-size: 11px; text-align: center; border-left: 1px solid #333; }
        .nav-item i { color: var(--main); display: block; margin-bottom: 4px; font-size: 18px; }

        /* اللوجو والاسم */
        .header { text-align: center; padding: 25px 10px; }
        .logo { width: 70px; height: 70px; border: 3px solid var(--main); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; background: #222; color: var(--main); box-shadow: 0 0 15px var(--main); }

        /* الأقسام */
        .cats { display: flex; overflow-x: auto; padding: 10px; gap: 8px; scrollbar-width: none; }
        .cat-btn { background: var(--card); border: 1px solid #333; color: white; padding: 10px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; }
        .cat-btn.active { background: var(--main); color: black; font-weight: bold; }

        /* شبكة العرض */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 15px; }
        .item { background: var(--card); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #222; }
        .item img { width: 100%; height: 200px; object-fit: cover; }
        .q-tag { position: absolute; top: 8px; left: 8px; background: var(--main); color: black; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .y-tag { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.8); font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .title { padding: 8px; font-size: 13px; text-align: center; }

        /* لوحة التحكم */
        #admin { display: none; background: #1a1a1a; padding: 20px; border: 2px solid var(--main); margin: 15px; border-radius: 15px; }
        .admin-input { width: 100%; padding: 10px; margin-bottom: 10px; background: #252525; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="https://wa.me/201040077271" class="nav-item"><i class="fab fa-whatsapp"></i> خدمة العملاء</a>
        <a href="mailto:karimkarim4884d@gmail.com" class="nav-item"><i class="fas fa-envelope"></i> الشكاوى</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" class="nav-item"><i class="fas fa-plus"></i> إضافة محتوى</a>
    </div>

    <div class="header">
        <div class="logo">KR</div>
        <h2 style="color:var(--main); margin-top:10px;">KARIM KHALED</h2>
        <p style="color:gray; font-size:11px; margin-top:-10px;">ZACK CINEMA ENGINE</p>
    </div>

    <div id="admin">
        <h3 style="text-align:center; color:var(--main);">لوحة التحكم السريعة</h3>
        <input type="text" id="m-title" class="admin-input" placeholder="اسم الفيلم">
        <input type="text" id="m-img" class="admin-input" placeholder="رابط الصورة المباشر">
        <input type="text" id="m-link" class="admin-input" placeholder="رابط الفيلم أو البث">
        <select id="m-cat" class="admin-input">
            <option value="بث مباشر">📡 بث مباشر</option>
            <option value="أفلام مصرية">🎥 أفلام مصرية</option>
            <option value="أفلام أكشن">🔥 أكشن</option>
            <option value="قرآن كريم">📖 قرآن</option>
            <option value="كرتون">🧸 كرتون</option>
            <option value="أغاني">🎵 أغاني</option>
        </select>
        <button onclick="addMovie()" style="width:100%; padding:12px; background:var(--main); border:none; font-weight:bold; border-radius:5px; cursor:pointer;">✅ حفظ بالسيرفر الآن</button>
    </div>

    <div class="cats">
        <button class="cat-btn active" onclick="render('الكل', this)">الكل</button>
        <button class="cat-btn" onclick="render('بث مباشر', this)">بث مباشر</button>
        <button class="cat-btn" onclick="render('أفلام مصرية', this)">أفلام</button>
        <button class="cat-btn" onclick="render('قرآن كريم', this)">قرآن</button>
        <button class="cat-btn" onclick="render('كرتون', this)">كرتون</button>
        <button class="cat-btn" onclick="render('أغاني', this)">أغاني</button>
    </div>

    <div class="grid" id="main-grid"></div>

    <script>
        // رابط الفايربيز المباشر الخاص بك
        const api = "https://karim-884d-default-rtdb.firebaseio.com/movies.json";

        function toggleAdmin() {
            const a = document.getElementById('admin');
            a.style.display = a.style.display === 'block' ? 'none' : 'block';
            a.scrollIntoView({behavior: "smooth"});
        }

        async function addMovie() {
            const m = {
                title: document.getElementById('m-title').value,
                img: document.getElementById('m-img').value,
                link: document.getElementById('m-link').value,
                cat: document.getElementById('m-cat').value,
                year: "2026",
                quality: "4K"
            };
            if(!m.title || !m.img) return alert("املا البيانات!");
            
            await fetch(api, { method: 'POST', body: JSON.stringify(m) });
            alert("تم النشر بنجاح!");
            toggleAdmin();
            render();
        }

        async function render(filter = 'الكل', btn = null) {
            if(btn) {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '<p style="text-align:center; width:100%;">تحميل البيانات من السيرفر...</p>';
            
            try {
                const res = await fetch(api);
                const data = await res.json();
                grid.innerHTML = '';

                if(data) {
                    Object.keys(data).reverse().forEach(id => {
                        const item = data[id];
                        if(filter === 'الكل' || item.cat === filter) {
                            grid.innerHTML += `
                                <div class="item">
                                    <span class="q-tag">${item.quality}</span>
                                    <span class="y-tag">${item.year}</span>
                                    <img src="${item.img}" onclick="window.location.href='${item.link}'" onerror="this.src='https://via.placeholder.com/150x200?text=Error'">
                                    <div class="title">${item.title}</div>
                                </div>
                            `;
                        }
                    });
                } else { grid.innerHTML = '<p style="text-align:center; width:100%;">السيرفر فارغ</p>'; }
            } catch(e) { grid.innerHTML = '<p style="text-align:center; width:100%;">خطأ في السيرفر</p>'; }
        }
        window.onload = () => render();
    </script>
</body>
    </html>
