<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة - النسخة الاحترافية</title>
    <style>
        :root {
            --bg-dark: #0f172a; --bg-card: #1e293b; --accent: #00bfff;
            --text-main: #ffffff; --text-dim: #94a3b8; --live-red: #ef4444;
            --vs-gold: #fbbf24;
        }
        /* منع النسخ والتحديد */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        body { background: var(--bg-dark); color: var(--text-main); padding-bottom: 80px; transition: 0.3s; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--bg-dark); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .top-icons { display: flex; gap: 15px; align-items: center; }
        .icon-btn { font-size: 1.2rem; cursor: pointer; color: var(--text-main); }
        .current-date { font-size: 0.85rem; color: var(--accent); font-weight: bold; }

        .page-content { display: none; padding: 15px; min-height: 80vh; }
        .page-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .date-tabs { display: flex; background: var(--bg-card); border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .date-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: var(--text-dim); font-size: 0.8rem; border-left: 1px solid rgba(255,255,255,0.05); }
        .date-tab.active { background: var(--accent); color: white; }
        
        .league-header { background: rgba(0, 191, 255, 0.1); padding: 8px 12px; border-radius: 8px; margin: 15px 0 10px; font-size: 0.85rem; color: var(--accent); border-right: 4px solid var(--accent); display: flex; align-items: center; gap: 10px; }
        .league-header img { width: 20px; height: 20px; object-fit: contain; }

        .match-card { background: var(--bg-card); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .team-box { flex: 1.2; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .team-box img { width: 35px; height: 35px; object-fit: contain; }
        .team-box p { font-size: 0.8rem; font-weight: 500; }
        
        .status-box { flex: 1; text-align: center; display: flex; flex-direction: column; gap: 4px; }
        .score-val { font-size: 1.3rem; font-weight: bold; letter-spacing: 2px; }
        .vs-text { color: var(--vs-gold); font-weight: bold; font-size: 1.1rem; }
        .live-label { color: var(--live-red); font-size: 0.65rem; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg-card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 0.7rem; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 3px; }

        #calendar-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-card); padding: 20px; border-radius: 15px; z-index: 2000; width: 90%; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body oncontextmenu="return false;">

    <div class="top-bar">
        <div class="top-icons">
            <i class="fas fa-search icon-btn"></i>
            <i class="fas fa-calendar-alt icon-btn" onclick="document.getElementById('calendar-modal').style.display='block'"></i>
            <span class="current-date">2026/03/23</span>
        </div>
        <img src="https://i.ibb.co/5T0S1S3/image-1.png" style="height: 40px; width: 40px; object-fit: contain;" alt="هجمة ولقطة">
    </div>

    <div id="matches-page" class="page-content active">
        <div class="date-tabs">
            <div class="date-tab" onclick="fetchMatches('yesterday', this)">مباريات الأمس</div>
            <div class="date-tab active" onclick="fetchMatches('today', this)">مباريات اليوم</div>
            <div class="date-tab" onclick="fetchMatches('tomorrow', this)">مباريات الغد</div>
        </div>
        <div id="matches-container"></div>
    </div>

    <div id="standings-page" class="page-content"><h3>جدول الترتيب</h3><p style="padding:20px; color:var(--text-dim);">جاري تحميل البيانات...</p></div>
    <div id="transfers-page" class="page-content"><h3>الانتقالات</h3><p style="padding:20px; color:var(--text-dim);">لا توجد انتقالات اليوم.</p></div>
    <div id="news-page" class="page-content"><h3>الأخبار</h3><p style="padding:20px; color:var(--text-dim);">تحميل آخر الأخبار...</p></div>
    <div id="more-page" class="page-content"><h3>المزيد</h3><p style="padding:20px; color:var(--text-dim);">إعدادات الحساب.</p></div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('matches', this)"><i class="fas fa-volleyball-ball"></i>المباريات</div>
        <div class="nav-item" onclick="switchTab('standings', this)"><i class="fas fa-list-ol"></i>الترتيب</div>
        <div class="nav-item" onclick="switchTab('transfers', this)"><i class="fas fa-exchange-alt"></i>الانتقالات</div>
        <div class="nav-item" onclick="switchTab('news', this)"><i class="fas fa-newspaper"></i>الأخبار</div>
        <div class="nav-item" onclick="switchTab('more', this)"><i class="fas fa-ellipsis-h"></i>المزيد</div>
    </nav>

    <script>
        // منع النسخ والاختصارات
        document.onkeydown = (e) => {
            if (e.ctrlKey && [67, 86, 85, 83].includes(e.keyCode)) return false;
            if (e.keyCode === 123) return false;
        };

        const API_KEYS = ["bf7d42ac856fecc0e1e6ad24debe9c5e", "df31d97917bce1190ac701b9db9f74b6"];
        // تعريف الدوريات المهمة (إنجليزي، إسباني، ألماني، إيطالي، فرنسي، أبطال أوروبا، مصري، سعودي)
        const IMPORTANT_IDS = [39, 140, 78, 135, 61, 2, 233, 307];

        function switchTab(pageId, el) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            el.classList.add('active');
        }

        async function fetchMatches(type, el) {
            if(el) {
                document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
                el.classList.add('active');
            }

            const container = document.getElementById('matches-container');
            container.innerHTML = '<p style="text-align:center; padding:30px; color:var(--text-dim);">جاري جلب المباريات الهامة...</p>';

            let date = new Date();
            if(type === 'yesterday') date.setDate(date.getDate() - 1);
            if(type === 'tomorrow') date.setDate(date.getDate() + 1);
            const dateStr = date.toISOString().split('T')[0];

            for (let key of API_KEYS) {
                try {
                    const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateStr}`, {
                        headers: {'x-rapidapi-host': 'v3.football.api-sports.io', 'x-rapidapi-key': key}
                    });
                    const data = await res.json();
                    
                    if(data.response && data.response.length > 0) {
                        // تصفية المباريات عشان نعرض المهمة فقط
                        const important = data.response.filter(m => IMPORTANT_IDS.includes(m.league.id));
                        // لو ملقاش مهمة في اللحظة دي، اعرض أول 15 مباراة متاحة عالمياً عشان الموقع ميبقاش فاضي
                        renderMatches(important.length > 0 ? important : data.response.slice(0, 15));
                        return;
                    }
                } catch(e) { console.log("Key failed"); }
            }
            container.innerHTML = '<p style="text-align:center; padding:20px;">لا توجد مباريات مسجلة حالياً.</p>';
        }

        function renderMatches(matches) {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';
            
            // تجميع حسب الدوري
            const grouped = matches.reduce((acc, m) => {
                const id = m.league.name;
                if (!acc[id]) acc[id] = {info: m.league, games: []};
                acc[id].games.push(m);
                return acc;
            }, {});

            for (let leagueName in grouped) {
                const league = grouped[leagueName];
                let leagueHTML = `
                    <div class="league-header">
                        <img src="${league.info.logo}">
                        <span>${league.info.name}</span>
                    </div>`;
                
                league.games.forEach(m => {
                    let status = m.fixture.status.short;
                    let score = `<div class="vs-text">SV</div>`;
                    let liveLabel = '';

                    if(status !== 'NS' && status !== 'TBD') {
                        score = `<div class="score-val">${m.goals.home} - ${m.goals.away}</div>`;
                    }
                    if(['1H','2H','HT'].includes(status)) {
                        liveLabel = `<div class="live-label">● مباشر ${m.fixture.status.elapsed}'</div>`;
                    } else if (status === 'FT') {
                        liveLabel = `<div style="font-size:0.7rem; color:var(--text-dim);">انتهت</div>`;
                    }

                    leagueHTML += `
                        <div class="match-card">
                            <div class="team-box"><img src="${m.teams.home.logo}"><p>${m.teams.home.name}</p></div>
                            <div class="status-box">${score}${liveLabel}</div>
                            <div class="team-box"><img src="${m.teams.away.logo}"><p>${m.teams.away.name}</p></div>
                        </div>`;
                });
                container.innerHTML += leagueHTML;
            }
        }

        window.onload = () => fetchMatches('today');
    </script>
</body>
            </html>
