<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة ولقطة - Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #00d2ff; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; padding-bottom: 80px; }
        header { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #30363d; }
        
        /* تصميم التبويبات */
        .tabs { display: flex; overflow-x: auto; background: #161b22; padding: 10px; gap: 10px; }
        .tab { padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; background: #21262d; color: #8b949e; }
        .tab.active { background: var(--accent); color: black; font-weight: bold; }

        .card { background: var(--card); margin: 12px; padding: 15px; border-radius: 12px; display: flex; align-items: center; border-right: 4px solid var(--accent); }
        .team { flex: 1; text-align: center; font-size: 0.85rem; }
        .team img { width: 35px; height: 35px; display: block; margin: 0 auto 5px; }
        .info { flex: 1; text-align: center; }
        .score { font-size: 1.3rem; font-weight: bold; color: var(--accent); }
        
        .btn-live { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; margin-top: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1} 50% {opacity:0.5} 100% {opacity:1} }

        /* شاشة البث */
        #live-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; flex-direction: column; }
        .player-container { width: 100%; flex: 1; position: relative; background: #000; }
        .close-bar { background: #333; padding: 15px; text-align: center; color: white; cursor: pointer; font-weight: bold; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0d1117; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #30363d; }
        .nav-item { color: #8b949e; font-size: 0.7rem; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: var(--accent);">هجمة ولقطة</div>
    <div id="search-icon">🔍</div>
</header>

<div class="tabs">
    <div class="tab" onclick="loadByDate(-1, this)">الأمس</div>
    <div class="tab active" onclick="loadByDate(0, this)">اليوم</div>
    <div class="tab" onclick="loadByDate(1, this)">الغد</div>
    <div class="tab" style="color:red" onclick="showLiveOnly()">🔴 مباشر</div>
</div>

<div id="matches-list"></div>

<div id="live-modal">
    <div class="close-bar" onclick="closeLive()">❌ إغلاق البث</div>
    <div class="player-container">
        <iframe id="main-player" src="" width="100%" height="100%" frameborder="0" allowfullscreen scrolling="no"></iframe>
    </div>
    <div style="padding: 10px; background: #111; font-size: 0.8rem; text-align: center; color: #aaa;">
        إذا ظهرت شاشة سوداء، انتظر ثواني للتحميل أو تأكد من جودة الإنترنت.
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item">⚽<br>المباريات</div>
    <div class="nav-item" onclick="showLiveOnly()">📺<br>البث</div>
    <div class="nav-item" onclick="window.location.href='https://wa.me/201040077271'">💬<br>المزيد</div>
</nav>

<script>
const key = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
let allMatches = [];

async function loadByDate(offset, el) {
    if(el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    const d = new Date(); d.setDate(d.getDate() + offset);
    const dateStr = d.toISOString().split('T')[0];
    
    document.getElementById('matches-list').innerHTML = '<p style="text-align:center">جاري جلب البيانات...</p>';
    
    try {
        const r = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateStr}`, {
            headers: { "x-rapidapi-key": key, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const json = await r.json();
        allMatches = json.response;
        render(allMatches);
    } catch(e) { document.getElementById('matches-list').innerHTML = 'خطأ في التحميل'; }
}

function render(matches) {
    const list = document.getElementById('matches-list');
    list.innerHTML = matches.map(m => {
        const isLive = ["1H","2H","HT"].includes(m.fixture.status.short);
        return `
        <div class="card">
            <div class="team"><img src="${m.teams.home.logo}">${m.teams.home.name}</div>
            <div class="info">
                <div class="score">${m.goals.home ?? 0} - ${m.goals.away ?? 0}</div>
                <div style="font-size:0.7rem">${m.fixture.status.long}</div>
                ${isLive ? `<button class="btn-live" onclick="openLive()">🔴 شاهد الآن</button>` : ''}
            </div>
            <div class="team"><img src="${m.teams.away.logo}">${m.teams.away.name}</div>
        </div>`;
    }).join('');
}

function showLiveOnly() {
    const live = allMatches.filter(m => ["1H","2H","HT"].includes(m.fixture.status.short));
    render(live.length > 0 ? live : []);
    if(live.length === 0) document.getElementById('matches-list').innerHTML = '<p style="text-align:center">لا توجد مباريات مباشرة الآن</p>';
}

function openLive() {
    document.getElementById('live-modal').style.display = 'flex';
    // ملاحظة: الروابط المجانية بتتوقف بسرعة. يفضل استخدام اشتراك IPTV أو سيرفر خاص.
    document.getElementById('main-player').src = "https://vidsrc.me/embed/movie?imdb=tt0111161"; // مثال لمشغل، غيره برابط البث المباشر
}

function closeLive() {
    document.getElementById('live-modal').style.display = 'none';
    document.getElementById('main-player').src = "";
}

loadByDate(0);
</script>
</body>
    </html>
