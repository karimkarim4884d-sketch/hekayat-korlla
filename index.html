<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مشغل البث - Zack Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #111; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #video { width: 80%; max-width: 800px; background: black; border-radius: 10px; }
    </style>
</head>
<body>

    <video id="video" controls autoplay></video>

    <script>
        var video = document.getElementById('video');
        // هنا تضع رابط البث الخاص بك (m3u8)
        var videoSrc = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'; 

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        }
        // للمتصفحات التي تدعم HLS أصلاً مثل Safari
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>
</body>
</html>
