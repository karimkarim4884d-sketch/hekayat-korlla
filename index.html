<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACK SMM | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --yellow: #faff00; --bg: #fdfdf5; --dark: #000; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; padding: 15px; }
        
        /* كارت الرصيد (نفس الصورة) */
        .balance-card { background: #fff; border: 4px solid #000; border-radius: 25px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .balance-val { font-size: 24px; font-weight: 900; }
        .balance-icon { background: var(--yellow); padding: 10px; border-radius: 12px; border: 2px solid #000; }

        /* نموذج الطلب */
        .card { background: #fff; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        select, input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #eee; background: #f9f9f9; font-family: 'Cairo'; margin-bottom: 12px; box-sizing: border-box; }
        
        .btn-order { width: 100%; background: #000; color: var(--yellow); padding: 18px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* صندوق فودافون كاش */
        .cash-section { border: 2px dashed #ff0000; background: #fff5f5; border-radius: 20px; padding: 15px; text-align: center; }
        .copy-btn { background: #000; color: #fff; border: none; padding: 5px 15px; border-radius: 8px; cursor: pointer; margin-top: 10px; }

        /* النافذة المنبثقة (Popup) */
        #customAlert { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border: 3px solid #000; padding: 30px; border-radius: 25px; display: none; z-index: 1000; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,0.5); width: 80%; }
    </style>
</head>
<body>

    <div class="balance-card">
        <div>
            <div style="font-size:12px; color:#888;">رصيد حسابك</div>
            <div class="balance-val">$0.4047</div>
        </div>
        <div class="balance-icon"><i class="fas fa-wallet"></i></div>
    </div>

    <div class="card">
        <label style="font-weight:bold; font-size:14px;">الخدمة</label>
        <select id="srv">
            <option>متابعين تيك توك - ضمان 30 يوم</option>
            <option>لايكات انستقرام حقيقية</option>
        </select>

        <input type="text" id="link" placeholder="ضع الرابط هنا...">
        <input type="number" id="qty" placeholder="الكمية (أقل شيء 100)">
        
        <button class="btn-order" onclick="processOrder()">تأكيد العملية الآن</button>
    </div>

    <div class="cash-section">
        <h3 style="color:#ff0000; margin:0 0 10px 0;"><i class="fas fa-mobile-alt"></i> شحن رصيد فودافون كاش</h3>
        <div style="font-size:20px; font-weight:bold; letter-spacing:2px;">01040077271</div>
        <button class="copy-btn" onclick="copyNum()">نسخ الرقم</button>
        <p style="font-size:11px; color:#666; margin-top:10px;">ارسل سكرين شوت + رقم المحول لتفعيل الرصيد</p>
    </div>

    <div id="customAlert">
        <div style="font-size:40px; color:green; margin-bottom:15px;"><i class="fas fa-check-circle"></i></div>
        <h2 style="margin:0;">تم بنجاح!</h2>
        <p>جاري معالجة طلبك عبر السيرفر بمفتاحك الخاص.</p>
        <button onclick="document.getElementById('customAlert').style.display='none'" style="background:#000; color:var(--yellow); padding:10px 30px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">حسناً</button>
    </div>

    <script>
        const API_KEY = "Af25c610001841c34364e8ad2d6d66e0";

        function processOrder() {
            const link = document.getElementById('link').value;
            if(!link) return alert("فين الرابط يا بطل؟");
            
            // إظهار النافذة الاحترافية بدل الـ Alert العادي
            document.getElementById('customAlert').style.display = 'block';
        }

        function copyNum() {
            navigator.clipboard.writeText("01040077271");
            alert("تم نسخ الرقم بنجاح!");
        }
    </script>
</body>
</html>
