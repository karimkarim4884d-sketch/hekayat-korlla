<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACK LIVE | شبكة الأسطورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .ostora-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; transition: 0.3s; cursor: pointer; }
        .ostora-card:hover { border-color: #eab308; transform: scale(1.05); }
        .video-player { border-bottom: 4px solid #eab308; box-shadow: 0 10px 50px rgba(0,0,0,0.9); }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-2xl mx-auto pb-20">

    <div id="loginSection" class="pt-24 px-6 text-center">
        <h1 class="text-4xl font-black text-yellow-500 italic mb-10">ZACK LIVE</h1>
        <div class="flex flex-col gap-4 max-w-xs mx-auto">
            <input type="text" id="uName" placeholder="اسمك" class="bg-[#0f172a] p-4 rounded-2xl text-center border border-slate-800 outline-none">
            <input type="password" id="uPass" placeholder="السر (للمدير)" class="bg-[#0f172a] p-4 rounded-2xl text-center border border-slate-800 outline-none">
            <button onclick="doLogin()" class="bg-yellow-500 text-black p-4 rounded-2xl font-black uppercase shadow-xl">دخول الشبكة</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="video-player sticky top-0 z-50 bg-black">
            <video id="video" controls autoplay playsinline class="w-full aspect-video"></video>
            <div class="p-3 bg-[#0f172a] flex justify-between items-center">
                <span id="pTitle" class="text-xs font-bold text-yellow-500">اختر قناة للمشاهدة..</span>
                <button onclick="logout()" class="text-[10px] text-gray-500"><i class="fas fa-power-off"></i></button>
            </div>
        </div>

        <div class="p-4">
            <div id="adminControls" class="hidden mb-6">
                <button onclick="fetchFromLink()" class="w-full bg-red-600 p-3 rounded-xl text-xs font-bold mb-4 uppercase">سحب القنوات من الرابط الجديد ⚡</button>
            </div>

            <h2 class="text-[10px] font-black text-gray-500 mb-4 uppercase tracking-[0.3em]">قنوات البث المباشر</h2>
            <div id="channelsGrid" class="grid grid-cols-3 sm:grid-cols-4 gap-3">
                </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('zack_live_db') || '[]');
        const m3uLink = 'https://share.google/jm1ifPVaCW0x0QGjT'; // الرابط بتاعك

        function doLogin() {
            const n = document.getElementById('uName').value;
            const p = document.getElementById('uPass').value;
            if(!n) return alert("اكتب اسمك");
            localStorage.setItem('u', n);
            localStorage.setItem('r', p === "7777" ? "admin" : "user");
            location.reload();
        }

        window.onload = function() {
            if(localStorage.getItem('u')) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                if(localStorage.getItem('r') === 'admin') document.getElementById('adminControls').classList.remove('hidden');
                render();
            }
        }

        async function fetchFromLink() {
            try {
                // ملاحظة: الرابط ده بيحتاج وسيط (Proxy) لو السيرفر مانع السحب المباشر
                const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(m3uLink));
                const json = await res.json();
                const content = json.contents;
                
                const lines = content.split('\n');
                let newCh = [];
                for(let i=0; i<lines.length; i++) {
                    if(lines[i].includes('#EXTINF')) {
                        let name = lines[i].split(',')[1] || 'قناة غير معروفة';
                        let url = lines[i+1]?.trim();
                        if(url && url.startsWith('http')) newCh.push({name, url});
                    }
                }
                db = newCh;
                localStorage.setItem('zack_live_db', JSON.stringify(db));
                render();
                alert("تم تحديث " + db.length + " قناة بنجاح!");
            } catch(e) { alert("حدث خطأ في السحب!"); }
        }

        function render() {
            const g = document.getElementById('channelsGrid');
            g.innerHTML = db.map(ch => `
                <div onclick="play('${ch.url}', '${ch.name}')" class="ostora-card p-4 text-center">
                    <i class="fas fa-play-circle text-red-600 text-lg mb-2"></i>
                    <span class="text-[9px] font-bold block truncate">${ch.name}</span>
                </div>
            `).join('');
        }

        function play(url, name) {
            document.getElementById('pTitle').innerText = "بث مباشر: " + name;
            const v = document.getElementById('video');
            if (Hls.isSupported()) {
                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                v.src = url; v.play();
            }
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
