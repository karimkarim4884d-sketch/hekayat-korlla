<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة - Zack</title>
    <style>
        :root {
            --dark-bg: #0b1118;
            --card-bg: #1a222d;
            --accent-cyan: #00f2ff;
            --accent-green: #00ff88;
            --accent-red: #ff4d4d;
            --text-gray: #a0aab2;
            --nav-active: #00f2ff;
        }

        body.light-mode { --dark-bg: #f5f5f5; --card-bg: #ffffff; color: #111; }
        body.large-font { font-size: 1.3rem; }
        body.small-font { font-size: 0.85rem; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: white; padding-bottom: 75px; transition: 0.3s; overflow-x: hidden; }

        .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: var(--dark-bg); position: sticky; top: 0; z-index: 1000; }
        .top-icons { display: flex; gap: 20px; align-items: center; }
        .icon-btn { color: white; font-size: 1.3rem; background: none; border: none; cursor: pointer; }
        .logo-small { height: 30px; }
        
        .time-tabs { display: flex; justify-content: space-around; background: var(--card-bg); padding: 10px 0; border-bottom: 1px solid #1e2732; }
        .time-tab { color: var(--text-gray); font-size: 0.9rem; font-weight: bold; cursor: pointer; padding: 5px 15px; border-radius: 15px; transition: 0.3s; }
        .time-tab.active { background: var(--accent-cyan); color: #000; }

        .date-display { text-align: center; padding: 10px; color: var(--text-gray); font-size: 0.8rem; }

        .section-container { display: none; padding: 10px; min-height: 80vh; }
        .section-container.active { display: block; }

        .league-header { padding: 15px 10px 5px; color: var(--accent-cyan); font-size: 0.9rem; font-weight: bold; border-right: 3px solid var(--accent-cyan); margin-bottom: 5px; }
        .match-row { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .team-box { display: flex; align-items: center; gap: 10px; flex: 1; font-size: 0.9rem; }
        .team-box.left { justify-content: flex-end; text-align: left; }
        .team-box img { width: 25px; height: 25px; object-fit: contain; }

        .status-box { text-align: center; min-width: 80px; }
        .score { font-weight: bold; color: var(--accent-cyan); font-size: 1.1rem; }
        .match-time { font-size: 0.75rem; color: var(--text-gray); display: block; }
        .live-tag { color: var(--accent-green); font-size: 0.7rem; font-weight: bold; animation: blink 1s infinite; }
        .finished-tag { color: var(--accent-red); font-size: 0.7rem; }

        @keyframes blink { 50% { opacity: 0.5; } }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f171f; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1e2732; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); font-size: 0.75rem; cursor: pointer; }
        .nav-item.active { color: var(--nav-active); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .setting-card { background: var(--card-bg); padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #333; }
        
        /* المشغل الجديد */
        .video-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .video-container { width: 95%; max-width: 800px; position: relative; background: #000; border-radius: 15px; overflow: hidden; }
        .close-video { position: absolute; top: -50px; left: 10px; color: white; font-size: 2.5rem; cursor: pointer; z-index: 2001; }
        .video-container iframe { width: 100%; height: 300px; border: none; }
        .server-switcher { display: flex; gap: 10px; margin-top: 15px; width: 95%; max-width: 800px; overflow-x: auto; padding: 5px; }
        .srv-btn { flex: 1; background: #2a3441; color: white; border: 1px solid var(--accent-cyan); padding: 10px; border-radius: 8px; font-size: 0.8rem; white-space: nowrap; cursor: pointer; }
        .srv-btn.active { background: var(--accent-cyan); color: #000; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body id="mainBody">

    <div id="videoOverlay" class="video-overlay">
        <span class="close-video" onclick="closePlayer()">&times;</span>
        <div class="video-container">
            <div id="playerHTML"></div>
        </div>
        <div class="server-switcher">
            <button class="srv-btn active" onclick="switchServer(1, event)">سيرفر 1 (رئيسي)</button>
            <button class="srv-btn" onclick="switchServer(2, event)">سيرفر 2 (احتياطي)</button>
            <button class="srv-btn" onclick="switchServer(3, event)">سيرفر 3 (عالمي)</button>
        </div>
        <p style="color:var(--text-gray); font-size: 0.7rem; margin-top: 10px;">إذا توقف السيرفر، جرب سيرفر آخر</p>
    </div>

    <div class="top-bar">
        <div class="top-icons">
            <button class="icon-btn" onclick="alert('القائمة قريباً')"><i class="fa-solid fa-bars"></i></button>
            <button class="icon-btn" onclick="openCalendar()"><i class="fa-regular fa-calendar-days"></i></button>
            <button class="icon-btn" onclick="location.reload()"><i class="fa-solid fa-rotate"></i></button>
            <input type="date" id="datePicker" style="display:none" onchange="handleDateChange(this.value)">
        </div>
        <img src="https://i.ibb.co/LzNfXpY/ball-icon.png" class="logo-small">
    </div>

    <div class="time-tabs" id="timeTabs">
        <div class="time-tab" onclick="filterByTime('yesterday', this)">الأمس</div>
        <div class="time-tab active" onclick="filterByTime('today', this)">اليوم</div>
        <div class="time-tab" onclick="filterByTime('tomorrow', this)">الغد</div>
    </div>

    <div class="date-display" id="dateLabel">جاري التحميل...</div>

    <div id="matches-section" class="section-container active">
        <div class="league-header">الدوري التجريبي</div>
        <div class="match-row" onclick="openPlayer('bein1')">
            <div class="team-box">ريال مدريد</div>
            <div class="status-box"><span class="score">0 - 0</span></div>
            <div class="team-box">برشلونة</div>
        </div>
        <div id="matches-list"></div>
    </div>

    <script>
        // دالة فتح المشغل
        function openPlayer(matchId) {
            document.getElementById('videoOverlay').style.display = 'flex';
            // تشغيل سيرفر 1 تلقائياً عند الفتح
            switchServer(1);
        }

        // دالة إغلاق المشغل
        function closePlayer() {
            document.getElementById('videoOverlay').style.display = 'none';
            document.getElementById('playerHTML').innerHTML = ''; // إيقاف الفيديو تماماً
        }

        // دالة التبديل بين السيرفرات
        function switchServer(serverNum, event) {
            // تحديث الألوان في الزراير
            const buttons = document.querySelectorAll('.srv-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');

            let videoUrl = "";
            
            // روابط سيرفرات البث (تقدر تغيرها براحتك)
            if (serverNum === 1) {
                videoUrl = "https://www.youtube.com/embed/live_stream?channel=UC4i8502Sqc_m5B-2Ww5nADg"; // مثال لايف
            } else if (serverNum === 2) {
                videoUrl = "https://www.dailymotion.com/embed/video/x8m3b22"; 
            } else {
                videoUrl = "https://vidsrc.me/embed/movie/tt0111161"; // سيرفر أفلام تجريبي
            }

            // حقن المشغل في الكود
            document.getElementById('playerHTML').innerHTML = `
                <iframe 
                    src="${videoUrl}" 
                    allowfullscreen="true" 
                    webkitallowfullscreen="true" 
                    mozallowfullscreen="true" 
                    scrolling="no" 
                    frameborder="0"
                    allow="autoplay; encrypted-media">
                </iframe>
            `;
        }

        // دوال وهمية لمنع الأخطاء في الكود الأصلي
        function filterByTime(t, el) { 
            document.querySelectorAll('.time-tab').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function openCalendar() { document.getElementById('datePicker').click(); }
        function handleDateChange(v) { document.getElementById('dateLabel').innerText = v; }
        
        // تعيين تاريخ اليوم كبداية
        document.getElementById('dateLabel').innerText = new Date().toLocaleDateString('ar-EG');
    </script>
</body>
</html>
