<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGMA W LAKTA</title>
    <style>
        :root { --main-red: #8b0000; --dark-bg: #050505; --accent: #00d2ff; }
        body { background: var(--dark-bg); color: white; margin: 0; font-family: 'Arial', sans-serif; padding-bottom: 70px; }
        
        header { padding: 20px; text-align: center; background: linear-gradient(to bottom, #1a0000, var(--dark-bg)); }
        .logo-text { font-size: 1.8rem; font-weight: bold; color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .match-card { 
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a); 
            margin: 15px; padding: 15px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid #333; position: relative; overflow: hidden;
        }
        .match-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--main-red); }

        .team { flex: 1; text-align: center; }
        .team img { width: 45px; height: 45px; object-fit: contain; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        .team-name { font-size: 0.8rem; margin-top: 5px; color: #ccc; }

        .score-box { flex: 0.7; text-align: center; }
        .vs { font-size: 1.2rem; font-weight: bold; color: var(--main-red); }
        .score { font-size: 1.8rem; font-weight: 900; color: white; }
        .status { font-size: 0.65rem; color: #888; margin-top: 5px; letter-spacing: 1px; }
        .live-dot { color: #ff0000; animation: blink 1s infinite; font-weight: bold; }

        @keyframes blink { 0% {opacity:1} 50% {opacity:0.3} 100% {opacity:1} }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-item { color: #555; font-size: 0.75rem; text-decoration: none; text-align: center; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo-text">HAGMA W LAKTA</div>
</header>

<div id="matches-container">
    <p style="text-align:center; padding:50px; color:#444;">Searching for matches...</p>
</div>

<nav class="nav">
    <a href="#" class="nav-item active">⚽<br>Matches</a>
    <a href="#" class="nav-item">📺<br>Live</a>
    <a href="https://wa.me/201040077271" class="nav-item">➕<br>More</a>
</nav>

<script>
const API_KEY = 'G7A1jgQBumWntdvz'; // تأكد إن المفتاح ده صحيح من موقع API-Football
const IMPORTANT_LEAGUES = [2, 3, 39, 140, 135, 78, 307, 233]; // أهم الدوريات

async function getLiveMatches() {
    const container = document.getElementById('matches-container');
    try {
        const response = await fetch('https://v3.football.api-sports.io/fixtures?live=all', {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': 'v3.football.api-sports.io' }
        });
        const data = await response.json();
        const matches = data.response;

        if (!matches || matches.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:50px;">No live matches right now.</p>';
            return;
        }

        container.innerHTML = matches.map(m => `
            <div class="match-card">
                <div class="team">
                    <img src="${m.teams.home.logo}" onerror="this.src='https://via.placeholder.com/40'">
                    <div class="team-name">${m.teams.home.name}</div>
                </div>
                <div class="score-box">
                    <div class="score">${m.goals.home} - ${m.goals.away}</div>
                    <div class="status"><span class="live-dot">●</span> LIVE ${m.fixture.status.elapsed}'</div>
                </div>
                <div class="team">
                    <img src="${m.teams.away.logo}" onerror="this.src='https://via.placeholder.com/40'">
                    <div class="team-name">${m.teams.away.name}</div>
                </div>
            </div>
        `).join('');

    } catch (error) {
        container.innerHTML = '<p style="text-align:center; padding:50px; color:red;">Connection Error. Check API Key.</p>';
    }
}

getLiveMatches();
setInterval(getLiveMatches, 60000); // تحديث كل دقيقة
</script>
</body>
</html>
