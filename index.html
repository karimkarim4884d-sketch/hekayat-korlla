<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة مرتدة - بث مباشر ومباريات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-color: #008136; /* لون أخضر رياضي */
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
        }

        /* شريط البحث والتقويم */
        .header-tools {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input[type="text"], input[type="date"] {
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--card-bg);
            color: white;
            flex: 1;
            min-width: 200px;
        }

        /* الأقسام (Tabs) */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background: var(--card-bg);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            flex: 1;
        }

        .tab-btn.active {
            background: var(--main-color);
        }

        /* كروت المباريات */
        .match-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 15px;
            border-right: 5px solid var(--main-color);
            transition: transform 0.2s;
        }

        .match-card:hover { transform: scale(1.02); }

        .team { text-align: center; width: 30%; }
        .team img { width: 40px; height: 40px; display: block; margin: 0 auto 5px; }

        .match-info { text-align: center; }
        .match-time { font-size: 1.2rem; font-weight: bold; color: var(--main-color); }
        .match-status { font-size: 0.8rem; color: #aaa; }

        /* زر الواتساب العائم */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-decoration: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: var(--main-color);">⚽ هجمة مرتدة</h2>

    <div class="header-tools">
        <input type="text" id="searchInput" placeholder="ابحث عن مباراة أو فريق..." onkeyup="filterMatches()">
        <input type="date" id="calendarInput" onchange="filterByDate()">
    </div>

    <div class="tabs">
        <button class="tab-btn" onclick="switchTab('yesterday', this)">مباريات الأمس</button>
        <button class="tab-btn active" onclick="switchTab('today', this)">مباريات اليوم</button>
        <button class="tab-btn" onclick="switchTab('tomorrow', this)">مباريات الغد</button>
    </div>

    <div id="matchesContainer">
        <div class="match-card" data-day="today" data-teams="ريال مدريد برشلونة">
            <div class="team">
                <img src="https://via.placeholder.com/40" alt="Home">
                <span>ريال مدريد</span>
            </div>
            <div class="match-info">
                <div class="match-time">22:00</div>
                <div class="match-status">الدوري الإسباني</div>
            </div>
            <div class="team">
                <img src="https://via.placeholder.com/40" alt="Away">
                <span>برشلونة</span>
            </div>
        </div>
        
        <div class="match-card" data-day="tomorrow" data-teams="ليفربول مانشستر سيتي">
            <div class="team">
                <img src="https://via.placeholder.com/40" alt="Home">
                <span>ليفربول</span>
            </div>
            <div class="match-info">
                <div class="match-time">18:00</div>
                <div class="match-status">الدوري الإنجليزي</div>
            </div>
            <div class="team">
                <img src="https://via.placeholder.com/40" alt="Away">
                <span>مان سيتي</span>
            </div>
        </div>
    </div>

    <a href="https://wa.me/201040077271" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        // دالة تبديل الأقسام (أمس، اليوم، غداً)
        function switchTab(day, btn) {
            // تحديث الأزرار
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // تصفية المباريات
            let matches = document.querySelectorAll('.match-card');
            matches.forEach(match => {
                if(match.getAttribute('data-day') === day) {
                    match.style.display = "flex";
                } else {
                    match.style.display = "none";
                }
            });
        }

        // دالة البحث الاحترافية
        function filterMatches() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let matches = document.querySelectorAll('.match-card');
            matches.forEach(match => {
                let teams = match.getAttribute('data-teams').toLowerCase();
                match.style.display = teams.includes(input) ? "flex" : "none";
            });
        }

        // دالة التقويم السنوي (فلترة بالتاريخ)
        function filterByDate() {
            let selectedDate = document.getElementById('calendarInput').value;
            alert("سيتم عرض مباريات تاريخ: " + selectedDate);
            // هنا تربطها بقاعدة البيانات لجلب ماتشات اليوم المختار
        }

        // تشغيل "اليوم" كافتراضي عند الفتح
        window.onload = () => {
            switchTab('today', document.querySelector('.tab-btn.active'));
        };
    </script>
</body>
                    </html>
