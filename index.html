<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema | Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .admin-sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: #0b0f1a; border-right: 2px solid #ef4444; z-index: 9999; transform: translateX(-100%); transition: 0.3s; }
        .admin-open { transform: translateX(0); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="adminPanel" class="admin-sidebar p-5 shadow-2xl">
        <h2 class="text-red-500 font-black text-center mb-5 border-b border-red-900 pb-2 italic text-lg uppercase">Zack Admin</h2>
        <div class="space-y-4">
            <input type="text" id="targetId" placeholder="أيدي العميل" class="w-full p-3 rounded-xl bg-black border border-slate-700 text-center font-bold outline-none">
            <input type="number" id="targetAmount" placeholder="الكمية" class="w-full p-3 rounded-xl bg-black border border-slate-700 text-center text-sm">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="cloudCharge('blue')" class="bg-blue-600 p-3 rounded-xl text-[9px] font-bold uppercase">شحن زرقاء</button>
                <button onclick="cloudCharge('red')" class="bg-red-600 p-3 rounded-xl text-[9px] font-bold uppercase">شحن حمراء</button>
            </div>
            <button onclick="cloudCharge('live')" class="w-full bg-green-600 p-3 rounded-xl font-bold text-xs uppercase">تفعيل البث ✅</button>
        </div>
        <button onclick="toggleAdmin()" class="mt-10 text-[10px] block mx-auto underline text-gray-500">إغلاق</button>
    </div>

    <div onclick="toggleAdmin()" style="position:fixed; top:0; left:0; width:60px; height:60px; z-index:9999;"></div>

    <div id="loginSection" class="w-full max-w-md glass rounded-[2.5rem] p-8 mt-10 text-center shadow-2xl border-t-4 border-blue-600">
        <h1 class="text-3xl font-black mb-6 italic text-blue-500 uppercase">Zack Cinema</h1>
        <input type="text" id="uName" placeholder="أدخل اسمك هنا" class="w-full p-4 rounded-2xl bg-black/50 border border-slate-800 text-center mb-4 font-bold outline-none">
        <button onclick="doLogin()" class="w-full bg-blue-600 p-4 rounded-2xl font-black shadow-lg">دخول</button>
    </div>

    <div id="userDash" class="hidden w-full max-w-md space-y-4">
        <div class="glass p-6 rounded-[2.5rem] border-b-4 border-blue-600 relative text-center">
            <button onclick="doLogout()" class="absolute top-4 left-6 text-red-500 font-bold text-[10px]">خروج</button>
            <h2 id="dispName" class="text-2xl font-black text-blue-400"></h2>
            <p id="dispId" class="text-xl font-mono font-bold mt-1"></p>
            <div class="flex gap-4 justify-center mt-4">
                <span class="text-[10px] bg-blue-900/30 px-4 py-1.5 rounded-full border border-blue-500/20">زرقاء: <b id="pBlue">0</b></span>
                <span class="text-[10px] bg-red-900/30 px-4 py-1.5 rounded-full border border-red-500/20">حمراء: <b id="pRed">0</b></span>
            </div>
        </div>

        <div id="liveBox" class="hidden glass p-4 rounded-[2.5rem] border-2 border-green-500 shadow-lg">
            <p class="text-green-500 text-[10px] font-bold mb-3 uppercase animate-pulse">● البث المباشر مفعّل</p>
            <iframe id="player" src="" class="w-full h-[200px] rounded-[20px]" allowfullscreen></iframe>
        </div>

        <a href="https://wa.me/201040077271" class="bg-green-600 flex items-center justify-center gap-2 w-full p-4 rounded-[2.5rem] font-black text-xs">
            <i class="fab fa-whatsapp"></i> خدمة العملاء (واتساب)
        </a>

        <div id="payOptions" class="space-y-4">
            <div class="glass p-5 rounded-[2.5rem] border border-red-900/30 text-center">
                <p class="text-[9px] mb-2 uppercase">تفعيل 15 يوم (300 حمراء)</p>
                <button onclick="userBuy('red')" class="w-full bg-red-600 p-3 rounded-2xl font-bold text-[10px]">تفعيل</button>
            </div>
        </div>
    </div>
