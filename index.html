<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACK SMM | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --yellow: #faff00; --bg: #fdfdf5; --dark: #000; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; padding: 15px; }
        #auth-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .auth-card { background: #fff; border: 4px solid #000; border-radius: 25px; padding: 30px; width: 100%; max-width: 400px; text-align: center; }
        #main-app { display: none; }
        .balance-card { background: #fff; border: 4px solid #000; border-radius: 25px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .balance-val { font-size: 28px; font-weight: 900; }
        .card { background: #fff; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 15px; font-family: 'Cairo'; box-sizing: border-box; }
        .btn-main { width: 100%; background: #000; color: var(--yellow); padding: 18px; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; }
        .cash-box { border: 2px dashed red; padding: 15px; border-radius: 20px; background: #fff5f5; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="auth-card">
            <h2>ZACK <span style="background:var(--yellow); padding:5px; border-radius:10px;">SMM</span></h2>
            <input type="number" id="auth-phone" placeholder="رقم الموبايل">
            <input type="password" id="auth-pass" placeholder="كلمة المرور">
            <button class="btn-main" onclick="handleAuth()">دخول / تسجيل</button>
        </div>
    </div>

    <div id="main-app">
        <div class="balance-card">
            <div>
                <div style="font-size:12px;">رصيدك الحالي</div>
                <div class="balance-val" id="user-balance">$0.0000</div>
            </div>
            <div style="background:var(--yellow); padding:10px; border-radius:10px; border:2px solid #000;"><i class="fas fa-wallet"></i></div>
        </div>

        <div class="card">
            <select id="srv"><option data-p="0.45">متابعين تيك توك ($0.45)</option></select>
            <input type="text" id="link" placeholder="الرابط...">
            <input type="number" id="qty" placeholder="الكمية...">
            <button class="btn-main" onclick="sendOrder()">تأكيد الطلب</button>
        </div>

        <div class="cash-box">
            <h4 style="color:red; margin:0;">شحن فوري (فودافون كاش)</h4>
            <div style="font-size:20px; font-weight:bold;">01040077271</div>
            <p style="font-size:10px;">الرصيد يضاف تلقائياً فور التحقق من العملية</p>
        </div>
    </div>

    <script>
        // البيانات اللي في صورتك يا بطل
        const firebaseConfig = {
            apiKey: "AIzaSyAubyhMKRbUApvTtIpDVo5...",
            authDomain: "mmss-242e6.firebaseapp.com",
            projectId: "mmss-242e6",
            storageBucket: "mmss-242e6.firebasestorage.app",
            messagingSenderId: "767920291158",
            appId: "1:767920291158:web:61e1eaacd48..."
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let userUID = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                userUID = user.uid;
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                db.ref('users/' + userUID + '/balance').on('value', s => {
                    document.getElementById('user-balance').innerText = "$" + (s.val() || 0).toFixed(4);
                });
            }
        });

        async function handleAuth() {
            const email = document.getElementById('auth-phone').value + "@zack.com";
            const pass = document.getElementById('auth-pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                await auth.createUserWithEmailAndPassword(email, pass);
                db.ref('users/' + auth.currentUser.uid).set({ balance: 0 });
            }
        }

        function sendOrder() {
            alert("تم استلام طلبك! سيتم الخصم من الرصيد فور التنفيذ.");
        }
    </script>
</body>
    </html>
