<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة ولقطة - النسخة الاحترافية</title>
    <style>
        :root {
            --dark-bg: #001220;
            --card-bg: #003366;
            --accent-orange: #ff6b35;
            --text-white: #ffffff;
            --light-blue: #00bfff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--dark-bg); color: var(--text-white); padding: 10px; }

        header { text-align: center; padding: 15px; color: var(--accent-orange); }

        .search-area { max-width: 500px; margin: 0 auto 15px; }
        .search-box {
            display: flex; background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 0 15px rgba(0,191,255, 0.2);
        }
        .search-box input {
            flex: 1; padding: 14px; border: none; outline: none; font-size: 1rem; color: #333; text-align: right;
        }
        .search-box button {
            padding: 0 20px; background: var(--accent-orange); border: none; color: white; cursor: pointer; font-weight: bold;
        }

        .tabs { display: flex; gap: 8px; max-width: 500px; margin: 0 auto 20px; }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; background: #002a4d; 
            color: white; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .tab-btn.active { background: var(--accent-orange); transform: translateY(-2px); }

        .match-container { max-width: 550px; margin: 0 auto; }

        .league-title { 
            text-align: center; font-size: 0.75rem; color: var(--light-blue); 
            margin: 25px 0 10px; font-weight: bold; background: rgba(0, 191, 255, 0.1); padding: 5px; border-radius: 5px;
        }

        .match-card {
            background: var(--card-bg);
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            border-right: 4px solid var(--light-blue);
        }

        .team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .team img { width: 45px; height: 45px; object-fit: contain; }
        .team span { font-size: 0.9rem; font-weight: bold; text-align: center; color: white; }

        .center-info { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 0 15px; }
        .vs-badge {
            background: var(--accent-orange); color: white; padding: 4px 12px;
            border-radius: 6px; font-weight: bold; font-size: 0.8rem;
        }
        .time { font-size: 0.85rem; font-weight: bold; color: var(--light-blue); }

        .no-result { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>

<header><h1>⚽ هجمة ولقطة</h1></header>

<div class="search-area">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث باسم الفريق بالعربي أو English..." oninput="filterData()">
        <button onclick="filterData()">بحث</button>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn" id="yesterday" onclick="getMatches(-1, 'yesterday')">مباريات الأمس</button>
    <button class="tab-btn active" id="today" onclick="getMatches(0, 'today')">مباريات اليوم</button>
    <button class="tab-btn" id="tomorrow" onclick="getMatches(1, 'tomorrow')">مباريات الغد</button>
</div>

<div id="matches-list" class="match-container">
    <div class="no-result">⏳ جاري تحميل الماتشات...</div>
</div>

<script>
const API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
let currentData = []; 

// قاموس ترجمة شامل (ضيف فيه براحتك)
const dictionary = {
    "Real Madrid": "ريال مدريد", "Barcelona": "برشلونة", "Liverpool": "ليفربول",
    "Manchester City": "مانشستر سيتي", "Manchester United": "مانشستر يونايتد",
    "Arsenal": "أرسنال", "Chelsea": "تشيلسي", "Tottenham": "توتنهام",
    "Bayern Munich": "بايرن ميونخ", "Dortmund": "دورتموند", "Paris Saint Germain": "باريس سان جيرمان",
    "Juventus": "يوفنتوس", "AC Milan": "ميلان", "Inter": "إنتر ميلان",
    "Al Ahly": "الأهلي", "Zamalek": "الزمالك", "Pyramids": "بيراميدز",
    "Al Hilal": "الهلال", "Al Nassr": "النصر", "Al Ittihad": "الاتحاد",
    "La Liga": "الدوري الإسباني", "Premier League": "الدوري الإنجليزي", 
    "Serie A": "الدوري الإيطالي", "Bundesliga": "الدوري الألماني", "Ligue 1": "الدوري الفرنسي"
};

const ar = (name) => dictionary[name] || name;

async function getMatches(offset, btnId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(btnId).classList.add('active');

    const d = new Date();
    d.setDate(d.getDate() + offset);
    const dateStr = d.toISOString().split('T')[0];

    const list = document.getElementById('matches-list');
    list.innerHTML = '<div class="no-result">⏳ جاري جلب البيانات...</div>';

    try {
        const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateStr}`, {
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const json = await res.json();
        currentData = json.response;
        render(currentData);
    } catch (e) {
        list.innerHTML = "<div class='no-result'>⚠️ فشل في الاتصال بالبيانات</div>";
    }
}

function render(data) {
    const list = document.getElementById('matches-list');
    if (!data || data.length === 0) {
        list.innerHTML = '<div class="no-result">لا توجد مباريات متاحة</div>';
        return;
    }
    
    list.innerHTML = '';
    data.forEach(m => {
        const matchTime = new Date(m.fixture.date).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
        list.innerHTML += `
            <div class="match-item">
                <div class="league-title">🏆 ${ar(m.league.name)}</div>
                <div class="match-card">
                    <div class="team">
                        <img src="${m.teams.home.logo}" onerror="this.src='https://via.placeholder.com/45'">
                        <span>${ar(m.teams.home.name)}</span>
                    </div>
                    <div class="center-info">
                        <div class="vs-badge">VS</div>
                        <div class="time">${matchTime}</div>
                    </div>
                    <div class="team">
                        <img src="${m.teams.away.logo}" onerror="this.src='https://via.placeholder.com/45'">
                        <span>${ar(m.teams.away.name)}</span>
                    </div>
                </div>
            </div>
        `;
    });
}

function filterData() {
    const val = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = currentData.filter(m => {
        const hEn = m.teams.home.name.toLowerCase();
        const aEn = m.teams.away.name.toLowerCase();
        const hAr = ar(m.teams.home.name);
        const aAr = ar(m.teams.away.name);
        
        return hEn.includes(val) || aEn.includes(val) || hAr.includes(val) || aAr.includes(val);
    });
    render(filtered);
}

getMatches(0, 'today');
</script>
</body>
</html>
