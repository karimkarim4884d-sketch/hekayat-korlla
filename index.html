<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هجمة ولقطة</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial;
}

/* HEADER */
header {
  background: #c40000;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* MENU */
.menu-btn {
  font-size: 25px;
  cursor: pointer;
}

.menu {
  display: none;
  background: #111;
}

.menu div {
  padding: 15px;
  border-bottom: 1px solid #333;
}

/* MAIN */
.main-btn {
  margin: 10px;
  padding: 15px;
  background: #111;
  border-bottom: 1px solid #333;
  font-size: 18px;
  cursor: pointer;
}

.main-btn:hover {
  background: #1a1a1a;
}

/* PAGES */
.page {
  display: none;
  padding: 15px;
}

/* SERVER BUTTONS */
.server-btn {
  padding: 10px;
  margin: 5px;
  background: #222;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

.server-btn:hover {
  background: red;
}
</style>

</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div>🔥 هجمة ولقطة 🔥</div>
</header>

<!-- MENU (الدعم) -->
<div class="menu" id="menu">

  <div>📱 واتساب:<br>
  <a href="https://wa.me/201040077271" style="color:lightgreen;">
  01040077271</a></div>

  <div>📧 البريد:<br>
  <a href="mailto:karimkarim4884d@gmail.com" style="color:skyblue;">
  karimkarim4884d@gmail.com</a></div>

  <div>⚽ موقع هجمة ولقطة - بث مباشر ومباريات</div>

</div>

<!-- الواجهة -->
<div onclick="openPage('live')" class="main-btn">📡 بث مباشر</div>
<div onclick="openPage('matches')" class="main-btn">📊 نتائج الماتشات</div>
<div onclick="openPage('series')" class="main-btn">📺 مسلسلات</div>
<div onclick="openPage('movies')" class="main-btn">🎬 أفلام مصرية</div>
<div onclick="openPage('quran')" class="main-btn">📖 القرآن الكريم</div>

<!-- البث -->
<div id="live" class="page">

📡 اختر السيرفر 👇<br><br>

<button class="server-btn" onclick="changeServer(1)">Server 1</button>
<button class="server-btn" onclick="changeServer(2)">Server 2</button>
<button class="server-btn" onclick="changeServer(3)">Server 3</button>

<br><br>

<iframe id="player" width="100%" height="220"
src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig"
allowfullscreen></iframe>

</div>

<!-- باقي الصفحات -->
<div id="matches" class="page">
📊 نتائج الماتشات قريبًا ⚽
</div>

<div id="series" class="page">
📺 مسلسلات قريبًا
</div>

<div id="movies" class="page">
🎬 أفلام مصرية قريبًا
</div>

<div id="quran" class="page">
📖 القرآن الكريم<br><br>
<audio controls>
<source src="https://download.quranicaudio.com/quran/mishary_rashid_alafasy/001.mp3">
</audio>
</div>

<script>
function toggleMenu() {
  let menu = document.getElementById("menu");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

function openPage(pageId) {
  let pages = document.querySelectorAll(".page");
  pages.forEach(p => p.style.display = "none");
  document.getElementById(pageId).style.display = "block";
}

function changeServer(num) {
  let player = document.getElementById("player");

  if(num == 1) {
    player.src = "https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig";
  }

  if(num == 2) {
    player.src = "https://player.vimeo.com/video/76979871";
  }

  if(num == 3) {
    player.src = "https://www.youtube.com/embed/dQw4w9WgXcQ";
  }
}
</script>

</body>
