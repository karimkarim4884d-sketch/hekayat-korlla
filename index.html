<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACK SMM | الموزع المعتمد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --yellow: #faff00; --bg: #fdfdf5; --dark: #000; --gray: #f4f4f4; }
        body { background-color: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; padding: 15px; color: var(--dark); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 28px; margin: 0; letter-spacing: -1px; }
        .header span { background: var(--yellow); padding: 0 12px; border-radius: 10px; border: 2px solid #000; }

        /* أيقونات المنصات المحدثة */
        .platform-grid { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .platform-item { min-width: 65px; height: 65px; background: #fff; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .platform-item.active { border-color: var(--dark); background: var(--yellow); transform: translateY(-5px); }

        .card { background: #fff; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 14px; }
        select, input { width: 100%; padding: 16px; border-radius: 15px; border: 1px solid #eee; background: var(--gray); font-family: 'Cairo'; margin-bottom: 15px; box-sizing: border-box; font-weight: bold; }
        
        .price-display { background: var(--dark); color: var(--yellow); padding: 18px; border-radius: 18px; text-align: center; margin-bottom: 15px; }
        .price-display span { font-size: 22px; }

        .btn-main { width: 100%; background: var(--dark); color: var(--yellow); padding: 18px; border: none; border-radius: 18px; font-weight: 900; font-size: 17px; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }

        /* قسم فودافون كاش */
        .payment-box { border: 2px dashed #d00; border-radius: 20px; padding: 15px; background: #fff5f5; }
        .payment-box h3 { color: #d00; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .copy-box { background: #eee; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-family: monospace; font-size: 18px; }
        .rules { font-size: 12px; color: #555; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ZACK <span>SMM</span></h1>
    </div>

    <div class="platform-grid">
        <div class="platform-item active" onclick="changeSet('tiktok', this)"><i class="fab fa-tiktok"></i></div>
        <div class="platform-item" onclick="changeSet('insta', this)"><i class="fab fa-instagram"></i></div>
        <div class="platform-item" onclick="changeSet('fb', this)"><i class="fab fa-facebook-f"></i></div>
        <div class="platform-item" onclick="changeSet('yt', this)"><i class="fab fa-youtube"></i></div>
        <div class="platform-item" onclick="changeSet('wa', this)"><i class="fab fa-whatsapp"></i></div>
        <div class="platform-item" onclick="changeSet('tele', this)"><i class="fab fa-telegram"></i></div>
    </div>

    <div class="card">
        <label class="label">الخدمة</label>
        <select id="services" onchange="calc()"></select>

        <label class="label">رابط الحساب/البوست</label>
        <input type="text" id="link" placeholder="انسخ الرابط هنا...">

        <label class="label">الكمية المطلوبة</label>
        <input type="number" id="qty" placeholder="أقل كمية 100" oninput="calc()">

        <div class="price-display">السعر الإجمالي: $<span id="total">0.00</span></div>
        <button class="btn-main" onclick="order()">تأكيد العملية الآن</button>
    </div>

    <div class="card payment-box">
        <h3><i class="fas fa-wallet"></i> شحن رصيد (فودافون كاش)</h3>
        <div class="copy-box">
            <span>01040077271</span>
            <i class="far fa-copy" style="cursor:pointer" onclick="alert('تم النسخ')"></i>
        </div>
        <div class="rules">
            <b>⚠️ شروط قبول الشحن:</b><br>
            1. يجب إرسال <b>سكرين شوت</b> واضحة للتحويل.<br>
            2. كتابة <b>الرقم الذي تم التحويل منه</b> في الملاحظات.<br>
            3. يتم إضافة الرصيد خلال 5 دقائق من التأكد.
        </div>
    </div>

    <script>
        const API_KEY = "Af25c610001841c34364e8ad2d6d66e0"; // المفتاح الجديد
        
        const data = {
            tiktok: [{id: 5520, n: "متابعين تيك توك", p: 0.40}, {id: 5521, n: "لايكات تيك توك", p: 0.10}],
            insta: [{id: 1010, n: "متابعين انستجرام", p: 0.70}],
            fb: [{id: 3030, n: "لايكات فيسبوك", p: 0.30}],
            yt: [{id: 4040, n: "مشتركين يوتيوب", p: 2.50}],
            wa: [{id: 9090, n: "رسائل واتساب جماعية", p: 1.20}],
            tele: [{id: 8080, n: "أعضاء قنوات تليجرام", p: 0.60}]
        };

        function changeSet(p, el) {
            document.querySelectorAll('.platform-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            const s = document.getElementById('services');
            s.innerHTML = "";
            data[p].forEach(item => {
                let o = document.createElement('option');
                o.value = item.id;
                o.dataset.p = item.p;
                o.innerText = item.n;
                s.appendChild(o);
            });
            calc();
        }

        function calc() {
            const s = document.getElementById('services');
            const price = parseFloat(s.options[s.selectedIndex]?.dataset.p || 0);
            const q = parseInt(document.getElementById('qty').value) || 0;
            document.getElementById('total').innerText = ((q/1000)*price).toFixed(2);
        }

        function order() {
            const l = document.getElementById('link').value;
            if(!l) return alert("فين الرابط يا زاك؟");
            alert("جاري الربط بالسيرفر... الطلب قيد التنفيذ بمفتاحك الجديد");
        }

        changeSet('tiktok', document.querySelector('.platform-item'));
    </script>
</body>
</html>
