<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hagma W Lakta - 2026</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #00d2ff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Segoe UI', sans-serif; padding-bottom: 70px; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid #30363d; background: var(--bg); }
        .logo-text { font-size: 1.5rem; font-weight: bold; color: var(--accent); letter-spacing: 1px; }
        
        /* كارت المباراة المطور */
        .match-card { background: var(--card); margin: 12px; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--accent); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .team { flex: 1; text-align: center; }
        .team img { width: 42px; height: 42px; display: block; margin: 0 auto 8px; object-fit: contain; }
        .team-name { font-size: 0.85rem; font-weight: 600; }
        
        .score-box { flex: 0.8; text-align: center; }
        .score { font-size: 1.6rem; font-weight: 800; color: var(--accent); margin-bottom: 2px; }
        .status { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
        .live-tag { color: #ff4d4d; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1} 50% {opacity:0.4} 100% {opacity:1} }

        .nav { position: fixed; bottom: 0; width: 100%; background: #0d1117; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #30363d; }
    </style>
</head>
<body>

<header>
    <div class="logo-text">HAGMA W LAKTA</div>
</header>

<div id="matches-list">
    <p style="text-align:center; padding:20px;">⏳ Loading Top Matches...</p>
</div>

<nav class="nav">
    <div style="color: var(--accent)">⚽ Matches</div>
    <div style="color: #8b949e">📺 Live</div>
    <div style="color: #8b949e">➕ More</div>
</nav>

<script>
// المفتاح الجديد بتاعك يا Zack
const API_KEY = 'G7A1jgQBumWntdvz'; 
// فلتر الدوريات المهمة (أبطال أوروبا، إنجلترا، إسبانيا، إيطاليا، ألمانيا، الدوري السعودي، المصري)
const TOP_LEAGUES = [2, 3, 39, 140, 135, 78, 307, 233];

async function loadTopMatches() {
    const today = new Date().toISOString().split('T')[0];
    const list = document.getElementById('matches-list');
    
    try {
        const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${today}`, {
            headers: { 
                "x-rapidapi-key": API_KEY, 
                "x-rapidapi-host": "v3.football.api-sports.io" 
            }
        });
        const data = await res.json();
        
        // تطبيق الفلتر على الدوريات المهمة فقط
        const filtered = data.response.filter(m => TOP_LEAGUES.includes(m.league.id));
        
        // لو مفيش ماتشات في الدوريات دي حالياً، اعرض أول 10 ماتشات عادية
        const displayMatches = filtered.length > 0 ? filtered : data.response.slice(0, 10);

        list.innerHTML = displayMatches.map(m => {
            const isLive = ["1H", "2H", "HT", "ET", "P"].includes(m.fixture.status.short);
            const time = new Date(m.fixture.date).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
            
            return `
            <div class="match-card">
                <div class="team">
                    <img src="${m.teams.home.logo}" alt="logo">
                    <div class="team-name">${m.teams.home.name}</div>
                </div>
                <div class="score-box">
                    <div class="score">${m.goals.home ?? 0} - ${m.goals.away ?? 0}</div>
                    <div class="status ${isLive ? 'live-tag' : ''}">
                        ${isLive ? '🔴 LIVE ' + m.fixture.status.elapsed + "'" : (m.fixture.status.short === 'FT' ? 'Finished' : time)}
                    </div>
                </div>
                <div class="team">
                    <img src="${m.teams.away.logo}" alt="logo">
                    <div class="team-name">${m.teams.away.name}</div>
                </div>
            </div>`;
        }).join('');

    } catch (e) {
        list.innerHTML = '<p style="text-align:center; padding:20px;">⚠️ Error Connection</p>';
    }
}

loadTopMatches();
</script>
</body>
</html>
