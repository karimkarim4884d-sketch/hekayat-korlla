    <script>
        // الرابط بتاع قاعدة البيانات بتاعتك
        const api = "https://karim-884d-default-rtdb.firebaseio.com/movies.json";

        function toggleAdmin() {
            const a = document.getElementById('admin');
            a.style.display = a.style.display === 'block' ? 'none' : 'block';
        }

        // وظيفة الإضافة من الموقع نفسه
        async function addMovie() {
            const m = {
                title: document.getElementById('m-title').value,
                link: document.getElementById('m-link').value,
                img: document.getElementById('m-img').value || "https://via.placeholder.com/300"
            };
            if(!m.title || !m.link) return alert("اكتب الاسم والرابط الأول!");
            
            await fetch(api, { method: 'POST', body: JSON.stringify(m) });
            alert("تم النشر بنجاح!");
            toggleAdmin();
            location.reload(); // تحديث الصفحة عشان تشوف الجديد
        }

        // وظيفة عرض الأفلام (المعدلة عشان تقرأ من البوت صح)
        async function render() {
            const g = document.getElementById('main-grid');
            try {
                const res = await fetch(api);
                const data = await res.json();
                g.innerHTML = '';
                
                if(data) {
                    // ترتيب من الأحدث للأقدم
                    const keys = Object.keys(data).reverse();
                    keys.forEach(id => {
                        const i = data[id];
                        // تأكد إن البيانات موجودة عشان مظهرش undefined
                        const title = i.title || "بدون عنوان";
                        const link = i.link || "#";
                        const img = i.img || "https://via.placeholder.com/300";

                        g.innerHTML += `
                            <div class="movie-card" onclick="window.location.href='${link}'">
                                <img src="${img}" onerror="this.src='https://via.placeholder.com/300'">
                                <div class="movie-title">${title}</div>
                            </div>
                        `;
                    });
                } else {
                    g.innerHTML = '<p style="text-align:center; grid-column: 1/4;">لا يوجد محتوى حالياً.. ابعت من البوت!</p>';
                }
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
            }
        }
        
        window.onload = render;
    </script>
