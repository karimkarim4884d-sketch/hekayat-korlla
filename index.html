<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema - اسمع الآن</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { background: linear-gradient(45deg, #b31312, #ff1f1f); padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(179, 19, 18, 0.3); }
        input { width: 90%; padding: 15px; border-radius: 30px; border: none; font-size: 18px; margin-top: 20px; outline: none; text-align: center; }
        .search-btn { background: #fff; color: #b31312; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 18px; transition: 0.3s; }
        .search-btn:hover { transform: scale(1.05); background: #eee; }
        
        /* التحديث الجديد: شاشة التحميل */
        #loading-screen { display: none; margin-top: 30px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #b31312; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #video-container { margin-top: 30px; display: none; background: #000; border: 2px solid #b31312; border-radius: 15px; overflow: hidden; }
        iframe { width: 100%; height: 450px; border: none; }
        .status-text { color: #00ff00; font-family: monospace; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Zack Cinema 🎬</h1>
            <p>اكتب اسم المسلسل أو الفيلم</p>
            <input type="text" id="movieName" placeholder="مثلاً: ولاد رزق، الهيبة...">
            <br>
            <button class="search-btn" onclick="startUpdate()">تحديث السيرفر والتشغيل</button>
        </div>

        <div id="loading-screen">
            <div class="loader"></div>
            <p class="status-text" id="status-msg">جارٍ الاتصال بقاعدة البيانات...</p>
        </div>

        <div id="video-container">
            <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function startUpdate() {
            var name = document.getElementById('movieName').value;
            if (name == "") { alert("اكتب اسم العمل يا Zack!"); return; }

            // إخفاء المشغل القديم وإظهار التحميل
            document.getElementById('video-container').style.display = "none";
            document.getElementById('loading-screen').style.display = "block";
            
            var messages = [
                "جارٍ فحص 100+ سيرفر...",
                "تحديث روابط البث الحية...",
                "تجاوز الإعلانات المزعجة...",
                "تم العثور على أفضل جودة (4K)...",
                "اتصال آمن بنسبة 100%..."
            ];
            
            var i = 0;
            var interval = setInterval(function() {
                document.getElementById('status-msg').innerText = messages[i];
                i++;
                if (i >= messages.length) {
                    clearInterval(interval);
                    showVideo(name);
                }
            }, 800); // سرعة تحديث الرسائل
        }

        function showVideo(name) {
            document.getElementById('loading-screen').style.display = "none";
            document.getElementById('video-container').style.display = "block";
            
            // الربط مع أقوى سيرفر بحث (بيمسح السيرفر القديم ويفتح الجديد)
            document.getElementById('videoPlayer').src = "https://vidsrc.me/embed/movie?query=" + encodeURIComponent(name);
        }
    </script>
</body>
</html>
