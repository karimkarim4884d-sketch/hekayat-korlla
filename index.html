<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ موقع الكورة - Live Matches</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    body { 
      background: linear-gradient(135deg, #001f3f, #003366); 
      color: white; 
      min-height: 100vh; 
      padding: 20px;
    }
    
    header { 
      text-align: center; 
      padding: 30px 0; 
      background: rgba(0,51,102,0.8);
      border-radius: 20px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }
    
    h1 { font-size: 2.5rem; margin-bottom: 10px; }
    
    .section { 
      max-width: 900px; 
      margin: 30px auto; 
      padding: 0 20px;
    }
    
    .section-title { 
      background: linear-gradient(90deg, #ff6b35, #f7931e, #00bfff); 
      padding: 20px; 
      border-radius: 20px; 
      margin-bottom: 25px; 
      text-align: center; 
      font-size: 1.8rem; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    
    .match { 
      background: rgba(0,51,102,0.9); 
      padding: 25px; 
      margin-bottom: 20px; 
      border-radius: 20px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      transition: all 0.3s;
      border-right: 6px solid #00bfff;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }
    
    .match:hover { 
      transform: translateY(-5px); 
      box-shadow: 0 15px 40px rgba(0,191,255,0.4); 
    }
    
    .teams { flex: 1; }
    .match h3 { 
      margin: 0 0 10px; 
      font-size: 1.6rem; 
      color: #00ff88;
    }
    
    .match-info p { 
      margin: 5px 0; 
      opacity: 0.9; 
      font-size: 1rem;
    }
    
    .score { 
      font-size: 2rem; 
      font-weight: bold; 
      min-width: 120px; 
      text-align: center;
      padding: 15px 20px;
      border-radius: 15px;
      background: linear-gradient(45deg, #00ff00, #32cd32);
      color: black;
      box-shadow: 0 5px 15px rgba(0,255,0,0.3);
    }
    
    .loading { 
      text-align: center; 
      padding: 60px 20px; 
      color: #00bfff; 
      font-size: 1.4rem; 
    }
    
    .refresh-btn {
      background: linear-gradient(45deg, #ff6b35, #f7931e);
      border: none;
      color: white;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 1.1rem;
      cursor: pointer;
      margin: 20px auto;
      display: block;
      transition: all 0.3s;
    }
    
    .refresh-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(255,107,53,0.4);
    }
    
    @media (max-width: 768px) { 
      .match { flex-direction: column; text-align: center; gap: 20px; }
      h1 { font-size: 2rem; }
      .section-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚽ موقع الكورة التلقائي</h1>
