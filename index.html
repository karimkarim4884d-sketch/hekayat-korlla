<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة مرتدة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --primary: #00ff62;
            --text-dark: #2d3436;
            --text-light: #636e72;
            --live: #ff4757;
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0; color: var(--text-dark);
            user-select: none; -webkit-user-select: none;
        }

        /* الهيدر */
        .app-header {
            background: #fff; padding: 15px; display: flex; 
            justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100;
        }
        .app-header h1 { font-size: 20px; color: var(--primary); margin: 0; filter: drop-shadow(0 0 2px #000); }

        /* شريط البحث */
        .search-box { padding: 15px; }
        .search-box input {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd;
            outline: none; box-sizing: border-box; background: #fff;
        }

        /* كارد المباراة - نفس صورة 1000017637 */
        .matches-list { padding: 10px; max-width: 600px; margin: 0 auto; }
        .match-card {
            background: var(--bg-card); border-radius: 15px; padding: 15px;
            margin-bottom: 12px; display: flex; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer;
        }

        .team-side { flex: 1; text-align: center; }
        .team-side img { width: 40px; height: 40px; object-fit: contain; }
        .team-name { font-size: 13px; font-weight: 600; margin-top: 5px; display: block; }

        .match-center { width: 100px; text-align: center; }
        .m-time { font-size: 14px; font-weight: bold; color: #555; }
        .m-score { font-size: 22px; font-weight: 900; color: #000; margin: 5px 0; }
        
        /* دائرة الوقت - صورة 1000017715 */
        .live-circle {
            width: 40px; height: 40px; border: 2px solid #eee; border-radius: 50%;
            display: inline-flex; flex-direction: column; align-items: center;
            justify-content: center; border-top-color: var(--primary);
        }
        .live-min { font-size: 11px; font-weight: bold; color: var(--primary); }

        /* Modal - نافذة التفاصيل */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 1000; overflow-y: auto;
        }
        .modal-head {
            padding: 20px; background: var(--bg-body); text-align: center;
            position: relative; border-bottom: 1px solid #eee;
        }
        .back-btn { position: absolute; right: 20px; top: 25px; font-size: 20px; cursor: pointer; }

        .modal-tabs {
            display: flex; background: #fff; border-bottom: 1px solid #eee;
            position: sticky; top: 0;
        }
        .m-tab {
            flex: 1; text-align: center; padding: 15px; color: var(--text-light);
            font-weight: 600; cursor: pointer; font-size: 14px;
        }
        .m-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* الإحصائيات - صورة 1000017638 */
        .stat-row { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #f1f1f1; }
        .stat-label { color: var(--text-light); font-size: 13px; }

        .wa-float {
            position: fixed; bottom: 20px; left: 20px; background: #25d366;
            color: #fff; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 28px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); text-decoration: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="app-header">
    <i class="fas fa-bars"></i>
    <h1>هجمة مرتدة ⚽</h1>
    <i class="fas fa-calendar-alt"></i>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="ابحث عن مباراة أو فريق..." onkeyup="search()">
</div>

<div class="matches-list" id="list">
    </div>

<div id="modal">
    <div class="modal-head">
        <i class="fas fa-chevron-right back-btn" onclick="closeModal()"></i>
        <div id="modal-match-info"></div>
    </div>
    <div class="modal-tabs">
        <div class="m-tab active" onclick="tab('events', this)">الأحداث</div>
        <div class="m-tab" onclick="tab('stats', this)">الإحصائيات</div>
        <div class="m-tab" onclick="tab('lineups', this)">التشكيلة</div>
    </div>
    <div id="modal-content" style="padding-bottom: 40px;"></div>
</div>

<a href="https://wa.me/201040077271" class="wa-float"><i class="fab fa-whatsapp"></i></a>

<script>
    const KEY = "Bf7d42ac856fecc0e1e6ad24debe9c5e";
    let activeId = null;

    async function load() {
        const list = document.getElementById('list');
        list.innerHTML = '<p style="text-align:center">جاري جلب المباريات...</p>';
        
        try {
            const today = new Date().toISOString().split('T')[0];
            const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${today}`, {
                "headers": { "x-rapidapi-key": KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
            });
            const data = await res.json();
            render(data.response.filter(m => [39, 140, 78, 135, 2, 3].includes(m.league.id)));
        } catch(e) { list.innerHTML = "فشل التحميل"; }
    }

    function render(matches) {
        const list = document.getElementById('list');
        list.innerHTML = matches.map(m => {
            const status = m.fixture.status.short;
            let center = '';
            
            if(status === 'NS') {
                center = `<div class="m-time">${m.fixture.date.split('T')[1].substring(0,5)}</div><div style="color:#aaa; font-size:10px">قريباً</div>`;
            } else {
                const live = ['1H','2H','HT'].includes(status);
                center = `
                    <div class="${live ? 'live-circle' : ''}">
                        <span class="live-min">${m.fixture.status.elapsed}'</span>
                    </div>
                    <div class="m-score">${m.goals.home} - ${m.goals.away}</div>
                `;
            }

            return `
                <div class="match-card" onclick="openMatch(${m.fixture.id})">
                    <div class="team-side">
                        <img src="${m.teams.home.logo}">
                        <span class="team-name">${m.teams.home.name}</span>
                    </div>
                    <div class="match-center">${center}</div>
                    <div class="team-side">
                        <img src="${m.teams.away.logo}">
                        <span class="team-name">${m.teams.away.name}</span>
                    </div>
                </div>`;
        }).join('');
    }

    async function openMatch(id) {
        activeId = id;
        document.getElementById('modal').style.display = 'block';
        tab('events', document.querySelector('.m-tab'));
    }

    async function tab(type, btn) {
        document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        const cont = document.getElementById('modal-content');
        cont.innerHTML = '<br><center>جاري التحميل...</center>';

        const res = await fetch(`https://v3.football.api-sports.io/fixtures/${type === 'events' ? 'events' : type === 'stats' ? 'statistics' : 'lineups'}?fixture=${activeId}`, {
            "headers": { "x-rapidapi-key": KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const data = await res.json();

        if(type === 'stats') {
            if(!data.response[0]) { cont.innerHTML = "الإحصائيات غير متوفرة حالياً"; return; }
            const h = data.response[0].statistics, a = data.response[1].statistics;
            const labels = {"Ball Possession":"الاستحواذ","Total Shots":"إجمالي التسديدات","Corner Kicks":"الركنيات","Fouls":"أخطاء"};
            cont.innerHTML = h.map((s,i) => `
                <div class="stat-row">
                    <span>${s.value || 0}</span>
                    <span class="stat-label">${labels[s.type] || s.type}</span>
                    <span>${a[i].value || 0}</span>
                </div>
            `).join('');
        } else if(type === 'events') {
            cont.innerHTML = data.response.map(e => `
                <div style="padding:15px; border-bottom:1px solid #f5f5f5; display:flex; align-items:center; gap:10px;">
                    <b style="color:var(--primary)">${e.time.elapsed}'</b>
                    <i class="fas ${e.type==='Goal'?'fa-futbol':e.detail.includes('Yellow')?'fa-copy':'fa-exchange-alt'}"></i>
                    <span>${e.player.name} (${e.detail})</span>
                </div>
            `).join('') || "لا توجد أحداث";
        } else {
            cont.innerHTML = "<center><br>التشكيلة تظهر قبل المباراة بـ 60 دقيقة</center>";
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function search() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.match-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
    }

    window.onload = load;
</script>
</body>
</html>
