<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zack Cinema Premium</title>
    <style>
        :root { --dark: #0b1118; --accent: #00f2ff; --card: #1a222d; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background: var(--dark); color: white; padding-bottom: 70px; overflow-x: hidden; }
        
        /* بار البحث */
        .top-bar { padding: 15px; position: sticky; top: 0; background: var(--dark); z-index: 100; }
        .search-box { background: var(--card); padding: 12px; border-radius: 25px; display: flex; border: 1px solid #333; }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 0.9rem; }

        /* شبكة العرض */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card img { width: 100%; height: 150px; object-fit: cover; background: #222; }
        .card .title { font-size: 0.7rem; padding: 8px 4px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* المشغل الاحترافي */
        .player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; }
        .player-header { padding: 15 shadow; display: flex; justify-content: space-between; align-items: center; background: #0b1118; border-bottom: 1px solid #222; padding: 15px; }
        .iframe-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        iframe { width: 100%; height: 300px; border: none; }
        
        .player-footer { padding: 15px; background: #0b1118; text-align: center; }
        .refresh-btn { background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        /* القائمة السفلية */
        .nav { position: fixed; bottom: 0; width: 100%; background: #0f171f; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #a0aab2; font-size: 0.8rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--accent); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="loadData('tv')">

    <div id="videoOverlay" class="player-overlay">
        <div class="player-header">
            <span onclick="closePlayer()" style="cursor:pointer; font-size: 1.1rem;"><i class="fa-solid fa-xmark"></i> إغلاق</span>
            <span style="color:var(--accent); font-weight: bold;">Zack Cinema</span>
        </div>
        <div class="iframe-container" id="videoBox"></div>
        <div class="player-footer">
            <button class="refresh-btn" onclick="refreshPlayer()"><i class="fa-solid fa-rotate"></i> تحديث السيرفر</button>
            <p style="font-size: 0.6rem; color: #555; margin-top: 10px;">إذا ظهر إعلان، اضغط "بقاء" لمنع الخروج من الموقع</p>
        </div>
    </div>

    <div class="top-bar">
        <div class="search-box">
            <input type="text" placeholder="ابحث عن مسلسل أو فيلم يا Zack..." onkeyup="searchZack(this.value)">
        </div>
    </div>

    <div class="grid" id="contentGrid"></div>

    <div class="nav">
        <div class="nav-item active" id="tv-btn" onclick="loadData('tv')">
            <i class="fa-solid fa-tv"></i><span>مسلسلات</span>
        </div>
        <div class="nav-item" id="movie-btn" onclick="loadData('movie')">
            <i class="fa-solid fa-film"></i><span>أفلام</span>
        </div>
    </div>

    <script>
        const TMDB_KEY = '932eefacf243fb7b9698ea142f2e0481';
        let currentId = '';
        let currentType = '';

        async function loadData(type) {
            currentType = type;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(type + '-btn').classList.add('active');
            
            const url = `https://api.themoviedb.org/3/discover/${type}?api_key=${TMDB_KEY}&language=ar&sort_by=popularity.desc&with_original_language=ar`;
            const res = await fetch(url);
            const data = await res.json();
            displayItems(data.results);
        }

        function displayItems(items) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = '';
            items.forEach(item => {
                if(!item.poster_path) return;
                grid.innerHTML += `
                    <div class="card" onclick="openPlayer('${item.id}')">
                        <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
                        <div class="title">${item.name || item.title}</div>
                    </div>`;
            });
        }

        function openPlayer(id) {
            currentId = id;
            document.getElementById('videoOverlay').style.display = 'flex';
            refreshPlayer();
            
            // حماية تمنع الإعلانات من إغلاق موقعك
            window.onbeforeunload = function() {
                return "هل تريد مغادرة Zack Cinema؟"; 
            };
        }

        function refreshPlayer() {
            // استخدام سيرفر vidsrc.to بدون sandbox لضمان التشغيل
            const videoUrl = `https://vidsrc.to/embed/${currentType}/${currentId}`;
            document.getElementById('videoBox').innerHTML = `
                <iframe src="${videoUrl}" allowfullscreen="true" onblur="window.focus()"></iframe>
            `;
        }

        function closePlayer() {
            document.getElementById('videoOverlay').style.display = 'none';
            document.getElementById('videoBox').innerHTML = '';
            window.onbeforeunload = null;
        }

        async function searchZack(query) {
            if(query.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&language=ar&query=${query}`);
            const data = await res.json();
            displayItems(data.results);
        }
    </script>
</body>
    </html>
