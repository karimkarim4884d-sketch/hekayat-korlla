<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>هجمة ولقطة - بث مباشر مصري</title>
  <style>
    /* ... (نفس الستايل بتاعك مع إضافة بسيطة للوميض) ... */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(135deg, #001f3f, #003366); color: white; padding: 10px; }
    
    .section { max-width: 900px; margin: 20px auto; }
    .section-title { background: linear-gradient(90deg, #ff6b35, #00bfff); padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; font-size: 1.4rem; }
    
    .big-match-table { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 15px; min-height: 100px; }
    
    .match-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 15px; background: rgba(0,51,102,0.8);
      border-radius: 10px; border-left: 5px solid #00ff88; margin-bottom: 8px; font-size: 1.1rem;
    }

    /* ستايل كلمة مباشر الآن */
    .live-status {
      color: #ff0000; font-weight: bold; animation: blink 1s infinite;
    }
    @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

    .match-time { font-weight: bold; color: #00ff88; }
    .match-league { font-size: 0.8rem; color: #aaa; max-width: 150px; text-align: left; }
    .loading { text-align: center; padding: 20px; color: #00bfff; }
  </style>
</head>
<body>

  <header style="text-align: center; padding: 20px; background: rgba(0,51,102,0.9); border-radius: 20px; margin-bottom: 20px;">
    <h1>⚽ هجمة ولقطة</h1>
    <p id="current-date">📺 بث مباشر تلقائي | جاري التحميل...</p>
  </header>

  <div class="section">
    <h2 class="section-title">📅 جدول مباريات اليوم المباشر</h2>
    <div id="match-container" class="big-match-table">
        <div class="loading">جاري سحب المباريات من السيرفر...</div>
    </div>
  </div>

  <script>
    // الإعدادات الخاصة بك
    const API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
    const container = document.getElementById('match-container');
    
    // ضبط التاريخ في الهيدر
    const today = new Date();
    document.getElementById('current-date').innerText = "📅 مباريات اليوم: " + today.toLocaleDateString('ar-EG');

    async function fetchMatches() {
        const dateStr = today.toISOString().split('T')[0];
        const url = `https://v3.football.api-sports.io/fixtures?date=${dateStr}`;

        try {
            const response = await fetch(url, {
                method: "GET",
                headers: {
                    "x-rapidapi-host": "v3.football.api-sports.io",
                    "x-rapidapi-key": API_KEY
                }
            });

            const data = await response.json();
            const matches = data.response;

            if (!matches || matches.length === 0) {
                container.innerHTML = '<div style="text-align:center">لا توجد مباريات مسجلة اليوم.</div>';
                return;
            }

            container.innerHTML = ''; // مسح رسالة التحميل

            matches.forEach(m => {
                const status = m.fixture.status.short;
                let timeOrStatus = "";
                let rowClass = "";

                // التحقق إذا كان الماتش "مباشر الآن"
                if (["1H", "2H", "HT", "ET", "P"].includes(status)) {
                    timeOrStatus = `<span class="live-status">🔴 مباشر الآن (${m.goals.home}-${m.goals.away})</span>`;
                } else if (status === "FT") {
                    timeOrStatus = `<span>انتهت (${m.goals.home}-${m.goals.away})</span>`;
                } else {
                    // تحويل الوقت لتوقيت مصر المحلي
                    const matchDate = new Date(m.fixture.date);
                    timeOrStatus = `<span class="match-time">${matchDate.toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})}</span>`;
                }

                const html = `
                    <div class="match-row">
                        ${timeOrStatus}
                        <div style="flex:1; text-align:center;">
                            ${m.teams.home.name} 🆚 ${m.teams.away.name}
                        </div>
                        <span class="match-league">${m.league.name}</span>
                    </div>
                `;
                container.innerHTML += html;
            });

        } catch (error) {
            container.innerHTML = '<div style="text-align:center; color:red">فشل في جلب البيانات. تأكد من اتصالك بالإنترنت.</div>';
            console.error(error);
        }
    }

    // تشغيل الدالة
    fetchMatches();
  </script>
</body>
</html>
