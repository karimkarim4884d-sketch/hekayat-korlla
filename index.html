<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARIM KHALED | يلا شوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .match-card { background: #1e293b; border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .score-box { background: #0f172a; padding: 5px 15px; border-radius: 12px; font-weight: 900; font-size: 20px; color: #3b82f6; border: 1px solid #3b82f6; }
        .hidden { display: none !important; }
        .id-badge { background: #3b82f6; color: white; padding: 2px 10px; border-radius: 10px; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-20">

    <div id="loginSection" class="p-8 pt-20 text-center">
        <div class="bg-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/50">
            <i class="fas fa-futbol text-4xl text-white"></i>
        </div>
        <h1 class="text-3xl font-black mb-2 uppercase tracking-tighter">KARIM KHALED</h1>
        <p class="text-gray-400 text-[10px] mb-10 font-bold uppercase tracking-[0.3em]">Live Match System</p>
        
        <div class="glass p-8 rounded-[3rem] shadow-2xl">
            <input type="text" id="uName" placeholder="ادخل اسمك لتسجيل الدخول" class="w-full p-5 rounded-2xl bg-black/40 border border-slate-700 text-center font-bold text-white mb-4 outline-none focus:border-blue-500 transition-all">
            <button onclick="doLogin()" class="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-transform">دخول النظام</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="glass p-6 sticky top-0 z-50 flex justify-between items-center border-b border-white/5">
            <div>
                <h2 class="text-lg font-black text-blue-400 leading-none uppercase">KARIM KHALED</h2>
                <div class="mt-2 flex items-center gap-2">
                    <span id="userNameDisp" class="text-[10px] text-white font-bold"></span>
                    <span id="userIdDisp" class="id-badge"></span>
                </div>
            </div>
            <button onclick="logout()" class="text-red-500 text-[10px] font-black border border-red-500/30 px-3 py-1 rounded-lg">خروج</button>
        </div>

        <div id="adminPanel" class="hidden p-4">
            <div class="glass p-6 rounded-[2.5rem] border-2 border-blue-500/30">
                <p class="text-[10px] text-blue-500 font-black mb-4 uppercase tracking-widest text-center">إدارة شحن العملاء</p>
                <input type="text" id="targetId" placeholder="ID العميل" class="w-full p-4 rounded-xl bg-black/60 border border-slate-800 text-center font-bold text-sm mb-3 outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="cloudAction('points')" class="bg-blue-600 p-3 rounded-xl text-[10px] font-bold uppercase">شحن مليون</button>
                    <button onclick="cloudAction('live')" class="bg-green-600 p-3 rounded-xl text-[10px] font-bold uppercase">تفعيل البث</button>
                </div>
            </div>
        </div>

        <div class="p-4">
            <div class="flex items-center gap-2 mb-4 px-2">
                <i class="fas fa-trophy text-blue-500"></i>
                <span class="text-xs font-bold uppercase">مباريات اليوم المباشرة</span>
            </div>

            <div class="match-card">
                <div class="flex items-center justify-between">
                    <div class="w-1/3 text-center">
                        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/7/7c/Liverpool_FC.svg/1200px-Liverpool_FC.svg.png" class="w-12 h-12 mx-auto mb-2">
                        <p class="text-[11px] font-black">ليفربول</p>
                    </div>
                    <div class="w-1/3 text-center">
                        <div class="score-box">1 - 0</div>
                        <div class="text-[10px] text-green-500 font-bold mt-2 animate-pulse">● مباشر '45</div>
                    </div>
                    <div class="w-1/3 text-center">
                        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/d/d3/Galatasaray_Sports_Club_Logo.svg/1200px-Galatasaray_Sports_Club_Logo.svg.png" class="w-12 h-12 mx-auto mb-2">
                        <p class="text-[11px] font-black">غلطة سراي</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto glass border-t border-white/5 flex justify-around p-4">
        <div class="text-blue-500 text-center"><i class="fas fa-home text-xl block"></i><span class="text-[9px] font-bold">الرئيسية</span></div>
        <div class="text-gray-500 text-center"><i class="fas fa-play-circle text-xl block"></i><span class="text-[9px] font-bold">المباريات</span></div>
        <div class="text-gray-500 text-center"><i class="fas fa-star text-xl block"></i><span class="text-[9px] font-bold">المفضلة</span></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const config = { databaseURL: "https://zack-cinema-default-rtdb.firebaseio.com" };
        let db; try { firebase.initializeApp(config); db = firebase.database(); } catch(e){}

        function doLogin() {
            const name = document.getElementById('uName').value.trim();
            if(name.length < 3) return alert("الرجاء إدخال اسمك");
            let id = (name.toLowerCase() === "karim khaled") ? "77777777" : Math.floor(Math.random() * 89999999) + 10000000;
            localStorage.setItem('z_n', name);
            localStorage.setItem('z_i', id);
            if(db) db.ref('users/' + id).update({ name: name, lastLogin: Date.now() });
            location.reload();
        }

        window.onload = function() {
            const n = localStorage.getItem('z_n'), i = localStorage.getItem('z_i');
            if(n && i) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userNameDisp').innerText = n;
                document.getElementById('userIdDisp').innerText = "#" + i;
                if(n.toLowerCase() === "karim khaled") document.getElementById('adminPanel').classList.remove('hidden');
            }
        };

        function cloudAction(type) {
            const target = document.getElementById('targetId').value.trim();
            if(!target || !db) return alert("أدخل ID العميل!");
            let data = (type === 'live') ? { live: true } : { blue: 1000000, red: 1000000 };
            db.ref('users/' + target).update(data).then(() => alert("تم تنفيذ العملية بنجاح لـ: " + target));
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
    </html>
