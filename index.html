<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة - التطبيق الرسمي</title>
    <style>
        :root {
            --dark-bg: #001220;
            --card-bg: #003366;
            --accent-orange: #ff6b35;
            --text-white: #ffffff;
            --light-blue: #00bfff;
            --goal-bg: #004d99;
            --nav-bg: #000c16;
        }

        /* حماية الموقع ومنع النسخ */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body { background: var(--dark-bg); color: var(--text-white); padding-bottom: 90px; overflow-x: hidden; }

        header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px 20px; border-bottom: 1px solid rgba(0, 191, 255, 0.1);
            background: var(--nav-bg); position: sticky; top: 0; z-index: 1000;
        }
        
        .logo-container {
            width: 45px; height: 45px; border-radius: 12px; overflow: hidden;
            box-shadow: 0 0 10px rgba(0,191,255,0.3); background: var(--card-bg);
            display: flex; align-items: center; justify-content: center;
        }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }

        .menu-icon { font-size: 24px; color: var(--light-blue); cursor: pointer; }

        .tabs { display: flex; gap: 8px; margin: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #002a4d; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .tab-btn.active { background: var(--accent-orange); box-shadow: 0 0 10px var(--accent-orange); }

        .league-title { text-align: center; font-size: 0.75rem; color: var(--light-blue); margin: 15px 0 5px; font-weight: bold; }
        
        .match-card {
            background: var(--card-bg); border-radius: 15px; display: flex;
            align-items: center; padding: 15px; margin: 0 15px 12px; border-right: 4px solid var(--light-blue);
            justify-content: space-between;
        }

        .team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
        .team img { width: 35px; height: 35px; object-fit: contain; }
        .team span { font-size: 0.75rem; font-weight: bold; }

        .score-box { display: flex; justify-content: center; gap: 8px; align-items: center; }
        .goal { background: var(--goal-bg); color: white; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; border: 1px solid var(--light-blue); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #002a4d; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 0.65rem; cursor: pointer; }
        .nav-item.active { color: var(--light-blue); }

        .sidebar { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background: #000c16; transition: 0.4s; padding-top: 60px; overflow-x: hidden; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: white; display: block; border-bottom: 1px solid #002a4d; }

        .hidden { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="sideMenu" class="sidebar">
    <a href="javascript:void(0)" onclick="closeMenu()" style="font-size:30px;">×</a>
    <a href="#" onclick="showSection('movies-section')">🎬 قسم الأفلام</a>
    <a href="#" onclick="showSection('series-section')">📺 قسم المسلسلات</a>
    <a href="#" onclick="showSection('matches-section')">🏠 الرئيسية</a>
</div>

<header>
    <div class="menu-icon" onclick="openMenu()">☰</div>
    <div style="display:flex; align-items:center; gap:10px;">
        <h1>هجمة ولقطة</h1>
        <div class="logo-container">
            <img src="https://i.ibb.co/LzNfXpY/ball-icon.png" class="logo-img">
        </div>
    </div>
    <div style="width:24px;"></div> 
</header>

<div id="matches-section" class="section-container">
    <div class="tabs">
        <button class="tab-btn" id="yesterday" onclick="getMatches(-1, 'yesterday')">الأمس</button>
        <button class="tab-btn active" id="today" onclick="getMatches(0, 'today')">اليوم</button>
        <button class="tab-btn" id="tomorrow" onclick="getMatches(1, 'tomorrow')">الغد</button>
    </div>
    <div id="matches-list"></div>
</div>

<div id="movies-section" class="section-container hidden" style="padding:20px;"><h3>🎬 مكتبة الأفلام بالعربي</h3><div class="match-card">قريباً...</div></div>
<div id="series-section" class="section-container hidden" style="padding:20px;"><h3>📺 مكتبة المسلسلات</h3><div class="match-card">قريباً...</div></div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showSection('matches-section', this)"><span>⚽</span><span>المباريات</span></div>
    <div class="nav-item"><span>📊</span><span>الترتيب</span></div>
    <div class="nav-item"><span>🔄</span><span>انتقالات</span></div>
    <div class="nav-item" onclick="showSection('more-section', this)"><span>➕</span><span>المزيد</span></div>
</nav>

<script>
const API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e'; 
const API_HOST = 'v3.football.api-sports.io';
const importantLeagues = [39, 140, 135, 78, 61, 2, 3, 1, 4, 233, 307, 202];

async function getMatches(offset, btnId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(btnId).classList.add('active');
    const d = new Date(); d.setDate(d.getDate() + offset);
    const dateStr = d.toLocaleDateString('en-CA'); 
    const list = document.getElementById('matches-list');
    list.innerHTML = '<div style="text-align:center; padding:30px;">⏳ جاري التحميل بالعربية...</div>';

    try {
        const res = await fetch(`https://${API_HOST}/fixtures?date=${dateStr}&lang=ar`, {
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": API_HOST }
        });
        const json = await res.json();
        let matches = json.response;

        let filtered;
        if (btnId === 'today') {
            filtered = matches.filter(m => m.fixture.status.short !== 'FT');
        } else if (btnId === 'yesterday') {
            filtered = matches.filter(m => m.fixture.status.short === 'FT');
        } else {
            filtered = matches;
        }

        let finalData = filtered.filter(m => importantLeagues.includes(m.league.id));
        render(finalData.length > 0 ? finalData : filtered.slice(0, 15));
    } catch (e) { list.innerHTML = "<div style='text-align:center;'>⚠️ خطأ في السحب</div>"; }
}

function render(data) {
    const list = document.getElementById('matches-list');
    list.innerHTML = '';
    data.forEach(m => {
        const time = new Date(m.fixture.date).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
        list.innerHTML += `
            <div class="league-title">🏆 ${m.league.name}</div>
            <div class="match-card">
                <div class="team"><img src="${m.teams.home.logo}"><span>${m.teams.home.name}</span></div>
                <div style="text-align:center; flex:1;">
                    <div class="score-box"><div class="goal">${m.goals.home ?? '-'}</div><span>:</span><div class="goal">${m.goals.away ?? '-'}</div></div>
                    <div style="font-size:0.7rem; color:var(--accent-orange); margin-top:5px;">${m.fixture.status.short === 'FT' ? 'انتهت' : time}</div>
                </div>
                <div class="team"><img src="${m.teams.away.logo}"><span>${m.teams.away.name}</span></div>
            </div>`;
    });
}

function openMenu() { document.getElementById("sideMenu").style.width = "250px"; }
function closeMenu() { document.getElementById("sideMenu").style.width = "0"; }
function showSection(id, el) {
    document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
    closeMenu();
}
getMatches(0, 'today');
</script>
</body>
</html>
