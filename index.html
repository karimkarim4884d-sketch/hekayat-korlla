<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة - التطبيق الكامل المطور</title>
    <style>
        :root {
            --bg-dark: #0f172a; --bg-card: #1e293b; --accent: #00bfff;
            --text-main: #ffffff; --text-dim: #94a3b8; --live-red: #ef4444;
            --vs-gold: #fbbf24;
        }
        /* منع تحديد النص في الموقع بالكامل */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        body { background: var(--bg-dark); color: var(--text-main); padding-bottom: 80px; transition: 0.3s; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--bg-dark); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .top-icons { display: flex; gap: 15px; align-items: center; }
        .icon-btn { font-size: 1.2rem; cursor: pointer; color: var(--text-main); }
        .current-date { font-size: 0.85rem; color: var(--accent); font-weight: bold; }

        /* الصفحات */
        .page-content { display: none; padding: 15px; min-height: 80vh; }
        .page-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* كروت المباريات */
        .date-tabs { display: flex; background: var(--bg-card); border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .date-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: var(--text-dim); font-size: 0.8rem; border-left: 1px solid rgba(255,255,255,0.05); }
        .date-tab.active { background: var(--accent); color: white; }
        
        .league-title { font-size: 0.9rem; color: var(--accent); margin: 15px 0 10px; border-right: 3px solid var(--accent); padding-right: 8px; }
        .match-card { background: var(--bg-card); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .team-box { flex: 1; text-align: center; }
        .team-box img { width: 30px; height: 30px; object-fit: contain; }
        .team-box p { font-size: 0.75rem; margin-top: 5px; }
        .status-box { flex: 1; text-align: center; }
        .score-val { font-size: 1.2rem; font-weight: bold; }
        .vs-text { color: var(--vs-gold); font-weight: bold; }

        /* القائمة السفلية */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg-card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 0.7rem; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 3px; }

        #calendar-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-card); padding: 20px; border-radius: 15px; z-index: 2000; width: 90%; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body oncontextmenu="return false;"> <div class="top-bar">
        <div class="top-icons">
            <i class="fas fa-search icon-btn"></i>
            <i class="fas fa-calendar-alt icon-btn" onclick="document.getElementById('calendar-modal').style.display='block'"></i>
            <span class="current-date">2026/03/23</span>
        </div>
        <img src="https://i.ibb.co/5T0S1S3/image-1.png" style="height: 35px;" alt="Logo">
    </div>

    <div id="matches-page" class="page-content active">
        <div class="date-tabs">
            <div class="date-tab" onclick="fetchMatches('yesterday', this)">مباريات الأمس</div>
            <div class="date-tab active" onclick="fetchMatches('today', this)">مباريات اليوم</div>
            <div class="date-tab" onclick="fetchMatches('tomorrow', this)">مباريات الغد</div>
        </div>
        <div id="matches-container"></div>
    </div>

    <div id="news-page" class="page-content">
        <h3>آخر الأخبار</h3>
        <p style="padding: 20px; color: var(--text-dim);">لا توجد أخبار جديدة حالياً.</p>
    </div>

    <div id="standings-page" class="page-content">
        <h3>ترتيب الدوريات</h3>
        <p style="padding: 20px; color: var(--text-dim);">جاري العمل على تحديث الجداول...</p>
    </div>

    <div id="transfers-page" class="page-content">
        <h3>سوق الانتقالات</h3>
        <p style="padding: 20px; color: var(--text-dim);">قريباً سيتم تفعيل قسم الانتقالات.</p>
    </div>

    <div id="more-page" class="page-content">
        <div style="background: var(--bg-card); padding: 20px; border-radius: 12px; text-align: center;">
            <p>مرحباً بك في هجمة ولقطة</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('matches', this)"><i class="fas fa-volleyball-ball"></i>المباريات</div>
        <div class="nav-item" onclick="switchTab('standings', this)"><i class="fas fa-list-ol"></i>الترتيب</div>
        <div class="nav-item" onclick="switchTab('transfers', this)"><i class="fas fa-exchange-alt"></i>الانتقالات</div>
        <div class="nav-item" onclick="switchTab('news', this)"><i class="fas fa-newspaper"></i>الأخبار</div>
        <div class="nav-item" onclick="switchTab('more', this)"><i class="fas fa-ellipsis-h"></i>المزيد</div>
    </nav>

    <script>
        // منع اختصارات الكيبورد (نسخ، قص، فحص العنصر)
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 86 || e.keyCode === 85 || e.keyCode === 83)) return false;
            if (e.keyCode === 123) return false;
        };

        const API_KEYS = ["bf7d42ac856fecc0e1e6ad24debe9c5e", "df31d97917bce1190ac701b9db9f74b6"];
        const IMPORTANT_LEAGUES = [39, 140, 78, 135, 61, 2, 233];

        function switchTab(pageId, el) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            el.classList.add('active');
        }

        async function fetchMatches(type, el) {
            if(el) {
                document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
                el.classList.add('active');
            }

            const container = document.getElementById('matches-container');
            container.innerHTML = '<p style="text-align:center; padding:20px;">جاري التحميل...</p>';

            // كود الـ Caching والـ API المدمج
            let date = new Date();
            if(type === 'yesterday') date.setDate(date.getDate() - 1);
            if(type === 'tomorrow') date.setDate(date.getDate() + 1);
            const dateStr = date.toISOString().split('T')[0];

            for (let key of API_KEYS) {
                try {
                    const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateStr}`, {
                        headers: {'x-rapidapi-host': 'v3.football.api-sports.io', 'x-rapidapi-key': key}
                    });
                    const data = await res.json();
                    if(data.response) {
                        renderMatches(data.response.filter(m => IMPORTANT_LEAGUES.includes(m.league.id)));
                        return;
                    }
                } catch(e) { console.log("Key failed, trying next..."); }
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matches-container');
            container.innerHTML = matches.length ? '' : '<p style="text-align:center; padding:20px;">لا توجد مباريات هامة.</p>';
            
            matches.forEach(m => {
                let status = m.fixture.status.short;
                let score = `<div class="vs-text">SV</div>`;
                if(status !== 'NS') score = `<div class="score-val">${m.goals.home} - ${m.goals.away}</div>`;
                if(['1H','2H','HT'].includes(status)) score += `<div style="color:red; font-size:10px;">مباشر</div>`;

                container.innerHTML += `
                    <div class="match-card">
                        <div class="team-box"><img src="${m.teams.home.logo}"><p>${m.teams.home.name}</p></div>
                        <div class="status-box">${score}</div>
                        <div class="team-box"><img src="${m.teams.away.logo}"><p>${m.teams.away.name}</p></div>
                    </div>`;
            });
        }

        window.onload = () => fetchMatches('today');
    </script>
</body>
    </html>
