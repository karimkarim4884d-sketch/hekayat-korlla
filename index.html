<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AI Video Editor (GitHub Ready)</title>
<style>
body{
font-family:Arial;
background:#111;
color:#fff;
text-align:center;
padding:20px;
}

video{
width:90%;
margin-top:15px;
border-radius:10px;
}

input,button{
padding:10px;
margin:8px;
border-radius:8px;
border:none;
}

button{
background:#00c3ff;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🎬 AI Video Editor (GitHub Pages)</h1>

<input type="file" id="video" accept="video/*"><br>

<video id="preview" controls></video>

<h3>📝 نص فوق الفيديو</h3>
<input type="text" id="text" placeholder="اكتب نص">

<br>

<button onclick="addText()">عرض الفيديو مع النص</button>

<p id="status"></p>

<script>
const video = document.getElementById("video");
const preview = document.getElementById("preview");

video.onchange = e => {
preview.src = URL.createObjectURL(e.target.files[0]);
};

function addText(){

const text = document.getElementById("text").value;

if(!video.files[0]){
alert("ارفع فيديو");
return;
}

preview.onplay = () => {

alert("⚠️ GitHub Pages لا يدعم تعديل الفيديو فعلياً، فقط عرض");

};

document.getElementById("status").innerText =
"✔ تم تشغيل الفيديو (عرض فقط على GitHub Pages)";

if(text){
alert("النص: " + text);
}

}
</script>

</body>
</html>
