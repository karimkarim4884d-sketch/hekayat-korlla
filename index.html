<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>هجمة ولقطة - بث مباشر</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { 
      background: linear-gradient(135deg, #001f3f, #003366); 
      color: white; 
      padding: 10px;
    }
    
    header { 
      text-align: center; 
      padding: 20px; 
      background: rgba(0,51,102,0.9);
      border-radius: 20px;
      margin-bottom: 20px;
    }
    
    .section { max-width: 1000px; margin: 20px auto; }
    .section-title { 
      background: linear-gradient(90deg, #ff6b35, #00bfff); 
      padding: 15px; 
      border-radius: 15px; 
      margin-bottom: 15px; 
      text-align: center; 
      font-size: 1.4rem;
    }
    
    /* مشغل الفيديو */
    #player {
      width: 100%;
      max-width: 1000px;
      height: 500px;
      background: #000;
      border-radius: 20px;
      margin: 20px auto;
      display: block;
    }
    
    /* القنوات */
    .channels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .channel {
      background: linear-gradient(90deg, #ff0000, #cc0000);
      padding: 20px;
      border-radius: 20px;
      border-left: 6px solid #ffd700;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      box-shadow: 0 8px 25px rgba(255,0,0,0.3);
    }
    
    .channel:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(255,0,0,0.5);
    }
    
    .channel-name {
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffd700;
      margin-bottom: 10px;
    }
    
    .channel-desc {
      color: #fff;
      opacity: 0.9;
    }
    
    .channel.active {
      background: linear-gradient(90deg, #00ff00, #32cd32);
      border-left-color: #000;
      color: black;
    }
    
    /* المباريات */
    .league {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 15px;
      border-right: 5px solid #00ff88;
    }
    
    .match {
      background: rgba(0,51,102,0.8);
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      border-left: 4px solid #ff6b35;
    }
    
    /* الأقسام الأخرى */
    .bottom-section {
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 20px;
      margin: 20px auto;
      max-width: 900px;
      text-align: center;
      border-right: 5px solid #00bfff;
      margin-bottom: 20px;
    }
    
    .site-name {
      background: linear-gradient(90deg, #ff0000, #ff6b35, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 3rem;
      font-weight: bold;
      text-align: center;
      margin: 30px 0;
    }
    
    .whatsapp { 
      background: #25D366; 
      color: white; 
      padding: 15px 30px; 
      border-radius: 30px; 
      text-decoration: none; 
      font-weight: bold;
      display: inline-block;
      margin: 10px;
      font-size: 1.1rem;
    }
    
    @media (max-width: 768px) {
      #player { height: 300px; }
      .site-name { font-size: 2rem; }
    }
  </style>
</head>
