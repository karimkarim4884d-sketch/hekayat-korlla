<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARIM KHALED | حكاية كورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .p-card { border: 1px solid #1e293b; transition: 0.3s; }
        .p-card:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .logo-img { width: 80px; height: 80px; object-fit: contain; margin: 0 auto 10px; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-24 px-4">

    <div class="py-4 flex justify-between items-center border-b border-white/5 mb-6">
        <div class="flex items-center gap-2">
            <button onclick="toggleMenu()" class="text-xl"><i class="fas fa-bars"></i></button>
            <h1 class="text-lg font-bold text-blue-400">كريم خالد</h1>
        </div>
        <button id="installApp" class="bg-blue-600 text-[10px] px-3 py-1 rounded-lg font-bold">تثبيت التطبيق</button>
    </div>

    <div class="text-center mb-8">
        <img src="https://i.ibb.co/vzYpYfP/1000008040.jpg" class="logo-img" alt="ZK Logo">
        <p class="text-xs text-gray-500 font-bold tracking-widest uppercase">Hekayet Kora System</p>
    </div>

    <div id="plansSection" class="space-y-3">
        <h3 class="text-sm font-bold mb-4 text-center">اختر باقة الاشتراك المباشر</h3>
        
        <div onclick="selectPlan(300, 20, '30 يوم')" class="p-card glass p-4 rounded-2xl flex justify-between items-center cursor-pointer">
            <div><b class="text-blue-400">300 نقطة</b> <span class="text-[10px] block text-gray-400">تفعيل 30 يوم</span></div>
            <div class="text-green-500 font-black">20 جنيه</div>
        </div>

        <div onclick="selectPlan(600, 40, '60 يوم')" class="p-card glass p-4 rounded-2xl flex justify-between items-center cursor-pointer border-blue-500/50 bg-blue-500/5">
            <div><b class="text-blue-400">600 نقطة</b> <span class="text-[10px] block text-gray-400">تفعيل 60 يوم</span></div>
            <div class="text-green-500 font-black">40 جنيه</div>
        </div>

        <div onclick="selectPlan(1200, 80, '120 يوم')" class="p-card glass p-4 rounded-2xl flex justify-between items-center cursor-pointer">
            <div><b class="text-blue-400">1200 نقطة</b> <span class="text-[10px] block text-gray-400">تفعيل 120 يوم</span></div>
            <div class="text-green-500 font-black">80 جنيه</div>
        </div>
    </div>

    <div id="paymentForm" class="hidden mt-6 glass p-6 rounded-3xl border-2 border-blue-500/30">
        <h4 class="text-center font-bold text-sm mb-4">تأكيد عملية التحويل</h4>
        <p class="text-[10px] text-center text-red-400 mb-4">حول المبلغ لـ 01032447101 فودافون كاش</p>
        
        <input type="text" id="senderName" placeholder="اسم صاحب الرقم المحول منه" class="w-full p-4 rounded-xl bg-black border border-slate-800 mb-2 text-sm outline-none">
        <input type="number" id="senderNumber" placeholder="الرقم اللي حولت منه" class="w-full p-4 rounded-xl bg-black border border-slate-800 mb-4 text-sm outline-none">
        
        <div class="mb-4">
            <label class="text-[10px] block mb-2 text-gray-400">ارفع سكرين شوت التحويل:</label>
            <input type="file" id="payImage" accept="image/*" class="text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white">
        </div>

        <button onclick="sendOrder()" class="w-full bg-green-600 p-4 rounded-xl font-black uppercase text-xs">إرسال الطلب للواتساب</button>
        <button onclick="location.reload()" class="w-full mt-2 text-[10px] text-gray-500">إلغاء</button>
    </div>

    <div id="sideMenu" class="hidden fixed inset-0 z-[100] bg-black/90 p-8">
        <button onclick="toggleMenu()" class="text-3xl mb-10"><i class="fas fa-times"></i></button>
        <div class="space-y-6">
            <a href="https://wa.me/201040077271" class="flex items-center gap-4 text-lg font-bold"><i class="fab fa-whatsapp text-green-500"></i> الدعم الفني</a>
            <a href="https://t.me/HekayetyKorabot" class="flex items-center gap-4 text-lg font-bold"><i class="fab fa-telegram text-blue-400"></i> بوت التلجرام</a>
        </div>
    </div>

    <script>
        let selectedData = {};
        let myID = localStorage.getItem('z_i') || "ID-" + Math.floor(Math.random()*900000);

        function selectPlan(pts, price, duration) {
            selectedData = { pts, price, duration };
            document.getElementById('plansSection').classList.add('hidden');
            document.getElementById('paymentForm').classList.remove('hidden');
        }

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('hidden'); }

        function sendOrder() {
            const name = document.getElementById('senderName').value;
            const num = document.getElementById('senderNumber').value;
            const now = new Date();
            const timeStr = `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
            const dateStr = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;

            if(!name || !num) return alert("كمل البيانات يا غالي!");

            // رسالة واتساب الاحترافية
            const msg = `طلب شحن جديد 🚀%0A---%0Aالأيدي: ${myID}%0Aالباقة: ${selectedData.duration}%0Aالسعر: ${selectedData.price} جنيه%0Aاسم المحول: ${name}%0Aرقم المحول: ${num}%0Aالتاريخ: ${dateStr}%0Aالوقت: ${timeStr}%0A---%0Aبرجاء مراجعة الصورة المرفقة وشحن النقاط!`;
            
            window.open(`https://wa.me/201040077271?text=${msg}`);
            alert("تم تجهيز الرسالة! ارفق صورة التحويل في الواتساب وابعت.");
        }

        // كود تثبيت الموقع كتطبيق
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installApp').style.display = 'block';
        });

        document.getElementById('installApp').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') deferredPrompt = null;
            }
        });
    </script>
</body>
    </html>
