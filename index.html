<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة - التطبيق الكامل</title>
    <style>
        :root {
            --bg-dark: #0f172a; --bg-card: #1e293b; --accent: #00bfff;
            --text-main: #ffffff; --text-dim: #94a3b8; --live-red: #ef4444;
        }
        body.light-mode {
            --bg-dark: #f1f5f9; --bg-card: #ffffff; --text-main: #0f172a;
            --text-dim: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); padding-bottom: 80px; transition: 0.3s; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--bg-dark); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .top-icons { display: flex; gap: 15px; align-items: center; }
        .icon-btn { font-size: 1.2rem; cursor: pointer; color: var(--text-main); }
        .current-date { font-size: 0.85rem; color: var(--accent); font-weight: bold; }

        .page-content { display: none; padding: 15px; min-height: 80vh; }
        .page-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .match-card { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .team-box { flex: 1; text-align: center; }
        .team-box img { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; }
        .team-box p { font-size: 0.8rem; }
        .score-val { font-size: 1.3rem; font-weight: bold; color: var(--text-main); background: rgba(0,191,255,0.1); padding: 5px 15px; border-radius: 8px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg-card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 0.7rem; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 3px; }

        #calendar-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-card); padding: 20px; border-radius: 15px; z-index: 2000; width: 90%; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .error-msg { color: var(--live-red); text-align: center; padding: 20px; font-size: 0.9rem; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="top-bar">
        <div class="top-icons">
            <i class="fas fa-search icon-btn"></i>
            <i class="fas fa-calendar-alt icon-btn" onclick="document.getElementById('calendar-modal').style.display='block'"></i>
            <span class="current-date" id="header-date">2026/03/23</span>
        </div>
        <img src="https://image.spreadshirtmedia.net/image-server/v1/mp/products/T210A2MPA3176PT17X28Y28D176722881W3333H3333/views/1,width=800,height=800,appearanceId=2,backgroundColor=F2F2F2/hagga-w-lakta-text-logo-logo-with-hagga-w-lakta-arabic-text.jpg" style="height: 35px; border-radius: 5px;" alt="Logo">
    </div>

    <div id="matches-page" class="page-content active">
        <div id="matches-container">
            <p style="text-align: center; padding: 20px;">جاري تحميل المباريات...</p>
        </div>
    </div>

    <div id="calendar-modal">
        <h3 style="margin-bottom:15px">اختر تاريخ</h3>
        <input type="date" id="date-picker" style="width:100%; padding:10px; border-radius:8px;">
        <button onclick="document.getElementById('calendar-modal').style.display='none'" style="margin-top:15px; width:100%; padding:10px; background:var(--accent); border:none; color:white; border-radius:8px;">إغلاق</button>
    </div>

    <nav class="bottom-nav">
        <a class="nav-item active"><i class="fas fa-volleyball-ball"></i>المباريات</a>
        <a class="nav-item"><i class="fas fa-newspaper"></i>الأخبار</a>
        <a class="nav-item"><i class="fas fa-exchange-alt"></i>الانتقالات</a>
        <a class="nav-item"><i class="fas fa-list-ol"></i>الترتيب</a>
        <a class="nav-item"><i class="fas fa-ellipsis-h"></i>المزيد</a>
    </nav>

    <script>
        const API_KEYS = [
            "bf7d42ac856fecc0e1e6ad24debe9c5e",
            "df31d97917bce1190ac701b9db9f74b6"
        ];

        async function fetchMatches() {
            const container = document.getElementById('matches-container');
            const cacheKey = 'matches_cache';
            const cacheTimeKey = 'matches_cache_time';
            const cacheDuration = 10 * 60 * 1000; // 10 دقائق

            const now = new Date().getTime();
            const cachedData = localStorage.getItem(cacheKey);
            const cachedTime = localStorage.getItem(cacheTimeKey);

            // استخدام الكاش لو متاح
            if (cachedData && cachedTime && (now - cachedTime < cacheDuration)) {
                console.log("استخدام الكاش...");
                renderMatches(JSON.parse(cachedData));
                return;
            }

            // محاولة جلب البيانات من الـ API
            for (let key of API_KEYS) {
                try {
                    const response = await fetch('https://v3.football.api-sports.io/fixtures?live=all', {
                        headers: {
                            'x-rapidapi-host': 'v3.football.api-sports.io',
                            'x-rapidapi-key': key
                        }
                    });
                    const data = await response.json();

                    if (data.response && data.response.length > 0) {
                        localStorage.setItem(cacheKey, JSON.stringify(data.response));
                        localStorage.setItem(cacheTimeKey, now);
                        renderMatches(data.response);
                        return; // نجح الطلب، اخرج من اللوب
                    } else if (data.errors && Object.keys(data.errors).length > 0) {
                        console.warn(`المفتاح ${key} انتهى صلاحيته، بجرب اللي بعده...`);
                        continue; 
                    }
                } catch (error) {
                    console.error("خطأ في الاتصال:", error);
                }
            }

            // لو كل المحاولات فشلت، اعرض الكاش حتى لو قديم أو رسالة خطأ
            if (cachedData) {
                renderMatches(JSON.parse(cachedData));
            } else {
                container.innerHTML = '<p class="error-msg">انتهت حدود الـ API لليوم، جرب لاحقاً.</p>';
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';
            
            if (matches.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:20px;">لا توجد مباريات مباشرة حالياً.</p>';
                return;
            }

            matches.forEach(match => {
                const html = `
                    <div class="match-card">
                        <div class="team-box">
                            <img src="${match.teams.home.logo}" onerror="this.src='https://via.placeholder.com/35'">
                            <p>${match.teams.home.name}</p>
                        </div>
                        <div class="score-val">${match.goals.home} - ${match.goals.away}</div>
                        <div class="team-box">
                            <img src="${match.teams.away.logo}" onerror="this.src='https://via.placeholder.com/35'">
                            <p>${match.teams.away.name}</p>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        window.onload = fetchMatches;
    </script>
</body>
        </html>
