<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>القيصر دوت نت</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #fff;
    text-align: center;
    margin: 0;
}

/* العنوان الكبير */
.main-title {
    font-size: 40px;
    font-weight: bold;
    background: linear-gradient(to right, purple, black);
    padding: 20px;
}

/* عنوان الباقات */
.sub-title {
    font-size: 28px;
    margin-top: 20px;
}

/* الحاوية */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

/* الكارت */
.card {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 12px;
    width: 230px;
    position: relative;
    overflow: hidden;
}

/* اللوجو الشفاف */
.logo-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0.1;
    top: 0;
    left: 0;
}

/* يخلي الكلام فوق اللوجو */
.card * {
    position: relative;
    z-index: 2;
}

.price {
    font-size: 22px;
    color: gold;
    margin: 10px 0;
}

.btn {
    display: inline-block;
    padding: 10px 15px;
    background: green;
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
}

.btn:hover {
    background: darkgreen;
}

/* زر واتساب */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 20px;
}
</style>

</head>

<body>

<div class="main-title">القيصر دوت نت</div>
<div class="sub-title">باقات الإنترنت</div>

<div class="container">

    <div class="card">
        <img src="logo.png" class="logo-bg">
        <h3>باقة 75 جيجا</h3>
        <p>سرعة 5 Mbps</p>
        <div class="price">150 جنيه</div>
        <a class="btn" href="https://wa.me/201030434299">اشترك الآن</a>
    </div>

    <div class="card">
        <img src="logo.png" class="logo-bg">
        <h3>باقة 75 جيجا ⭐</h3>
        <p>سرعة 10 Mbps</p>
        <div class="price">200 جنيه</div>
        <a class="btn" href="https://wa.me/201030434299">اشترك الآن</a>
    </div>

    <div class="card">
        <img src="logo.png" class="logo-bg">
        <h3>باقة 100 جيجا</h3>
        <p>سرعة 5 Mbps</p>
        <div class="price">200 جنيه</div>
        <a class="btn" href="https://wa.me/201030434299">اشترك الآن</a>
    </div>

    <div class="card">
        <img src="logo.png" class="logo-bg">
        <h3>باقة 100 جيجا</h3>
        <p>سرعة 10 Mbps</p>
        <div class="price">250 جنيه</div>
        <a class="btn" href="https://wa.me/201030434299">اشترك الآن</a>
    </div>

</div>

<a class="whatsapp-float" href="https://wa.me/201030434299">💬</a>

</body>
</html>
