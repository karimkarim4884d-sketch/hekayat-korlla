<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIM KHALED | MULTI-LIVE</title>
    <link rel="icon" href="https://i.ibb.co/vzYpYfP/1000008040.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .btn-gold { background: #eab308; color: #000; font-weight: 900; }
        .channel-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .channel-btn.active { background: #eab308; color: #000; border-color: #eab308; font-weight: bold; }
        video { width: 100%; border-radius: 1.5rem; background: #000; border: 2px solid rgba(234, 179, 8, 0.2); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-24 px-4 text-right">

    <div id="loginSection" class="pt-24 text-center">
        <h1 class="text-3xl font-black text-yellow-500 mb-8 uppercase italic">KARIM KHALED</h1>
        <div class="glass p-8 rounded-[3rem] border-t-4 border-yellow-500 shadow-2xl">
            <input type="text" id="uName" placeholder="اسمك" class="w-full p-4 bg-black border border-slate-800 mb-4 text-center rounded-xl outline-none text-white">
            <input type="password" id="uPass" placeholder="السر (للمدير)" class="w-full p-4 bg-black border border-slate-800 mb-6 text-center rounded-xl outline-none text-white">
            <button onclick="doLogin()" class="w-full btn-gold p-4 rounded-xl font-black uppercase text-xs">دخول</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="py-4 flex justify-between items-center border-b border-white/5 mb-6 sticky top-0 bg-[#020617] z-50">
            <div class="flex items-center gap-2">
                <img src="https://i.ibb.co/vzYpYfP/1000008040.jpg" class="w-7 h-7">
                <h1 class="text-sm font-bold text-yellow-500 uppercase">KARIM KHALED LIVE</h1>
            </div>
        </div>

        <div id="liveSection" class="mb-6">
            <video id="video" controls autoplay playsinline class="mb-4"></video>
            
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar" id="userChannels">
                </div>
        </div>

        <div id="adminPanel" class="hidden glass p-6 rounded-[2rem] border-2 border-yellow-500/50 mb-8">
             <h3 class="text-[10px] text-yellow-500 font-black mb-4 uppercase text-center">إضافة قناة جديدة</h3>
             <input type="text" id="chName" placeholder="اسم القناة (مثل: beIN 1)" class="w-full p-3 bg-black border border-slate-800 mb-2 text-center text-xs rounded-xl text-white">
             <input type="text" id="chUrl" placeholder="رابط الـ m3u8" class="w-full p-3 bg-black border border-slate-800 mb-4 text-center text-xs rounded-xl text-white">
             <button onclick="addChannel()" class="w-full bg-red-600 p-3 rounded-xl text-[9px] font-bold uppercase">إضافة القناة للقائمة ✅</button>
             <button onclick="clearChannels()" class="w-full mt-2 bg-gray-800 p-2 rounded-xl text-[8px] uppercase">مسح كل القنوات</button>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass rounded-2xl p-4 flex justify-around items-center border border-white/10">
        <a href="https://wa.me/201040077271" class="text-green-500"><i class="fab fa-whatsapp text-xl"></i></a>
        <a href="https://t.me/HekayetyKorabot" class="text-blue-400"><i class="fab fa-telegram text-xl"></i></a>
        <button onclick="logout()" class="text-red-500"><i class="fas fa-power-off text-xl"></i></button>
    </div>

    <script>
        let channels = JSON.parse(localStorage.getItem('zk_channels') || '[]');

        function doLogin() {
            const n = document.getElementById('uName').value.trim();
            const p = document.getElementById('uPass').value.trim();
            if(!n) return alert("اكتب اسمك");
            let role = (n.toLowerCase() === "karim khaled" && p === "7777") ? "admin" : "user";
            localStorage.setItem('z_n', n); localStorage.setItem('z_r', role);
            location.reload();
        }

        window.onload = function() {
            const n = localStorage.getItem('z_n'), r = localStorage.getItem('z_r');
            if(n) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                if(r === 'admin') document.getElementById('adminPanel').classList.remove('hidden');
                renderChannels();
                if(channels.length > 0) loadStream(channels[0].url);
            }
        };

        function addChannel() {
            const name = document.getElementById('chName').value;
            const url = document.getElementById('chUrl').value;
            if(!name || !url) return alert("كمل البيانات!");
            channels.push({name, url});
            localStorage.setItem('zk_channels', JSON.stringify(channels));
            alert("تمت الإضافة!");
            location.reload();
        }

        function renderChannels() {
            const container = document.getElementById('userChannels');
            container.innerHTML = channels.map((ch, index) => `
                <button onclick="changeChannel('${ch.url}', this)" class="channel-btn shrink-0 px-4 py-2 rounded-xl text-[10px] uppercase">
                    ${ch.name}
                </button>
            `).join('');
        }

        function changeChannel(url, btn) {
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadStream(url);
        }

        function loadStream(url) {
            const video = document.getElementById('video');
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }
        }

        function clearChannels() { localStorage.removeItem('zk_channels'); location.reload(); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
        </html>
