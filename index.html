<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim Khaled | KR Zack Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #eab308; --dark-bg: #020617; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* تحسين مظهر اللوجو ليظهر بشكل ممتلئ واحترافي */
        .kr-logo { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; box-shadow: 0 0 12px rgba(234, 179, 8, 0.4); }
        .kr-logo-sidebar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; margin: 0 auto 15px; box-shadow: 0 0 20px rgba(234, 179, 8, 0.5); }

        .sidebar { position: fixed; top: 0; right: -100%; width: 290px; height: 100%; background: #0f172a; transition: 0.5s; z-index: 200; border-left: 2px solid var(--gold); }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 150; backdrop-filter: blur(4px); }
        .video-box { position: sticky; top: 0; z-index: 100; background: #000; border-bottom: 3px solid var(--gold); width: 100%; aspect-ratio: 16/9; }
        video, iframe { width: 100%; height: 100%; background: #000; }
        .ostora-card { background: #1e293b; border-radius: 15px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid rgba(234, 179, 8, 0.1); position: relative; height: 170px; }
        .nav-tab { background: #1e293b; color: #94a3b8; padding: 12px 18px; border-radius: 12px; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .nav-tab.active { background: var(--gold); color: #000; box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); }
        .admin-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172a; padding: 30px; border-radius: 25px; border: 2px solid var(--gold); z-index: 300; display: none; width: 92%; max-width: 420px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-2xl mx-auto pb-24">

    <div id="mainApp">
        <div class="video-box" id="mediaPlayer">
            <video id="vPlayer" controls autoplay playsinline class="w-full h-full"></video>
        </div>

        <div class="p-4 bg-[#0f172a] flex justify-between items-center shadow-2xl">
            <button onclick="toggleSidebar()" class="text-yellow-500 text-2xl active:scale-90 transition"><i class="fas fa-bars"></i></button>
            <div class="text-center">
                <h1 class="text-[16px] font-black text-yellow-500 italic uppercase tracking-wider">Karim Khaled</h1>
                <p id="streamName" class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.2em]">Premium Cinema Engine</p>
            </div>
            <img src="https://raw.githubusercontent.com/ZackCinema/ZK/main/ZK.png" onerror="this.src='https://via.placeholder.com/100/eab308/000000?text=KR'" class="kr-logo">
        </div>

        <div class="p-4">
            <div class="flex gap-3 overflow-x-auto mb-6 pb-2">
                <button onclick="setTab('live', this)" class="nav-tab active">بث مباشر ⚽</button>
                <button onclick="setTab('ramadan', this)" class="nav-tab">رمضان 2026 🌙</button>
                <button onclick="setTab('movies', this)" class="nav-tab">أفلام 🎬</button>
            </div>
            <div id="contentGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <div id="adminModal" class="admin-modal">
        <h3 class="text-center font-black mb-6 text-yellow-500 text-xl uppercase italic">KR Admin Access</h3>
        <div id="loginSection">
            <input type="text" id="userInp" placeholder="اسم المستخدم" class="w-full p-4 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none">
            <input type="password" id="passInp" placeholder="كلمة المرور" class="w-full p-4 mb-6 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none">
            <button onclick="checkAdmin()" class="w-full bg-yellow-500 text-black p-4 rounded-xl font-black uppercase">فتح لوحة التحكم</button>
        </div>
        <div id="addSection" class="hidden">
            <input type="text" id="mName" placeholder="اسم المحتوى" class="w-full p-3 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none">
            <input type="text" id="mUrl" placeholder="رابط السيرفر" class="w-full p-3 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none">
            <input type="text" id="mImg" placeholder="رابط البوستر" class="w-full p-3 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none">
            <select id="mCat" class="w-full p-3 mb-6 bg-slate-900 border border-slate-700 rounded-xl text-white">
                <option value="live">بث مباشر</option>
                <option value="ramadan">مسلسلات رمضان</option>
                <option value="movies">أفلام</option>
            </select>
            <div class="flex gap-2">
                <button onclick="addItem()" class="flex-1 bg-green-600 p-3 rounded-xl text-xs font-black uppercase">إضافة</button>
                <button onclick="closeAdmin()" class="flex-1 bg-red-600 p-3 rounded-xl text-xs font-black uppercase">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="sidebar" class="sidebar p-8 flex flex-col justify-between">
        <div>
            <div class="text-center mb-10">
                <img src="https://raw.githubusercontent.com/ZackCinema/ZK/main/ZK.png" onerror="this.src='https://via.placeholder.com/200/eab308/000000?text=KR'" class="kr-logo-sidebar">
                <p class="text-xl font-black text-yellow-500 uppercase italic">Karim Khaled</p>
                <p class="text-[10px] text-gray-500 mt-1 uppercase font-bold">Developer & Creator</p>
            </div>
            
            <div class="flex flex-col gap-3">
                <button onclick="openAdmin()" class="bg-yellow-500 text-black p-4 rounded-2xl text-sm font-black flex items-center justify-between mb-4 active:scale-95 transition shadow-lg">
                    <span>إضافة محتوى</span> <i class="fas fa-lock text-lg"></i>
                </button>
                
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">تواصل معنا</p>
                
                <a href="https://wa.me/201040077271" target="_blank" class="bg-white/5 hover:bg-white/10 p-4 rounded-xl text-sm flex items-center justify-between transition border border-white/5">
                    <span>واتساب</span> <i class="fab fa-whatsapp text-green-500 text-xl"></i>
                </a>
                
                <a href="mailto:karimkarim4884d@gmail.com" class="bg-white/5 hover:bg-white/10 p-4 rounded-xl text-sm flex items-center justify-between transition border border-white/5">
                    <span>البريد الإلكتروني</span> <i class="fas fa-envelope text-blue-400 text-xl"></i>
                </a>
                
                <a href="https://karimkarim4884d-sketch.github.io/hekayat-korlla/" target="_blank" class="bg-white/5 hover:bg-white/10 p-4 rounded-xl text-sm flex items-center justify-between transition border border-white/5">
                    <span>الموقع الرسمي</span> <i class="fas fa-globe text-yellow-500 text-xl"></i>
                </a>
            </div>
        </div>
        <button onclick="toggleSidebar()" class="w-full p-4 bg-red-600/10 text-red-500 border border-red-600/20 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-red-600 hover:text-white transition">إغلاق القائمة</button>
    </div>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('kr_cinema_v6')) || [];
        let currentTab = 'live';
        const hls = new Hls();

        window.onload = () => render();

        function checkAdmin() {
            if(document.getElementById('userInp').value === 'admin' && document.getElementById('passInp').value === 'admin') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('addSection').classList.remove('hidden');
            } else { alert("عذراً، البيانات خاطئة!"); }
        }

        function smartPlay(url, name) {
            if (url.includes("discussiondaub")) { alert("تنبيه: هذا الرابط يحتوي على إعلانات مزعجة!"); return; }
            document.getElementById('streamName').innerText = "PLAYING: " + name;
            const container = document.getElementById('mediaPlayer');
            if (url.includes('.m3u8') || url.includes('.mp4') || url.includes('/max')) {
                container.innerHTML = '<video id="vPlayer" controls autoplay playsinline class="w-full h-full"></video>';
                const video = document.getElementById('vPlayer');
                if (Hls.isSupported()) { hls.loadSource(url); hls.attachMedia(video); hls.on(Hls.Events.MANIFEST_PARSED, () => video.play()); }
                else { video.src = url; video.play(); }
            } else { container.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen allow="autoplay"></iframe>`; }
        }

        function render() {
            const grid = document.getElementById('contentGrid');
            const items = db.filter(i => i.cat === currentTab);
            grid.innerHTML = items.length ? items.map(i => `
                <div onclick="smartPlay('${i.url}', '${i.name}')" class="ostora-card shadow-lg">
                    <img src="${i.img || 'https://via.placeholder.com/300x450/1e293b/eab308?text=Zack+Cinema'}" class="w-full h-full object-cover opacity-40">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent flex flex-col justify-end p-3">
                        <p class="text-[10px] font-black text-yellow-500 truncate uppercase tracking-tighter">${i.name}</p>
                        <p class="text-[7px] text-gray-500 font-bold italic">KR PREMIUM</p>
                    </div>
                </div>
            `).join('') : '<p class="col-span-3 text-center py-20 text-gray-700 text-[10px] font-black uppercase">لا يوجد محتوى حالياً</p>';
        }

        function setTab(cat, btn) { currentTab = cat; document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); render(); }
        function openAdmin() { document.getElementById('adminModal').style.display = 'block'; toggleSidebar(); }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; document.getElementById('loginSection').classList.remove('hidden'); document.getElementById('addSection').classList.add('hidden'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none'; }

        function addItem() {
            const name = document.getElementById('mName').value;
            const url = document.getElementById('mUrl').value;
            const img = document.getElementById('mImg').value;
            const cat = document.getElementById('mCat').value;
            if(name && url) {
                db.unshift({name, url, img, cat});
                localStorage.setItem('kr_cinema_v6', JSON.stringify(db));
                alert("تمت الإضافة بنجاح يا كريم!"); closeAdmin(); render();
            }
        }
    </script>
</body>
        </html>
