<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اسمع الآن</title>
    <style>
        :root { --bg: #ffffff; --main: #b31312; --text: #333; --item-bg: #ffffff; }
        .dark-mode { --bg: #121212; --text: #ffffff; --item-bg: #1e1e1e; }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }

        /* الهيدر العلوي */
        .header { background: var(--main); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .site-title { font-size: 20px; font-weight: bold; }
        .menu-icon { font-size: 24px; cursor: pointer; }

        /* القائمة الجانبية (3 شرط) */
        .sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--item-bg); z-index: 2000; transition: 0.4s; box-shadow: -2px 0 10px rgba(0,0,0,0.5); padding: 20px; }
        .sidebar.active { right: 0; }
        .sidebar a { display: block; padding: 15px; color: var(--text); text-decoration: none; border-bottom: 1px solid #444; font-weight: bold; }

        /* تصميم الأزرار (نفس الصورة) */
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .section-item { 
            background: var(--item-bg); 
            border: 2px solid var(--main); 
            border-radius: 10px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; /* حجم كبير مريح */
            cursor: pointer; 
            text-decoration: none;
        }
        .section-text { font-size: 20px; font-weight: bold; color: var(--main); }
        .section-icon { 
            width: 45px; height: 45px; 
            background: var(--main); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-size: 10px; font-weight: bold; text-align: center;
        }

        /* صفحة عرض المحتوى */
        #contentPage { display: none; position: fixed; top: 55px; left: 0; width: 100%; height: calc(100% - 55px); background: var(--bg); z-index: 1500; overflow-y: auto; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .movie-card { background: var(--item-bg); border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
        .movie-card img { width: 100%; height: 140px; object-fit: cover; }
        .movie-card p { font-size: 12px; padding: 5px; text-align: center; height: 35px; overflow: hidden; }

        /* المشغل */
        .player { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; flex-direction:column; }
        iframe { width:100%; height:300px; border:none; }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <div onclick="closeMenu()" style="font-size: 25px; cursor: pointer; margin-bottom: 20px;">✕</div>
        <a href="https://wa.me/201040077271">📱 واتساب: 01040077271</a>
        <a href="#" onclick="toggleTheme()">🌓 وضع (أبيض/أسود)</a>
        <a href="#" onclick="location.reload()">🏠 الرئيسية</a>
    </div>

    <div class="header">
        <div class="menu-icon" onclick="openMenu()">☰</div>
        <div class="site-title">اسمع الآن</div>
        <div style="font-size: 20px;">📅</div>
    </div>

    <div class="container" id="mainMenu">
        <div class="section-item" onclick="loadContent('ar','movie','الأفلام العربية')">
            <span class="section-text">الأفلام العربية</span>
            <span class="section-icon">أفلام<br>عربي</span>
        </div>
        <div class="section-item" onclick="loadContent('en','movie','الأفلام الأجنبية')">
            <span class="section-text">الأفلام الأجنبية</span>
            <span class="section-icon">Zack</span>
        </div>
        <div class="section-item" onclick="loadContent('tr','movie','الأفلام التركية')">
            <span class="section-text">الأفلام التركية</span>
            <span class="section-icon">TR</span>
        </div>
        <div class="section-item" onclick="loadContent('ar','tv','المسلسلات العربية')">
            <span class="section-text">المسلسلات العربية</span>
            <span class="section-icon">مسلسلات</span>
        </div>
        <div class="section-item" onclick="loadContent('tr','tv','المسلسلات التركية')">
            <span class="section-text">المسلسلات التركية</span>
            <span class="section-icon">TR TV</span>
        </div>
        <div class="section-item" onclick="loadContent('28','genre','أفلام الأكشن')">
            <span class="section-text">أفلام الأكشن</span>
            <span class="section-icon">Action</span>
        </div>
        <div class="section-item" onclick="loadContent('16','genre','كرتون وأنيمي')">
            <span class="section-text">كرتون وأنيمي</span>
            <span class="section-icon">Kids</span>
        </div>
        <div class="section-item" onclick="loadContent('35','genre','مسرحيات')">
            <span class="section-text">مسرحيات</span>
            <span class="section-icon">مسرح</span>
        </div>
        <div class="section-item" onclick="loadContent('10402','genre','أغاني وكليبات')">
            <span class="section-text">أغاني وكليبات</span>
            <span class="section-icon">Music</span>
        </div>
    </div>

    <div id="contentPage">
        <h3 id="catTitle" style="margin-bottom:15px; color:var(--main); border-right: 4px solid var(--main); padding-right: 10px;"></h3>
        <div class="grid" id="movieGrid"></div>
        <button onclick="hideContent()" style="width:100%; padding:15px; margin-top:20px; background:var(--main); color:white; border:none; border-radius:8px; font-weight:bold;">الرجوع للأقسام</button>
    </div>

    <div id="player" class="player">
        <div style="padding:15px; color:white; display:flex; justify-content:space-between;" onclick="closePlayer()">
            <span>جاري التشغيل...</span>
            <span>✕ إغلاق</span>
        </div>
        <div id="vBox" style="flex:1; display:flex; align-items:center;"></div>
        <button onclick="changeSrv()" style="padding:20px; background:var(--main); color:white; border:none; font-weight:bold;">سيرفر إضافي (بدون إعلانات)</button>
    </div>

    <script>
        const API = '932eefacf243fb7b9698ea142f2e0481';
        let actId = '', actType = '', srvNum = 0;

        function openMenu() { document.getElementById('sidebar').classList.add('active'); }
        function closeMenu() { document.getElementById('sidebar').classList.remove('active'); }
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }

        async function loadContent(val, type, title) {
            document.getElementById('catTitle').innerText = title;
            document.getElementById('contentPage').style.display = 'block';
            let url = `https://api.themoviedb.org/3/discover/${type === 'genre' ? 'movie' : type}?api_key=${API}&language=ar&sort_by=popularity.desc`;
            if(type === 'genre') url += `&with_genres=${val}`; else url += `&with_original_language=${val}`;

            const res = await fetch(url);
            const data = await res.json();
            let html = '';
            data.results.forEach(m => {
                html += `<div class="movie-card" onclick="play('${m.id}','${type==='tv'?'tv':'movie'}')"><img src="https://image.tmdb.org/t/p/w200${m.poster_path}"><p>${m.title || m.name}</p></div>`;
            });
            document.getElementById('movieGrid').innerHTML = html;
        }

        function hideContent() { document.getElementById('contentPage').style.display = 'none'; }

        function play(id, type) {
            actId = id; actType = type; srvNum = 0;
            document.getElementById('player').style.display = 'flex';
            changeSrv();
        }

        function changeSrv() {
            const srvs = [
                `https://vidsrc.to/embed/${actType}/${actId}`,
                `https://embed.smashystream.com/playere.php?tmdb=${actId}`
            ];
            document.getElementById('vBox').innerHTML = `<iframe src="${srvs[srvNum % 2]}" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin"></iframe>`;
            srvNum++;
        }

        function closePlayer() { document.getElementById('player').style.display='none'; document.getElementById('vBox').innerHTML=''; }
    </script>
</body>
            </html>
