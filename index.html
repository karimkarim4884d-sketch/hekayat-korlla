<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة ولقطة</title>
    <style>
        :root { --bg: #001220; --card: #003366; --accent: #ff6b35; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; text-align: center; }
        header { padding: 20px; border-bottom: 1px solid #002a4d; color: var(--accent); }
        .match-card { background: var(--card); margin: 10px; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; }
        .team img { width: 35px; height: 35px; display: block; margin: 0 auto; }
        .score { font-size: 1.2rem; font-weight: bold; background: #004d99; padding: 5px 10px; border-radius: 5px; }
        .live-label { color: red; font-size: 0.7rem; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000c16; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #002a4d; }
    </style>
</head>
<body>
    <header><h1>هجمة ولقطة</h1></header>
    <div id="list"><p>⏳ جاري تحميل المباريات المباشرة...</p></div>
    <nav class="nav"><div>⚽ المباريات</div><div>📊 الترتيب</div><div>⭐ مفضلتي</div></nav>

    <script>
        const key = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
        async function fetchMatches() {
            try {
                const r = await fetch('https://v3.football.api-sports.io/fixtures?live=all', {
                    headers: { "x-rapidapi-key": key, "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const d = await r.json();
                const list = document.getElementById('list');
                if (d.response.length === 0) {
                    list.innerHTML = '<p>لا توجد مباريات جارية حالياً</p>';
                    return;
                }
                list.innerHTML = d.response.map(m => `
                    <div class="match-card">
                        <div class="team"><img src="${m.teams.home.logo}"> ${m.teams.home.name}</div>
                        <div>
                            <div class="score">${m.goals.home} - ${m.goals.away}</div>
                            <div class="live-label">🔴 مباشر</div>
                        </div>
                        <div class="team"><img src="${m.teams.away.logo}"> ${m.teams.away.name}</div>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('list').innerHTML = '⚠️ خطأ في الاتصال بالبيانات'; }
        }
        fetchMatches();
    </script>
</body>
</html>
