<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zack Cinema Premium</title>
    <style>
        :root { --dark-bg: #0b1118; --accent: #00f2ff; --card: #1a222d; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background: var(--dark-bg); color: white; padding-bottom: 70px; }
        
        .top-bar { padding: 15px; position: sticky; top: 0; background: var(--dark-bg); z-index: 100; }
        .search-box { background: var(--card); padding: 10px; border-radius: 20px; display: flex; border: 1px solid #333; }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card); border-radius: 8px; overflow: hidden; cursor: pointer; text-align: center; }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card div { font-size: 0.7rem; padding: 5px; height: 35px; overflow: hidden; }

        /* المشغل */
        .player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; }
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .iframe-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* أهم تعديل للمشغل */
        iframe { width: 100%; height: 100%; max-height: 300px; border: none; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #0f171f; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; }
        .nav-item { color: #a0aab2; font-size: 0.8rem; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body onload="load('tv')">

    <div id="player" class="player-overlay">
        <div class="header">
            <span onclick="closeP()" style="cursor:pointer">✕ إغلاق</span>
            <span style="color:var(--accent)">Zack Premium Player</span>
        </div>
        <div class="iframe-wrapper" id="frameBox"></div>
        <div style="padding: 20px; text-align: center;">
            <button onclick="refreshP()" style="background:var(--accent); color:#000; border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">تحديث السيرفر</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="search-box"><input id="srch" type="text" placeholder="ابحث هنا يا Zack..." onkeyup="search(this.value)"></div>
    </div>

    <div class="grid" id="mainGrid"></div>

    <div class="nav">
        <div class="nav-item active" id="btn-tv" onclick="load('tv')">مسلسلات</div>
        <div class="nav-item" id="btn-movie" onclick="load('movie')">أفلام</div>
    </div>

    <script>
        const KEY = '932eefacf243fb7b9698ea142f2e0481';
        let curId, curType;

        async function load(type) {
            curType = type;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('btn-'+type).classList.add('active');
            const res = await fetch(`https://api.themoviedb.org/3/discover/${type}?api_key=${KEY}&language=ar&sort_by=popularity.desc&with_original_language=ar`);
            const data = await res.json();
            render(data.results);
        }

        function render(items) {
            const g = document.getElementById('mainGrid');
            g.innerHTML = '';
            items.forEach(i => {
                if(!i.poster_path) return;
                g.innerHTML += `<div class="card" onclick="openP('${i.id}')">
                    <img src="https://image.tmdb.org/t/p/w500${i.poster_path}">
                    <div>${i.name || i.title}</div>
                </div>`;
            });
        }

        function openP(id) {
            curId = id;
            document.getElementById('player').style.display = 'flex';
            refreshP();
            
            // قفل الأمان لمنع الخروج من الموقع
            window.onbeforeunload = () => "هل تريد المغادرة؟";
        }

        function refreshP() {
            // استخدام سيرفر vidsrc.pro - أنضف سيرفر حالياً
            const url = `https://vidsrc.pro/embed/${curType}/${curId}`;
            
            // تعديل الـ Sandbox ليكون مقبولاً من السيرفر ومحمياً في نفس الوقت
            document.getElementById('frameBox').innerHTML = `
                <iframe src="${url}" 
                    allowfullscreen="true" 
                    sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation">
                </iframe>`;
        }

        function closeP() {
            document.getElementById('player').style.display = 'none';
            document.getElementById('frameBox').innerHTML = '';
            window.onbeforeunload = null;
        }

        async function search(q) {
            if(q.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&language=ar&query=${q}`);
            const data = await res.json();
            render(data.results);
        }
    </script>
</body>
</html>
