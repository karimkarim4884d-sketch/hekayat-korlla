<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZACK TOK - KARIM KHALED</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ffcc00; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: sans-serif; }

        /* حاوية التيك توك - سحب عمودي */
        .tiktok-container { width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .tiktok-container::-webkit-scrollbar { display: none; }

        .video-card { width: 100%; height: 100vh; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* الأزرار الجانبية (مثل تيك توك) */
        .side-actions { position: absolute; bottom: 100px; right: 15px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .action-btn { color: white; text-align: center; font-size: 12px; cursor: pointer; }
        .action-btn i { font-size: 30px; margin-bottom: 5px; display: block; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .action-btn.fav i { color: var(--main); }

        /* معلومات الفيديو أسفل الشاشة */
        .video-info { position: absolute; bottom: 30px; left: 15px; right: 80px; color: white; z-index: 10; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        .video-info h3 { margin: 0; font-size: 16px; color: var(--main); }
        .video-info p { margin: 5px 0 0; font-size: 13px; opacity: 0.9; }

        /* الساعة (القائمة) وزرار الإضافة */
        .menu-toggle { position: fixed; top: 20px; right: 20px; background: rgba(255, 204, 0, 0.8); color: black; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1001; }
        .side-menu { position: fixed; top: 0; right: -250px; width: 200px; height: 100%; background: rgba(0,0,0,0.9); border-left: 2px solid var(--main); transition: 0.4s; z-index: 1000; padding-top: 80px; }
        .side-menu.active { right: 0; }
        .menu-item { display: block; padding: 20px; color: white; text-decoration: none; border-bottom: 1px dotted #333; }

        /* لوحة التحكم */
        #admin { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #1a1a1a; padding: 20px; border: 2px solid var(--main); border-radius: 15px; z-index: 2000; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="document.querySelector('.side-menu').classList.toggle('active')"><i class="fas fa-bars"></i></div>

    <div class="side-menu">
        <a href="https://wa.me/201040077271" class="menu-item"><i class="fab fa-whatsapp"></i> خدمة العملاء</a>
        <a href="mailto:karimkarim4884d@gmail.com" class="menu-item"><i class="fas fa-envelope"></i> الشكاوى</a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" class="menu-item"><i class="fas fa-plus"></i> إضافة فيديو</a>
    </div>

    <div id="admin">
        <h3 style="color:var(--main); text-align:center;">إضافة فيديو تيك توك</h3>
        <input type="text" id="v-title" class="admin-input" placeholder="عنوان الفيديو">
        <input type="text" id="v-link" class="admin-input" placeholder="رابط الفيديو (Direct MP4)">
        <input type="text" id="v-desc" class="admin-input" placeholder="وصف قصير">
        <button onclick="addVideo()" style="width:100%; padding:15px; background:var(--main); border:none; font-weight:bold; border-radius:8px;">نشر الآن</button>
        <button onclick="toggleAdmin()" style="width:100%; margin-top:10px; background:red; color:white; border:none; padding:5px; border-radius:5px;">إغلاق</button>
    </div>

    <div class="tiktok-container" id="video-wrapper">
        </div>

    <script>
        const dbURL = "https://karim-884d-default-rtdb.firebaseio.com/tiktok.json";

        function toggleAdmin() {
            const a = document.getElementById('admin');
            a.style.display = a.style.display === 'block' ? 'none' : 'block';
        }

        async function addVideo() {
            const v = {
                title: document.getElementById('v-title').value,
                link: document.getElementById('v-link').value,
                desc: document.getElementById('v-desc').value
            };
            if(!v.link) return alert("حط رابط الفيديو!");
            await fetch(dbURL, { method: 'POST', body: JSON.stringify(v) });
            alert("تم النشر!");
            location.reload();
        }

        async function loadVideos() {
            const container = document.getElementById('video-wrapper');
            const res = await fetch(dbURL);
            const data = await res.json();
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const vid = data[id];
                    container.innerHTML += `
                        <div class="video-card">
                            <video loop onclick="this.paused ? this.play() : this.pause()">
                                <source src="${vid.link}" type="video/mp4">
                            </video>
                            <div class="side-actions">
                                <div class="action-btn fav"><i class="fas fa-heart"></i><span>1.2M</span></div>
                                <div class="action-btn"><i class="fas fa-comment"></i><span>450</span></div>
                                <div class="action-btn" onclick="deleteVid('${id}')"><i class="fas fa-trash" style="color:red"></i></div>
                            </div>
                            <div class="video-info">
                                <h3>@karim_khaled</h3>
                                <p>${vid.title}</p>
                                <marquee style="width:150px; font-size:12px; margin-top:10px;"><i class="fas fa-music"></i> ${vid.desc || 'Original Sound'}</marquee>
                            </div>
                        </div>
                    `;
                });
            }
        }

        async function deleteVid(id) {
            if(confirm("تمسح الفيديو؟")) {
                await fetch(`https://karim-884d-default-rtdb.firebaseio.com/tiktok/${id}.json`, { method: 'DELETE' });
                location.reload();
            }
        }

        window.onload = loadVideos;
    </script>
</body>
</html>
