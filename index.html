<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema | Ultimate System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .blue-p { color: #3b82f6; border: 1px solid #3b82f6; padding: 2px 8px; rounded: 10px; }
        .red-p { color: #ef4444; border: 1px solid #ef4444; padding: 2px 8px; rounded: 10px; }
        .admin-sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 300px; background: #0b0f1a; border-right: 2px solid #ef4444; z-index: 1000; transform: translateX(-100%); transition: 0.4s; }
        .admin-open { transform: translateX(0); }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center gap-4">

    <div id="admin-sidebar" class="admin-sidebar p-6 overflow-y-auto">
        <h2 class="text-red-500 font-black text-center mb-6 border-b border-red-900 pb-2 italic">ZACK CONTROL</h2>
        <div class="space-y-4">
            <input type="text" id="target-id" placeholder="أدخل أيدي العميل" class="w-full p-3 rounded-xl bg-black border border-slate-800 text-center font-bold">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="adminAction('blue')" class="bg-blue-600 p-2 rounded-lg text-[9px] font-bold">شحن نقاط زرقاء</button>
                <button onclick="adminAction('red')" class="bg-red-600 p-2 rounded-lg text-[9px] font-bold">شحن نقاط حمراء</button>
            </div>
            <input type="number" id="pts-amount" placeholder="الكمية" class="w-full p-2 rounded-lg bg-black text-center border border-slate-800">
            <button onclick="adminAction('activate')" class="w-full bg-green-600 p-3 rounded-xl font-bold text-xs">تفعيل البث فوراً ✅</button>
        </div>
        <button onclick="closeAdmin()" class="mt-10 text-[10px] underline block mx-auto text-gray-600">إغلاق</button>
    </div>

    <button onclick="openAdmin()" class="fixed top-4 left-4 opacity-10 text-white z-[500]"><i class="fas fa-user-shield text-xl"></i></button>

    <div id="login-panel" class="w-full max-w-md glass rounded-[2.5rem] p-8 mt-10 border-t-4 border-blue-600 shadow-2xl">
        <h2 class="text-xl font-bold text-center mb-6 italic">ZACK CINEMA TV</h2>
        <input type="text" id="nameInput" placeholder="أدخل اسمك بالإنجليزي" class="w-full p-4 rounded-2xl bg-black/40 border border-slate-700 text-center mb-4 font-bold">
        <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-2xl font-black">دخول</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-md space-y-4">
        
        <div class="glass p-6 rounded-[2.5rem] border-b-4 border-blue-500 relative text-center">
            <button onclick="logout()" class="absolute top-4 left-6 text-red-500 font-bold text-xs">خروج</button>
            <h3 id="userNameDisplay" class="text-2xl font-black text-blue-400"></h3>
            <p id="autoID" class="text-xl font-mono font-bold text-white mt-1"></p>
            <div class="flex gap-4 justify-center mt-4">
                <span class="text-[10px]">زرقاء: <b id="bluePoints" class="blue-p">0</b></span>
                <span class="text-[10px]">حمراء: <b id="redPoints" class="red-p">0</b></span>
            </div>
        </div>

        <div id="live-section" class="hidden glass p-4 rounded-[2.5rem] border-2 border-green-500 overflow-hidden">
            <p class="text-green-500 text-[10px] font-bold mb-3"><i class="fas fa-circle animate-ping mr-2"></i>البث المباشر مفعّل</p>
            <iframe id="videoPlayer" src="" class="w-full h-[200px] rounded-xl" allowfullscreen></iframe>
        </div>

        <div class="glass p-4 rounded-[2.5rem] text-center">
            <h4 class="text-xs font-bold mb-2"><i class="fas fa-futbol mr-2 text-green-500"></i>نتائج الماتشات مباشرة</h4>
            <div class="bg-black/20 p-4 rounded-xl text-[10px] text-gray-400">لا يوجد مباريات جارية حالياً</div>
        </div>

        <a href="https://wa.me/201040077271" class="flex items-center justify-center gap-3 w-full bg-green-600 p-4 rounded-[2.5rem] font-black text-sm">
            <i class="fab fa-whatsapp text-xl"></i> خدمة العملاء (تواصل واتساب)
        </a>

        <div id="recharge-section" class="space-y-4">
            <div class="glass p-5 rounded-[2.5rem] border border-red-500/20">
                <p class="text-[10px] text-center mb-3">شحن تفعيل 15 يوم (300 حمراء = 20LE)</p>
                <button onclick="userAction('buy15')" class="w-full bg-red-600 p-3 rounded-2xl font-bold text-xs">تفعيل 15 يوم الآن</button>
            </div>
            <div class="glass p-5 rounded-[2.5rem] border border-blue-500/20">
                <p class="text-[10px] text-center mb-3 text-blue-400">ترقية أيدي مميز 30 يوم (500 زرقاء = 30LE)</p>
                <input type="text" id="vipInput" maxlength="8" placeholder="اختر 8 أرقام للأيدي المميز" class="w-full p-3 rounded-xl bg-black border border-blue-900/50 text-center font-bold mb-3 text-blue-500 outline-none">
                <button onclick="userAction('buyVIP')" class="w-full bg-blue-600 p-3 rounded-2xl font-bold text-xs">تفعيل الأيدي المميز الآن</button>
            </div>
        </div>
    </div>

    <script>
        // لوحة الأدمن
        function openAdmin() {
            if (localStorage.getItem('z_adm') === "t" || prompt("كلمة السر:") === "zack2026") {
                localStorage.setItem('z_adm', "t");
                document.getElementById('admin-sidebar').classList.add('admin-open');
            }
        }

        function adminAction(type) {
            const id = document.getElementById('target-id').value;
            const amount = document.getElementById('pts-amount').value;
            if(!id) return alert("دخل الأيدي!");
            
            // الربط اللحظي: تخزين البيانات تحت مفتاح الأيدي
            if(type === 'blue') localStorage.setItem('blue_'+id, amount);
            if(type === 'red') localStorage.setItem('red_'+id, amount);
            if(type === 'activate') localStorage.setItem('active_'+id, 'true');
            
            alert("تم تنفيذ العملية للأيدي " + id);
        }

        // لوحة المستخدم
        function login() {
            const name = document.getElementById('nameInput').value.trim();
            if(name.length < 2) return;
            const id = Math.floor(10000000 + Math.random() * 90000000);
            localStorage.setItem('z_name', name);
            localStorage.setItem('z_id', id);
            location.reload();
        }

        window.onload = function() {
            const name = localStorage.getItem('z_name');
            const id = localStorage.getItem('z_id');
            if(name && id) {
                // جلب البيانات "المسمعة" من الأدمن للأيدي ده
                const bPts = localStorage.getItem('blue_'+id) || 0;
                const rPts = localStorage.getItem('red_'+id) || 0;
                const isActive = localStorage.getItem('active_'+id) === 'true';

                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = name;
                document.getElementById('autoID').innerText = "#" + id;
                document.getElementById('bluePoints').innerText = bPts;
                document.getElementById('redPoints').innerText = rPts;

                if(isActive) {
                    document.getElementById('live-section').classList.remove('hidden');
                    document.getElementById('videoPlayer').src = "https://www.youtube.com/embed/live_stream?channel=UC4p9m8_4S99S5M2_9G6G5Q";
                }
            }
        };

        function userAction(type) {
            const id = localStorage.getItem('z_id');
            if(type === 'buy15') {
                let pts = parseInt(localStorage.getItem('red_'+id) || 0);
                if(pts >= 300) {
                    localStorage.setItem('red_'+id, pts - 300);
                    localStorage.setItem('active_'+id, 'true');
                    location.reload();
                } else alert("نقاطك الحمراء مش كفاية!");
            }
            if(type === 'buyVIP') {
                const newID = document.getElementById('vipInput').value;
                let pts = parseInt(localStorage.getItem('blue_'+id) || 0);
                if(pts >= 500 && newID.length === 8) {
                    localStorage.setItem('blue_'+id, pts - 500);
                    localStorage.setItem('z_id', newID); // تغيير الأيدي للمميز
                    localStorage.setItem('active_'+id, 'true'); // تفعيل 30 يوم
                    location.reload();
                } else alert("تأكد من النقاط الزرقاء أو طول الأيدي!");
            }
        }

        function closeAdmin() { document.getElementById('admin-sidebar').classList.remove('admin-open'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
    </html>
