<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karim Khaled | Cinema System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .admin-section { border-top: 2px solid #3b82f6; margin-top: 20px; padding-top: 20px; }
        .btn-active:active { transform: scale(0.96); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="loginSection" class="w-full max-w-md glass rounded-[3rem] p-10 mt-12 text-center shadow-2xl border-t-4 border-blue-600">
        <h1 class="text-3xl font-black mb-2 italic text-blue-500 uppercase">Karim Khaled</h1>
        <p class="text-[10px] text-gray-400 mb-10 uppercase font-bold tracking-widest">Cinema Experience</p>
        <input type="text" id="uName" placeholder="اكتب اسمك (Karim Khaled للمدير)" class="w-full p-5 rounded-3xl bg-black/40 border border-slate-800 text-center font-bold outline-none text-white mb-4">
        <button onclick="doLogin()" class="w-full bg-blue-600 p-5 rounded-3xl font-black uppercase shadow-xl btn-active">دخول</button>
    </div>

    <div id="userDash" class="hidden w-full max-w-md space-y-5">
        
        <div class="glass p-8 rounded-[3rem] border-b-8 border-blue-600 relative text-center shadow-2xl">
            <button onclick="doLogout()" class="absolute top-6 left-8 text-red-500 font-black text-[10px] uppercase">خروج</button>
            <h2 id="dispName" class="text-2xl font-black text-blue-400 uppercase"></h2>
            <p id="dispId" class="text-xl font-mono font-black mt-2 text-white"></p>
            <div class="flex gap-4 justify-center mt-6">
                <div class="bg-blue-900/20 px-5 py-2 rounded-2xl border border-blue-500/20 text-center">
                    <p class="text-[8px] text-gray-500 uppercase">زرقاء</p>
                    <b id="pBlue" class="text-blue-400 text-lg">0</b>
                </div>
                <div class="bg-red-900/20 px-5 py-2 rounded-2xl border border-red-500/20 text-center">
                    <p class="text-[8px] text-gray-500 uppercase">حمراء</p>
                    <b id="pRed" class="text-red-400 text-lg">0</b>
                </div>
            </div>

            <div id="adminControls" class="hidden admin-section space-y-4">
                <p class="text-blue-500 font-bold text-[10px] uppercase tracking-widest italic text-center">لوحة شحن العملاء</p>
                <input type="text" id="targetId" placeholder="ID العميل" class="w-full p-4 rounded-2xl bg-black border border-slate-800 text-center font-bold text-sm outline-none">
                <input type="number" id="targetAmount" placeholder="الكمية" class="w-full p-4 rounded-2xl bg-black border border-slate-800 text-center font-bold text-sm outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="cloudCharge('blue')" class="bg-blue-600 p-3 rounded-xl text-[9px] font-bold uppercase shadow-lg btn-active">شحن زرقاء</button>
                    <button onclick="cloudCharge('red')" class="bg-red-600 p-3 rounded-xl text-[9px] font-bold uppercase shadow-lg btn-active">شحن حمراء</button>
                </div>
                <button onclick="cloudCharge('live')" class="w-full bg-green-600 p-3 rounded-xl font-bold text-[10px] uppercase btn-active">تفعيل البث للعميل ✅</button>
            </div>
        </div>

        <div id="liveBox" class="hidden glass p-4 rounded-[3rem] border-2 border-green-500 shadow-lg">
            <p class="text-green-500 text-[10px] font-bold mb-3 uppercase animate-pulse">● البث المباشر مفعّل</p>
            <iframe id="player" src="" class="w-full h-[200px] rounded-[25px]" allowfullscreen></iframe>
        </div>

        <a href="https://wa.me/201040077271" class="bg-green-600 flex items-center justify-center gap-3 w-full p-5 rounded-[2.5rem] font-black text-xs uppercase shadow-lg btn-active">
            <i class="fab fa-whatsapp text-xl"></i> خدمة العملاء (واتساب)
        </a>

        <div id="payOptions" class="glass p-6 rounded-[3rem] border border-red-900/30 text-center">
            <p class="text-[9px] mb-4 text-gray-400 font-bold uppercase italic">اشتراك 15 يوم (300 حمراء)</p>
            <button onclick="userBuy('red')" class="w-full bg-red-600 p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg btn-active">تفعيل الاشتراك</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const config = { databaseURL: "https://zack-cinema-default-rtdb.firebaseio.com" };
        let db;
        try { if (!firebase.apps.length) firebase.initializeApp(config); db = firebase.database(); } catch(e){}

        function doLogin() {
            const n = document.getElementById('uName').value.trim();
            if(n.length < 2) return alert("اكتب اسمك!");
            let id = localStorage.getItem('z_i') || Math.floor(Math.random() * 89999999) + 10000000;
            
            if(n.toLowerCase() === "karim khaled") {
                id = "77777777";
                if(db) db.ref('users/' + id).update({ name: n, blue: 1000000, red: 1000000, live: true });
                localStorage.setItem('is_adm', 'true');
            }

            localStorage.setItem('z_n', n);
            localStorage.setItem('z_i', id);
            showDash(n, id);
        }

        function showDash(n, i) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('userDash').classList.remove('hidden');
            document.getElementById('dispName').innerText = n;
            document.getElementById('dispId').innerText = "#" + i;

            // إظهار لوحة الشحن في المين إذا كان الداخل هو كريم
            if(localStorage.getItem('is_adm') === 'true') {
                document.getElementById('adminControls').classList.remove('hidden');
            }

            if(db) {
                db.ref('users/' + i).on('value', (s) => {
                    const d = s.val();
                    if(d) {
                        document.getElementById('pBlue').innerText = (d.blue || 0).toLocaleString();
                        document.getElementById('pRed').innerText = (d.red || 0).toLocaleString();
                        if(d.live === true) {
                            document.getElementById('payOptions').classList.add('hidden');
                            document.getElementById('liveBox').classList.remove('hidden');
                            document.getElementById('player').src = "https://www.youtube.com/embed/live_stream?channel=UC4p9m8_4S99S5M2_9G6G5Q";
                        }
                    }
                });
            }
        }

        window.onload = function() {
            const n = localStorage.getItem('z_n'), i = localStorage.getItem('z_i');
            if(n && i) showDash(n, i);
        };

        function cloudCharge(t) {
            const target = document.getElementById('targetId').value;
            const am = parseInt(document.getElementById('targetAmount').value) || 0;
            if(!target || !db) return alert("أدخل ID العميل!");
            let up = {};
            if(t === 'blue') up = { blue: am };
            if(t === 'red') up = { red: am };
            if(t === 'live') up = { live: true };
            db.ref('users/' + target).update(up);
            alert("✅ تم التحديث للأيدي " + target);
        }

        function userBuy(t) {
            const myId = localStorage.getItem('z_i');
            db.ref('users/' + myId).once('value').then(s => {
                const d = s.val();
                if(t === 'red' && d.red >= 300) db.ref('users/' + myId).update({ red: d.red - 300, live: true });
                else alert("رصيدك لا يكفي!");
            });
        }
        function doLogout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
