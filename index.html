<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema | Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .admin-sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: #0b0f1a; border-right: 2px solid #ef4444; z-index: 10000; transform: translateX(-100%); transition: 0.3s; }
        .admin-open { transform: translateX(0); }
        iframe { width: 100%; height: 200px; border-radius: 20px; border: 2px solid #22c55e; }
        .btn-blue { background: #3b82f6; }
        .btn-red { background: #ef4444; }
        .btn-green { background: #22c55e; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="adminPanel" class="admin-sidebar p-5">
        <h2 class="text-red-500 font-black text-center mb-5 border-b border-red-900 pb-2">ZACK ADMIN</h2>
        <div class="space-y-4">
            <div class="bg-black/50 p-2 rounded-lg text-center text-[10px]">
                <p>رصيد نقاط زرقاء: <span class="text-blue-400">1,000,000</span></p>
                <p>رصيد نقاط حمراء: <span class="text-red-400">1,000,000</span></p>
            </div>
            <input type="text" id="targetId" placeholder="أيدي العميل" class="w-full p-2 rounded bg-black border border-slate-700 text-center text-sm">
            <input type="number" id="targetAmount" placeholder="الكمية" class="w-full p-2 rounded bg-black border border-slate-700 text-center text-sm">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="doCharge('blue')" class="btn-blue text-[9px] p-2 rounded font-bold">شحن زرقاء</button>
                <button onclick="doCharge('red')" class="btn-red text-[9px] p-2 rounded font-bold">شحن حمراء</button>
            </div>
            <button onclick="doCharge('live')" class="w-full btn-green p-2 rounded font-bold text-xs">تفعيل البث فوراً</button>
        </div>
        <button onclick="toggleAdmin()" class="mt-10 text-[10px] block mx-auto underline text-gray-500">إغلاق</button>
    </div>

    <div onclick="toggleAdmin()" style="position:fixed; top:0; left:0; width:50px; height:50px; z-index:999; cursor:pointer;"></div>

    <div id="loginSection" class="w-full max-w-md glass rounded-[2.5rem] p-8 mt-10 text-center shadow-2xl">
        <h1 class="text-2xl font-black mb-6 italic text-blue-500">ZACK CINEMA TV</h1>
        <input type="text" id="uName" placeholder="اكتب اسمك هنا" class="w-full p-4 rounded-2xl bg-black border border-slate-800 text-center mb-4 font-bold outline-none">
        <button onclick="startApp()" class="w-full btn-blue p-4 rounded-2xl font-black shadow-lg">دخول وتفعيل</button>
    </div>

    <div id="userDash" class="hidden w-full max-w-md space-y-4">
        
        <div class="glass p-6 rounded-[2.5rem] border-b-4 border-blue-600 relative text-center">
            <button onclick="exitApp()" class="absolute top-4 left-6 text-red-500 font-bold text-[10px]">خروج</button>
            <h2 id="dispName" class="text-xl font-black text-blue-400"></h2>
            <p id="dispId" class="text-lg font-mono font-bold tracking-widest mt-1"></p>
            <div class="flex gap-4 justify-center mt-3">
                <span class="text-[9px] text-blue-400">زرقاء: <b id="pBlue">0</b></span>
                <span class="text-[9px] text-red-400">حمراء: <b id="pRed">0</b></span>
            </div>
        </div>

        <div id="liveBox" class="hidden glass p-4 rounded-[2.5rem] border-2 border-green-500">
            <p class="text-green-500 text-[10px] font-bold mb-2">● البث المباشر مفعّل</p>
            <iframe id="player" src="" allowfullscreen></iframe>
        </div>

        <div class="glass p-4 rounded-[2.5rem] text-center">
            <p class="text-[10px] font-bold text-gray-400 italic">نتائج الماتشات مباشرة</p>
        </div>

        <a href="https://wa.me/201040077271" class="btn-green flex items-center justify-center gap-2 w-full p-4 rounded-[2.5rem] font-black text-xs">
            <i class="fab fa-whatsapp"></i> خدمة العملاء (واتساب)
        </a>

        <div id="payOptions" class="space-y-4">
            <div class="glass p-5 rounded-[2.5rem] border border-red-900/30">
                <p class="text-[9px] text-center mb-2">تفعيل 15 يوم (300 حمراء = 20LE)</p>
                <button onclick="buy('red')" class="w-full btn-red p-3 rounded-2xl font-bold text-[10px]">تفعيل الآن</button>
            </div>
            <div class="glass p-5 rounded-[2.5rem] border border-blue-900/30">
                <p class="text-[9px] text-center mb-2 text-blue-400">أيدي مميز 30 يوم (500 زرقاء = 30LE)</p>
                <input type="text" id="newIdInput" maxlength="8" placeholder="اختر 8 أرقام للأيدي" class="w-full p-2 rounded-xl bg-black border border-blue-900 text-center mb-2 text-blue-400 text-sm outline-none">
                <button onclick="buy('blue')" class="w-full btn-blue p-3 rounded-2xl font-bold text-[10px]">تفعيل الأيدي المميز</button>
            </div>
        </div>
    </div>

        // تنظيف وحفظ البيانات

            const name = document.getElementById('uName').value.trim();
            if(name.length < 2) return alert("اكتب اسمك!");

            localStorage.setItem('z_user', name);
            localStorage.setItem('z_id', id);
            location.reload(); // تحديث فوري
        }
