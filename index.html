<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة ولقطة - الجدول العالمي</title>
    <style>
        :root {
            --dark-bg: #001220;
            --card-bg: #003366;
            --accent-orange: #ff6b35;
            --text-white: #ffffff;
            --light-blue: #00bfff;
            --goal-bg: #004d99;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--dark-bg); color: var(--text-white); padding: 10px; padding-bottom: 90px; }

        header { text-align: center; padding: 15px; color: var(--accent-orange); }

        /* شريط البحث */
        .search-area { max-width: 500px; margin: 0 auto 15px; }
        .search-box { display: flex; background: white; border-radius: 12px; overflow: hidden; border: 2px solid var(--accent-orange); }
        .search-box input { flex: 1; padding: 12px; border: none; outline: none; font-size: 1rem; color: #333; text-align: right; }
        .search-box button { padding: 0 20px; background: var(--accent-orange); border: none; color: white; cursor: pointer; font-weight: bold; }

        /* الأزرار */
        .tabs { display: flex; gap: 8px; max-width: 500px; margin: 0 auto 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #002a4d; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.9rem; }
        .tab-btn.active { background: var(--accent-orange); box-shadow: 0 0 10px var(--accent-orange); }

        .match-container { max-width: 550px; margin: 0 auto; }

        .league-title { 
            text-align: center; font-size: 0.85rem; color: var(--light-blue); 
            margin: 25px 0 10px; font-weight: bold; background: rgba(0, 191, 255, 0.1); padding: 8px; border-radius: 5px;
        }

        .match-card {
            background: var(--card-bg); border-radius: 15px; display: flex;
            align-items: center; padding: 15px; margin-bottom: 12px; border-right: 4px solid var(--light-blue);
            justify-content: space-between; position: relative;
        }

        .team { flex: 2; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .team img { width: 40px; height: 40px; object-fit: contain; }
        .team span { font-size: 0.8rem; font-weight: bold; text-align: center; }

        /* خانة النتيجة الرقمية */
        .score-box {
            background: var(--goal-bg); color: white; min-width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-weight: bold; font-size: 1.1rem;
            border: 1px solid var(--light-blue); margin: 0 5px;
        }

        .center-info { flex: 1.5; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .vs-badge { background: var(--accent-orange); color: white; padding: 3px 10px; border-radius: 6px; font-weight: bold; font-size: 0.75rem; }
        .time { font-size: 0.75rem; font-weight: bold; color: var(--light-blue); }

        .live-label { color: #ff4d4d; font-size: 0.7rem; font-weight: bold; animation: blink 1.2s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }

        /* الدعم الفني */
        .whatsapp-float {
            position: fixed; bottom: 20px; left: 20px; background: #25d366;
            color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 1000;
            display: flex; align-items: center; gap: 8px;
        }

        /* المودال للتشكيلة */
        .modal {
            display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; width: 100%; max-width: 380px; max-height: 80vh; overflow-y: auto; text-align: center; border: 1px solid var(--light-blue); }
        .close-btn { color: var(--accent-orange); float: left; font-size: 30px; cursor: pointer; }
        .player-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #004d99; font-size: 0.9rem; color: #fff; }

        .no-result { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>

<header><h1>⚽ هجمة ولقطة</h1></header>

<div class="search-area">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث عن مباراة أو فريق..." oninput="filterData()">
        <button onclick="filterData()">بحث</button>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn" id="yesterday" onclick="getMatches(-1, 'yesterday')">مباريات الأمس</button>
    <button class="tab-btn active" id="today" onclick="getMatches(0, 'today')">مباريات اليوم</button>
    <button class="tab-btn" id="tomorrow" onclick="getMatches(1, 'tomorrow')">مباريات الغد</button>
</div>

<div id="matches-list" class="match-container">
    <div class="no-result">⏳ جاري جلب الماتشات...</div>
</div>

<a href="https://wa.me/201040077271" class="whatsapp-float" target="_blank">
    <span>الدعم الفني</span> 💬
</a>

<div id="lineupModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="lineupTitle" style="margin-bottom:15px; color: var(--light-blue);"></h3>
        <div id="lineupBody"></div>
    </div>
</div>

<script>
const API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
let currentData = [];

// وسعنا قائمة الدوريات عشان متبقاش فاضية دايماً
const importantLeagues = [39, 140, 135, 78, 61, 2, 3, 1, 4, 233, 307, 848, 480, 202];

const dictionary = {
    "Real Madrid": "ريال مدريد", "Barcelona": "برشلونة", "Liverpool": "ليفربول",
    "Manchester City": "مانشستر سيتي", "Al Ahly": "الأهلي", "Zamalek": "الزمالك",
    "Arsenal": "أرسنال", "Chelsea": "تشيلسي", "Bayern Munich": "بايرن ميونخ",
    "Paris Saint Germain": "باريس سان جيرمان", "Al Hilal": "الهلال", "Al Nassr": "النصر",
    "Premier League": "الدوري الإنجليزي", "La Liga": "الدوري الإسباني",
    "UEFA Champions League": "دوري أبطال أوروبا", "Egyptian Premier League": "الدوري المصري",
    "Saudi Pro League": "الدوري السعودي", "Serie A": "الدوري الإيطالي"
};

const translateAr = (name) => dictionary[name] || name;

async function getMatches(offset, btnId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(btnId).classList.add('active');

    const d = new Date();
    d.setDate(d.getDate() + offset);
    // تصحيح التوقيت عشان ميجيبش يوم غلط
    const dateStr = d.toLocaleDateString('en-CA'); 
    
    const list = document.getElementById('matches-list');
    list.innerHTML = '<div class="no-result">⏳ جاري تحميل البيانات...</div>';

    try {
        const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateStr}`, {
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const json = await res.json();
        
        // لو مفيش ماتشات في الدوريات المهمة، نعرض كله عشان الصفحة متكونش فاضية
        let filtered = json.response.filter(m => importantLeagues.includes(m.league.id));
        currentData = filtered.length > 0 ? filtered : json.response.slice(0, 20); 
        
        render(currentData);
    } catch (e) {
        list.innerHTML = "<div class='no-result'>⚠️ فشل في جلب الماتشات</div>";
    }
}

function render(data) {
    const list = document.getElementById('matches-list');
    if (!data || data.length === 0) {
        list.innerHTML = '<div class="no-result">مفيش ماتشات مسجلة في التاريخ ده</div>';
        return;
    }
    
    list.innerHTML = '';
    data.forEach(m => {
        const matchTime = new Date(m.fixture.date).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
        const status = m.fixture.status.short;
        const isStarted = status !== 'NS' && status !== 'TBD';
        const isLive = ['1H', '2H', 'HT', 'ET', 'P'].includes(status);
        
        list.innerHTML += `
            <div class="match-item">
                <div class="league-title">🏆 ${translateAr(m.league.name)}</div>
                <div class="match-card">
                    <div class="team" onclick="showLineup(${m.fixture.id}, '${m.teams.home.name}')">
                        <img src="${m.teams.home.logo}">
                        <span>${translateAr(m.teams.home.name)}</span>
                    </div>
                    
                    ${isStarted ? `<div class="score-box">${m.goals.home}</div>` : ''}

                    <div class="center-info">
                        ${isLive ? '<div class="live-label">● مباشر</div>' : 
                          isStarted ? '<div class="vs-badge">انتهت</div>' : 
                          '<div class="vs-badge">VS</div>'}
                        <div class="time">${matchTime}</div>
                    </div>

                    ${isStarted ? `<div class="score-box">${m.goals.away}</div>` : ''}

                    <div class="team" onclick="showLineup(${m.fixture.id}, '${m.teams.away.name}')">
                        <img src="${m.teams.away.logo}">
                        <span>${translateAr(m.teams.away.name)}</span>
                    </div>
                </div>
            </div>
        `;
    });
}

async function showLineup(fixtureId, teamName) {
    const modal = document.getElementById('lineupModal');
    const body = document.getElementById('lineupBody');
    document.getElementById('lineupTitle').innerText = `تشكيلة ${translateAr(teamName)}`;
    modal.style.display = 'flex';
    body.innerHTML = '<p style="color:#aaa">جاري جلب اللاعبين...</p>';

    try {
        const res = await fetch(`https://v3.football.api-sports.io/fixtures/lineups?fixture=${fixtureId}`, {
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const json = await res.json();
        const teamData = json.response.find(t => t.team.name === teamName);
        
        if (teamData && teamData.startXI) {
            body.innerHTML = `<div style="color:var(--accent-orange); margin-bottom:10px;">الخطة: ${teamData.formation}</div>`;
            teamData.startXI.forEach(p => {
                body.innerHTML += `<div class="player-row"><span>${p.player.name}</span> <span>${p.player.number}#</span></div>`;
            });
        } else {
            body.innerHTML = '<p>التشكيلة الرسمية لسه منزلتش</p>';
        }
    } catch(e) { body.innerHTML = 'خطأ في التحميل'; }
}

function closeModal() { document.getElementById('lineupModal').style.display = 'none'; }

function filterData() {
    const val = document.getElementById('searchInput').value.toLowerCase();
    const filtered = currentData.filter(m => 
        translateAr(m.teams.home.name).includes(val) || 
        translateAr(m.teams.away.name).includes(val) ||
        m.league.name.toLowerCase().includes(val)
    );
    render(filtered);
}

// البداية بمباريات اليوم
getMatches(0, 'today');
</script>
</body>
    </html>
