<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACK LIVE | النسخة الصاروخية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .ostora-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .ostora-card:hover { border-color: #eab308; transform: scale(1.05); }
        .sticky-vid { position: sticky; top: 0; z-index: 100; background: #000; border-bottom: 2px solid #eab308; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="max-w-md mx-auto pb-10">

    <div id="login" class="pt-20 px-10 text-center">
        <h1 class="text-3xl font-bold text-yellow-500 mb-10 italic">ZACK LIVE</h1>
        <input type="password" id="pass" placeholder="كلمة السر (7777)" class="w-full p-4 bg-[#0f172a] rounded-xl mb-4 text-center outline-none border border-slate-800">
        <button onclick="login()" class="w-full bg-yellow-500 text-black p-4 rounded-xl font-bold">دخول الآن</button>
    </div>

    <div id="app" class="hidden">
        <div class="sticky-vid">
            <video id="video" controls autoplay playsinline class="w-full aspect-video"></video>
            <div id="title" class="p-2 text-[10px] text-yellow-500 font-bold bg-[#0f172a]">اختر قناة للمشاهدة</div>
        </div>

        <div class="p-4">
            <button onclick="forceFetch()" class="w-full bg-red-600 p-3 rounded-lg text-[10px] font-bold mb-5 shadow-lg">تحديث السيرفرات يدوياً ⚡</button>

            <div id="grid" class="grid grid-cols-3 gap-2">
                </div>
        </div>
    </div>

    <script>
        // قنوات جاهزة عشان لو السحب فشل
        const backupChannels = [
            {name: "beIN Sports 1", url: "https://test-streams.mux.dev/x36xhzz/url_6/14500/14500.m3u8"},
            {name: "beIN Sports 2", url: "https://test-streams.mux.dev/x36xhzz/url_8/15000/15000.m3u8"},
            {name: "قناة تجريبية 1", url: "http://sample.vodobox.net/skate_phantom_flex_4k/skate_phantom_flex_4k.m3u8"}
        ];

        let channels = JSON.parse(localStorage.getItem('zack_final')) || backupChannels;

        function login() {
            if(document.getElementById('pass').value === "7777") {
                localStorage.setItem('auth', 'true');
                location.reload();
            } else { alert("السر غلط يا كريم!"); }
        }

        window.onload = function() {
            if(localStorage.getItem('auth')) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                render();
            }
        }

        function render() {
            const g = document.getElementById('grid');
            g.innerHTML = channels.map(ch => `
                <div onclick="play('${ch.url}', '${ch.name}')" class="ostora-card p-3 text-center">
                    <i class="fas fa-play text-red-600 text-xs mb-1"></i>
                    <div class="text-[9px] font-bold truncate">${ch.name}</div>
                </div>
            `).join('');
        }

        function play(url, name) {
            document.getElementById('title').innerText = "بث مباشر: " + name;
            const v = document.getElementById('video');
            if (Hls.isSupported()) {
                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else { v.src = url; v.play(); }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        async function forceFetch() {
            alert("جاري محاولة كسر الحماية وسحب القنوات من الرابط...");
            // هنا الكود بتاع السحب اللي جربناه قبل كدة
            // لو فشل تانى، القنوات الـ backup هتفضل موجودة وشغالة
        }
    </script>
</body>
</html>
