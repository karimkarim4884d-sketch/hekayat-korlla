<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مباريات اليوم</title>
</head>

<body style="background:black; color:white; text-align:center;">

<h2>🔴 مباريات اليوم</h2>

<div id="matches"></div>

<script>
let key = "6f5f3573964c66a1e8ccd8599d02de13";

// يجيب كل المباريات
fetch(`https://api.sportsrc.org/?data=matches&category=football&key=${key}`)
.then(res => res.json())
.then(data => {

    let container = document.getElementById("matches");

    data.forEach(match => {

        // يدور على ماتش فياريال
        if(match.home.includes("Villarreal") || match.away.includes("Villarreal")) {

            container.innerHTML += `
                <h3>${match.home} 🆚 ${match.away}</h3>
                <iframe src="https://sportsrc.org/embed/${match.id}" 
                width="100%" height="400"></iframe>
            `;
        }

    });

});
</script>

</body>
</html>
