<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة مرتدة | بث مباشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-green: #00ff62;
            --pitch-green: #2e7d32;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --live-red: #ff3e3e;
        }

        /* منع النسخ */
        body {
            user-select: none; -webkit-user-select: none;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--dark-bg); color: var(--text-color); margin: 0; padding: 10px;
        }

        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: var(--main-green); margin: 0; font-size: 28px; }

        .tools-container { display: flex; gap: 10px; margin-bottom: 15px; max-width: 800px; margin: 0 auto 15px auto; }
        input { background: var(--card-bg); border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; outline: none; flex: 1; }

        .tabs { display: flex; gap: 5px; max-width: 800px; margin: 0 auto 20px auto; }
        .tab-btn { flex: 1; background: var(--card-bg); color: white; border: none; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--main-green); color: black; }

        .match-card { background: var(--card-bg); border-radius: 15px; padding: 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; cursor: pointer; }
        
        /* دائرة الوقت الاحترافية */
        .time-circle {
            width: 50px; height: 50px; border: 2px solid #333; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; border-top-color: var(--main-green); animation: rotate 2s linear infinite;
        }
        @keyframes rotate { 100% { border-top-color: var(--live-red); } }
        .time-val { font-size: 14px; font-weight: bold; color: var(--main-green); }
        .sec-val { font-size: 8px; color: #888; }

        #detailsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; }
        .modal-content { background: var(--dark-bg); max-width: 600px; margin: 20px auto; border-radius: 20px; padding: 20px; border: 1px solid #333; }
        
        .pitch { 
            background: var(--pitch-green); background-image: repeating-linear-gradient(transparent, transparent 40px, rgba(0,0,0,0.1) 40px, rgba(0,0,0,0.1) 80px);
            border: 2px solid white; border-radius: 10px; height: 450px; display: flex; flex-direction: column; justify-content: space-around; margin: 15px 0;
        }
        .pitch-row { display: flex; justify-content: center; gap: 10px; }
        .player-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; }
        
        .info-box { background: #222; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 13px; }
        .sub-list { color: #aaa; font-size: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        
        .stat-bar { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
        .wa-btn { position: fixed; bottom: 20px; left: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; text-decoration: none; }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="header"><h1>هجمة مرتدة ⚽</h1></div>

<div class="tools-container">
    <input type="text" id="searchInput" placeholder="ابحث عن فريق..." onkeyup="searchMatches()">
</div>

<div class="tabs">
    <button class="tab-btn active" id="btn-today" onclick="loadMatches(new Date().toISOString().split('T')[0])">مباريات اليوم</button>
</div>

<div id="matchesContainer"></div>

<div id="detailsModal">
    <div class="modal-content">
        <span style="cursor:pointer; float:left;" onclick="closeModal()">إغلاق &times;</span>
        <div id="modalHeader"></div>
        <div class="tabs" style="margin-top:20px;">
            <button class="tab-btn active" onclick="showSection('events', this)">الأحداث</button>
            <button class="tab-btn" onclick="showSection('stats', this)">الإحصائيات</button>
            <button class="tab-btn" onclick="showSection('lineups', this)">التشكيلة</button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<a href="https://wa.me/201040077271" class="wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script>
    const API_KEY = "Bf7d42ac856fecc0e1e6ad24debe9c5e";
    let currentFixtureId = null;

    async function loadMatches(date) {
        const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${date}`, {
            "headers": { "x-rapidapi-host": "v3.football.api-sports.io", "x-rapidapi-key": API_KEY }
        });
        const data = await res.json();
        renderMatches(data.response.filter(m => [39, 140, 78, 135, 61, 2, 3].includes(m.league.id)));
    }

    function renderMatches(matches) {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = matches.map(m => {
            const elapsed = m.fixture.status.elapsed || 0;
            const timeHTML = m.fixture.status.short === 'NS' ? m.fixture.date.split('T')[1].substring(0,5) : 
                `<div class="time-circle"><span class="time-val">${elapsed}'</span><span class="sec-val">مباشر</span></div>`;
            
            return `
                <div class="match-card" onclick="openDetails(${m.fixture.id})">
                    <div class="team"><img src="${m.teams.home.logo}"><span>${m.teams.home.name}</span></div>
                    <div class="info"><div>${timeHTML}</div><div style="font-size:20px; font-weight:bold;">${m.goals.home ?? 0} - ${m.goals.away ?? 0}</div></div>
                    <div class="team"><img src="${m.teams.away.logo}"><span>${m.teams.away.name}</span></div>
                </div>`;
        }).join('');
    }

    async function openDetails(id) {
        currentFixtureId = id;
        document.getElementById('detailsModal').style.display = 'block';
        showSection('events', document.querySelector('.tab-btn.active'));
    }

    async function showSection(type, btn) {
        const body = document.getElementById('modalBody');
        body.innerHTML = 'جاري التحميل...';
        
        const res = await fetch(`https://v3.football.api-sports.io/fixtures/${type === 'events' ? 'events' : type === 'stats' ? 'statistics' : 'lineups'}?fixture=${currentFixtureId}`, {
            "headers": { "x-rapidapi-host": "v3.football.api-sports.io", "x-rapidapi-key": API_KEY }
        });
        const data = await res.json();

        if (type === 'lineups') {
            if (!data.response[0]) { body.innerHTML = "التشكيلة غير متوفرة"; return; }
            renderFullLineup(data.response);
        } else if (type === 'stats') {
            renderStats(data.response);
        } else {
            renderEvents(data.response);
        }
    }

    function renderFullLineup(teams) {
        const body = document.getElementById('modalBody');
        body.innerHTML = teams.map((t, idx) => `
            <div class="info-box">
                <h3 style="color:var(--main-green)">${t.team.name} (${t.formation})</h3>
                <div class="pitch">
                    ${[t.startXI.filter(p=>p.player.pos==='F'), t.startXI.filter(p=>p.player.pos==='M'), t.startXI.filter(p=>p.player.pos==='D'), t.startXI.filter(p=>p.player.pos==='G')]
                        .map(row => `<div class="pitch-row">${row.map(p=>`<div style="text-align:center"><img class="player-img" src="https://media.api-sports.io/football/players/${p.player.id}.png"><div style="font-size:9px">${p.player.name}</div></div>`).join('')}</div>`).join('')}
                </div>
                <p><b>المدرب:</b> ${t.coach.name || 'غير معروف'}</p>
                <p><b>البدلاء:</b></p>
                <div class="sub-list">${t.substitutes.map(s => `<span>- ${s.player.name}</span>`).join('')}</div>
            </div>
        `).join('<hr>');
    }

    function renderStats(stats) {
        if (!stats[0]) { document.getElementById('modalBody').innerHTML = "لا توجد إحصائيات"; return; }
        const h = stats[0].statistics, a = stats[1].statistics;
        const translate = {"Ball Possession":"الاستحواذ","Total Shots":"التسديدات","Offsides":"تسلل","Fouls":"أخطاء"};
        document.getElementById('modalBody').innerHTML = h.map((s, i) => `
            <div class="stat-bar"><span>${s.value || 0}</span><b>${translate[s.type] || s.type}</b><span>${a[i].value || 0}</span></div>
        `).join('');
    }

    function renderEvents(events) {
        document.getElementById('modalBody').innerHTML = events.map(e => `
            <div style="padding:10px; border-bottom:1px solid #333;">
                <b>${e.time.elapsed}'</b> [${e.type === 'subst' ? 'تبديل 🔄' : e.type}] ${e.player.name} ${e.assist.name ? 'مع ' + e.assist.name : ''}
            </div>
        `).join('');
    }

    function closeModal() { document.getElementById('detailsModal').style.display = 'none'; }
    window.onload = () => loadMatches(new Date().toISOString().split('T')[0]);
</script>
</body>
</html>
