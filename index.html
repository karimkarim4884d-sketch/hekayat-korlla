<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim Khaled | KR Full Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow-x: hidden; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: #0f172a; transition: 0.4s; z-index: 200; border-left: 2px solid #eab308; }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 150; }
        .ostora-card { background: #1e293b; border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid transparent; position: relative; }
        .ostora-card:hover { border-color: #eab308; transform: scale(1.03); }
        .video-fixed { position: sticky; top: 0; z-index: 100; background: #000; border-bottom: 3px solid #eab308; }
        .nav-tab { background: #1e293b; color: #94a3b8; padding: 10px 15px; border-radius: 10px; font-size: 10px; white-space: nowrap; font-weight: bold; }
        .nav-tab.active { background: #eab308; color: #000; }
        .live-tag { position: absolute; top: 5px; left: 5px; background: red; color: white; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .admin-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172a; padding: 20px; border-radius: 20px; border: 2px solid #eab308; z-index: 300; display: none; width: 90%; max-width: 400px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-2xl mx-auto pb-20">

    <div id="mainApp">
        <div class="video-fixed">
            <video id="video" controls autoplay playsinline class="w-full aspect-video bg-black"></video>
            <div class="p-3 bg-[#0f172a] flex justify-between items-center">
                <button onclick="toggleSidebar()" class="text-yellow-500 text-2xl"><i class="fas fa-bars"></i></button>
                <span id="pTitle" class="text-[10px] font-bold text-yellow-500 italic uppercase">Karim Khaled | KR Premier</span>
                <img src="https://raw.githubusercontent.com/ZackCinema/ZK/main/ZK.png" class="w-8 h-8 rounded-full border-2 border-yellow-500">
            </div>
        </div>

        <div class="p-4">
            <div class="flex gap-2 overflow-x-auto mb-4 pb-2">
                <button onclick="setTab('matches', this)" class="nav-tab active">ماتشات اليوم ⚽</button>
                <button onclick="setTab('movies', this)" class="nav-tab">أفلام مصرية 🎬</button>
                <button onclick="setTab('kids', this)" class="nav-tab">كرتون 🧸</button>
                <button onclick="setTab('war', this)" class="nav-tab">أخبار وحروب ⚔️</button>
                <button onclick="setTab('quran', this)" class="nav-tab">قرآن 🕌</button>
            </div>

            <button onclick="fetchLiveMatches()" class="w-full mb-6 bg-red-600 p-3 rounded-xl text-[10px] font-black uppercase shadow-lg active:scale-95">
                تحديث سيرفر المباريات المباشرة ⚡
            </button>

            <div id="contentGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
        </div>
    </div>

    <div id="adminModal" class="admin-modal">
        <h3 class="text-center font-bold mb-4 text-yellow-500 uppercase">KR ADMIN PANEL</h3>
        <input type="text" id="mName" placeholder="الاسم" class="w-full p-3 mb-2 bg-slate-800 rounded-lg text-xs outline-none">
        <input type="text" id="mUrl" placeholder="رابط m3u8 أو mp4" class="w-full p-3 mb-2 bg-slate-800 rounded-lg text-xs outline-none">
        <input type="text" id="mImg" placeholder="رابط البوستر" class="w-full p-3 mb-2 bg-slate-800 rounded-lg text-xs outline-none">
        <select id="mCat" class="w-full p-3 mb-4 bg-slate-800 rounded-lg text-xs outline-none">
            <option value="matches">ماتشات</option>
            <option value="movies">أفلام مصرية</option>
            <option value="kids">كرتون</option>
        </select>
        <div class="flex gap-2">
            <button onclick="addItem()" class="flex-1 bg-green-600 p-3 rounded-lg text-xs font-bold">إضافة</button>
            <button onclick="closeAdmin()" class="flex-1 bg-red-600 p-3 rounded-lg text-xs font-bold">إلغاء</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar p-6">
        <div class="text-center mb-10">
            <img src="https://raw.githubusercontent.com/ZackCinema/ZK/main/ZK.png" class="w-20 h-20 rounded-full border-4 border-yellow-500 mx-auto mb-2">
            <p class="text-xs font-black text-yellow-500 uppercase">Karim Khaled</p>
        </div>
        
        <div class="flex flex-col gap-3">
            <button onclick="openAdmin()" class="bg-yellow-500 text-black p-4 rounded-xl text-sm font-bold flex items-center justify-between">
                <span>إضافة محتوى جديد</span> <i class="fas fa-plus-circle"></i>
            </button>
            
            <hr class="border-slate-800 my-2">
            
            <a href="https://wa.me/201040077271" class="bg-white/5 p-4 rounded-xl text-sm flex items-center justify-between">
                <span>واتساب الدعم</span> <i class="fab fa-whatsapp text-green-500"></i>
            </a>
            
            <a href="mailto:karimkarim4884d@gmail.com" class="bg-white/5 p-4 rounded-xl text-sm flex items-center justify-between">
                <span>البريد الإلكتروني</span> <i class="fas fa-envelope text-blue-500"></i>
            </a>
            
            <a href="https://karimkarim4884d-sketch.github.io/hekayat-korlla/" target="_blank" class="bg-white/5 p-4 rounded-xl text-sm flex items-center justify-between">
                <span>رابط الموقع الرسمي</span> <i class="fas fa-globe text-yellow-500"></i>
            </a>
        </div>
        
        <button onclick="toggleSidebar()" class="w-full p-4 bg-red-600 rounded-xl text-xs font-bold mt-10">إغلاق القائمة</button>
    </div>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('kr_mega_db')) || [];
        let currentTab = 'matches';

        window.onload = () => { if(db.length === 0) fetchLiveMatches(); else render(); };

        async function fetchLiveMatches() {
            document.getElementById('pTitle').innerText = "CONNECTING SERVERS.. 📡";
            const sources = ['https://raw.githubusercontent.com/iptv-org/iptv/master/streams/ar.m3u','https://raw.githubusercontent.com/mohammadreza-erteshali/iptv/main/iptv.m3u'];
            let fetched = [];
            const proxy = 'https://api.allorigins.win/raw?url=';
            for (let s of sources) {
                try {
                    const res = await fetch(proxy + encodeURIComponent(s));
                    const text = await res.text();
                    const lines = text.split('\n');
                    for(let i=0; i<lines.length; i++) {
                        if(lines[i].includes('#EXTINF')) {
                            let name = lines[i].split(',')[1]?.trim() || 'Live Channel';
                            let url = lines[i+1]?.trim();
                            if(url && url.startsWith('http')) {
                                let cat = 'movies';
                                if(/sport|bein|ssc|kora|كورة/i.test(name)) cat = 'matches';
                                if(/quran|قرآن/i.test(name)) cat = 'quran';
                                if(/kids|cartoon/i.test(name)) cat = 'kids';
                                if(/war|news|أخبار/i.test(name)) cat = 'war';
                                fetched.push({name, url, cat, isLive: cat === 'matches'});
                            }
                        }
                    }
                } catch(e) {}
            }
            if(fetched.length > 0) {
                db = fetched;
                localStorage.setItem('kr_mega_db', JSON.stringify(db));
                document.getElementById('pTitle').innerText = "KR SERVER UPDATED ✅";
                render();
            }
        }

        function setTab(cat, btn) {
            currentTab = cat;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const grid = document.getElementById('contentGrid');
            const items = db.filter(i => i.cat === currentTab);
            grid.innerHTML = items.length ? items.map(i => `
                <div onclick="play('${i.url}', '${i.name}')" class="ostora-card p-4 text-center">
                    ${i.isLive ? '<span class="live-tag">LIVE</span>' : ''}
                    <i class="fas fa-play-circle text-yellow-500 text-3xl mb-2"></i>
                    <p class="text-[9px] font-bold truncate">${i.name}</p>
                </div>
            `).join('') : '<p class="col-span-3 text-center py-10 text-gray-600 text-xs italic">استخدم التحديث أو لوحة التحكم</p>';
        }

        function play(url, name) {
            document.getElementById('pTitle').innerText = "WATCHING: " + name;
            const video = document.getElementById('video');
            if (Hls.isSupported()) {
                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else { video.src = url; video.play(); }
        }

        function openAdmin() { document.getElementById('adminModal').style.display = 'block'; toggleSidebar(); }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function addItem() {
            const name = document.getElementById('mName').value;
            const url = document.getElementById('mUrl').value;
            const cat = document.getElementById('mCat').value;
            if(name && url) {
                db.unshift({name, url, cat, isLive: cat === 'matches'});
                localStorage.setItem('kr_mega_db', JSON.stringify(db));
                alert("تم الحفظ في سيرفر Karim Khaled!");
                closeAdmin();
                render();
            }
        }
    </script>
</body>
</html>
