<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIM KHALED | حكاية كورة</title>
    <link rel="icon" href="https://i.ibb.co/vzYpYfP/1000008040.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Karim Khaled">
    <link rel="apple-touch-icon" href="https://i.ibb.co/vzYpYfP/1000008040.jpg">

    <style>
        body { background: #020617; color: white; font-family: sans-serif; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .bg-logo { position: fixed; inset: 0; opacity: 0.05; z-index: -1; display: flex; align-items: center; justify-content: center; }
        .bg-logo img { width: 80%; object-fit: contain; }
        .btn-install { background: #eab308; color: #000; font-weight: 900; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-20 px-4">

    <div id="bgLogo" class="bg-logo"><img src="https://i.ibb.co/vzYpYfP/1000008040.jpg"></div>

    <div id="loginSection" class="pt-24 text-center">
        <h1 class="text-3xl font-black text-yellow-500 mb-8 uppercase italic">KARIM KHALED</h1>
        <div class="glass p-8 rounded-[3rem] border-t-4 border-yellow-500 shadow-2xl">
            <input type="text" id="uName" placeholder="الاسم" class="w-full p-4 bg-black border border-slate-800 mb-3 text-center rounded-xl outline-none">
            <input type="password" id="uPass" placeholder="كلمة السر للمدير" class="w-full p-4 bg-black border border-slate-800 mb-6 text-center rounded-xl outline-none">
            <button onclick="doLogin()" class="w-full bg-yellow-500 text-black p-4 rounded-xl font-black uppercase text-xs">دخول</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="py-4 flex justify-between items-center border-b border-white/5 mb-6 sticky top-0 bg-[#020617] z-50">
            <div class="flex items-center gap-2">
                <img src="https://i.ibb.co/vzYpYfP/1000008040.jpg" class="w-7 h-7" alt="ZK">
                <h1 class="text-sm font-bold text-yellow-500 uppercase">KARIM KHALED</h1>
                <span id="userIdDisp" class="bg-yellow-500 text-black text-[9px] px-2 py-0.5 rounded-full font-bold"></span>
            </div>
            <button id="installBtn" class="btn-install text-[10px] px-3 py-2 rounded-lg shadow-lg">تثبيت التطبيق 📲</button>
        </div>

        <div id="adminPanel" class="hidden glass p-6 rounded-[2rem] border-2 border-yellow-500/30 mb-8 text-center">
             <p class="text-[10px] text-yellow-500 font-bold mb-4 uppercase">لوحة تحكم المدير (500K)</p>
             <input type="text" id="targetId" placeholder="ID العميل" class="w-full p-3 bg-black border border-slate-800 mb-3 text-center text-xs rounded-xl">
             <div class="grid grid-cols-2 gap-2">
                 <button onclick="alert('تم الشحن')" class="bg-blue-600 p-3 rounded-xl text-[9px] font-bold uppercase">شحن نقاط</button>
                 <button onclick="alert('تم التفعيل')" class="bg-green-600 p-3 rounded-xl text-[9px] font-bold uppercase">تفعيل بث</button>
             </div>
        </div>

        <div id="plansSection" class="space-y-3">
            <h3 class="text-[10px] text-center font-bold mb-4 text-gray-500 uppercase tracking-widest">اختر باقة الاشتراك</h3>
            <div onclick="openPay(20, '30 يوم')" class="glass p-5 rounded-2xl flex justify-between items-center border border-white/5 cursor-pointer">
                <div><b class="text-yellow-500">300 نقطة</b> <span class="text-[9px] block text-gray-500 font-bold">تفعيل 30 يوم</span></div>
                <div class="text-green-500 font-black text-sm">20 جنيه</div>
            </div>
            <div onclick="openPay(40, '60 يوم')" class="glass p-5 rounded-2xl flex justify-between items-center border border-yellow-500/30 cursor-pointer">
                <div><b class="text-yellow-500">600 نقطة</b> <span class="text-[9px] block text-gray-500 font-bold">تفعيل 60 يوم</span></div>
                <div class="text-green-500 font-black text-sm">40 جنيه</div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass rounded-2xl p-4 flex justify-around items-center border border-white/10">
        <a href="https://wa.me/201040077271" class="text-center"><i class="fab fa-whatsapp text-green-500 text-xl block mb-1"></i><span class="text-[8px] font-bold">واتساب</span></a>
        <a href="https://t.me/HekayetyKorabot" class="text-center"><i class="fab fa-telegram text-blue-400 text-xl block mb-1"></i><span class="text-[8px] font-bold">تلجرام</span></a>
        <button onclick="logout()" class="text-center"><i class="fas fa-power-off text-red-500 text-xl block mb-1"></i><span class="text-[8px] font-bold">خروج</span></button>
    </div>

    <script>
        // كود تشغيل التثبيت
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') deferredPrompt = null;
            } else {
                alert("لتثبيت التطبيق:\n1. اضغط على خيارات المتصفح (3 نقط).\n2. اختر 'إضافة للشاشة الرئيسية' (Add to Home Screen).");
            }
        });

        function doLogin() {
            const name = document.getElementById('uName').value.trim();
            const pass = document.getElementById('uPass').value.trim();
            if(!name) return alert("الاسم مطلوب!");
            let id, role;
            if(name.toLowerCase() === "karim khaled" && pass === "7777") { id = "77777777"; role = 'admin'; }
            else { id = Math.floor(Math.random() * 89999999) + 10000000; role = 'user'; }
            localStorage.setItem('z_n', name); localStorage.setItem('z_i', id); localStorage.setItem('z_r', role);
            location.reload();
        }

        window.onload = function() {
            const n = localStorage.getItem('z_n'), i = localStorage.getItem('z_i'), r = localStorage.getItem('z_r');
            if(n && i) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userIdDisp').innerText = "#" + i;
                if(r === 'admin') document.getElementById('adminPanel').classList.remove('hidden');
            }
        };

        function openPay(price, time) {
            const id = localStorage.getItem('z_i');
            const msg = `طلب شحن جديد 🚀%0Aالأيدي: ${id}%0Aالباقة: ${time}%0Aالسعر: ${price} جنيه%0Aرقم فودافون كاش: 01032447101`;
            window.open(`https://wa.me/201040077271?text=${msg}`);
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
