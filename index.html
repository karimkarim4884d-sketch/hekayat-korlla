<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة مرتدة | بث مباشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-green: #00ff62;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --live-red: #ff3e3e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
        }

        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: var(--main-green); margin: 0; font-size: 28px; }

        .tools-container {
            display: flex; gap: 10px; margin-bottom: 15px; max-width: 800px; margin: 0 auto 15px auto;
        }

        input[type="text"], input[type="date"] {
            background: var(--card-bg); border: 1px solid #333; color: white;
            padding: 12px; border-radius: 8px; outline: none; flex: 1;
        }

        .tabs { display: flex; gap: 5px; max-width: 800px; margin: 0 auto 20px auto; }
        .tab-btn {
            flex: 1; background: var(--card-bg); color: white; border: none;
            padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold;
        }
        .tab-btn.active { background: var(--main-green); color: black; }

        #matchesContainer { max-width: 800px; margin: 0 auto; }

        .match-card {
            background: var(--card-bg); border-radius: 15px; padding: 18px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px; border-bottom: 4px solid #222; cursor: pointer;
        }

        .team { width: 35%; text-align: center; }
        .team img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 8px; }
        .team span { display: block; font-size: 14px; font-weight: 600; }

        .info { width: 30%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .score { font-size: 26px; font-weight: 900; letter-spacing: 2px; color: var(--main-green); }
        .status-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .live { background: var(--live-red); color: white; animation: blink 1.2s infinite; }
        .finished { background: #333; color: #aaa; }

        /* Modal Styles */
        #detailsModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto;
        }
        .modal-content {
            background: var(--dark-bg); max-width: 600px; margin: 20px auto;
            border-radius: 20px; padding: 20px; position: relative;
        }
        .close-btn { position: absolute; left: 20px; top: 20px; font-size: 24px; cursor: pointer; }
        
        .detail-tabs { display: flex; border-bottom: 1px solid #333; margin-top: 20px; }
        .d-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #888; }
        .d-tab.active { color: var(--main-green); border-bottom: 2px solid var(--main-green); }
        
        .event-item { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 1px solid #222; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }

        @keyframes blink { 50% { opacity: 0.4; } }
        .wa-btn { position: fixed; bottom: 20px; left: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; text-decoration: none; }
    </style>
</head>
<body>

<div class="header"><h1>هجمة مرتدة ⚽</h1></div>

<div class="tools-container">
    <input type="text" id="searchInput" placeholder="ابحث عن فريق..." onkeyup="searchMatches()">
    <input type="date" id="datePicker" onchange="fetchByDate(this.value)">
</div>

<div class="tabs">
    <button class="tab-btn" id="btn-yesterday" onclick="changeTab(-1, 'btn-yesterday')">أمس</button>
    <button class="tab-btn active" id="btn-today" onclick="changeTab(0, 'btn-today')">اليوم</button>
    <button class="tab-btn" id="btn-tomorrow" onclick="changeTab(1, 'btn-tomorrow')">غداً</button>
</div>

<div id="matchesContainer"></div>

<div id="detailsModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalHeader" style="text-align: center;"></div>
        
        <div class="detail-tabs">
            <div class="d-tab active" onclick="showSection('events', this)">الأحداث</div>
            <div class="d-tab" onclick="showSection('stats', this)">الإحصائيات</div>
            <div class="d-tab" onclick="showSection('lineups', this)">التشكيلة</div>
        </div>

        <div id="modalBody" style="margin-top: 20px;">
            <p style="text-align: center;">جاري التحميل...</p>
        </div>
    </div>
</div>

<a href="https://wa.me/201040077271" class="wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script>
    const API_KEY = "Bf7d42ac856fecc0e1e6ad24debe9c5e";
    const IMPORTANT_LEAGUES = [2, 3, 39, 140, 78, 135, 61, 233, 848, 4, 301];
    let currentFixtureId = null;

    async function loadMatches(dateString) {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = '<p style="text-align: center;">جاري التحديث...</p>';
        try {
            const response = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateString}`, {
                "headers": { "x-rapidapi-host": "v3.football.api-sports.io", "x-rapidapi-key": API_KEY }
            });
            const data = await response.json();
            renderMatches(data.response.filter(m => IMPORTANT_LEAGUES.includes(m.league.id)));
        } catch (e) { container.innerHTML = 'خطأ في الاتصال'; }
    }

    function renderMatches(matches) {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = matches.map(m => {
            const status = m.fixture.status.short;
            const home = m.teams.home;
            const away = m.teams.away;
            let info = '';

            if (status === 'NS') {
                info = `<div class="score">VS</div><div>${new Date(m.fixture.date).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</div>`;
            } else {
                const liveBadge = ['1H','2H','HT','ET','P'].includes(status) ? `<div class="status-badge live">مباشر | ${m.fixture.status.elapsed}'</div>` : `<div class="status-badge finished">منتهية</div>`;
                info = `<div class="score">${m.goals.home} - ${m.goals.away}</div>${liveBadge}`;
            }

            return `
                <div class="match-card" onclick="openDetails(${m.fixture.id}, '${home.name}', '${away.name}', '${home.logo}', '${away.logo}')" data-name="${home.name} ${away.name}">
                    <div class="team"><img src="${home.logo}"><span>${home.name}</span></div>
                    <div class="info">${info}<div class="league">${m.league.name}</div></div>
                    <div class="team"><img src="${away.logo}"><span>${away.name}</span></div>
                </div>`;
        }).join('');
    }

    async function openDetails(id, hName, aName, hLogo, aLogo) {
        currentFixtureId = id;
        document.getElementById('detailsModal').style.display = 'block';
        document.getElementById('modalHeader').innerHTML = `
            <div style="display:flex; justify-content:space-around; align-items:center;">
                <div><img src="${hLogo}" width="40"><br>${hName}</div>
                <div style="font-size:20px; font-weight:bold;">VS</div>
                <div><img src="${aLogo}" width="40"><br>${aName}</div>
            </div>`;
        showSection('events', document.querySelector('.d-tab'));
    }

    async function showSection(type, btn) {
        document.querySelectorAll('.d-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        const body = document.getElementById('modalBody');
        body.innerHTML = 'جاري التحميل...';

        const endpoint = type === 'events' ? 'fixtures/events' : type === 'stats' ? 'fixtures/statistics' : 'fixtures/lineups';
        try {
            const res = await fetch(`https://v3.football.api-sports.io/${endpoint}?fixture=${currentFixtureId}`, {
                "headers": { "x-rapidapi-host": "v3.football.api-sports.io", "x-rapidapi-key": API_KEY }
            });
            const data = await res.json();
            
            if (type === 'events') {
                body.innerHTML = data.response.map(e => `
                    <div class="event-item">
                        <span>${e.time.elapsed}'</span>
                        <i class="fas ${e.type === 'Goal' ? 'fa-futbol' : 'fa-copy'}" style="color:${e.detail.includes('Yellow')?'yellow':e.detail.includes('Red')?'red':'white'}"></i>
                        <span>${e.player.name} (${e.detail})</span>
                    </div>`).join('') || 'لا توجد أحداث حالياً';
            } else if (type === 'stats') {
                if(!data.response[0]) { body.innerHTML = "الإحصائيات غير متوفرة"; return; }
                const hStats = data.response[0].statistics;
                const aStats = data.response[1].statistics;
                body.innerHTML = hStats.map((s, i) => `
                    <div class="stat-row">
                        <span>${s.value || 0}</span>
                        <span style="color:#888">${s.type}</span>
                        <span>${aStats[i].value || 0}</span>
                    </div>`).join('');
            } else {
                body.innerHTML = "التشكيلة ستظهر قبل المباراة بـ 60 دقيقة";
            }
        } catch (e) { body.innerHTML = 'حدث خطأ في جلب البيانات'; }
    }

    function closeModal() { document.getElementById('detailsModal').style.display = 'none'; }
    function changeTab(offset, id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const d = new Date(); d.setDate(d.getDate() + offset);
        loadMatches(d.toISOString().split('T')[0]);
    }
    function fetchByDate(date) { loadMatches(date); }
    function searchMatches() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.match-card').forEach(c => {
            c.style.display = c.getAttribute('data-name').toLowerCase().includes(q) ? "flex" : "none";
        });
    }

    window.onload = () => loadMatches(new Date().toISOString().split('T')[0]);
</script>
</body>
</html>
