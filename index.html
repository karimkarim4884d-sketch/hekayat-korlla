<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة - بث مباشر</title>
    <style>
        :root {
            --dark-bg: #001220;
            --card-bg: #003366;
            --accent-orange: #ff6b35;
            --text-white: #ffffff;
            --light-blue: #00bfff;
            --goal-bg: #004d99;
            --nav-bg: #000c16;
            --star-color: #ffc107;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body { background: var(--dark-bg); color: var(--text-white); padding-bottom: 90px; }

        header { 
            display: flex; align-items: center; justify-content: center; 
            gap: 15px; padding: 20px; color: var(--accent-orange);
            border-bottom: 1px solid rgba(0, 191, 255, 0.1);
        }

        .section-container { display: none; padding: 0 15px; }
        .section-container.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Match Card */
        .match-card {
            background: var(--card-bg); border-radius: 18px; display: flex;
            align-items: center; padding: 15px; margin-bottom: 15px; border-right: 5px solid var(--light-blue);
            justify-content: space-between; position: relative;
        }

        .team { flex: 2; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .team img { width: 45px; height: 45px; object-fit: contain; }
        .team span { font-size: 0.85rem; font-weight: bold; text-align: center; }

        .score-box {
            background: var(--goal-bg); color: white; min-width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-weight: bold; font-size: 1.2rem;
        }

        .center-info { flex: 1.5; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .watch-btn {
            background: #ff0000; color: white; padding: 4px 12px; border-radius: 6px;
            font-weight: bold; font-size: 0.7rem; cursor: pointer; animation: blink 1.2s infinite;
        }

        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        /* Live Modal */
        .live-modal {
            display: none; position: fixed; z-index: 3000; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; flex-direction: column;
        }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        .close-live { padding: 15px; color: white; background: var(--accent-orange); text-align: center; cursor: pointer; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg);
            display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #002a4d;
        }
        .nav-item { color: #888; font-size: 0.7rem; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--light-blue); }
    </style>
</head>
<body>

<header><h1>هجمة ولقطة</h1></header>

<div id="matches-section" class="section-container active">
    <div id="matches-list" style="margin-top: 20px;"></div>
</div>

<div id="livePlayerModal" class="live-modal">
    <div class="close-live" onclick="closeLive()">❌ إغلاق البث</div>
    <div class="video-container">
        <iframe id="liveFrame" src="" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active"><span>⚽</span><br>المباريات</div>
    <div class="nav-item"><span>📊</span><br>الترتيب</div>
    <div class="nav-item"><span>⭐</span><br>مفضلتي</div>
</nav>

<script>
const API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
const importantLeagues = [39, 140, 135, 78, 61, 2, 3, 1];

async function getMatches() {
    const list = document.getElementById('matches-list');
    list.innerHTML = '<p style="text-align:center">⏳ جاري تحميل الماتشات...</p>';
    try {
        const res = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, {
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const json = await res.json();
        render(json.response);
    } catch (e) { list.innerHTML = "❌ خطأ في التحميل"; }
}

function render(data) {
    const list = document.getElementById('matches-list');
    list.innerHTML = '';
    data.forEach(m => {
        list.innerHTML += `
            <div class="match-card">
                <div class="team"><img src="${m.teams.home.logo}"><span>${m.teams.home.name}</span></div>
                <div class="score-box">${m.goals.home ?? 0}</div>
                <div class="center-info">
                    <div class="watch-btn" onclick="watchLive('${m.fixture.id}')">🔴 بث مباشر</div>
                </div>
                <div class="score-box">${m.goals.away ?? 0}</div>
                <div class="team"><img src="${m.teams.away.logo}"><span>${m.teams.away.name}</span></div>
            </div>`;
    });
}

function watchLive(id) {
    const modal = document.getElementById('livePlayerModal');
    const frame = document.getElementById('liveFrame');
    // رابط المشغل (تقدر تغير السورس ده لأي موقع بث)
    frame.src = "https://clappr.io/demo/index.html?src=https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";
    modal.style.display = 'flex';
}

function closeLive() {
    document.getElementById('livePlayerModal').style.display = 'none';
    document.getElementById('liveFrame').src = "";
}

getMatches();
</script>
</body>
    </html>
