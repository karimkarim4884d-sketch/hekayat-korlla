<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema | VIP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .vip-gold { background: linear-gradient(90deg, #facc15, #eab308); color: black; box-shadow: 0 0 20px rgba(234, 179, 8, 0.3); }
        .hidden { display: none !important; }
        /* تأثير حركة النجاح */
        .success-anim { animation: bounce 0.5s ease infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md flex justify-between items-center mb-6 px-2">

        <button onclick="showAdmin()" class="opacity-10 hover:opacity-100 p-2"><i class="fas fa-user-shield text-xl"></i></button>
    </div>

    <div id="login-panel" class="w-full max-w-md glass-card rounded-[2.5rem] p-8 shadow-2xl border-t-4 border-blue-600">
        <h2 class="text-xl font-bold text-center mb-6">أدخل اسمك (بالإنجليزي)</h2>
        <input type="text" id="nameInput" placeholder="Ex: Karim Zack" class="w-full p-4 rounded-2xl bg-black/40 border border-slate-700 text-center font-bold mb-4 outline-none focus:border-blue-500 transition-all">

    </div>

    <div id="dashboard" class="hidden w-full max-w-md glass-card rounded-[2.5rem] p-8 shadow-2xl border-t-4 border-green-500">
        <div class="text-center mb-4">
            <span class="text-[10px] text-gray-500 uppercase tracking-widest">مرحباً بك يا بطل</span>
            <h3 id="userNameDisplay" class="text-2xl font-black text-blue-400 uppercase"></h3>
        </div>

        <div class="bg-black/60 p-6 rounded-3xl border border-blue-500/20 text-center mb-6">
            <p id="autoID" class="text-3xl font-mono font-black text-white tracking-widest">#--------</p>
            <div class="mt-4 p-4 rounded-2xl border border-yellow-500/20 bg-yellow-500/5">
                <button onclick="requestVip()" class="vip-gold w-full p-3 rounded-xl font-black text-sm uppercase">شحن أيدي مميز (VIP) - 30LE</button>
            </div>
        </div>

        <div class="space-y-3 bg-blue-900/10 p-5 rounded-3xl border border-blue-500/10">
            <label class="text-xs text-blue-400 font-bold mr-2 uppercase">باقات الشحن المتوفرة:</label>
            <select id="amount" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 font-bold outline-none text-blue-100">
                <option value="500">500 عملة - (20 جنيه)</option>
                <option value="1500">1500 عملة - (50 جنيه)</option>
                <option value="5000">5000 عملة - (150 جنيه)</option>
            </select>
            <button onclick="sendOrder()" class="w-full bg-green-600 p-4 rounded-2xl font-bold shadow-lg shadow-green-900/30 hover:bg-green-500 transition">إرسال الطلب للأدمن</button>
        </div>
        
        <button onclick="logout()" class="w-full mt-6 text-[10px] text-gray-600 underline uppercase tracking-widest">تسجيل الخروج</button>
    </div>

    <div id="admin-panel" class="hidden w-full max-w-md glass-card rounded-[2.5rem] p-8 border-2 border-red-600 mt-6 shadow-2xl">
        <h2 class="text-red-500 font-black mb-4 text-center text-lg uppercase">ZACK ADMIN PANEL</h2>
        <div class="bg-black/40 p-3 rounded-xl mb-4 text-center border border-white/5">

            <p class="text-xl font-bold text-green-400"><span id="admin-balance">50000</span> عملة</p>
