<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema | Speed Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .admin-sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: #0b0f1a; border-right: 2px solid #ef4444; z-index: 9999; transform: translateX(-100%); transition: 0.3s; }
        .admin-open { transform: translateX(0); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="adminPanel" class="admin-sidebar p-5">
        <h2 class="text-red-500 font-bold text-center mb-5 border-b border-red-900 pb-2">ZACK ADMIN</h2>
        <div class="space-y-4">
            <input type="text" id="targetId" placeholder="أيدي العميل" class="w-full p-3 rounded-xl bg-black border border-slate-700 text-center font-bold">
            <input type="number" id="targetAmount" placeholder="الكمية" class="w-full p-3 rounded-xl bg-black border border-slate-700 text-center">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="cloudCharge('blue')" class="bg-blue-600 p-2 rounded-xl text-[10px] font-bold">شحن زرقاء</button>
                <button onclick="cloudCharge('red')" class="bg-red-600 p-2 rounded-xl text-[10px] font-bold">شحن حمراء</button>
            </div>
            <button onclick="cloudCharge('live')" class="w-full bg-green-600 p-3 rounded-xl font-bold text-xs">تفعيل البث ✅</button>
        </div>
        <button onclick="toggleAdmin()" class="mt-10 text-[10px] block mx-auto underline text-gray-500">إغلاق</button>
    </div>

    <div onclick="toggleAdmin()" style="position:fixed; top:0; left:0; width:60px; height:60px; z-index:999;"></div>

    <div id="loginSection" class="w-full max-w-md glass rounded-[2.5rem] p-8 mt-10 text-center shadow-2xl border-t-4 border-blue-600">
        <h1 class="text-2xl font-black mb-6 italic text-blue-500 uppercase">Zack Cinema TV</h1>
        <input type="text" id="uName" placeholder="أدخل اسمك هنا" class="w-full p-4 rounded-2xl bg-black border border-slate-800 text-center mb-4 font-bold outline-none">
        <button id="loginBtn" onclick="doLogin()" class="w-full bg-blue-600 p-4 rounded-2xl font-black shadow-lg">دخول الآن</button>
    </div>

    <div id="userDash" class="hidden w-full max-w-md space-y-4">
        
        <div class="glass p-6 rounded-[2.5rem] border-b-4 border-blue-600 relative text-center">
            <button onclick="doLogout()" class="absolute top-4 left-6 text-red-500 font-bold text-[10px]">خروج</button>
            <h2 id="dispName" class="text-xl font-black text-blue-400"></h2>
            <p id="dispId" class="text-xl font-mono font-bold mt-1 text-white"></p>
            <div class="flex gap-4 justify-center mt-3">
                <span class="text-[10px]">زرقاء: <b id="pBlue" class="text-blue-400">0</b></span>
                <span class="text-[10px]">حمراء: <b id="pRed" class="text-red-400">0</b></span>
            </div>
        </div>

        <div id="liveBox" class="hidden glass p-4 rounded-[2.5rem] border-2 border-green-500">
            <p class="text-green-500 text-[10px] font-bold mb-2 uppercase">● البث المباشر مفعّل</p>
            <iframe id="player" src="" class="w-full h-[200px] rounded-2xl" allowfullscreen></iframe>
        </div>

        <div class="glass p-4 rounded-[2.5rem] text-center">
            <p class="text-[10px] font-bold text-gray-400">نتائج الماتشات مباشرة</p>
        </div>

        <a href="https://wa.me/201040077271" class="bg-green-600 flex items-center justify-center gap-2 w-full p-4 rounded-[2.5rem] font-black text-xs">
            <i class="fab fa-whatsapp text-lg"></i> خدمة العملاء (واتساب)
        </a>

        <div id="payOptions" class="space-y-4">
            <div class="glass p-5 rounded-[2.5rem] border border-red-900/30">
                <p class="text-[9px] text-center mb-2 uppercase">تفعيل 15 يوم (300 حمراء)</p>
                <button onclick="userBuy('red')" class="w-full bg-red-600 p-3 rounded-2xl font-bold text-[10px]">تفعيل الاشتراك</button>
            </div>
        </div>
    </div>

    <script>
        // إعداد السحابة
        const config = { databaseURL: "https://zack-cinema-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();

        // دالة الدخول (سريعة جداً ولا تقف)
        function doLogin() {
            const n = document.getElementById('uName').value.trim();
            if(n.length < 2) return alert("اكتب اسمك!");
            
            const id = Math.floor(Math.random() * 90000000) + 10000000;
            localStorage.setItem('z_n', n);
            localStorage.setItem('z_i', id);
            
            // محاولة التسجيل في السحاب بهدوء
            try { db.ref('users/' + id).set({ name: n, blue: 0, red: 0, live: false }); } catch(e){}
            
            // الانتقال الفوري للواجهة
            showDash(n, id);
        }

        function showDash(n, i) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('userDash').classList.remove('hidden');
            document.getElementById('dispName').innerText = n;
            document.getElementById('dispId').innerText = "#" + i;
            
            // استماع للشحن (يسمع فوراً)
            db.ref('users/' + i).on('value', (s) => {
                const d = s.val();
                if(d) {
                    document.getElementById('pBlue').innerText = d.blue || 0;
                    document.getElementById('pRed').innerText = d.red || 0;
                    if(d.live) {
                        document.getElementById('payOptions').classList.add('hidden');
                        document.getElementById('liveBox').classList.remove('hidden');
                        document.getElementById('player').src = "https://www.youtube.com/embed/live_stream?channel=UC4p9m8_4S99S5M2_9G6G5Q";
                    }
                }
            });
        }

        window.onload = function() {
            const n = localStorage.getItem('z_n'), i = localStorage.getItem('z_i');
            if(n && i) showDash(n, i);
        };

        function cloudCharge(t) {
            const id = document.getElementById('targetId').value;
            const am = parseInt(document.getElementById('targetAmount').value) || 0;
            if(!id) return alert("فين الأيدي؟");
            let up = {};
            if(t === 'blue') up = { blue: am };
            if(t === 'red') up = { red: am };
            if(t === 'live') up = { live: true };
            db.ref('users/' + id).update(up);
            alert("✅ تم الشحن للأيدي " + id);
        }

        function toggleAdmin() {
            if (localStorage.getItem('is_adm') || prompt("كلمة السر:") === "zack2026") {
                localStorage.setItem('is_adm', 't');
                document.getElementById('adminPanel').classList.toggle('admin-open');
            }
        }
        function doLogout() { localStorage.clear(); location.reload(); }
    </script>
</body>
            </html>
