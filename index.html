<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim Khaled | KR Zack Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #eab308; --dark-bg: #020617; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: #0f172a; transition: 0.5s; z-index: 200; border-left: 2px solid var(--gold); }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 150; backdrop-filter: blur(4px); }
        .video-box { position: sticky; top: 0; z-index: 100; background: #000; border-bottom: 3px solid var(--gold); width: 100%; aspect-ratio: 16/9; shadow: 0 10px 30px rgba(0,0,0,0.9); }
        video, iframe { width: 100%; height: 100%; background: #000; }
        .ostora-card { background: #1e293b; border-radius: 15px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid rgba(234, 179, 8, 0.1); position: relative; height: 180px; }
        .ostora-card:hover { border-color: var(--gold); transform: translateY(-8px); }
        .nav-tab { background: #1e293b; color: #94a3b8; padding: 12px 18px; border-radius: 12px; font-size: 11px; font-weight: bold; white-space: nowrap; transition: 0.3s; }
        .nav-tab.active { background: var(--gold); color: #000; box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); }
        .admin-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172a; padding: 30px; border-radius: 25px; border: 2px solid var(--gold); z-index: 300; display: none; width: 92%; max-width: 420px; box-shadow: 0 0 100px #000; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-2xl mx-auto pb-24">

    <div id="mainApp">
        <div class="video-box" id="mediaPlayer">
            <video id="vPlayer" controls autoplay playsinline class="w-full h-full"></video>
        </div>

        <div class="p-4 bg-[#0f172a] flex justify-between items-center shadow-2xl">
            <button onclick="toggleSidebar()" class="text-yellow-500 text-2xl"><i class="fas fa-bars"></i></button>
            <div class="text-center">
                <h1 class="text-[15px] font-black text-yellow-500 italic uppercase tracking-widest">Karim Khaled</h1>
                <p id="streamName" class="text-[8px] text-gray-500 font-bold uppercase tracking-[0.2em]">Zack Cinema Engine v5.0</p>
            </div>
            <img src="https://raw.githubusercontent.com/ZackCinema/ZK/main/ZK.png" class="w-10 h-10 rounded-full border-2 border-yellow-500 shadow-lg">
        </div>

        <div class="p-4">
            <div class="flex gap-3 overflow-x-auto mb-6 pb-2">
                <button onclick="setTab('live', this)" class="nav-tab active">بث مباشر ⚽</button>
                <button onclick="setTab('ramadan', this)" class="nav-tab">رمضان 2026 🌙</button>
                <button onclick="setTab('movies', this)" class="nav-tab">أفلام 🎬</button>
            </div>
            <div id="contentGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <div id="adminModal" class="admin-modal">
        <h3 class="text-center font-black mb-6 text-yellow-500 text-xl uppercase italic">KR Admin Panel</h3>
        <div id="loginSection">
            <input type="text" id="userInp" placeholder="اسم المستخدم" class="w-full p-4 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-yellow-500">
            <input type="password" id="passInp" placeholder="كلمة المرور" class="w-full p-4 mb-6 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-yellow-500">
            <button onclick="checkAdmin()" class="w-full bg-yellow-500 text-black p-4 rounded-xl font-black uppercase">دخول</button>
        </div>
        <div id="addSection" class="hidden">
            <input type="text" id="mName" placeholder="اسم العمل" class="w-full p-3 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-xs text-white outline-none">
            <input type="text" id="mUrl" placeholder="رابط السيرفر أو الصفحة" class="w-full p-3 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-xs text-white outline-none">
            <input type="text" id="mImg" placeholder="رابط البوستر" class="w-full p-3 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-xs text-white outline-none">
            <select id="mCat" class="w-full p-3 mb-6 bg-slate-900 border border-slate-700 rounded-xl text-xs text-white">
                <option value="live">بث مباشر</option>
                <option value="ramadan">مسلسلات رمضان</option>
                <option value="movies">أفلام</option>
            </select>
            <div class="flex gap-2">
                <button onclick="addItem()" class="flex-1 bg-green-600 p-3 rounded-xl text-xs font-black uppercase">حفظ</button>
                <button onclick="closeAdmin()" class="flex-1 bg-red-600 p-3 rounded-xl text-xs font-black uppercase">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="sidebar" class="sidebar p-8 flex flex-col justify-between">
        <div>
            <div class="text-center mb-12">
                <img src="https://raw.githubusercontent.com/ZackCinema/ZK/main/ZK.png" class="w-24 h-24 rounded-full border-4 border-yellow-500 mx-auto mb-4">
                <p class="text-xl font-black text-yellow-500 uppercase italic">Karim Khaled</p>
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="openAdmin()" class="bg-yellow-500 text-black p-4 rounded-2xl text-sm font-black flex items-center justify-between">
                    <span>إضافة محتوى</span> <i class="fas fa-lock"></i>
                </button>
                <a href="https://wa.me/201040077271" class="bg-white/5 p-5 rounded-2xl text-sm flex items-center justify-between"><span>واتساب</span> <i class="fab fa-whatsapp text-green-500"></i></a>
            </div>
        </div>
        <button onclick="toggleSidebar()" class="w-full p-4 bg-red-600/10 text-red-500 rounded-2xl text-xs font-black uppercase">إغلاق</button>
    </div>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('kr_pro_v5_locked')) || [];
        let currentTab = 'live';
        const hls = new Hls();

        window.onload = () => render();

        function checkAdmin() {
            const u = document.getElementById('userInp').value;
            const p = document.getElementById('passInp').value;
            if(u === 'admin' && p === 'admin') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('addSection').classList.remove('hidden');
            } else {
                alert("بيانات الدخول غلط يا مبرمج!");
            }
        }

        function smartPlay(url, name) {
            // حماية المبرمج كريم من روابط الإعلانات
            if (url.includes("discussiondaub")) {
                alert("الرابط ده إعلانات يا كريم.. جيب لينك السيرفر المباشر");
                return;
            }
            document.getElementById('streamName').innerText = "PLAYING: " + name;
            const container = document.getElementById('mediaPlayer');
            if (url.includes('.m3u8') || url.includes('.mp4') || url.includes('/max')) {
                container.innerHTML = '<video id="vPlayer" controls autoplay playsinline class="w-full h-full"></video>';
                const video = document.getElementById('vPlayer');
                if (Hls.isSupported()) { hls.loadSource(url); hls.attachMedia(video); hls.on(Hls.Events.MANIFEST_PARSED, () => video.play()); }
                else { video.src = url; video.play(); }
            } else {
                container.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen allow="autoplay"></iframe>`;
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function render() {
            const grid = document.getElementById('contentGrid');
            const items = db.filter(i => i.cat === currentTab);
            grid.innerHTML = items.length ? items.map(i => `
                <div onclick="smartPlay('${i.url}', '${i.name}')" class="ostora-card">
                    <img src="${i.img || 'https://raw.githubusercontent.com/ZackCinema/ZK/main/ZK.png'}" class="w-full h-full object-cover opacity-40">
                    <div class="absolute inset-0 bg-gradient-to-t from-black flex flex-col justify-end p-3">
                        <p class="text-[10px] font-black text-yellow-500 truncate uppercase">${i.name}</p>
                    </div>
                </div>
            `).join('') : '<p class="col-span-3 text-center py-20 text-gray-700 text-[10px] font-black uppercase">No Content</p>';
        }

        function setTab(cat, btn) { currentTab = cat; document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); render(); }
        function openAdmin() { document.getElementById('adminModal').style.display = 'block'; toggleSidebar(); }
        function closeAdmin() { 
            document.getElementById('adminModal').style.display = 'none';
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('addSection').classList.add('hidden');
            document.getElementById('userInp').value = ''; document.getElementById('passInp').value = '';
        }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none'; }

        function addItem() {
            const name = document.getElementById('mName').value;
            const url = document.getElementById('mUrl').value;
            const img = document.getElementById('mImg').value;
            const cat = document.getElementById('mCat').value;
            if(name && url) {
                db.unshift({name, url, img, cat});
                localStorage.setItem('kr_pro_v5_locked', JSON.stringify(db));
                alert("تم الحفظ بنجاح!");
                closeAdmin(); render();
            }
        }
    </script>
</body>
</html>
