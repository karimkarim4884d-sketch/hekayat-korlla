<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة ولقطة</title>
    <style>
        body { background: #001220; color: white; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 60px; }
        header { padding: 20px; color: #ff6b35; border-bottom: 1px solid #002a4d; }
        .card { background: #003366; margin: 10px; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; border-right: 4px solid #00bfff; }
        .team img { width: 30px; height: 30px; display: block; margin: 0 auto 5px; }
        .score { font-size: 1.2rem; font-weight: bold; background: #004d99; padding: 5px 10px; border-radius: 8px; }
        .status { font-size: 0.7rem; color: #00bfff; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000c16; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #002a4d; }
    </style>
</head>
<body>
    <header><h1>هجمة ولقطة</h1></header>
    <div id="list"><p>⏳ جاري جلب مباريات اليوم...</p></div>
    <nav class="nav"><div>⚽ المباريات</div><div>📊 الترتيب</div><div>⭐ مفضلتي</div></nav>

    <script>
        const key = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
        async function load() {
            const today = new Date().toISOString().split('T')[0];
            try {
                const r = await fetch(`https://v3.football.api-sports.io/fixtures?date=${today}`, {
                    headers: { "x-rapidapi-key": key, "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const d = await r.json();
                const list = document.getElementById('list');
                // عرض أول 15 ماتش في اليوم عشان تتأكد إن الموقع شغال
                const matches = d.response.slice(0, 15);
                if (matches.length === 0) {
                    list.innerHTML = '<p>لا توجد مباريات مجدولة لليوم</p>';
                } else {
                    list.innerHTML = matches.map(m => `
                        <div class="card">
                            <div style="flex:1"><img src="${m.teams.home.logo}"> ${m.teams.home.name}</div>
                            <div style="flex:1">
                                <div class="score">${m.goals.home ?? 0} - ${m.goals.away ?? 0}</div>
                                <div class="status">${m.fixture.status.short}</div>
                            </div>
                            <div style="flex:1"><img src="${m.teams.away.logo}"> ${m.teams.away.name}</div>
                        </div>
                    `).join('');
                }
            } catch (e) { document.getElementById('list').innerHTML = '❌ خطأ في الاتصال'; }
        }
        load();
    </script>
</body>
</html>
