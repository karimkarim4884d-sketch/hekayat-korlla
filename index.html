<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan SMM | لوحة الخدمات الملكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #f1c40f; --bg-dark: #0a0a0a; --card-bg: #161616; --success: #2ecc71; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; text-align: center; }
        header { background: #1a1a1a; padding: 20px; border-bottom: 2px solid var(--primary); font-size: 26px; font-weight: bold; color: var(--primary); }
        .hero { padding: 40px 20px; }
        .search-container { margin: 20px auto; width: 90%; max-width: 500px; }
        .search-input { width: 100%; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #222; color: white; outline: none; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 20px; border: 1px solid #222; text-align: right; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .service-id { color: var(--primary); font-size: 12px; font-weight: bold; }
        .service-name { font-size: 16px; margin: 10px 0; height: 50px; overflow: hidden; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; }
        .price { color: var(--success); font-size: 20px; font-weight: bold; }
        .order-btn { background: var(--primary); color: black; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .whatsapp-btn { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header>👑 SULTAN SMM</header>

<div class="hero">
    <h1>لوحة الخدمات الملكية 🔥</h1>
    <p>جميع الخدمات بأسعار خاصة شاملة عمولتك</p>
</div>

<div class="search-container">
    <input type="text" id="search" class="search-input" placeholder="🔍 ابحث عن خدمة..." onkeyup="filterServices()">
</div>

<div class="container">
    <div id="services-list" class="services-grid">
        <div style="grid-column: 1/-1;">جاري سحب الخدمات من السيرفر... 🔄</div>
    </div>
</div>

<a href="https://wa.me/201040077271" class="whatsapp-btn">
    <i class="fab fa-whatsapp"></i> دعم كيمو: 01040077271
</a>

<script>
    const API_KEY = "Ae64eeb72f7d8fa4d26565e8060191e3"; // المفتاح اللي بعته يا وحش
    const API_URL = "https://smmcpan.com/api/v2?key=" + API_KEY + "&action=services";
    const PROXY = "https://api.allorigins.win/get?url=";

    async function fetchServices() {
        try {
            const response = await fetch(PROXY + encodeURIComponent(API_URL));
            const rawData = await response.json();
            const data = JSON.parse(rawData.contents);
            
            const container = document.getElementById('services-list');
            container.innerHTML = '';

            data.forEach(service => {
                // السعر الأصلي + 10 جنيه عمولتك
                const finalPrice = (parseFloat(service.rate) + 10.0).toFixed(2);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="service-id">ID: ${service.service}</span>
                    <div class="service-name">${service.name}</div>
                    <div class="price-row">
                        <div class="price">${finalPrice} ج.م</div>
                        <a href="https://wa.me/201040077271?text=طلب خدمة ID: ${service.service}" class="order-btn">اطلب الآن</a>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (err) {
            document.getElementById('services-list').innerHTML = "❌ خطأ في التحميل، تأكد من إعدادات السيرفر.";
        }
    }

    function filterServices() {
        let val = document.getElementById('search').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        Array.from(cards).forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    }

    fetchServices();
</script>

</body>
</html>
