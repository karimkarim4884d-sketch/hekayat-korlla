const express = require('express');
const app = express();

app.get('/', (req, res) => {
  res.send(`
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 موقع البث 🔥</title>

<style>
body {
  background: #000;
  color: #fff;
  font-family: Arial;
  text-align: center;
  margin: 0;
}

h1 {
  background: red;
  padding: 15px;
  margin: 0;
}

/* الأقسام */
.btn {
  width: 90%;
  margin: 10px auto;
  padding: 20px;
  font-size: 20px;
  background: #111;
  border: 2px solid red;
  border-radius: 15px;
  color: white;
  cursor: pointer;
}

.btn:hover {
  background: red;
}

/* السيرفرات */
.servers {
  margin-top: 15px;
}

.servers button {
  padding: 12px 20px;
  margin: 8px;
  font-size: 16px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.servers button:hover {
  background: #ff4444;
}

/* الفيديو */
#player iframe {
  width: 100%;
  height: 75vh;
  border: none;
  margin-top: 10px;
}
</style>

</head>

<body>

<h1>🔥 موقع البث 🔥</h1>

<button class="btn" onclick="showLive()">📡 بث مباشر</button>
<button class="btn">📊 نتائج المباريات</button>
<button class="btn">📺 مسلسلات</button>
<button class="btn">🎬 أفلام</button>
<button class="btn" onclick="quran()">📖 القرآن الكريم</button>

<h3>👇 اختار السيرفر</h3>

<div class="servers">
  <button onclick="playServer(1)">Server 1</button>
  <button onclick="playServer(2)">Server 2</button>
  <button onclick="playServer(3)">Server 3</button>
</div>

<div id="player"></div>

<script>

// روابط السيرفرات (تقدر تغيرها)
const servers = {
  1: "https://www.youtube.com/embed/x0kUqvfFAHE",
  2: "https://www.youtube.com/embed/aqz-KE-bpKQ",
  3: "https://www.youtube.com/embed/5qap5aO4i9A"
};

// عرض رسالة البث
function showLive() {
  document.getElementById("player").innerHTML =
    '<h2>📡 اختار سيرفر شغال فوق 👆</h2>';
}

// تشغيل السيرفر
function playServer(num) {
  const url = servers[num];
  document.getElementById("player").innerHTML =
    '<iframe src="' + url + '" allowfullscreen></iframe>';
}

// القرآن الكريم
function quran() {
  document.getElementById("player").innerHTML =
    '<iframe src="https://www.youtube.com/embed/x0kUqvfFAHE" allowfullscreen></iframe>';
}

</script>

</body>
</html>
  `);
});

// تشغيل السيرفر
app.listen(3000, () => {
  console.log("🔥 Server running on http://localhost:3000");
});
