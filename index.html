<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة ولقطة - الجدول العالمي</title>
    <style>
        :root {
            --dark-bg: #001220;
            --card-bg: #003366;
            --accent-orange: #ff6b35;
            --text-white: #ffffff;
            --light-blue: #00bfff;
            --goal-bg: #004d99;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--dark-bg); color: var(--text-white); padding: 10px; }

        header { text-align: center; padding: 15px; color: var(--accent-orange); }

        .search-area { max-width: 500px; margin: 0 auto 15px; }
        .search-box { display: flex; background: white; border-radius: 12px; overflow: hidden; }
        .search-box input { flex: 1; padding: 12px; border: none; outline: none; font-size: 1rem; color: #333; text-align: right; }
        .search-box button { padding: 0 20px; background: var(--accent-orange); border: none; color: white; cursor: pointer; font-weight: bold; }

        .tabs { display: flex; gap: 8px; max-width: 500px; margin: 0 auto 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #002a4d; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-orange); box-shadow: 0 0 10px var(--accent-orange); }

        .match-container { max-width: 550px; margin: 0 auto; }

        .league-title { 
            text-align: center; font-size: 0.85rem; color: var(--light-blue); 
            margin: 25px 0 10px; font-weight: bold; background: rgba(0, 191, 255, 0.1); padding: 8px; border-radius: 5px;
        }

        .match-card {
            background: var(--card-bg); border-radius: 15px; display: flex;
            align-items: center; padding: 15px; margin-bottom: 12px; border-right: 4px solid var(--light-blue);
            justify-content: space-between;
        }

        .team { flex: 2; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .team img { width: 45px; height: 45px; object-fit: contain; }
        .team span { font-size: 0.9rem; font-weight: bold; text-align: center; }

        /* خانة النتيجة الصغيرة */
        .score-box {
            background: var(--goal-bg); color: white; min-width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-weight: bold; font-size: 1.2rem;
            border: 1px solid var(--light-blue); margin: 0 5px;
        }

        .center-info { flex: 1.5; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .vs-badge { background: var(--accent-orange); color: white; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; }
        .time { font-size: 0.85rem; font-weight: bold; color: var(--light-blue); }

        /* حالة مباشر */
        .live-label { color: #ff4d4d; font-size: 0.75rem; font-weight: bold; animation: blink 1.2s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }

        .no-result { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>

<header><h1>⚽ هجمة ولقطة</h1></header>

<div class="search-area">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث عن مباراة أو فريق بالعربي..." oninput="filterData()">
        <button onclick="filterData()">بحث</button>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn" id="yesterday" onclick="getMatches(-1, 'yesterday')">مباريات الأمس</button>
    <button class="tab-btn active" id="today" onclick="getMatches(0, 'today')">مباريات اليوم</button>
    <button class="tab-btn" id="tomorrow" onclick="getMatches(1, 'tomorrow')">مباريات الغد</button>
</div>

<div id="matches-list" class="match-container">
    <div class="no-result">⏳ جاري تحميل الماتشات المترجمة...</div>
</div>

<script>
const API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
let currentData = [];

const importantLeagues = [39, 140, 135, 78, 61, 2, 3, 233, 307, 848];

const dictionary = {
    "Real Madrid": "ريال مدريد", "Barcelona": "برشلونة", "Liverpool": "ليفربول",
    "Manchester City": "مانشستر سيتي", "Al Ahly": "الأهلي", "Zamalek": "الزمالك",
    "Arsenal": "أرسنال", "Chelsea": "تشيلسي", "Bayern Munich": "بايرن ميونخ",
    "Paris Saint Germain": "باريس سان جيرمان", "Al Hilal": "الهلال", "Al Nassr": "النصر",
    "Premier League": "الدوري الإنجليزي", "La Liga": "الدوري الإسباني",
    "UEFA Champions League": "دوري أبطال أوروبا", "Egyptian Premier League": "الدوري المصري",
    "Saudi Pro League": "الدوري السعودي", "Serie A": "الدوري الإيطالي"
};

const translateAr = (name) => dictionary[name] || name;

async function getMatches(offset, btnId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(btnId).classList.add('active');

    const d = new Date();
    d.setDate(d.getDate() + offset);
    const dateStr = d.toISOString().split('T')[0];
    const list = document.getElementById('matches-list');
    list.innerHTML = '<div class="no-result">⏳ جاري جلب البيانات...</div>';

    try {
        const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateStr}`, {
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const json = await res.json();
        currentData = json.response.filter(m => importantLeagues.includes(m.league.id));
        render(currentData);
    } catch (e) {
        list.innerHTML = "<div class='no-result'>⚠️ خطأ في الاتصال</div>";
    }
}

function render(data) {
    const list = document.getElementById('matches-list');
    if (!data || data.length === 0) {
        list.innerHTML = '<div class="no-result">لا توجد مباريات "مهمة" متاحة</div>';
        return;
    }
    
    list.innerHTML = '';
    data.forEach(m => {
        const matchTime = new Date(m.fixture.date).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
        const status = m.fixture.status.short;
        const isStarted = status !== 'NS' && status !== 'TBD';
        const isLive = ['1H', '2H', 'HT', 'ET', 'P'].includes(status);
        
        // النتيجة
        const homeScore = m.goals.home !== null ? m.goals.home : 0;
        const awayScore = m.goals.away !== null ? m.goals.away : 0;

        list.innerHTML += `
            <div class="match-item">
                <div class="league-title">🏆 ${translateAr(m.league.name)}</div>
                <div class="match-card">
                    <!-- فريق صاحب الأرض -->
                    <div class="team">
                        <img src="${m.teams.home.logo}">
                        <span>${translateAr(m.teams.home.name)}</span>
                    </div>
                    
                    <!-- خانة أهداف صاحب الأرض -->
                    ${isStarted ? `<div class="score-box">${homeScore}</div>` : ''}

                    <!-- منطقة الوسط -->
                    <div class="center-info">
                        ${isLive ? '<div class="live-label">● مباشر</div>' : 
                          isStarted ? '<div class="vs-badge">انتهت</div>' : 
                          '<div class="vs-badge">VS</div>'}
                        <div class="time">${matchTime}</div>
                    </div>

                    <!-- خانة أهداف الضيف -->
                    ${isStarted ? `<div class="score-box">${awayScore}</div>` : ''}

                    <!-- فريق الضيف -->
                    <div class="team">
                        <img src="${m.teams.away.logo}">
                        <span>${translateAr(m.teams.away.name)}</span>
                    </div>
                </div>
            </div>
        `;
    });
}

function filterData() {
    const val = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = currentData.filter(m => {
        const hAr = translateAr(m.teams.home.name);
        const aAr = translateAr(m.teams.away.name);
        return hAr.includes(val) || aAr.includes(val);
    });
    render(filtered);
}

getMatches(0, 'today');
</script>
</body>
</html>
