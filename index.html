<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIM KHALED | LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .btn-gold { background: #eab308; color: #000; font-weight: 900; }
        video { width: 100%; border-radius: 1.5rem; background: #000; border: 2px solid #eab308; }
        .channel-btn { background: #1e293b; border: 1px solid #334155; padding: 10px 20px; border-radius: 12px; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .channel-btn:hover { background: #eab308; color: black; }
    </style>
</head>
<body class="max-w-md mx-auto px-4 pb-20">

    <div id="loginSection" class="pt-20 text-center">
        <h1 class="text-3xl font-black text-yellow-500 mb-8 italic">KARIM KHALED</h1>
        <div class="glass p-8 rounded-[2rem]">
            <input type="text" id="uName" placeholder="اكتب اسمك للمشاهدة" class="w-full p-4 bg-black border border-slate-800 mb-4 rounded-xl text-center outline-none">
            <input type="password" id="uPass" placeholder="كلمة السر (للمدير فقط)" class="w-full p-4 bg-black border border-slate-800 mb-6 rounded-xl text-center outline-none">
            <button onclick="doLogin()" class="w-full btn-gold p-4 rounded-xl uppercase">مشاهدة الماتش الآن</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="py-6 flex justify-between items-center border-b border-white/10 mb-6">
            <h1 class="text-lg font-black text-yellow-500">KARIM KHALED LIVE</h1>
            <button onclick="logout()" class="text-red-500 text-sm font-bold">خروج</button>
        </div>

        <div class="mb-6">
            <video id="video" controls autoplay playsinline></video>
            <div id="statusMsg" class="text-center mt-4 text-[10px] text-gray-500 uppercase italic">اختر قناة لبدء البث المباشر</div>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-6 no-scrollbar" id="userChannels">
            </div>

        <div id="adminPanel" class="hidden glass p-6 rounded-[2rem] border-2 border-yellow-500/30 mb-10">
            <h2 class="text-center text-yellow-500 text-xs font-bold mb-4 uppercase underline">لوحة التحكم (كريم)</h2>
            <input type="text" id="chName" placeholder="اسم القناة (مثل: beIN 1)" class="w-full p-3 bg-black border border-slate-700 mb-2 rounded-xl text-xs text-center">
            <input type="text" id="chUrl" placeholder="رابط الـ m3u8 أو الـ ts" class="w-full p-3 bg-black border border-slate-700 mb-4 rounded-xl text-xs text-center">
            <button onclick="addChannel()" class="w-full bg-green-600 p-3 rounded-xl text-xs font-bold uppercase mb-2">إضافة القناة للموقع ✅</button>
            <button onclick="clearChannels()" class="w-full bg-red-900 p-2 rounded-xl text-[10px] text-gray-300">مسح كل القنوات</button>
        </div>
    </div>

    <script>
        let channels = JSON.parse(localStorage.getItem('zk_list') || '[]');

        function doLogin() {
            const n = document.getElementById('uName').value;
            const p = document.getElementById('uPass').value;
            if(!n) return alert("من فضلك اكتب اسمك");
            
            // لو كتب الباسورد 7777 يدخل كمدير، غير كدا يدخل كعميل
            localStorage.setItem('user', n);
            localStorage.setItem('role', p === "7777" ? "admin" : "user");
            location.reload();
        }

        window.onload = function() {
            const user = localStorage.getItem('user');
            const role = localStorage.getItem('role');
            if(user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                
                // إظهار لوحة المدير فقط لو الرتبة admin
                if(role === 'admin') document.getElementById('adminPanel').classList.remove('hidden');
                
                renderChannels();
                if(channels.length > 0) loadStream(channels[0].url);
            }
        };

        function addChannel() {
            const name = document.getElementById('chName').value;
            const url = document.getElementById('chUrl').value;
            if(!name || !url) return alert("اكمل البيانات");
            channels.push({name, url});
            localStorage.setItem('zk_list', JSON.stringify(channels));
            renderChannels();
            alert("تمت الإضافة بنجاح!");
        }

        function renderChannels() {
            const div = document.getElementById('userChannels');
            div.innerHTML = channels.map((c, i) => `
                <button onclick="loadStream('${c.url}')" class="channel-btn shrink-0">
                    <i class="fas fa-play ml-1 text-yellow-500"></i> ${c.name}
                </button>
            `).join('');
        }

        function loadStream(url) {
            const video = document.getElementById('video');
            document.getElementById('statusMsg').innerText = "جاري تشغيل البث الآن...";
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        function clearChannels() { localStorage.removeItem('zk_list'); location.reload(); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
