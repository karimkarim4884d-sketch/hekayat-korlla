<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zack Live | يلا شوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f3f4f6; color: #1f2937; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .match-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; }
        .league-title { background: #e5e7eb; color: #374151; padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .score-box { background: #f9fafb; border: 1px solid #eee; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 18px; min-width: 80px; text-align: center; }
        .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .admin-float { background: #020617; color: white; border-radius: 30px 30px 0 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="max-w-md mx-auto bg-gray-100 min-h-screen">

    <div class="bg-white p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-futbol"></i></div>
            <h1 class="text-xl font-black italic text-blue-900">ZACK LIVE</h1>
        </div>
        <div class="text-gray-400 text-sm font-bold">الأربعاء، 18/03/2026</div>
    </div>

    <div id="adminArea" class="hidden p-4">
        <div class="admin-float p-6 shadow-2xl">
             <div class="flex justify-between items-center mb-4">
                 <h2 class="text-blue-400 font-bold text-xs uppercase tracking-widest">Control Panel</h2>
                 <span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-[10px]">#77777777</span>
             </div>
             <div class="grid grid-cols-2 gap-2 mb-4 text-center">
                 <div class="bg-slate-800 p-2 rounded-xl">
                     <p class="text-[8px] text-gray-500">زرقاء</p>
                     <b id="pBlue" class="text-blue-400">1M</b>
                 </div>
                 <div class="bg-slate-800 p-2 rounded-xl">
                     <p class="text-[8px] text-gray-500">حمراء</p>
                     <b id="pRed" class="text-red-400">1M</b>
                 </div>
             </div>
             <input type="text" id="targetId" placeholder="ID العميل" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-white text-sm mb-2 outline-none">
             <div class="grid grid-cols-2 gap-2">
                 <button onclick="cloudCharge('blue')" class="bg-blue-600 p-3 rounded-xl text-[10px] font-bold uppercase">شحن</button>
                 <button onclick="cloudCharge('live')" class="bg-green-600 p-3 rounded-xl text-[10px] font-bold uppercase">تفعيل بث</button>
             </div>
        </div>
    </div>

    <div class="p-4">
        
        <div class="league-title"><i class="fas fa-trophy text-yellow-600"></i> دوري أبطال أوروبا</div>
        
        <div class="match-card flex items-center justify-between text-center">
            <div class="w-1/3">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/7/7c/Liverpool_FC.svg/1200px-Liverpool_FC.svg.png" class="w-10 h-10 mx-auto mb-2">
                <p class="text-[11px] font-bold">ليفربول</p>
            </div>
            <div class="w-1/3 flex flex-col items-center">
                <div class="score-box">1 - 0</div>
                <p class="text-[10px] text-green-600 font-bold mt-2"><span class="live-dot"></span> 45'</p>
            </div>
            <div class="w-1/3">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/d/d3/Galatasaray_Sports_Club_Logo.svg/1200px-Galatasaray_Sports_Club_Logo.svg.png" class="w-10 h-10 mx-auto mb-2">
                <p class="text-[11px] font-bold">غلطة سراي</p>
            </div>
        </div>

        <div class="league-title"><i class="fas fa-medal text-blue-600"></i> كأس مصر</div>
        
        <div class="match-card flex items-center justify-between text-center opacity-80">
            <div class="w-1/3">
                <img src="https://upload.wikimedia.org/wikipedia/ar/2/21/Tala%27ea_El_Gaish_SC_logo.png" class="w-10 h-10 mx-auto mb-2">
                <p class="text-[11px] font-bold">طلائع الجيش</p>
            </div>
            <div class="w-1/3 flex flex-col items-center">
                <div class="score-box text-gray-400">0 - 0</div>
                <p class="text-[10px] text-gray-400 font-bold mt-2">لم تبدأ</p>
            </div>
            <div class="w-1/3">
                <img src="https://upload.wikimedia.org/wikipedia/ar/f/f6/ZED_FC_Logo.png" class="w-10 h-10 mx-auto mb-2">
                <p class="text-[11px] font-bold">نادي زد</p>
            </div>
        </div>

    </div>

    <div id="liveBox" class="hidden p-4">
        <div class="bg-black rounded-2xl overflow-hidden shadow-2xl">
            <div class="p-3 bg-green-600 text-white text-[10px] font-bold flex justify-between">
                <span>● بث مباشر مباراة ليفربول</span>
                <button onclick="toggleFS()"><i class="fas fa-expand"></i></button>
            </div>
            <iframe id="player" class="w-full h-[220px]" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t flex justify-around p-3 text-[10px] font-bold text-gray-500">
        <div class="text-blue-600 flex flex-col items-center"><i class="fas fa-home text-lg mb-1"></i> الرئيسية</div>
        <div class="flex flex-col items-center" onclick="doLoginPrompt()"><i class="fas fa-user text-lg mb-1"></i> حسابي</div>
        <div class="flex flex-col items-center"><i class="fas fa-tv text-lg mb-1"></i> البث المباشر</div>
        <div class="flex flex-col items-center"><i class="fas fa-newspaper text-lg mb-1"></i> الأخبار</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const config = { databaseURL: "https://zack-cinema-default-rtdb.firebaseio.com" };
        let db; try { firebase.initializeApp(config); db = firebase.database(); } catch(e){}

        function doLoginPrompt() {
            let n = prompt("ادخل اسم المستخدم:");
            if(!n) return;
            let id = (n.toLowerCase() === "karim khaled") ? "77777777" : Math.floor(Math.random()*90000000)+10000000;
            localStorage.setItem('z_n', n);
            localStorage.setItem('z_i', id);
            location.reload();
        }

        window.onload = function() {
            const n = localStorage.getItem('z_n'), i = localStorage.getItem('z_i');
            if(n && i) {
                if(n.toLowerCase() === "karim khaled") document.getElementById('adminArea').classList.remove('hidden');
                
                db.ref('users/' + i).on('value', (s) => {
                    const d = s.val();
                    if(d && d.live) {
                        document.getElementById('liveBox').classList.remove('hidden');
                        document.getElementById('player').src = "https://www.youtube.com/embed/live_stream?channel=UC4p9m8_4S99S5M2_9G6G5Q";
                    }
                });
            }
        };

        function cloudCharge(t) {
            const target = document.getElementById('targetId').value;
            if(!target) return alert("أدخل ID العميل!");
            let up = (t === 'live') ? { live: true } : { blue: 500 };
            db.ref('users/' + target).update(up).then(() => alert("تم التحديث بنجاح! ✅"));
        }
    </script>
</body>
                                                 </html>
