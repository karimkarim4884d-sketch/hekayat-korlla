<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة</title>
    <style>
        :root {
            --dark-bg: #001220;
            --card-bg: #003366;
            --accent-orange: #ff6b35;
            --text-white: #ffffff;
            --light-blue: #00bfff;
            --nav-bg: #000c16;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { background: var(--dark-bg); color: var(--text-white); padding-bottom: 70px; overflow: hidden; }

        header { 
            display: flex; align-items: center; justify-content: center; 
            gap: 15px; padding: 15px; color: var(--accent-orange);
            border-bottom: 1px solid rgba(0, 191, 255, 0.1);
            background: var(--nav-bg);
        }
        
        .logo-container {
            width: 45px; height: 45px; border-radius: 12px; 
            overflow: hidden; box-shadow: 0 0 10px rgba(255,107,53,0.4);
        }

        .logo-img { width: 100%; height: 100%; object-fit: cover; }

        .section-container { display: none; width: 100%; height: calc(100vh - 130px); }
        .section-container.active { display: block; }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--dark-bg);
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg);
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid #002a4d; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; text-decoration: none; font-size: 0.75rem; cursor: pointer; }
        .nav-item.active { color: var(--light-blue); }
        .nav-item span:first-child { font-size: 1.2rem; margin-bottom: 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://cdn-icons-png.flaticon.com/512/53/53283.png" class="logo-img" alt="⚽">
    </div>
    <h1 style="font-size: 1.4rem;">هجمة ولقطة</h1>
</header>

<div id="matches-section" class="section-container active">
    <iframe src="https://www.scoreaxis.com/widget/live-scores?autoHeight=0&lang=ar&bodyColor=%23001220&font=heebo&textColor=%23ffffff&linkColor=%2300bfff&borderColor=%23003366&tabColor=%23003366&leagues=39,140,135,78,61,2,3,4,202,6232265abf1fa71a672159ec" allowtransparency="true"></iframe>
</div>

<div id="standings-section" class="section-container">
    <iframe src="https://www.scoreaxis.com/widget/league-table/39?autoHeight=0&lang=ar&bodyColor=%23001220&font=heebo&textColor=%23ffffff&linkColor=%2300bfff&borderColor=%23003366&tabColor=%23003366" allowtransparency="true"></iframe>
</div>

<div id="more-section" class="section-container">
    <div style="padding: 40px 20px; text-align: center;">
        <h3 style="color: var(--light-blue); margin-bottom: 20px;">➕ تواصل معنا</h3>
        <a href="https://wa.me/201040077271" style="background: #25d366; color: white; padding: 18px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-weight: bold;">
            💬 واتساب الدعم الفني
        </a>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showSection('matches-section', this)"><span>⚽</span><span>المباريات</span></div>
    <div class="nav-item" onclick="showSection('standings-section', this)"><span>📊</span><span>الترتيب</span></div>
    <div class="nav-item" onclick="showSection('more-section', this)"><span>➕</span><span>المزيد</span></div>
</nav>

<script>
function showSection(sectionId, element) {
    document.querySelectorAll('.section-container').forEach(sec => sec.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
    element.classList.add('active');
}
</script>

</body>
</html>
