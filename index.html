<style>
    /* تنسيق شاشة البث المباشر */
    .live-modal {
        display: none; position: fixed; z-index: 3000; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; flex-direction: column;
    }
    .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
    .close-live { padding: 15px; color: white; background: var(--accent-orange); text-align: center; cursor: pointer; font-weight: bold; }
    .watch-btn {
        background: #ff0000; color: white; padding: 4px 10px; border-radius: 4px;
        font-size: 0.7rem; margin-top: 5px; cursor: pointer; animation: blink 1s infinite;
    }
    @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
</style>

<div id="livePlayerModal" class="live-modal">
    <div class="close-live" onclick="closeLive()">❌ إغلاق البث والعودة للنتائج</div>
    <div class="video-container">
        <iframe id="liveFrame" src="" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
    </div>
    <div style="padding: 20px; text-align: center;">
        <h3 id="liveMatchTitle">بث مباشر</h3>
        <p style="color: #aaa; font-size: 0.8rem;">إذا انقطع البث قم بتحديث الصفحة</p>
    </div>
</div>

<script>
// --- وظيفة تشغيل البث المباشر ---
function watchLive(home, away) {
    const modal = document.getElementById('livePlayerModal');
    const frame = document.getElementById('liveFrame');
    document.getElementById('liveMatchTitle').innerText = `${home} vs ${away}`;
    
    // هنا بنحط رابط البث (تقدر تخليه متغير بناءً على الماتش)
    // ده مثال لرابط مشغل بيسحب قنوات رياضية
    const streamUrl = "https://clappr.io/demo/index.html?src=https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"; 
    
    frame.src = streamUrl;
    modal.style.display = 'flex';
}

function closeLive() {
    const modal = document.getElementById('livePlayerModal');
    const frame = document.getElementById('liveFrame');
    frame.src = ""; // عشان يوقف الصوت لما تقفل
    modal.style.display = 'none';
}

// --- تعديل بسيط في دالة render عشان يظهر زر البث ---
// دور على السطر اللي فيه vs-badge وزود تحته ده:

    <div class="vs-badge">VS</div>

    <div class="watch-btn" onclick="watchLive('${m.teams.home.name}', '${m.teams.away.name}')">🔴 شاهد الآن</div>
</div>
*/
</script>
