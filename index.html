<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACK HUB | الأفلام والكورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ffe611; --bg: #0b0b0b; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Cairo'; margin: 0; padding-bottom: 80px; }
        .header { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: bold; color: var(--main); text-transform: uppercase; }
        .search-box { padding: 10px; display: flex; gap: 5px; background: #111; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; font-family: 'Cairo'; }
        .btn-search { background: var(--main); border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tabs { display: flex; justify-content: space-around; background: #1a1a1a; padding: 10px 0; border-bottom: 1px solid #333; }
        .tab-btn { color: #888; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .tab-btn.active { color: var(--main); border-bottom: 2px solid var(--main); padding-bottom: 5px; }
        .section { display: none; padding: 15px; }
        .active-section { display: block; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #333; position: relative; cursor: pointer; }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-info { padding: 8px; text-align: center; font-size: 12px; font-weight: bold; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; z-index: 2000; flex-direction: column; }
        .close { padding: 20px; color: var(--main); font-size: 30px; cursor: pointer; align-self: flex-start; }
        iframe { width: 100%; height: 280px; border: 1px solid var(--main); margin-top: 20px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { color: #777; text-decoration: none; font-size: 11px; text-align: center; }
        .nav-item.active { color: var(--main); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">ZACK <span style="color:white">HUB</span></div>
</div>

<div class="search-box">
    <input type="text" id="movieInput" placeholder="بحث عن فيلم أو مسلسل...">
    <button class="btn-search" onclick="search()"><i class="fas fa-search"></i></button>
</div>

<div class="tabs">
    <div class="tab-btn active" id="movieTab" onclick="switchType('movie')">أفلام</div>
    <div class="tab-btn" id="tvTab" onclick="switchType('tv')">مسلسلات</div>
</div>

<div id="content" class="section active-section">
    <div class="grid" id="displayList"></div>
</div>

<div id="sports" class="section">
    <h2 style="font-size:18px; border-right:4px solid var(--main); padding-right:10px;">مباريات اليوم</h2>
    <div class="card" style="display:block; padding:15px; margin-bottom:10px;" onclick="alert('جاري تجهيز البث المباشر...')">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>ريال مدريد</span>
            <span style="color:var(--main)">22:00</span>
            <span>برشلونة</span>
        </div>
    </div>
</div>

<div id="playerModal" class="modal">
    <div class="close" onclick="closePlayer()"><i class="fas fa-times"></i></div>
    <iframe id="videoFrame" src="" allowfullscreen></iframe>
    <div style="padding:20px; text-align:center; color:var(--main); font-size:12px;">ملاحظة: إذا لم يعمل السيرفر، جرب تحديث الصفحة.</div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="showPage('content', this)"><i class="fas fa-home"></i>الرئيسية</div>
    <div class="nav-item" onclick="showPage('sports', this)"><i class="fas fa-futbol"></i>الكورة</div>
    <div class="nav-item" onclick="window.open('https://wa.me/201040077271')"><i class="fab fa-whatsapp"></i>دعم</div>
</div>

<script>
    const tmdbKey = "932eefacf243fb7b9698ea142f2e0481";
    let currentType = 'movie';

    function switchType(type) {
        currentType = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(type + 'Tab').classList.add('active');
        loadTrending();
    }

    function showPage(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    async function loadTrending() {
        const res = await fetch(`https://api.themoviedb.org/3/trending/${currentType}/day?api_key=${tmdbKey}&language=ar`);
        const data = await res.json();
        render(data.results);
    }

    async function search() {
        const q = document.getElementById('movieInput').value;
        if(!q) return loadTrending();
        const res = await fetch(`https://api.themoviedb.org/3/search/${currentType}?query=${q}&api_key=${tmdbKey}&language=ar`);
        const data = await res.json();
        render(data.results);
    }

    function render(items) {
        let h = '';
        items.forEach(m => {
            if(!m.poster_path) return;
            const title = m.title || m.name;
            h += `<div class="card" onclick="openPlayer('${m.id}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="card-info">${title}</div>
                  </div>`;
        });
        document.getElementById('displayList').innerHTML = h;
    }

    function openPlayer(id) {
        const server = currentType === 'movie' ? 'movie' : 'tv';
        document.getElementById('videoFrame').src = `https://vidsrc.to/embed/${server}/${id}`;
        document.getElementById('playerModal').style.display = 'flex';
    }

    function closePlayer() {
        document.getElementById('playerModal').style.display = 'none';
        document.getElementById('videoFrame').src = '';
    }

    loadTrending();
</script>
</body>
</html>
