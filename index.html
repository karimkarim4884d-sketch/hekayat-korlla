<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر زاك لشحن الألعاب</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: white; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 50px; }
        .card { background: #16213e; border: 1px solid #0f3460; border-radius: 15px; padding: 20px; width: 200px; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: #e94560; }
        .card img { width: 100%; border-radius: 10px; }
        .card h3 { margin-top: 15px; font-size: 1.2rem; }
        .btn-order { background-color: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>مرحباً بك في متجر الشحن الخاص بك</h1>
    <p>اختر اللعبة وابدأ الشحن فوراً</p>

    <div class="container">
        <div class="card">
            <img src="https://via.placeholder.com/150/000000/FFFFFF/?text=PUBG" alt="PUBG">
            <h3>ببجي موبايل</h3>
            <button class="btn-order">عرض الباقات</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150/000000/FFFFFF/?text=Free+Fire" alt="Free Fire">
            <h3>فري فاير</h3>
            <button class="btn-order">عرض الباقات</button>
        </div>
    </div>

</body>
</html>
