<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة ولقطة - التطبيق الكامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b1120; /* لون غامق احترافي زي الصورة */
            --card-bg: #151f32;
            --text-color: #ffffff;
            --accent-color: #00d1ff;
            --nav-bg: #0f172a;
        }

        .light-mode {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --accent-color: #3b82f6;
            --nav-bg: #e2e8f0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0;
            padding-bottom: 70px;
            transition: 0.3s;
        }

        /* الهيدر العلوي */
        .top-bar {
            background: var(--nav-bg);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .menu-btn { font-size: 24px; cursor: pointer; color: var(--accent-color); }

        /* القائمة الجانبية (الثلاث شروط) */
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 3000;
            top: 0; right: 0; background-color: #050a14;
            overflow-x: hidden; transition: 0.4s; padding-top: 60px;
        }

        .sidebar a {
            padding: 15px 25px; text-decoration: none; font-size: 18px;
            color: white; display: block; border-bottom: 1px solid #1e293b;
        }

        /* شريط التبويبات العلوي (أمس، اليوم، غداً) */
        .date-tabs {
            display: flex; justify-content: space-around;
            background: var(--card-bg); padding: 10px 0;
        }

        .date-btn {
            background: none; border: none; color: #888;
            font-weight: bold; cursor: pointer; padding-bottom: 5px;
        }

        .date-btn.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }

        /* الأقسام السفلية (Bottom Nav) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: var(--nav-bg); display: flex;
            justify-content: space-around; padding: 10px 0;
            border-top: 1px solid #1e293b; z-index: 2000;
        }

        .nav-link {
            text-decoration: none; color: #64748b;
            text-align: center; font-size: 11px; cursor: pointer;
        }

        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-link.active { color: var(--accent-color); }

        /* المحتوى */
        .content-section { padding: 15px; }
        .hidden { display: none; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 20px; margin-bottom: 10px; text-align: center; }

        /* زرار الأبيض والأسود */
        .theme-toggle {
            background: var(--accent-color); color: #000;
            border: none; padding: 10px 20px; border-radius: 20px;
            font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="sideMenu" class="sidebar">
        <a href="javascript:void(0)" style="font-size:30px;" onclick="closeMenu()">×</a>
        <a href="#" onclick="switchPage('movies')"><i class="fas fa-film"></i> قسم الأفلام</a>
        <a href="#"><i class="fas fa-tv"></i> قسم المسلسلات</a>
        <a href="#" onclick="switchPage('home')"><i class="fas fa-home"></i> العودة للرئيسية</a>
    </div>

    <div class="top-bar">
        <div class="menu-btn" onclick="openMenu()">☰</div>
        <div id="main-title" style="font-weight: bold;">هجمة ولقطة</div>
        <i class="fas fa-search" style="font-size: 20px;"></i>
    </div>

    <div id="home-page" class="content-section">
        <div class="date-tabs">
            <button class="date-btn" onclick="changeDate('yesterday')">ماتشات أمس</button>
            <button class="date-btn active" onclick="changeDate('today')">ماتشات اليوم</button>
            <button class="date-btn" onclick="changeDate('tomorrow')">ماتشات غداً</button>
        </div>
        <div class="card" style="margin-top:20px;">عرض المباريات والنتائج هنا...</div>
    </div>

    <div id="movies-page" class="content-section hidden">
        <h3>🎬 مكتبة زاك للسينما</h3>
        <div class="card">فيلم الناصر صلاح الدين</div>
        <div class="card">فيلم الإرهاب والكباب</div>
    </div>

    <div id="more-page" class="content-section hidden">
        <h3>المزيد</h3>
        <div class="card" style="text-align: right;">
            <p>📱 واتساب: <a href="https://wa.me/201040077271" style="color:var(--accent-color);">01040077271</a></p>
            <p>🌐 اللغة: العربية / English</p>
            <hr>
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <span>الوضع الليلي</span>
                <button class="theme-toggle" onclick="toggleTheme()" id="t-btn">تفعيل الأبيض</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link active" onclick="switchPage('home', this)">
            <i class="fas fa-volleyball-ball"></i>
            <span>المباريات</span>
        </div>
        <div class="nav-link" onclick="switchPage('rank')">
            <i class="fas fa-list-ol"></i>
            <span>الترتيب</span>
        </div>
        <div class="nav-link" onclick="switchPage('transfers')">
            <i class="fas fa-exchange-alt"></i>
            <span>الانتقالات</span>
        </div>
        <div class="nav-link" onclick="switchPage('news')">
            <i class="fas fa-newspaper"></i>
            <span>الأخبار</span>
        </div>
        <div class="nav-link" onclick="switchPage('more', this)">
            <i class="fas fa-ellipsis-h"></i>
            <span>المزيد</span>
        </div>
    </div>

    <script>
        function openMenu() { document.getElementById("sideMenu").style.width = "250px"; }
        function closeMenu() { document.getElementById("sideMenu").style.width = "0"; }

        function switchPage(pageId, element) {
            // إخفاء كل الصفحات
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('movies-page').classList.add('hidden');
            document.getElementById('more-page').classList.add('hidden');

            // إظهار الصفحة المطلوبة
            if(pageId === 'home') document.getElementById('home-page').classList.remove('hidden');
            if(pageId === 'movies') document.getElementById('movies-page').classList.remove('hidden');
            if(pageId === 'more') document.getElementById('more-page').classList.remove('hidden');

            // تحديث الشريط السفلي
            if(element) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                element.classList.add('active');
            }
            closeMenu();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.getElementById('t-btn');
            btn.innerText = document.body.classList.contains('light-mode') ? "تفعيل الداكن" : "تفعيل الأبيض";
        }

        function changeDate(day) {
            document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
                </html>
