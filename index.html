<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGMA W LAKTA</title>
    <style>
        :root { --red: #8b0000; --dark: #050505; --accent: #00d2ff; }
        body { background: var(--dark); color: white; margin: 0; font-family: sans-serif; padding-bottom: 80px; }
        header { padding: 20px; text-align: center; background: linear-gradient(to bottom, #1a0000, var(--dark)); }
        .logo { font-size: 1.8rem; font-weight: bold; color: var(--accent); text-shadow: 0 0 10px var(--accent); font-family: 'Arial Black', sans-serif; }
        
        /* التبويبات */
        .tabs { display: flex; justify-content: space-around; background: #111; padding: 10px 0; border-bottom: 1px solid #222; }
        .tab { font-size: 0.85rem; color: #888; cursor: pointer; padding: 5px 10px; border-radius: 15px; }
        .tab.active { color: white; background: var(--red); font-weight: bold; }

        .container { min-height: 400px; }
        .match-card { 
            background: #111; margin: 12px; padding: 15px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: space-between;
            border-right: 4px solid var(--red);
        }
        .team { flex: 1; text-align: center; font-size: 0.8rem; }
        .team img { width: 40px; height: 40px; display: block; margin: 0 auto 5px; }
        .score-box { flex: 0.8; text-align: center; }
        .score { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .status { font-size: 0.7rem; color: #666; margin-top: 5px; }
        .live { color: #ff0000; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1} 50% {opacity:0.4} 100% {opacity:1} }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-item { color: #555; font-size: 0.75rem; text-align: center; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

<header><div class="logo">HAGMA W LAKTA</div></header>

<div class="tabs">
    <div class="tab" id="yesterday" onclick="changeDate(-1, 'yesterday')">مباريات الأمس</div>
    <div class="tab active" id="today" onclick="changeDate(0, 'today')">مباريات اليوم</div>
    <div class="tab" id="tomorrow" onclick="changeDate(1, 'tomorrow')">مباريات الغد</div>
</div>

<div id="list" class="container">
    <p style="text-align:center; padding:50px;">⏳ جاري تحميل الماتشات...</p>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="changeDate(0, 'today')">⚽<br>المباريات</div>
    <div class="nav-item" onclick="window.location.reload()">📺<br>البث المباشر</div>
    <a href="https://wa.me/201040077271" class="nav-item">💬<br>المزيد</a>
</nav>

<script>
const API_KEY = 'Bf7d42ac856fecc0e1e6ad24debe9c5e';
const TOP_LEAGUES = [2, 3, 39, 140, 135, 78, 307, 233, 61]; 

async function loadMatches(offset = 0) {
    const list = document.getElementById('list');
    const date = new Date();
    date.setDate(date.getDate() + offset);
    const dateStr = date.toISOString().split('T')[0];

    try {
        const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateStr}`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': 'v3.football.api-sports.io' }
        });
        const data = await res.json();
        const matches = data.response;

        // فلترة الدوريات المهمة
        let filtered = matches.filter(m => TOP_LEAGUES.includes(m.league.id));
        if (filtered.length === 0) filtered = matches.slice(0, 15);

        // لو قسم "اليوم": استبعد الماتشات اللي خلصت (FT) عشان تروح للأمس
        if (offset === 0) {
            filtered = filtered.filter(m => m.fixture.status.short !== "FT");
        }

        if (filtered.length === 0) {
            list.innerHTML = '<p style="text-align:center; padding:50px;">لا توجد مباريات متاحة الآن</p>';
            return;
        }

        list.innerHTML = filtered.map(m => {
            const isLive = ["1H", "2H", "HT", "ET", "P"].includes(m.fixture.status.short);
            const time = new Date(m.fixture.date).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
            let statusText = isLive ? `<span class="live">🔴 مباشر ${m.fixture.status.elapsed}'</span>` : (m.fixture.status.short === "FT" ? "انتهت" : time);

            return `
            <div class="match-card">
                <div class="team"><img src="${m.teams.home.logo}"> ${m.teams.home.name}</div>
                <div class="score-box">
                    <div class="score">${m.goals.home ?? 0} - ${m.goals.away ?? 0}</div>
                    <div class="status">${statusText}</div>
                </div>
                <div class="team"><img src="${m.teams.away.logo}"> ${m.teams.away.name}</div>
            </div>`;
        }).join('');

    } catch (e) { list.innerHTML = '<p style="text-align:center; color:red;">خطأ في الاتصال بالـ API</p>'; }
}

function changeDate(offset, tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    loadMatches(offset);
}

loadMatches(0); // ابدأ بمباريات اليوم
</script>
</body>
</html>
