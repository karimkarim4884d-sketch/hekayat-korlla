<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACK SMM | لوحة التحكم المزدوجة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --yellow: #faff00; --bg: #fdfdf5; --dark: #000000; }
        body { background-color: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .order-card { background: #fff; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .platform-icons { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 5px; }
        .p-icon { width: 55px; height: 55px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid transparent; }
        .p-icon.active { border-color: var(--dark); background: var(--yellow); }
        .label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #333; }
        select, input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #eee; background: #f9f9f9; font-family: 'Cairo'; margin-bottom: 15px; box-sizing: border-box; }
        .price-box { background: #000; color: var(--yellow); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .server-tag { font-size: 10px; background: #eee; padding: 2px 8px; border-radius: 5px; margin-right: 5px; color: #666; }
    </style>
</head>
<body>

    <h2 style="text-align:center;">ZACK <span style="background:var(--yellow); padding:0 10px; border-radius:10px;">SMM</span></h2>

    <div class="platform-icons">
        <div class="p-icon active" onclick="selectPlatform('tiktok', this)"><i class="fab fa-tiktok"></i></div>
        <div class="p-icon" onclick="selectPlatform('insta', this)"><i class="fab fa-instagram"></i></div>
        <div class="p-icon" onclick="selectPlatform('snap', this)"><i class="fab fa-snapchat"></i></div>
    </div>

    <div class="order-card">
        <div class="input-group">
            <span class="label">السيرفر والخدمة</span>
            <select id="service-id" onchange="updatePrice()"></select>
        </div>

        <div class="input-group">
            <span class="label">الرابط (Link)</span>
            <input type="text" id="order-link" placeholder="أدخل الرابط هنا">
        </div>

        <div class="input-group">
            <span class="label">الكمية</span>
            <input type="number" id="quantity" placeholder="الحد الأدنى 100" oninput="updatePrice()">
        </div>

        <div class="price-box">التكلفة: $<span id="total">0.00</span></div>

        <button onclick="sendOrder()" style="width:100%; background:var(--dark); color:var(--yellow); padding:18px; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">
            إرسال الطلب الآن
        </button>
    </div>

    <script>
        // دمج المفتاحين بتوعك
        const KEYS = {
            server1: "f842d46e86abf6a5805e7d54a43060aa",
            server2: "Af25c610001841c34364e8ad2d6d66e0"
        };

        const services = {
            tiktok: [ 
                {id: 5520, name: "متابعين (السيرفر 1)", price: 0.50, key: 'server1'},
                {id: 7780, name: "متابعين (السيرفر 2)", price: 0.45, key: 'server2'}
            ],
            insta: [ 
                {id: 1010, name: "لايكات (السيرفر 1)", price: 0.20, key: 'server1'},
                {id: 9920, name: "لايكات (السيرفر 2)", price: 0.18, key: 'server2'}
            ],
            snap: [ {id: 2159, name: "إضافات سناب (السيرفر 1)", price: 5.00, key: 'server1'} ]
        };

        function selectPlatform(p, el) {
            document.querySelectorAll('.p-icon').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            const list = document.getElementById('service-id');
            list.innerHTML = "";
            services[p].forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.id;
                opt.setAttribute('data-price', s.price);
                opt.setAttribute('data-key', s.key);
                opt.innerText = s.name;
                list.appendChild(opt);
            });
            updatePrice();
        }

        function updatePrice() {
            const select = document.getElementById('service-id');
            const price = parseFloat(select.options[select.selectedIndex]?.getAttribute('data-price') || 0);
            const qty = parseInt(document.getElementById('quantity').value) || 0;
            document.getElementById('total').innerText = ((qty / 1000) * price).toFixed(3);
        }

        async function sendOrder() {
            const select = document.getElementById('service-id');
            const serviceId = select.value;
            const keyType = select.options[select.selectedIndex].getAttribute('data-key');
            const finalKey = KEYS[keyType]; // اختيار المفتاح الصح بناءً على الخدمة
            const link = document.getElementById('order-link').value;
            const qty = document.getElementById('quantity').value;

            if(!link || !qty) return alert("أكمل البيانات يا زاك!");

            console.log(`إرسال الطلب للسيرفر بمفتاح: ${finalKey}`);
            alert(`تم توجيه الطلب بنجاح عبر مفتاح ${keyType.toUpperCase()}`);
        }

        selectPlatform('tiktok', document.querySelector('.p-icon'));
    </script>
</body>
</html>
