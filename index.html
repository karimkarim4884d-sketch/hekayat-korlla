<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent: #00bfff;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --live-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); padding-bottom: 70px; }

        /* الهيدر العلوي الجديد (البحث والتاريخ) */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: var(--bg-dark); position: sticky; top: 0; z-index: 100;
        }
        .top-icons { display: flex; gap: 15px; align-items: center; }
        .icon-btn { font-size: 1.2rem; cursor: pointer; color: var(--text-main); }
        .current-date { font-size: 0.85rem; color: var(--accent); font-weight: bold; }

        /* أقسام المحتوى */
        .page-content { display: none; padding: 10px; min-height: 80vh; }
        .page-content.active { display: block; }

        /* تبويبات الأيام */
        .date-tabs { display: flex; background: #161e2e; margin-bottom: 10px; }
        .date-tab { flex: 1; padding: 12px; text-align: center; font-size: 0.8rem; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; }
        .date-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(0, 191, 255, 0.05); }

        /* كرت المباراة الاحترافي */
        .match-card {
            background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .team-box { flex: 1; text-align: center; }
        .team-box img { width: 35px; height: 35px; margin-bottom: 5px; }
        .team-name { font-size: 0.8rem; display: block; }
        .score-box { flex: 1; text-align: center; }
        .score-val { font-size: 1.3rem; font-weight: bold; }
        .status-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; margin-bottom: 5px; display: inline-block; }
        .live { background: var(--live-red); animation: blink 1s infinite; }

        /* صفحة المزيد (الإعدادات) */
        .more-item {
            background: var(--bg-card); display: flex; justify-content: space-between;
            padding: 15px; margin-bottom: 8px; border-radius: 10px; cursor: pointer;
        }
        .support-btn { background: #22c55e !important; color: white !important; font-weight: bold; justify-content: center !important; }

        /* القائمة السفلية */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #0a101f;
            display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #1e293b;
        }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 0.7rem; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 2px; }

        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
    <!-- أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- الشريط العلوي -->
    <div class="top-bar">
        <div class="top-icons">
            <i class="fas fa-search icon-btn"></i>
            <i class="fas fa-calendar-alt icon-btn"></i>
            <span class="current-date" id="header-date">22/03/2026</span>
        </div>
        <img src="https://i.ibb.co/v4m0ZqH/logo.png" style="height: 35px; border-radius: 5px;" alt="Logo">
    </div>

    <!-- قسم المباريات -->
    <div id="matches-page" class="page-content active">
        <div class="date-tabs">
            <div class="date-tab" onclick="loadDay('yesterday', this)">الأمس</div>
            <div class="date-tab active" onclick="loadDay('today', this)">اليوم</div>
            <div class="date-tab" onclick="loadDay('tomorrow', this)">الغد</div>
        </div>
        <div id="matches-list"></div>
    </div>

    <!-- الأقسام الأخرى (فارغة حالياً) -->
    <div id="news-page" class="page-content"><h2 style="text-align:center; margin-top:50px;">آخر الأخبار الرياضية</h2></div>
    <div id="transfers-page" class="page-content"><h2 style="text-align:center; margin-top:50px;">سوق الانتقالات</h2></div>
    <div id="standings-page" class="page-content"><h2 style="text-align:center; margin-top:50px;">جدول ترتيب الدوريات</h2></div>

    <!-- قسم المزيد (الدعم والإعدادات) -->
    <div id="more-page" class="page-content">
        <div style="background:var(--bg-card); padding:20px; border-radius:15px; margin-bottom:15px; text-align:center;">
            <p style="color:var(--text-dim)">أهلاً بك في هجمة ولقطة</p>
            <button style="background:var(--accent); border:none; color:white; padding:8px 20px; border-radius:5px; margin-top:10px;">دخول</button>
        </div>
        <div class="more-item"><span>اللغة</span><span>العربية ></span></div>
        <div class="more-item"><span>الوضع الليلي</span><i class="fas fa-toggle-on" style="color:var(--accent)"></i></div>
        <div class="more-item"><span>الإشعارات</span><span>تفعيل ></span></div>
        <a href="https://wa.me/201040077271" class="more-item support-btn" style="text-decoration:none;">خدمة العملاء (واتساب)</a>
    </div>

    <!-- القائمة السفلية -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('matches-page', this)"><i class="fas fa-volleyball-ball"></i>المباريات</div>
        <div class="nav-item" onclick="showPage('news-page', this)"><i class="fas fa-newspaper"></i>الأخبار</div>
        <div class="nav-item" onclick="showPage('transfers-page', this)"><i class="fas fa-exchange-alt"></i>الانتقالات</div>
        <div class="nav-item" onclick="showPage('standings-page', this)"><i class="fas fa-list-ol"></i>الترتيب</div>
        <div class="nav-item" onclick="showPage('more-page', this)"><i class="fas fa-ellipsis-h"></i>المزيد</div>
    </nav>

<script>
    const API_KEY = "bf7d42ac856fecc0e1e6ad24debe9c5e";
    const IMPORTANT_LEAGUES = [2021, 2014, 2002, 2019, 2015, 2001, 2000, 2152];
    let dataCache = { yesterday: [], today: [], tomorrow: [] };

    // تبديل الصفحات الأساسية
    function showPage(pageId, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');
    }

    async function fetchMatches() {
        const today = new Date();
        const fmt = (d) => d.toISOString().split('T')[0];
        document.getElementById('header-date').innerText = today.toLocaleDateString('ar-EG');

        try {
            const response = await fetch(`https://api.football-data.org/v4/matches`, {
                headers: { 'X-Auth-Token': API_KEY }
            });
            const data = await response.json();
            
            dataCache.today = data.matches.filter(m => IMPORTANT_LEAGUES.includes(m.competition.id));
            renderMatches('today');
        } catch (e) { console.error("API Error"); }
    }

    function renderMatches(day) {
        const list = document.getElementById('matches-list');
        const matches = dataCache[day];
        if (!matches || matches.length === 0) {
            list.innerHTML = "<p style='text-align:center; padding:20px;'>لا توجد مباريات مهمة حالياً</p>";
            return;
        }

        list.innerHTML = matches.map(m => `
            <div class="match-card">
                <div class="team-box">
                    <img src="${m.homeTeam.crest}">
                    <span class="team-name">${m.homeTeam.shortName}</span>
                </div>
                <div class="score-box">
                    <span class="status-tag ${m.status === 'IN_PLAY' ? 'live' : ''}">
                        ${m.status === 'IN_PLAY' ? 'مباشر' : m.status === 'FINISHED' ? 'انتهت' : 'لم تبدأ'}
                    </span>
                    <div class="score-val">${m.score.fullTime.home ?? 0} - ${m.score.fullTime.away ?? 0}</div>
                    <div style="font-size:0.7rem; color:var(--text-dim)">${new Date(m.utcDate).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</div>
                </div>
                <div class="team-box">
                    <img src="${m.awayTeam.crest}">
                    <span class="team-name">${m.awayTeam.shortName}</span>
                </div>
            </div>
        `).join('');
    }

    function loadDay(day, el) {
        document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderMatches(day);
    }

    fetchMatches();
</script>
</body>
            </html>
