<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zack Cinema Pro</title>
    <style>
        :root { --bg: #0b1118; --acc: #00f2ff; --card: #1a222d; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 70px; }
        
        /* تصميم الواجهة */
        .top { padding: 15px; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .search { background: var(--card); padding: 12px; border-radius: 25px; border: 1px solid #333; }
        .search input { background:none; border:none; color:white; width:100%; outline:none; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; text-align: center; }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card p { font-size: 0.7rem; padding: 5px; white-space: nowrap; overflow: hidden; }

        /* مشغل Zack الجديد */
        .player-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; }
        .p-head { padding: 15px; display: flex; justify-content: space-between; background: #0b1118; border-bottom: 1px solid #222; }
        .p-video { flex: 1; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 300px; border: none; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #0f171f; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; }
        .nav-item { color: #a0aab2; cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--acc); }
    </style>
</head>
<body onload="load('tv')">

    <div id="pv" class="player-view">
        <div class="p-head">
            <span onclick="closeP()" style="cursor:pointer">✕ إغلاق</span>
            <span style="color:var(--acc)">Zack Cinema</span>
        </div>
        <div class="p-video" id="vBox"></div>
        <div style="padding: 20px;">
            <button onclick="refreshP()" style="width:100%; padding:12px; background:var(--acc); border:none; border-radius:8px; font-weight:bold;">تغيير السيرفر لو معلق</button>
        </div>
    </div>

    <div class="top">
        <div class="search"><input type="text" placeholder="ابحث هنا يا Zack..." onkeyup="search(this.value)"></div>
    </div>

    <div class="grid" id="mainG"></div>

    <div class="nav">
        <div class="nav-item active" id="b-tv" onclick="load('tv')">مسلسلات</div>
        <div class="nav-item" id="b-movie" onclick="load('movie')">أفلام</div>
    </div>

    <script>
        const KEY = '932eefacf243fb7b9698ea142f2e0481';
        let cId, cType, srvNum = 1;

        async function load(t) {
            cType = t;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('b-'+t).classList.add('active');
            const res = await fetch(`https://api.themoviedb.org/3/discover/${t}?api_key=${KEY}&language=ar&sort_by=popularity.desc&with_original_language=ar`);
            const data = await res.json();
            render(data.results);
        }

        function render(items) {
            const g = document.getElementById('mainG'); g.innerHTML = '';
            items.forEach(i => {
                if(!i.poster_path) return;
                g.innerHTML += `<div class="card" onclick="openP('${i.id}')"><img src="https://image.tmdb.org/t/p/w500${i.poster_path}"><p>${i.name || i.title}</p></div>`;
            });
        }

        function openP(id) {
            cId = id; srvNum = 1;
            document.getElementById('pv').style.display = 'flex';
            setVideo();
            // حماية لمنع خروج الإعلانات
            window.onbeforeunload = () => "خليك في موقعك؟";
        }

        function setVideo() {
            let url = "";
            if(srvNum === 1) url = `https://embed.su/embed/${cType}/${cId}`;
            else url = `https://vidsrc.me/embed/${cType === 'tv' ? 'tv' : 'movie'}?tmdb=${cId}`;
            
            // الحل: ضفنا Sandbox بس سمحنا بالحاجات اللي تشغله وتمنع الإعلانات تخرج بره
            document.getElementById('vBox').innerHTML = `
                <iframe src="${url}" allowfullscreen 
                sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation-by-user-activation">
                </iframe>`;
        }

        function refreshP() {
            srvNum = srvNum === 1 ? 2 : 1;
            setVideo();
        }

        function closeP() {
            document.getElementById('pv').style.display = 'none';
            document.getElementById('vBox').innerHTML = '';
            window.onbeforeunload = null;
        }

        async function search(q) {
            if(q.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&language=ar&query=${q}`);
            const data = await res.json(); render(data.results);
        }
    </script>
</body>
</html>
