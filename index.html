const express = require('express');
const app = express();

app.get('/', (req, res) => {
  res.send(`
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 موقع البث 🔥</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  background: #000;
  color: #fff;
  font-family: Arial;
  text-align: center;
  margin: 0;
}

h1 {
  background: red;
  padding: 15px;
  margin: 0;
}

.btn {
  width: 90%;
  margin: 10px auto;
  padding: 20px;
  font-size: 20px;
  background: #111;
  border: 2px solid red;
  border-radius: 15px;
  color: white;
  cursor: pointer;
}

.btn:hover {
  background: red;
}

.servers button {
  padding: 12px 20px;
  margin: 8px;
  font-size: 16px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.servers button.active {
  background: green;
}

#player {
  margin-top: 10px;
}

video {
  width: 100%;
  height: 70vh;
  background: black;
}
</style>

</head>

<body>

<h1>🔥 موقع البث 🔥</h1>

<button class="btn" onclick="football()">⚽ بث الكورة</button>
<button class="btn" onclick="showLive()">📡 بث مباشر</button>
<button class="btn" onclick="quran()">📖 القرآن الكريم</button>

<h3>👇 اختار السيرفر</h3>

<div class="servers">
  <button onclick="playServer(1, this)">Server 1</button>
  <button onclick="playServer(2, this)">Server 2</button>
  <button onclick="playServer(3, this)">Server 3</button>
  <button onclick="playServer(4, this)">Server 4 🔥</button>
</div>

<div id="player">
  <h2>📡 اختار سيرفر 👆</h2>
</div>

<script>

// السيرفرات
const servers = {
  1: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
  2: "https://test-streams.mux.dev/test_001/stream.m3u8",
  3: "https://www.youtube.com/embed/aqz-KE-bpKQ",
  4: "https://www.youtube.com/embed/yBcrrpetg4Y"
};

// رسالة البداية
function showLive() {
  document.getElementById("player").innerHTML =
    '<h2>📡 اختار سيرفر شغال 👆</h2>';
}

// تشغيل السيرفر
function playServer(num, btn) {
  const url = servers[num];

  document.querySelectorAll('.servers button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (url.includes(".m3u8")) {
    document.getElementById("player").innerHTML =
      '<video id="video" controls autoplay></video>';

    const video = document.getElementById("video");

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
    } else {
      video.src = url;
    }

  } else {
    document.getElementById("player").innerHTML =
      '<iframe src="' + url + '" width="100%" height="400" allowfullscreen></iframe>';
  }
}

// بث الكورة (الرابط بتاعك)
function football() {
  document.getElementById("player").innerHTML =
    '<iframe src="https://www.youtube.com/embed/yBcrrpetg4Y" width="100%" height="400" allowfullscreen></iframe>';
}

// قرآن
function quran() {
  document.getElementById("player").innerHTML =
    '<iframe src="https://www.youtube.com/embed/x0kUqvfFAHE" width="100%" height="400" allowfullscreen></iframe>';
}

</script>

</body>
</html>
  `);
});

app.listen(3000, '0.0.0.0', () => {
  console.log("🔥 Server running on http://localhost:3000");
});
