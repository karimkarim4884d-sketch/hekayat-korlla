<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة - Zack</title>
    <style>
        :root {
            --dark-bg: #0b1118;
            --card-bg: #1a222d;
            --accent-cyan: #00f2ff;
            --text-gray: #a0aab2;
            --nav-active: #00f2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: white; padding-bottom: 70px; overflow-x: hidden; }

        /* الهيدر الجديد نسخة من الصورة */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; background: var(--dark-bg); position: sticky; top: 0; z-index: 1000;
        }
        .top-icons { display: flex; gap: 20px; align-items: center; }
        .icon-btn { color: white; font-size: 1.3rem; cursor: pointer; text-decoration: none; background: none; border: none; }
        .logo-small { height: 30px; }

        .date-display { text-align: center; padding: 10px; color: var(--text-gray); font-size: 0.9rem; border-bottom: 1px solid #1e2732; }

        /* الأقسام */
        .section-container { display: none; padding: 10px; min-height: 80vh; }
        .section-container.active { display: block; }

        /* كروت الماتشات (نسخة 1000014754.jpg) */
        .league-header { display: flex; align-items: center; gap: 10px; padding: 10px; color: var(--text-gray); font-size: 0.85rem; }
        .match-row {
            background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 8px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .team-box { display: flex; align-items: center; gap: 10px; flex: 1; }
        .team-box.left { justify-content: flex-end; }
        .score-time { background: #121922; padding: 5px 15px; border-radius: 20px; font-weight: bold; color: var(--accent-cyan); min-width: 80px; text-align: center; }

        /* البار السفلي */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #0f171f;
            display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #1e2732;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--nav-active); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }

        /* Input التقويم المخفي */
        #datePicker { position: absolute; visibility: hidden; }

        /* لودر التحليل (AI) */
        .ai-badge { background: linear-gradient(to right, #7b2ff7, #00f2ff); color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.6rem; margin-top: 5px; cursor: pointer; display: inline-block; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="top-bar">
        <div class="top-icons">
            <button class="icon-btn" onclick="openCalendar()"><i class="fa-regular fa-calendar-days"></i></button>
            <button class="icon-btn" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-sliders"></i></button>
            <input type="date" id="datePicker" onchange="handleDateChange(this.value)">
        </div>
        <img src="https://i.ibb.co/LzNfXpY/ball-icon.png" class="logo-small" alt="Logo">
    </div>

    <div class="date-display" id="currentDateLabel">الاثنين، 23/03/2026</div>

    <div id="matches-section" class="section-container active">
        <div id="matches-list"></div>
    </div>

    <div id="news-section" class="section-container">
        <div id="news-list"></div>
    </div>

    <div id="transfers-section" class="section-container">
        <div id="transfers-list"></div>
    </div>

    <div id="standings-section" class="section-container">
        <div id="standings-list"></div>
    </div>

    <div id="more-section" class="section-container">
        <div class="match-row"><span>الوضع الليلي</span><i class="fa-solid fa-moon"></i></div>
        <div class="match-row"><span>حجم الخط</span><i class="fa-solid fa-font"></i></div>
        <div class="match-row" onclick="window.location.href='https://wa.me/201040077271'"><span>اتصل بنا</span><i class="fa-brands fa-whatsapp"></i></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('matches-section', this)"><i class="fa-solid fa-futbol"></i><span>المباريات</span></div>
        <div class="nav-item" onclick="switchTab('news-section', this)"><i class="fa-regular fa-newspaper"></i><span>الأخبار</span></div>
        <div class="nav-item" onclick="switchTab('transfers-section', this)"><i class="fa-solid fa-right-left"></i><span>الانتقالات</span></div>
        <div class="nav-item" onclick="switchTab('standings-section', this)"><i class="fa-solid fa-chart-simple"></i><span>الترتيب</span></div>
        <div class="nav-item" onclick="switchTab('more-section', this)"><i class="fa-solid fa-ellipsis"></i><span>المزيد</span></div>
    </nav>

<script>
    const FOOTBALL_API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
    let currentActiveTab = 'matches-section';

    // تبديل الأقسام بدون Refresh كامل للصفحة
    function switchTab(tabId, el) {
        currentActiveTab = tabId;
        document.querySelectorAll('.section-container').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');

        // جلب الداتا للقسم النشط فقط
        refreshCurrentSection();
    }

    // وظيفة الـ Refresh الذكي (تحدث القسم اللي إنت فيه بس)
    function refreshCurrentSection() {
        if(currentActiveTab === 'matches-section') loadMatches(new Date().toISOString().split('T')[0]);
        if(currentActiveTab === 'transfers-section') loadTransfers();
        if(currentActiveTab === 'standings-section') loadStandings();
    }

    async function loadMatches(date) {
        const list = document.getElementById('matches-list');
        list.innerHTML = '<p style="text-align:center; padding:20px;">جاري التحديث...</p>';
        try {
            const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${date}`, {
                headers: { "x-rapidapi-key": FOOTBALL_API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
            });
            const data = await res.json();
            renderMatches(data.response);
        } catch(e) { list.innerHTML = "خطأ في الاتصال"; }
    }

    function renderMatches(matches) {
        const list = document.getElementById('matches-list');
        list.innerHTML = '';
        if(matches.length === 0) { list.innerHTML = '<p style="text-align:center; padding:20px;">لا يوجد مباريات في هذا التاريخ</p>'; return; }
        
        matches.slice(0, 15).forEach(m => {
            list.innerHTML += `
                <div class="league-header">🏆 ${m.league.name}</div>
                <div class="match-row">
                    <div class="team-box left"><span>${m.teams.home.name}</span><img src="${m.teams.home.logo}" width="25"></div>
                    <div class="score-time">${m.goals.home ?? 0} - ${m.goals.away ?? 0}</div>
                    <div class="team-box"><img src="${m.teams.away.logo}" width="25"><span>${m.teams.away.name}</span></div>
                </div>`;
        });
    }

    // التحكم في التقويم
    function openCalendar() { document.getElementById('datePicker').showPicker(); }
    function handleDateChange(date) {
        document.getElementById('currentDateLabel').innerText = date;
        loadMatches(date);
    }

    function toggleSearch() {
        const query = prompt("ابحث عن فريق أو بطولة:");
        if(query) alert("جاري البحث عن: " + query);
    }

    // تشغيل التطبيق على اليوم
    window.onload = () => loadMatches(new Date().toISOString().split('T')[0]);
</script>
</body>
    </html>
