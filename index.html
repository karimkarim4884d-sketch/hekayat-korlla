<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة مرتدة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --primary: #00ff62;
            --text-dark: #2d3436;
            --text-light: #636e72;
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0; color: var(--text-dark);
            user-select: none; -webkit-user-select: none;
        }

        /* الهيدر */
        .app-header {
            background: #fff; padding: 15px; display: flex; 
            justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100;
        }
        .app-header h1 { font-size: 20px; color: var(--primary); margin: 0; font-weight: 900; }

        /* شريط البحث */
        .search-box { padding: 10px 15px; }
        .search-box input {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd;
            outline: none; box-sizing: border-box; background: #fff;
        }

        /* شريط التنقل بين الأيام (أمس - اليوم - غداً) */
        .day-tabs {
            display: flex; gap: 10px; padding: 0 15px 15px 15px;
            max-width: 600px; margin: 0 auto;
        }
        .day-btn {
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #eee;
            background: #fff; color: var(--text-light); font-weight: bold;
            cursor: pointer; font-size: 13px; transition: 0.3s;
        }
        .day-btn.active {
            background: var(--primary); color: #000; border-color: var(--primary);
        }

        /* قائمة المباريات */
        .matches-list { padding: 10px; max-width: 600px; margin: 0 auto; }
        .match-card {
            background: var(--bg-card); border-radius: 15px; padding: 15px;
            margin-bottom: 12px; display: flex; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer;
        }

        .team-side { flex: 1; text-align: center; }
        .team-side img { width: 35px; height: 35px; object-fit: contain; }
        .team-name { font-size: 12px; font-weight: 600; margin-top: 5px; display: block; }

        .match-center { width: 90px; text-align: center; }
        .m-score { font-size: 20px; font-weight: 900; margin: 5px 0; }
        
        .live-circle {
            width: 35px; height: 35px; border: 2px solid #eee; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            border-top-color: var(--primary); font-size: 10px; font-weight: bold; color: var(--primary);
        }

        /* Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; }
        .modal-head { padding: 20px; background: var(--bg-body); text-align: center; border-bottom: 1px solid #eee; }
        .back-btn { position: absolute; right: 20px; top: 25px; font-size: 20px; cursor: pointer; }

        .wa-float { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; text-decoration: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="app-header">
    <i class="fas fa-calendar-alt"></i>
    <h1>هجمة مرتدة ⚽</h1>
    <i class="fas fa-bars"></i>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="ابحث عن مباراة أو فريق..." onkeyup="search()">
</div>

<div class="day-tabs">
    <button class="day-btn" id="btn-yesterday" onclick="changeDay(-1, 'btn-yesterday')">أمس</button>
    <button class="day-btn active" id="btn-today" onclick="changeDay(0, 'btn-today')">اليوم</button>
    <button class="day-btn" id="btn-tomorrow" onclick="changeDay(1, 'btn-tomorrow')">غداً</button>
</div>

<div class="matches-list" id="list"></div>

<div id="modal">
    <div class="modal-head">
        <i class="fas fa-chevron-right back-btn" onclick="closeModal()"></i>
        <div id="modal-content"></div>
    </div>
</div>

<a href="https://wa.me/201040077271" class="wa-float"><i class="fab fa-whatsapp"></i></a>

<script>
    const KEY = "Bf7d42ac856fecc0e1e6ad24debe9c5e";

    async function loadMatches(date) {
        const list = document.getElementById('list');
        list.innerHTML = '<center><br>جاري التحميل...</center>';
        
        try {
            const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${date}`, {
                "headers": { "x-rapidapi-key": KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
            });
            const data = await res.json();
            render(data.response.filter(m => [39, 140, 78, 135, 2, 3].includes(m.league.id)));
        } catch(e) { list.innerHTML = "خطأ في الاتصال"; }
    }

    function render(matches) {
        const list = document.getElementById('list');
        if(matches.length === 0) { list.innerHTML = "<center><br>لا توجد مباريات لهذا اليوم</center>"; return; }
        
        list.innerHTML = matches.map(m => {
            const status = m.fixture.status.short;
            let center = '';
            
            if(status === 'NS') {
                center = `<div style="font-size:12px; font-weight:bold;">${m.fixture.date.split('T')[1].substring(0,5)}</div><div style="font-size:10px; color:#999">قريباً</div>`;
            } else {
                center = `<div class="live-circle">${m.fixture.status.elapsed}'</div><div class="m-score">${m.goals.home} - ${m.goals.away}</div>`;
            }

            return `
                <div class="match-card" onclick="alert('سيتم عرض التفاصيل قريباً')">
                    <div class="team-side">
                        <img src="${m.teams.home.logo}">
                        <span class="team-name">${m.teams.home.name}</span>
                    </div>
                    <div class="match-center">${center}</div>
                    <div class="team-side">
                        <img src="${m.teams.away.logo}">
                        <span class="team-name">${m.teams.away.name}</span>
                    </div>
                </div>`;
        }).join('');
    }

    // دالة تغيير اليوم
    function changeDay(offset, btnId) {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(btnId).classList.add('active');
        
        const d = new Date();
        d.setDate(d.getDate() + offset);
        loadMatches(d.toISOString().split('T')[0]);
    }

    function search() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.match-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
    }

    window.onload = () => loadMatches(new Date().toISOString().split('T')[0]);
</script>
</body>
</html>
