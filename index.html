<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema | شحن VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .vip-badge { background: linear-gradient(45deg, #facc15, #eab308); color: black; font-weight: bold; padding: 2px 10px; border-radius: 10px; font-size: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black text-blue-500 italic">ZACK CINEMA</h1>
        <button onclick="showAdmin()" class="opacity-10 hover:opacity-100"><i class="fas fa-user-cog"></i></button>
    </div>

    <div id="user-panel" class="w-full max-w-md glass-card rounded-[2.5rem] p-8 shadow-2xl border-t-4 border-blue-600">
        <div id="login-section" class="text-center">
            <img src="https://www.google.com/favicon.ico" class="w-12 h-12 mx-auto mb-4 bg-white p-2 rounded-full shadow-lg">
            <h2 class="text-xl font-bold mb-6">سجل دخولك بنظام Google</h2>
            <button onclick="mockLogin()" class="w-full bg-white text-black p-4 rounded-2xl font-bold flex items-center justify-center gap-3 active:scale-95 transition">
                <i class="fab fa-google text-red-500"></i> الدخول بحساب جوجل
            </button>
        </div>

        <div id="dashboard" class="hidden space-y-6">
            <div class="text-center">
                <p class="text-gray-400 text-xs">أهلاً بك يا بطل</p>
                <h3 id="user-display-name" class="text-xl font-bold text-blue-400"></h3>
            </div>

            <div class="bg-black/40 p-6 rounded-3xl border border-blue-500/20 text-center relative">
                <span class="text-[10px] uppercase tracking-widest text-gray-500">الأيدي الحالي (عشوائي)</span>
                <p id="my-id" class="text-3xl font-mono font-black mt-1 tracking-wider text-white">#--------</p>
                
                <div class="mt-4 pt-4 border-t border-white/5">
                    <span class="vip-badge italic">عرض خاص</span>
                    <button onclick="requestVip()" class="block w-full mt-2 text-sm text-yellow-500 font-bold hover:underline">
                        امتلك أيدي مميز (مثل 88888888) <br> <span class="text-xs text-white/60">بـ 30 جنيه فقط! 💰</span>
                    </button>
                </div>
            </div>

            <div class="space-y-3 bg-blue-600/5 p-4 rounded-2xl border border-blue-500/10">
                <label class="text-xs text-blue-400 font-bold">باقة الشحن السريع:</label>
                <select id="amount" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 outline-none font-bold">
                    <option value="500">500 عملة - (20 جنيه)</option>
                    <option value="1500">1500 عملة - (50 جنيه)</option>
                    <option value="5000">5000 عملة - (150 جنيه)</option>
                </select>
                <button onclick="sendOrder()" class="w-full bg-blue-600 p-4 rounded-xl font-bold shadow-lg shadow-blue-600/30 hover:bg-blue-500 transition">إرسال طلب الشحن</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden w-full max-w-md glass-card rounded-[2.5rem] p-8 border-t-4 border-red-600 mt-4">
        <h2 class="text-red-500 font-bold mb-4 text-center">لوحة الإدارة (زاك)</h2>
        <div class="bg-black/50 p-4 rounded-2xl mb-4">
            <p class="text-xs text-gray-400">رصيدك القابل للشحن:</p>
            <p class="text-2xl font-bold text-green-400"><span id="admin-balance">50000</span> عملة</p>
        </div>
        <input type="text" id="target-id" placeholder="أدخل أيدي المستخدم" class="w-full p-4 mb-2 rounded-xl bg-slate-800 border-none outline-none">
        <input type="number" id="charge-amount" placeholder="الكمية" class="w-full p-4 mb-4 rounded-xl bg-slate-800 border-none outline-none">
        <button onclick="adminCharge()" class="w-full bg-red-600 p-4 rounded-xl font-bold shadow-lg shadow-red-600/20">تأكيد الشحن الفوري</button>
        <button onclick="hideAdmin()" class="w-full mt-4 text-xs text-gray-500">إغلاق اللوحة</button>
    </div>

            const name = prompt("مرحباً بك! أدخل اسمك للتسجيل:");
            if(name) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('user-display-name').innerText = name;
                const randomID = Math.floor(10000000 + Math.random() * 90000000);
                document.getElementById('my-id').innerText = randomID;
            }
        }

        }
