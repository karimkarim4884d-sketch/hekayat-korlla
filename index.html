const express = require('express');
const app = express();

app.get('/', (req, res) => {
  res.send(`
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هجمة ولقطة - تحديث السيرفرات</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  body { background: #000; color: #fff; font-family: Arial; text-align: center; margin: 0; padding-bottom: 50px; direction: rtl; }
  h1 { background: red; padding: 15px; margin: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 10px rgba(255,0,0,0.5); }
  
  /* خانة التحديث الجديدة */
  .update-section {
    background: #1a1a1a;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    border: 1px dashed red;
  }
  
  .refresh-btn {
    background: #28a745;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  .refresh-btn:active { transform: scale(0.9); background: #218838; }

  .servers-container { 
    display: grid; 
    grid-template-columns: repeat(4, 1fr); 
    gap: 8px; 
    padding: 10px; 
    max-height: 400px; 
    overflow-y: auto; 
    background: #111;
    margin: 10px;
    border-radius: 10px;
  }
  
  .servers-container button {
    padding: 12px 5px;
    background: #333;
    border: 1px solid #444;
    color: white;
    font-size: 11px;
    border-radius: 5px;
  }
  .servers-container button:hover { background: red; }
  
  #player { background: #111; min-height: 250px; margin: 10px 0; border: 2px solid #222; }
  video, iframe { width: 100%; height: 350px; border: none; }
  
  .status-dot { height: 10px; width: 10px; background-color: #28a745; border-radius: 50%; display: inline-block; margin-left: 5px; }
</style>
</head>
<body>

<h1>🔥 هجمة ولقطة 🔥</h1>

<div id="player">
  <h2 style="color: #555; padding-top: 100px;">اختر سيرفر للمشاهدة ⚽</h2>
</div>

<!-- خانة تحديث السيرفرات -->
<div class="update-section">
  <span class="status-dot"></span>
  <span>حالة السيرفرات: متصلة</span>
  <br><br>
  <button class="refresh-btn" onclick="updateServers()">🔄 تحديث قائمة السيرفرات</button>
  <p id="update-msg" style="font-size: 12px; color: #888; margin-top: 8px;"></p>
</div>

<div class="servers-container" id="serversList">
  <!-- السيرفرات بتتحمل هنا -->
</div>

<script>
const baseLinks = [
  "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
  "https://test-streams.mux.dev/test_001/stream.m3u8",
  "https://www.youtube.com/embed/aqz-KE-bpKQ",
  "https://www.youtube.com/embed/yBcrrpetg4Y"
];

function loadServers() {
  const serversListDiv = document.getElementById('serversList');
  serversListDiv.innerHTML = ""; // مسح القائمة الحالية
  
  for (let i = 1; i <= 100; i++) {
    const btn = document.createElement('button');
    btn.innerHTML = "سيرفر " + i;
    const link = baseLinks[(i - 1) % baseLinks.length];
    btn.onclick = () => play(link, i);
    serversListDiv.appendChild(btn);
  }
}

function updateServers() {
  const msg = document.getElementById('update-msg');
  msg.innerText = "جاري جلب روابط جديدة...";
  
  // حركية بسيطة للإيهام بالتحديث
  setTimeout(() => {
    loadServers();
    const now = new Date();
    msg.innerText = "تم التحديث بنجاح في: " + now.toLocaleTimeString('ar-EG');
    msg.style.color = "#28a745";
  }, 1500);
}

function play(url, num) {
  const player = document.getElementById("player");
  player.innerHTML = '<div style="padding: 100px;">جاري تشغيل سيرفر ' + num + '...</div>';
  
  setTimeout(() => {
    if (url.includes(".m3u8")) {
      player.innerHTML = '<video id="video" controls autoplay></video>';
      const video = document.getElementById("video");
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
      } else {
        video.src = url;
      }
    } else {
      player.innerHTML = '<iframe src="' + url + '" allowfullscreen></iframe>';
    }
  }, 500);
}

// تشغيل القائمة أول ما الصفحة تفتح
loadServers();
</script>

</body>
</html>
  `);
});

app.listen(3000, '0.0.0.0', () => {
  console.log("🚀 السيرفر شغال!");
});
