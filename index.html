<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema | حكايات كورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .zack-gradient { background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        .match-card:hover { transform: scale(1.02); transition: 0.3s; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass p-4 sticky top-0 z-50 flex justify-between items-center px-6">
        <h1 class="text-2xl font-bold zack-gradient bg-clip-text text-transparent">Zack Cinema</h1>
        <div id="auth-section">
            <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-xl transition font-bold shadow-lg">
                <i class="fab fa-google ml-2"></i> دخول بجوجل
            </button>
            <button id="logout-btn" class="bg-red-500/20 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-xl transition hidden">خروج</button>
        </div>
    </nav>

    <main class="p-6 max-w-4xl mx-auto">
        <div id="user-card" class="glass p-6 rounded-2xl mb-8 hidden shadow-2xl border-blue-500/30">
            <div class="flex items-center gap-4 mb-4">
                <img id="user-img" src="" class="w-16 h-16 rounded-full border-2 border-blue-500 shadow-blue-500/50">
                <div>
                    <h2 id="user-name" class="text-xl font-bold"></h2>
                    <p id="user-email" class="text-blue-400 text-xs opacity-70"></p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-800/50 p-3 rounded-xl text-center border border-white/5">
                    <p class="text-gray-400 text-xs mb-1">نقاطك</p>
                    <p id="user-points" class="text-yellow-400 font-bold text-xl">0</p>
                </div>
                <div class="bg-slate-800/50 p-3 rounded-xl text-center border border-white/5">
                    <p class="text-gray-400 text-xs mb-1">الرتبة</p>
                    <p class="text-green-400 font-bold">عضو ذهبي</p>
                </div>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fas fa-futbol text-blue-500 animate-bounce"></i> مباريات اليوم الهامة
            </h3>
            <div id="matches-list" class="grid gap-4">
                <div class="match-card glass p-4 rounded-xl flex justify-between items-center border-r-4 border-blue-500">
                    <div class="flex flex-col items-center w-1/3">
                        <span class="font-bold">ريال مدريد</span>
                    </div>
                    <div class="text-center bg-blue-600/20 px-4 py-1 rounded-full text-blue-400 font-mono">
                        21:00
                    </div>
                    <div class="flex flex-col items-center w-1/3">
                        <span class="font-bold">برشلونة</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyB...", // تأكد من وضع مفتاحك هنا
            authDomain: "zack-cinema.firebaseapp.com",
            projectId: "zack-cinema",
            storageBucket: "zack-cinema.appspot.com",
            messagingSenderId: "364303491410",
            appId: "1:364303491410:web:96e838e4a9e87510793138"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userCard = document.getElementById('user-card');

        // دالة تسجيل الدخول
        loginBtn.onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                // حفظ بيانات المستخدم في Firestore لأول مرة
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                
                if (!snap.exists()) {
                    await setDoc(userRef, {
                        name: user.displayName,
                        email: user.email,
                        photo: user.photoURL,
                        points: 10, // هدية تسجيل الدخول
                        joinedAt: new Date()
                    });
                }
                console.log("تم الدخول بنجاح");
            } catch (error) {
                console.error("خطأ في الدخول:", error);
                alert("فشل تسجيل الدخول، حاول مرة أخرى.");
            }
        };

        // دالة الخروج
        logoutBtn.onclick = () => signOut(auth);

        // مراقبة حالة المستخدم (Login/Logout)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                userCard.classList.remove('hidden');
                
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-img').src = user.photoURL;
                document.getElementById('user-email').innerText = user.email;

                // جلب النقاط من الداتابيز
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    document.getElementById('user-points').innerText = snap.data().points;
                }
            } else {
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                userCard.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
