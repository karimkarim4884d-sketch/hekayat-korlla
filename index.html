<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema | حكايات كورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .zack-gradient { background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        .whatsapp-btn { background-color: #25D366; transition: 0.3s; }
        .whatsapp-btn:hover { background-color: #128C7E; transform: translateY(-2px); }
        .telegram-btn { background-color: #0088cc; transition: 0.3s; }
        .telegram-btn:hover { background-color: #006699; transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass p-4 sticky top-0 z-50 flex justify-between items-center px-6 shadow-xl">
        <h1 class="text-2xl font-bold zack-gradient bg-clip-text text-transparent">Zack Cinema</h1>
        <div id="auth-section">
            <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-xl transition font-bold shadow-lg flex items-center gap-2">
                <i class="fab fa-google text-sm"></i> دخول بجوجل
            </button>
            <button id="logout-btn" class="bg-red-500/20 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-xl transition hidden">خروج</button>
        </div>
    </nav>

    <main class="p-6 max-w-4xl mx-auto">
        
        <div id="user-card" class="glass p-6 rounded-2xl mb-8 hidden shadow-2xl border-blue-500/30">
            <div class="flex items-center gap-4 mb-6">
                <img id="user-img" src="" class="w-16 h-16 rounded-full border-2 border-blue-500 shadow-blue-500/50">
                <div>
                    <h2 id="user-name" class="text-xl font-bold"></h2>
                    <p id="user-email" class="text-blue-400 text-xs opacity-70"></p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                <div class="bg-slate-800/50 p-4 rounded-xl border border-white/5">
                    <p class="text-gray-400 text-xs mb-1 uppercase tracking-wider">نقاطك</p>
                    <p id="user-points" class="text-yellow-400 font-bold text-2xl">0</p>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-xl border border-white/5">
                    <p class="text-gray-400 text-xs mb-1 uppercase tracking-wider">سعر الاشتراك</p>
                    <p class="text-green-400 font-bold text-xl">10 ج.م <span class="text-xs text-gray-400">/ شهر</span></p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                <a href="https://wa.me/201040077271?text=أهلاً زاك، أريد تفعيل اشتراكي في حكايات كورة" target="_blank" class="whatsapp-btn flex items-center justify-center gap-3 py-3 rounded-xl font-bold text-white shadow-lg">
                    <i class="fab fa-whatsapp text-2xl"></i> الدعم الفني
                </a>
                <a href="https://t.me/+NAPc7AALNTI4MmE0" target="_blank" class="telegram-btn flex items-center justify-center gap-3 py-3 rounded-xl font-bold text-white shadow-lg">
                    <i class="fab fa-telegram-plane text-2xl"></i> قناة التليجرام
                </a>
            </div>

            <div class="bg-blue-600/10 p-4 rounded-xl border border-blue-500/20 text-center">
                <p class="text-sm text-blue-200 mb-2">هل قمت بالتحويل؟ أرسل صورة التحويل للدعم لتفعيل حسابك فوراً.</p>
                <button onclick="window.open('https://wa.me/201040077271', '_blank')" class="text-blue-400 font-bold underline">إرسال إثبات الدفع</button>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                <i class="fas fa-play-circle text-blue-500"></i> محتوى حكايات كورة
            </h3>
            <div id="matches-list" class="grid gap-4">
                <div class="glass p-6 rounded-2xl flex flex-col items-center justify-center text-center border-dashed border-2 border-white/10">
                    <i class="fas fa-lock text-4xl mb-3 text-gray-600"></i>
                    <p class="text-gray-400 italic font-light">سجل دخولك أو اشترك لتتمكن من مشاهدة المباريات والقصص الحصرية</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB...", // كود الـ API الخاص بك
            authDomain: "zack-cinema.firebaseapp.com",
            projectId: "zack-cinema",
            storageBucket: "zack-cinema.appspot.com",
            messagingSenderId: "364303491410",
            appId: "1:364303491410:web:96e838e4a9e87510793138"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userCard = document.getElementById('user-card');

        loginBtn.onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                
                if (!snap.exists()) {
                    await setDoc(userRef, {
                        name: user.displayName,
                        email: user.email,
                        photo: user.photoURL,
                        points: 10, // هدية ترحيبية
                        status: 'مستخدم جديد',
                        joinedAt: new Date()
                    });
                }
            } catch (error) { console.error("Login Error:", error); }
        };

        logoutBtn.onclick = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                userCard.classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-img').src = user.photoURL;
                document.getElementById('user-email').innerText = user.email;

                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    document.getElementById('user-points').innerText = snap.data().points;
                }
            } else {
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                userCard.classList.add('hidden');
            }
        });
    </script>
</body>
                </html>
