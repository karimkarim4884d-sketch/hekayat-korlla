<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة 2026</title>
    <style>
        :root {
            --bg-dark: #0f172a; --bg-card: #1e293b; --accent: #00bfff;
            --text-main: #ffffff; --text-dim: #94a3b8; --live-red: #ef4444;
        }
        body.light-mode {
            --bg-dark: #f1f5f9; --bg-card: #ffffff; --text-main: #0f172a;
            --text-dim: #64748b; --nav-bg: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body { background: var(--bg-dark); color: var(--text-main); padding-bottom: 70px; }

        /* الهيدر */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--bg-dark); position: sticky; top: 0; z-index: 100; }
        .top-icons { display: flex; gap: 15px; align-items: center; }
        .icon-btn { font-size: 1.2rem; cursor: pointer; color: var(--text-main); }
        .current-date { font-size: 0.85rem; color: var(--accent); font-weight: bold; }

        /* الصفحات */
        .page-content { display: none; padding: 10px; }
        .page-content.active { display: block; }

        /* كروت المباراة */
        .match-card { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .team-box img { width: 35px; height: 35px; }

        /* قسم المزيد الجديد */
        .login-box { background: var(--bg-card); padding: 25px; border-radius: 15px; margin-bottom: 15px; text-align: center; border: 1px solid rgba(0,191,255,0.2); }
        .entry-btn { background: var(--accent); border: none; color: white; padding: 10px 40px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .setting-item { background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; padding: 16px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; }
        .support-green { background: #22c55e !important; color: white; justify-content: center !important; font-weight: bold; text-decoration: none; }

        /* القائمة السفلية */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg-card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 0.7rem; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 3px; }

        /* نافذة التقويم */
        #calendar-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-card); padding: 20px; border-radius: 15px; z-index: 2000; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .close-btn { float: left; cursor: pointer; color: var(--live-red); }
        input[type="date"] { background: var(--bg-dark); color: white; border: 1px solid var(--accent); padding: 10px; border-radius: 5px; width: 100%; }

        /* التبديل (Switch) */
        .switch { position: relative; display: inline-block; width: 45px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="top-bar">
        <div class="top-icons">
            <i class="fas fa-search icon-btn"></i>
            <i class="fas fa-calendar-alt icon-btn" onclick="document.getElementById('calendar-modal').style.display='block'"></i>
            <span class="current-date" id="header-date">2026/03/22</span>
        </div>
        <img src="https://i.ibb.co/v4m0ZqH/logo.png" style="height: 35px; border-radius: 5px;" alt="Logo">
    </div>

    <!-- التقويم -->
    <div id="calendar-modal">
        <span class="close-btn" onclick="this.parentElement.style.display='none'">إغلاق X</span>
        <h3 style="margin-bottom:15px">اختر تاريخ (2026)</h3>
        <input type="date" id="date-picker" min="2026-01-01" max="2026-12-31" onchange="updateDate(this.value)">
    </div>

    <!-- صفحة المباريات -->
    <div id="matches-page" class="page-content active">
        <div id="matches-list"><p style="text-align:center; padding:20px;">جاري جلب مباريات اليوم...</p></div>
    </div>

    <!-- صفحة المزيد -->
    <div id="more-page" class="page-content">
        <div class="login-box">
            <p style="margin-bottom:15px; font-size:0.9rem;">أهلاً بك في هجمة ولقطة</p>
            <button class="entry-btn" onclick="alert('جاري التحويل لصفحة التسجيل...')">دخول</button>
        </div>

        <div class="setting-item">
            <span>اللغة</span>
            <select style="background:none; color:var(--accent); border:none; font-weight:bold;">
                <option>العربية</option><option>English</option><option>Français</option><option>Español</option>
            </select>
        </div>

        <div class="setting-item">
            <span>الوضع (فاتح / ليلي / تلقائي)</span>
            <label class="switch">
                <input type="checkbox" id="theme-toggle" onclick="toggleTheme()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item">
            <span>الإشعارات</span>
            <div style="display:flex; align-items:center; gap:10px;">
                <span id="notif-status" style="font-size:0.8rem; color:var(--text-dim)">تفعيل</span>
                <label class="switch">
                    <input type="checkbox" onchange="document.getElementById('notif-status').innerText = this.checked ? 'مفعلة' : 'معطلة'">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <a href="https://wa.me/201040077271" class="setting-item support-green">خدمة العملاء (واتساب)</a>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('matches-page', this)"><i class="fas fa-volleyball-ball"></i>المباريات</div>
        <div class="nav-item"><i class="fas fa-newspaper"></i>الأخبار</div>
        <div class="nav-item"><i class="fas fa-exchange-alt"></i>الانتقالات</div>
        <div class="nav-item"><i class="fas fa-list-ol"></i>الترتيب</div>
        <div class="nav-item" onclick="showPage('more-page', this)"><i class="fas fa-ellipsis-h"></i>المزيد</div>
    </nav>

<script>
    const API_KEY = "bf7d42ac856fecc0e1e6ad24debe9c5e";

    function showPage(pageId, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        // إذا كان التليفون أبيض (Light) أو أسود يتم التبديل يدوياً هنا
    }

    function updateDate(val) {
        document.getElementById('header-date').innerText = val.replace(/-/g, '/');
        document.getElementById('calendar-modal').style.display = 'none';
        alert("سيتم عرض مباريات تاريخ: " + val);
    }

    async function fetchMatches() {
        try {
            const res = await fetch(`https://api.football-data.org/v4/matches`, { headers: { 'X-Auth-Token': API_KEY } });
            const data = await res.json();
            const list = document.getElementById('matches-list');
            list.innerHTML = data.matches.slice(0, 10).map(m => `
                <div class="match-card">
                    <div class="team-box"><img src="${m.homeTeam.crest}"><span style="display:block; font-size:0.7rem">${m.homeTeam.shortName}</span></div>
                    <div style="text-align:center">
                        <span style="font-size:0.6rem; color:var(--accent)">${m.status === 'IN_PLAY' ? 'مباشر' : 'لم تبدأ'}</span>
                        <div style="font-size:1.2rem; font-weight:bold">${m.score.fullTime.home ?? 0} - ${m.score.fullTime.away ?? 0}</div>
                    </div>
                    <div class="team-box"><img src="${m.awayTeam.crest}"><span style="display:block; font-size:0.7rem">${m.awayTeam.shortName}</span></div>
                </div>
            `).join('');
        } catch (e) { console.log("API Limit"); }
    }

    fetchMatches();
</script>
</body>
                                                  </html>
