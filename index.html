<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة - برو</title>
    <style>
        :root {
            --dark-bg: #000c16;
            --card-bg: #001e33;
            --accent-orange: #ff6b35;
            --text-white: #ffffff;
            --light-blue: #00bfff;
            --star-color: #ffc107;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        body { background: var(--dark-bg); color: var(--text-white); padding-bottom: 80px; }

        /* ضبط اللوجو والهيدر */
        header { 
            display: flex; align-items: center; justify-content: center; 
            gap: 12px; padding: 15px; background: var(--card-bg);
            border-bottom: 2px solid var(--accent-orange);
        }
        
        .logo-wrap {
            width: 50px; height: 50px; border-radius: 50%; 
            border: 2px solid var(--accent-orange); overflow: hidden;
            background: #fff; display: flex; align-items: center; justify-content: center;
        }
        .logo-img { width: 85%; height: 85%; object-fit: contain; }

        /* قسم المفضلات */
        .fav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .fav-item { 
            background: var(--card-bg); padding: 10px; border-radius: 12px; 
            text-align: center; border: 1px solid #004d99; position: relative;
        }
        .fav-item img { width: 40px; height: 40px; margin-bottom: 5px; }
        .fav-item .remove-fav { position: absolute; top: 5px; right: 5px; color: #ff4d4d; font-size: 12px; }

        /* كارت المباراة */
        .match-card {
            background: var(--card-bg); border-radius: 15px; padding: 15px;
            margin: 10px 15px; display: flex; align-items: center;
            justify-content: space-between; border-right: 4px solid var(--light-blue);
        }
        .team-box { flex: 1; text-align: center; position: relative; }
        .team-box img { width: 40px; height: 40px; }
        .star-icon { position: absolute; top: -10px; right: 0; font-size: 1.2rem; color: #444; cursor: pointer; }
        .star-icon.active { color: var(--star-color); }

        .score { font-size: 1.5rem; font-weight: bold; color: var(--light-blue); min-width: 50px; text-align: center; }

        /* التبويب السفلي */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #000;
            display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222;
        }
        .nav-link { color: #888; text-decoration: none; font-size: 0.7rem; text-align: center; }
        .nav-link.active { color: var(--light-blue); }

        .section { display: none; padding-top: 10px; }
        .section.active { display: block; }
        
        .history-title { padding: 10px 15px; color: var(--accent-orange); font-size: 0.9rem; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <div class="logo-wrap">
        <img src="https://i.ibb.co/LzNfXpY/ball-icon.png" class="logo-img">
    </div>
    <h1 style="font-size: 1.4rem;">هجمة ولقطة ⭐</h1>
</header>

<div id="main-sec" class="section active">
    <div id="matches-list"></div>
</div>

<div id="fav-sec" class="section">
    <h3 style="margin: 15px;">⭐ فرقك المفضلة</h3>
    <div id="fav-grid" class="fav-grid"></div>
    <div id="fav-history"></div>
</div>

<nav class="nav-bar">
    <div class="nav-link active" onclick="switchSec('main-sec', this)"><div>⚽</div><div>المباريات</div></div>
    <div class="nav-link" onclick="switchSec('fav-sec', this)"><div>⭐</div><div>المفضلة</div></div>
</nav>

<script>
const API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
let favTeams = JSON.parse(localStorage.getItem('myFavs')) || [];

function switchSec(id, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
    if(id === 'fav-sec') renderFavs();
}

async function loadHome() {
    const res = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, {
        headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
    });
    const data = await res.json();
    const list = document.getElementById('matches-list');
    list.innerHTML = '';
    data.response.slice(0, 20).forEach(m => {
        const isHomeFav = favTeams.some(f => f.id === m.teams.home.id);
        const isAwayFav = favTeams.some(f => f.id === m.teams.away.id);
        
        list.innerHTML += `
            <div class="match-card">
                <div class="team-box">
                    <span class="star-icon ${isHomeFav?'active':''}" onclick="toggleFav(${m.teams.home.id}, '${m.teams.home.name}', '${m.teams.home.logo}')">★</span>
                    <img src="${m.teams.home.logo}">
                    <p style="font-size:0.7rem">${m.teams.home.name}</p>
                </div>
                <div class="score">${m.goals.home} - ${m.goals.away}</div>
                <div class="team-box">
                    <span class="star-icon ${isAwayFav?'active':''}" onclick="toggleFav(${m.teams.away.id}, '${m.teams.away.name}', '${m.teams.away.logo}')">★</span>
                    <img src="${m.teams.away.logo}">
                    <p style="font-size:0.7rem">${m.teams.away.name}</p>
                </div>
            </div>`;
    });
}

function toggleFav(id, name, logo) {
    const idx = favTeams.findIndex(t => t.id === id);
    if(idx === -1) favTeams.push({id, name, logo});
    else favTeams.splice(idx, 1);
    localStorage.setItem('myFavs', JSON.stringify(favTeams));
    loadHome();
}

function renderFavs() {
    const grid = document.getElementById('fav-grid');
    grid.innerHTML = favTeams.length ? '' : '<p style="padding:20px">لا يوجد فرق في المفضلة</p>';
    favTeams.forEach(t => {
        grid.innerHTML += `
            <div class="fav-item" onclick="getHistory(${t.id}, '${t.name}')">
                <img src="${t.logo}">
                <p style="font-size:0.7rem">${t.name}</p>
            </div>`;
    });
}

async function getHistory(teamId, teamName) {
    const histDiv = document.getElementById('fav-history');
    histDiv.innerHTML = `<p style="padding:15px">⏳ جاري جلب مباريات ${teamName}...</p>`;
    const res = await fetch(`https://v3.football.api-sports.io/fixtures?team=${teamId}&last=10`, {
        headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
    });
    const data = await res.json();
    histDiv.innerHTML = `<div class="history-title">آخر 10 مباريات لـ ${teamName}:</div>`;
    data.response.forEach(m => {
        histDiv.innerHTML += `
            <div class="match-card" style="border-right-color: #555; opacity: 0.9;">
                <div class="team-box"><img src="${m.teams.home.logo}"><p>${m.teams.home.name}</p></div>
                <div class="score">${m.goals.home} - ${m.goals.away}</div>
                <div class="team-box"><img src="${m.teams.away.logo}"><p>${m.teams.away.name}</p></div>
            </div>`;
    });
}

loadHome();
</script>
</body>
</html>
