<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة</title>
    <style>
        :root {
            --dark-bg: #001220;
            --card-bg: #003366;
            --accent-orange: #ff6b35;
            --text-white: #ffffff;
            --light-blue: #00bfff;
            --goal-bg: #004d99;
            --nav-bg: #000c16;
            --star-gold: #ffc107;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        input { user-select: text !important; }

        body { background: var(--dark-bg); color: var(--text-white); padding-bottom: 90px; overflow-x: hidden; }

        header { 
            display: flex; align-items: center; justify-content: center; 
            gap: 12px; padding: 20px; color: var(--accent-orange);
            background: var(--nav-bg); border-bottom: 2px solid var(--accent-orange);
        }
        
        .logo-wrap { width: 50px; height: 50px; border-radius: 12px; border: 1px solid var(--accent-orange); overflow: hidden; background: #fff; }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }

        .search-area { max-width: 500px; margin: 15px; }
        .search-box { display: flex; background: white; border-radius: 12px; overflow: hidden; border: 2px solid var(--accent-orange); }
        .search-box input { flex: 1; padding: 12px; border: none; outline: none; text-align: right; color: #333; }
        .search-box button { padding: 0 15px; background: var(--accent-orange); border: none; color: white; }

        .tabs { display: flex; gap: 8px; margin: 0 15px 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #002a4d; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .tab-btn.active { background: var(--accent-orange); box-shadow: 0 0 10px var(--accent-orange); }

        .section-container { display: none; padding: 0 15px; }
        .section-container.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .league-title { text-align: center; color: var(--light-blue); margin: 20px 0 10px; font-weight: bold; background: rgba(0,191,255,0.1); padding: 8px; border-radius: 5px; font-size: 0.8rem; }

        .match-card {
            background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
            border-right: 4px solid var(--light-blue); position: relative;
        }

        .team { flex: 2; display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; }
        .team img { width: 40px; height: 40px; object-fit: contain; }
        .team span { font-size: 0.75rem; font-weight: bold; text-align: center; }

        .star-icon { position: absolute; top: -10px; right: 0; color: #555; font-size: 1.2rem; cursor: pointer; }
        .star-icon.active { color: var(--star-gold); text-shadow: 0 0 5px var(--star-gold); }

        .score-box { background: var(--goal-bg); color: white; min-width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: bold; border: 1px solid var(--light-blue); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 0.7rem; cursor: pointer; }
        .nav-item.active { color: var(--light-blue); }

        .placeholder-card { background: var(--card-bg); padding: 25px; border-radius: 12px; text-align: center; border: 1px dashed var(--light-blue); margin-top: 15px; }

        /* ستايل الإعدادات */
        .setting-item { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .wa-btn { background: #25d366; color: white; padding: 12px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: bold; justify-content: center; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo-wrap"><img src="https://i.ibb.co/LzNfXpY/ball-icon.png" class="logo-img"></div>
    <h1>هجمة ولقطة</h1>
</header>

<div id="matches-section" class="section-container active">
    <div class="search-area">
        <div class="search-box"><input type="text" id="searchInput" placeholder="ابحث عن مباراة أو فريق..." oninput="filterData()"><button>🔍</button></div>
    </div>
    <div class="tabs">
        <button class="tab-btn" onclick="getMatches(-1, this)">الأمس</button>
        <button class="tab-btn active" onclick="getMatches(0, this)">اليوم</button>
        <button class="tab-btn" onclick="getMatches(1, this)">الغد</button>
    </div>
    <div id="matches-list"></div>
</div>

<div id="standings-section" class="section-container">
    <h3 style="color:var(--light-blue)">📊 الترتيب</h3>
    <div class="placeholder-card">جاري العمل على جداول الدوريات...</div>
</div>

<div id="fav-section" class="section-container">
    <h3 style="color:var(--light-blue)">⭐ المفضلات</h3>
    <div id="fav-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top:15px;"></div>
    <div id="fav-history-area" style="margin-top:20px;"></div>
</div>

<div id="settings-section" class="section-container">
    <h3 style="color:var(--light-blue); margin-bottom:15px;">⚙️ الإعدادات</h3>
    <div class="setting-item"><span>اللغة</span><span>العربية</span></div>
    <div class="setting-item"><span>وضع التطبيق</span><span>داكن</span></div>
    <div class="setting-item"><span>الإشعارات</span><span>تعمل</span></div>
    
    <a href="https://wa.me/201040077271" class="wa-btn">
        💬 الدعم الفني عبر واتساب
    </a>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showSection('matches-section', this)"><span>⚽</span><span>المباريات</span></div>
    <div class="nav-item" onclick="showSection('standings-section', this)"><span>📊</span><span>الترتيب</span></div>
    <div class="nav-item" onclick="showSection('fav-section', this)"><span>⭐</span><span>مفضلتي</span></div>
    <div class="nav-item" onclick="showSection('settings-section', this)"><span>⚙️</span><span>الإعدادات</span></div>
</nav>

<script>
const API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
// قائمة الدوريات الكبرى لفلترة الماتشات المهمة
const importantLeagues = [39, 140, 135, 78, 61, 2, 3, 848, 480, 202, 1, 4, 307];
let currentMatches = [];
let favTeams = JSON.parse(localStorage.getItem('myFavs')) || [];

function showSection(id, el) {
    document.querySelectorAll('.section-container').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
    if(id === 'fav-section') renderFavs();
}

async function getMatches(offset, btn) {
    if(btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    const d = new Date(); d.setDate(d.getDate() + offset);
    const dateStr = d.toLocaleDateString('en-CA');
    const list = document.getElementById('matches-list');
    list.innerHTML = '<div class="placeholder-card">⏳ جاري تحميل الماتشات المهمة...</div>';

    try {
        const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateStr}`, {
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const json = await res.json();
        // فلترة المباريات لتكون للدوريات المهمة فقط
        currentMatches = json.response.filter(m => importantLeagues.includes(m.league.id));
        if(currentMatches.length === 0) currentMatches = json.response.slice(0, 15);
        render(currentMatches);
    } catch (e) { list.innerHTML = "⚠️ خطأ في الاتصال"; }
}

function render(data) {
    const list = document.getElementById('matches-list');
    list.innerHTML = '';
    data.forEach(m => {
        const isHomeFav = favTeams.some(f => f.id === m.teams.home.id);
        const isAwayFav = favTeams.some(f => f.id === m.teams.away.id);
        list.innerHTML += `
            <div class="league-title">🏆 ${m.league.name}</div>
            <div class="match-card">
                <div class="team">
                    <span class="star-icon ${isHomeFav?'active':''}" onclick="toggleFav(${m.teams.home.id}, '${m.teams.home.name}', '${m.teams.home.logo}')">★</span>
                    <img src="${m.teams.home.logo}"><span>${m.teams.home.name}</span>
                </div>
                <div class="score-box">${m.goals.home ?? '-'}</div>
                <div style="font-size:0.7rem; color:var(--accent-orange)">VS</div>
                <div class="score-box">${m.goals.away ?? '-'}</div>
                <div class="team">
                    <span class="star-icon ${isAwayFav?'active':''}" onclick="toggleFav(${m.teams.away.id}, '${m.teams.away.name}', '${m.teams.away.logo}')">★</span>
                    <img src="${m.teams.away.logo}"><span>${m.teams.away.name}</span>
                </div>
            </div>`;
    });
}

function toggleFav(id, name, logo) {
    const idx = favTeams.findIndex(t => t.id === id);
    if(idx === -1) favTeams.push({id, name, logo});
    else favTeams.splice(idx, 1);
    localStorage.setItem('myFavs', JSON.stringify(favTeams));
    render(currentMatches);
}

function renderFavs() {
    const grid = document.getElementById('fav-grid');
    grid.innerHTML = favTeams.length ? '' : '<p>لا يوجد فرق مفضلة</p>';
    favTeams.forEach(t => {
        grid.innerHTML += `
            <div onclick="getTeamHistory(${t.id}, '${t.name}')" style="background:var(--card-bg); padding:10px; border-radius:10px; text-align:center;">
                <img src="${t.logo}" style="width:35px;"><p style="font-size:0.6rem;">${t.name}</p>
            </div>`;
    });
}

async function getTeamHistory(teamId, teamName) {
    const area = document.getElementById('fav-history-area');
    area.innerHTML = `<h4 style="color:var(--accent-orange)">⏳ مباريات ${teamName}:</h4>`;
    try {
        const res = await fetch(`https://v3.football.api-sports.io/fixtures?team=${teamId}&last=10`, {
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const json = await res.json();
        json.response.forEach(m => {
            area.innerHTML += `
                <div class="match-card" style="border-right-color:#555">
                    <div class="team"><img src="${m.teams.home.logo}"><span>${m.teams.home.name}</span></div>
                    <div class="score-box">${m.goals.home}</div>
                    <div class="score-box">${m.goals.away}</div>
                    <div class="team"><img src="${m.teams.away.logo}"><span>${m.teams.away.name}</span></div>
                </div>`;
        });
    } catch(e) { area.innerHTML = "خطأ في تحميل البيانات"; }
}

function filterData() {
    const val = document.getElementById('searchInput').value.toLowerCase();
    const filtered = currentMatches.filter(m => m.teams.home.name.toLowerCase().includes(val) || m.teams.away.name.toLowerCase().includes(val));
    render(filtered);
}

getMatches(0);
</script>
</body>
</html>
