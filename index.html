<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>هجمة ولقطة - الجدول الاحترافي</title>
  <style>
    :root { 
        --primary-red: #8b0000; 
        --dark-blue: #002a4d;
        --bg-gray: #f4f6f8;
        --text-dark: #333;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; }
    body { background: var(--bg-gray); color: var(--text-dark); padding: 5px; }
    
    /* رأس الصفحة */
    header { 
        text-align: center; 
        padding: 15px; 
        background: var(--primary-red); 
        color: white; 
        border-radius: 0 0 15px 15px; 
        margin-bottom: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* نظام الأزرار (أمس - اليوم - غداً) */
    .tabs { 
        display: flex; 
        justify-content: center; 
        gap: 5px; 
        margin: 10px auto; 
        max-width: 500px; 
    }
    .tab-btn { 
        flex: 1; 
        padding: 10px 5px; 
        border: none; 
        border-radius: 5px; 
        cursor: pointer; 
        background: var(--dark-blue); 
        color: white; 
        font-size: 0.9rem;
        font-weight: bold;
        transition: all 0.3s ease;
    }
    .tab-btn.active { background: var(--primary-red); transform: scale(1.05); }

    .match-container { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }

    /* كارت المباراة - مستوحى من طلبك */
    .match-card {
        background: white;
        border-radius: 12px;
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        border: 1px solid #e1e4e8;
    }

    /* الجزء العلوي (الفرق والوقت) */
    .match-main {
        display: grid;
        grid-template-columns: 1fr 0.8fr 1fr;
        align-items: center;
        padding: 15px 10px;
        text-align: center;
    }

    .team-box img { width: 50px; height: 50px; object-fit: contain; }
    .team-name { display: block; margin-top: 8px; font-weight: bold; font-size: 0.85rem; }

    .center-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .match-time { font-size: 1.2rem; font-weight: 800; color: #111; }
    .match-status { 
        font-size: 0.7rem; 
        background: #f0f0f0; 
        padding: 4px 10px; 
        border-radius: 20px; 
        color: #555;
    }
    .live-badge { background: #ff0000; color: white; animation: pulse 1.5s infinite; }

    /* الجزء السفلي (الدوري والقناة) */
    .match-footer {
        background: #f9f9f9;
        padding: 8px 15px;
        border-top: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.75rem;
        color: #666;
    }
    .channel-info { color: #0056b3; font-weight: bold; display: flex; align-items: center; gap: 4px; }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }

    .loading { text-align: center; margin-top: 50px; font-weight: bold; color: var(--dark-blue); }
  </style>
</head>
<body>

<header>
    <h1>⚽ هجمة ولقطة</h1>
</header>

<div class="tabs">
    <button class="tab-btn" id="yesterday-btn" onclick="loadDay(-1, 'yesterday-btn')">مباريات الأمس</button>
    <button class="tab-btn active" id="today-btn" onclick="loadDay(0, 'today-btn')">مباريات اليوم</button>
    <button class="tab-btn" id="tomorrow-btn" onclick="loadDay(1, 'tomorrow-btn')">مباريات الغد</button>
</div>

<div class="match-container" id="matches-list">
    <div class="loading">⏳ جاري تحميل الماتشات...</div>
</div>

<script>
const API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e';

// قاموس ترجمة ذكي للأندية والدوريات والقنوات
const dictionary = {
    // دوريات
    "Premier League": "الدوري الإنجليزي", "La Liga": "الدوري الإسباني", "Serie A": "الدوري الإيطالي",
    "Bundesliga": "الدوري الألماني", "Ligue 1": "الدوري الفرنسي", "UEFA Champions League": "دوري أبطال أوروبا",
    "Egyptian Premier League": "الدوري المصري", "Saudi Pro League": "الدوري السعودي",
    // أندية
    "Real Madrid": "ريال مدريد", "Barcelona": "برشلونة", "Liverpool": "ليفربول", "Manchester City": "مانشستر سيتي",
    "Manchester United": "مانشستر يونايتد", "Arsenal": "أرسنال", "Chelsea": "تشيلسي", "Bayern Munich": "بايرن ميونخ",
    "Paris Saint Germain": "باريس سان جيرمان", "Al Ahly": "الأهلي", "Zamalek": "الزمالك", "Al Hilal": "الهلال", "Al Nassr": "النصر"
};

function getAr(text) { return dictionary[text] || text; }

async function loadDay(offset, btnId) {
    // تحديث شكل الأزرار
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(btnId).classList.add('active');

    const date = new Date();
    date.setDate(date.getDate() + offset);
    const dateStr = date.toISOString().split('T')[0];

    const list = document.getElementById('matches-list');
    list.innerHTML = '<div class="loading">⏳ جاري جلب البيانات...</div>';

    try {
        const response = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateStr}`, {
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const result = await response.json();
        renderMatches(result.response);
    } catch (e) {
        list.innerHTML = '<div class="loading">❌ فشل تحميل البيانات.</div>';
    }
}

function renderMatches(matches) {
    const list = document.getElementById('matches-list');
    list.innerHTML = '';

    if (!matches.length) {
        list.innerHTML = '<div class="loading">لا توجد مباريات متاحة.</div>';
        return;
    }

    matches.forEach(m => {
        const status = m.fixture.status.short;
        const time = new Date(m.fixture.date).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
        
        let statusHtml = `<span class="match-status">لم تبدأ بعد</span>`;
        if (["1H", "2H", "HT"].includes(status)) {
            statusHtml = `<span class="match-status live-badge">🔴 مباشر ${m.goals.home}:${m.goals.away}</span>`;
        } else if (status === "FT") {
            statusHtml = `<span class="match-status">انتهت ${m.goals.home}:${m.goals.away}</span>`;
        }

        // محاكاة القناة الناقلة (لأن الـ API لا يوفرها دائماً بشكل مباشر في الخطة المجانية)
        // سنستخدم اسم الملعب أو القناة الافتراضية بناءً على الدوري
        let channel = "بي إن سبورت 1"; 
        if(m.league.name.includes("Premier")) channel = "بي إن سبورت 2";
        if(m.league.name.includes("Saudi")) channel = "SSC HD";

        list.innerHTML += `
            <div class="match-card">
                <div class="match-main">
                    <div class="team-box">
                        <img src="${m.teams.home.logo}" alt="logo">
                        <span class="team-name">${getAr(m.teams.home.name)}</span>
                    </div>
                    
                    <div class="center-box">
                        <div class="match-time">${time}</div>
                        ${statusHtml}
                    </div>

                    <div class="team-box">
                        <img src="${m.teams.away.logo}" alt="logo">
                        <span class="team-name">${getAr(m.teams.away.name)}</span>
                    </div>
                </div>

                <div class="match-footer">
                    <span>🏆 ${getAr(m.league.name)}</span>
                    <span class="channel-info">📺 ${channel}</span>
                </div>
            </div>
        `;
    });
}

// تشغيل عند الفتح
loadDay(0, 'today-btn');
</script>

</body>
</html>
