<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACK SMM</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif;">

    <div id="login-screen" style="margin-top:100px;">
        <h2>تسجيل دخول ZACK</h2>
        <input type="number" id="phone" placeholder="رقم الموبايل" style="padding:10px; margin:10px; border-radius:5px;"><br>
        <input type="password" id="pass" placeholder="كلمة المرور" style="padding:10px; margin:10px; border-radius:5px;"><br>
        <button onclick="login()" style="background:#faff00; color:#000; padding:10px 20px; border:none; font-weight:bold; cursor:pointer;">دخول</button>
    </div>

    <div id="dashboard" style="display:none; margin-top:100px;">
        <h1>رصيدك الحالي: <span id="balance" style="color:#faff00;">$0.00</span></h1>
        <button onclick="location.reload()" style="background:#faff00; color:#000; padding:5px 15px; border:none; margin-top:20px;">خروج</button>
    </div>

    <script>
        // دي بياناتك اللي إنت لسه باعتها يا زاك
        const firebaseConfig = {
            apiKey: "AIzaSyAubyhMKRbUApvTtIpDVo5JbRFIeoEyT-o",
            authDomain: "mmss-242e6.firebaseapp.com",
            databaseURL: "https://mmss-242e6-default-rtdb.firebaseio.com",
            projectId: "mmss-242e6",
            storageBucket: "mmss-242e6.firebasestorage.app",
            messagingSenderId: "767920291158",
            appId: "1:767920291158:web:123f4c49df0b31e7316af7"
        };

        // تشغيل الفايربيس
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function login() {
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('pass').value;
            const email = phone + "@zack.com"; // بنعمل إيميل وهمي برقمك

            if(phone == "" || pass.length < 6) { alert("اكتب رقمك وباسورد أكتر من 6 أرقام"); return; }

            // محاولة الدخول أو التسجيل لو جديد
            auth.signInWithEmailAndPassword(email, pass)
            .then((user) => { loadData(user.user.uid); })
            .catch(() => {
                auth.createUserWithEmailAndPassword(email, pass)
                .then((user) => {
                    db.ref('users/' + user.user.uid).set({ balance: 0 }); // بنصفر رصيده أول مرة
                    loadData(user.user.uid);
                }).catch(err => alert("خطأ: " + err.message));
            });
        }

        function loadData(uid) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            // سحب الرصيد من قاعدة البيانات اللي إنت فتحتها
            db.ref('users/' + uid + '/balance').on('value', (snapshot) => {
                const bal = snapshot.val() || 0;
                document.getElementById('balance').innerText = "$" + bal.toFixed(2);
            });
        }
    </script>
</body>
</html>
