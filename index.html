<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة - Zack</title>
    <style>
        :root {
            --dark-bg: #0b1118;
            --card-bg: #1a222d;
            --accent-cyan: #00f2ff;
            --accent-green: #00ff88;
            --accent-red: #ff4d4d;
            --text-gray: #a0aab2;
            --nav-active: #00f2ff;
        }

        body.light-mode { --dark-bg: #f5f5f5; --card-bg: #ffffff; color: #111; }
        body.large-font { font-size: 1.3rem; }
        body.small-font { font-size: 0.85rem; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: white; padding-bottom: 75px; transition: 0.3s; overflow-x: hidden; }

        .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: var(--dark-bg); position: sticky; top: 0; z-index: 1000; }
        .top-icons { display: flex; gap: 20px; align-items: center; }
        .icon-btn { color: white; font-size: 1.3rem; background: none; border: none; cursor: pointer; }
        .logo-small { height: 30px; }
        
        .time-tabs { display: flex; justify-content: space-around; background: var(--card-bg); padding: 10px 0; border-bottom: 1px solid #1e2732; }
        .time-tab { color: var(--text-gray); font-size: 0.9rem; font-weight: bold; cursor: pointer; padding: 5px 15px; border-radius: 15px; transition: 0.3s; }
        .time-tab.active { background: var(--accent-cyan); color: #000; }

        .date-display { text-align: center; padding: 10px; color: var(--text-gray); font-size: 0.8rem; }

        .section-container { display: none; padding: 10px; min-height: 80vh; }
        .section-container.active { display: block; }

        .league-header { padding: 15px 10px 5px; color: var(--accent-cyan); font-size: 0.9rem; font-weight: bold; border-right: 3px solid var(--accent-cyan); margin-bottom: 5px; }
        .match-row { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .team-box { display: flex; align-items: center; gap: 10px; flex: 1; font-size: 0.9rem; }
        .team-box.left { justify-content: flex-end; text-align: left; }
        .team-box img { width: 25px; height: 25px; object-fit: contain; }

        .status-box { text-align: center; min-width: 80px; }
        .score { font-weight: bold; color: var(--accent-cyan); font-size: 1.1rem; }
        .match-time { font-size: 0.75rem; color: var(--text-gray); display: block; }
        .live-tag { color: var(--accent-green); font-size: 0.7rem; font-weight: bold; animation: blink 1s infinite; }
        .finished-tag { color: var(--accent-red); font-size: 0.7rem; }

        @keyframes blink { 50% { opacity: 0.5; } }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f171f; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1e2732; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); font-size: 0.75rem; cursor: pointer; }
        .nav-item.active { color: var(--nav-active); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .setting-card { background: var(--card-bg); padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #333; }
        
        /* ستايل المشغل لمنع الإعلانات */
        .video-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .video-container { width: 95%; max-width: 800px; position: relative; }
        .close-video { position: absolute; top: -45px; right: 10px; color: white; font-size: 2.5rem; cursor: pointer; z-index: 2001; }
        .video-container iframe { width: 100%; height: 250px; border-radius: 10px; border: 1px solid var(--accent-cyan); background: #000; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body id="mainBody">

    <div id="videoOverlay" class="video-overlay">
        <div class="video-container">
            <span class="close-video" onclick="closePlayer()">&times;</span>
            <div id="playerHTML"></div>
        </div>
    </div>

    <div class="top-bar">
        <div class="top-icons">
            <button class="icon-btn" onclick="alert('القائمة قريباً')"><i class="fa-solid fa-bars"></i></button>
            <button class="icon-btn" onclick="openCalendar()"><i class="fa-regular fa-calendar-days"></i></button>
            <button class="icon-btn" onclick="location.reload()"><i class="fa-solid fa-rotate"></i></button>
            <input type="date" id="datePicker" style="display:none" onchange="handleDateChange(this.value)">
        </div>
        <img src="https://i.ibb.co/LzNfXpY/ball-icon.png" class="logo-small">
    </div>

    <div class="time-tabs" id="timeTabs">
        <div class="time-tab" onclick="filterByTime('yesterday', this)">الأمس</div>
        <div class="time-tab active" onclick="filterByTime('today', this)">اليوم</div>
        <div class="time-tab" onclick="filterByTime('tomorrow', this)">الغد</div>
    </div>

    <div class="date-display" id="dateLabel">جاري التحميل...</div>

    <div id="matches-section" class="section-container active">
        <div id="matches-list"></div>
    </div>

    <div id="movies-section" class="section-container">
        <h3 style="padding:10px; color:var(--accent-cyan);">🇪🇬 أفلام عربية</h3>
        <div id="arabic-movies-list" class="settings-grid" style="margin-bottom:20px;"></div>
        
        <h3 style="padding:10px; color:var(--accent-cyan);">🌐 أفلام عالمية</h3>
        <div id="movies-list" class="settings-grid">
            <p style="text-align:center; grid-column: 1/3;">جاري تحميل المحتوى...</p>
        </div>
    </div>

    <div id="news-section" class="section-container">
        <p style="text-align:center; padding:20px;">📰 جاري تحديث آخر الأخبار الرياضية...</p>
    </div>

    <div id="standings-section" class="section-container">
        <div id="standings-list"></div>
    </div>

    <div id="more-section" class="section-container">
        <h3 style="padding:10px; border-bottom: 1px solid #333;">الإعدادات والمزيد</h3>
        <div class="settings-grid">
            <div class="setting-card" onclick="toggleDarkMode()"><i class="fa-solid fa-moon"></i><br>الوضع الليلي</div>
            <div class="setting-card" onclick="changeFont('large')"><i class="fa-solid fa-maximize"></i><br>خط كبير</div>
            <div class="setting-card" onclick="changeFont('small')"><i class="fa-solid fa-minimize"></i><br>خط صغير</div>
            <div class="setting-card" onclick="alert('اللغة العربية مفعلة افتراضياً')"><i class="fa-solid fa-language"></i><br>اللغة</div>
        </div>
        <div class="match-row" style="margin-top:20px" onclick="window.location.href='https://wa.me/201040077271'">
            <span>دعم فني واتساب</span><i class="fa-brands fa-whatsapp" style="color:#25d366; font-size:1.5rem"></i>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="matches-section" onclick="switchTab('matches-section', this)"><i class="fa-solid fa-futbol"></i><span>المباريات</span></div>
        <div class="nav-item" data-tab="movies-section" onclick="switchTab('movies-section', this)"><i class="fa-solid fa-film"></i><span>الأفلام</span></div>
        <div class="nav-item" data-tab="news-section" onclick="switchTab('news-section', this)"><i class="fa-regular fa-newspaper"></i><span>الأخبار</span></div>
        <div class="nav-item" data-tab="standings-section" onclick="switchTab('standings-section', this)"><i class="fa-solid fa-chart-simple"></i><span>الترتيب</span></div>
        <div class="nav-item" data-tab="more-section" onclick="switchTab('more-section', this)"><i class="fa-solid fa-ellipsis"></i><span>المزيد</span></div>
    </nav>

<script>
    const API_KEY = 'bf7d42ac856fecc0e1e6ad24debe9c5e';
    const MOVIE_API_KEY = '932eefacf243fb7b9698ea142f2e0481';
    const IMPORTANT_LEAGUES = [2, 39, 140, 233, 307, 135, 78, 61]; 
    let allMatches = { yesterday: [], today: [], tomorrow: [] };

    const translationMap = {
        "Real Madrid": "ريال مدريد", "Barcelona": "برشلونة", "Liverpool": "ليفربول",
        "Manchester City": "مانشستر سيتي", "Al Ahly": "الأهلي", "Zamalek": "الزمالك",
        "Premier League": "الدوري الإنجليزي", "La Liga": "الدوري الإسباني",
        "Champions League": "دوري أبطال أوروبا", "Egyptian Premier League": "الدوري المصري",
        "Saudi Pro League": "الدوري السعودي", "Bayern Munich": "بايرن ميونخ"
    };

    function translate(name) { return translationMap[name] || name; }

    function switchTab(id, el) {
        document.querySelectorAll('.section-container').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        document.getElementById('timeTabs').style.display = (id === 'matches-section') ? 'flex' : 'none';
        sessionStorage.setItem('currentTab', id);
        if(id === 'movies-section') loadMovies();
    }

    async function loadData() {
        const savedTab = sessionStorage.getItem('currentTab') || 'matches-section';
        const targetNav = document.querySelector(`[data-tab="${savedTab}"]`);
        if(targetNav) switchTab(savedTab, targetNav);

        try {
            const todayStr = new Date().toISOString().split('T')[0];
            const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${todayStr}`, {
                headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
            });
            const data = await res.json();
            const now = new Date();
            data.response.forEach(m => {
                if (!IMPORTANT_LEAGUES.includes(m.league.id)) return;
                const matchDate = new Date(m.fixture.date);
                const diffHours = (now - matchDate) / (1000 * 60 * 60);
                if (diffHours > 12) allMatches.yesterday.push(m);
                else allMatches.today.push(m);
            });
            const tomorrowStr = new Date(now.getTime() + 86400000).toISOString().split('T')[0];
            const resTom = await fetch(`https://v3.football.api-sports.io/fixtures?date=${tomorrowStr}`, {
                headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
            });
            const dataTom = await resTom.json();
            allMatches.tomorrow = dataTom.response.filter(m => IMPORTANT_LEAGUES.includes(m.league.id));
            filterByTime('today', document.querySelector('.time-tab.active'));
        } catch(e) { console.log("Network Error"); }
    }

    // نظام تشغيل الفيديو المحمي من الإعلانات
    function playMovie(id, type) {
        const overlay = document.getElementById('videoOverlay');
        const player = document.getElementById('playerHTML');
        const embedUrl = type === 'movie' ? `https://vidsrc.me/embed/movie?tmdb=${id}` : `https://vidsrc.me/embed/tv?tmdb=${id}`;
        // sandbox تمنع المواقع التانية من الفتح
        player.innerHTML = `<iframe src="${embedUrl}" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>`;
        overlay.style.display = 'flex';
    }

    function closePlayer() {
        document.getElementById('videoOverlay').style.display = 'none';
        document.getElementById('playerHTML').innerHTML = '';
    }

    async function loadMovies() {
        try {
            // جلب أفلام عالمية
            const res = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${MOVIE_API_KEY}&language=ar`);
            const data = await res.json();
            const list = document.getElementById('movies-list');
            list.innerHTML = '';
            data.results.forEach(item => {
                const title = item.title || item.name;
                const type = item.media_type || 'movie';
                list.innerHTML += `<div class="setting-card" style="padding:5px;" onclick="playMovie('${item.id}', '${type}')"><img src="https://image.tmdb.org/t/p/w500${item.poster_path}" style="width:100%; border-radius:8px;"><div style="font-size:0.8rem; margin-top:5px; height:35px; overflow:hidden;">${title}</div><div style="color:var(--accent-cyan); font-size:0.7rem;">⭐ ${item.vote_average.toFixed(1)}</div></div>`;
            });

            // جلب أفلام عربية (باستخدام لغة المنطقة AR-EG)
            const resAr = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${MOVIE_API_KEY}&with_original_language=ar&language=ar`);
            const dataAr = await resAr.json();
            const arList = document.getElementById('arabic-movies-list');
            arList.innerHTML = '';
            dataAr.results.slice(0, 4).forEach(item => {
                arList.innerHTML += `<div class="setting-card" style="padding:5px;" onclick="playMovie('${item.id}', 'movie')"><img src="https://image.tmdb.org/t/p/w500${item.poster_path}" style="width:100%; border-radius:8px;"><div style="font-size:0.8rem; margin-top:5px; height:35px; overflow:hidden;">${item.title}</div><div style="color:var(--accent-cyan); font-size:0.7rem;">⭐ ${item.vote_average.toFixed(1)}</div></div>`;
            });
        } catch(e) { console.log("Movie API Error"); }
    }

    function getStatusLabel(status, time) {
        if (['1H', '2H', 'HT', 'ET', 'P'].includes(status)) return '<span class="live-tag">● مباشر</span>';
        if (['FT', 'AET', 'PEN'].includes(status)) return '<span class="finished-tag">منتهي</span>';
        return `<span class="match-time">${new Date(time).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})}</span>`;
    }

    function renderMatches(matches) {
        const list = document.getElementById('matches-list');
        list.innerHTML = matches.length ? '' : '<p style="text-align:center; padding:50px; color:var(--text-gray);">لا توجد مباريات هامة مسجلة</p>';
        const grouped = matches.reduce((acc, m) => {
            const lName = translate(m.league.name);
            acc[lName] = acc[lName] || [];
            acc[lName].push(m);
            return acc;
        }, {});
        for (let league in grouped) {
            list.innerHTML += `<div class="league-header">🏆 ${league}</div>`;
            grouped[league].forEach(m => {
                list.innerHTML += `<div class="match-row"><div class="team-box left"><span>${translate(m.teams.home.name)}</span><img src="${m.teams.home.logo}"></div><div class="status-box"><div class="score">${m.goals.home ?? ''} - ${m.goals.away ?? ''}</div>${getStatusLabel(m.fixture.status.short, m.fixture.date)}</div><div class="team-box"><img src="${m.teams.away.logo}"><span>${translate(m.teams.away.name)}</span></div></div>`;
            });
        }
    }

    function filterByTime(period, el) {
        document.querySelectorAll('.time-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        const labels = { yesterday: 'الأمس', today: 'اليوم', tomorrow: 'الغد' };
        document.getElementById('dateLabel').innerText = `مباريات ${labels[period]}`;
        renderMatches(allMatches[period] || []);
    }

    function toggleDarkMode() { document.body.classList.toggle('light-mode'); }
    function changeFont(size) {
        document.body.classList.remove('large-font', 'small-font');
        if(size === 'large') document.body.classList.add('large-font');
        if(size === 'small') document.body.classList.add('small-font');
    }
    function openCalendar() { document.getElementById('datePicker').showPicker(); }
    window.onload = loadData;
</script>
</body>
    </html>
