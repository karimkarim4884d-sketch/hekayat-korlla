<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هجمة ولقطة - أهم المباريات</title>
    <style>
        :root {
            --dark-bg: #001220;
            --card-bg: #003366;
            --accent-orange: #ff6b35;
            --text-white: #ffffff;
            --light-blue: #00bfff;
            --nav-bg: #000c16;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body { background: var(--dark-bg); color: var(--text-white); padding-bottom: 70px; }

        header { 
            display: flex; align-items: center; justify-content: center; 
            gap: 15px; padding: 15px; color: var(--accent-orange);
            border-bottom: 1px solid rgba(0, 191, 255, 0.1);
            background: var(--nav-bg); position: sticky; top: 0; z-index: 100;
        }

        .section-container { display: none; padding: 10px; }
        .section-container.active { display: block; }

        /* تصميم كرت المباراة */
        .match-card {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .team { flex: 1; text-align: center; font-size: 0.9rem; }
        .team img { width: 30px; height: 30px; display: block; margin: 0 auto 5px; }

        .score-info { flex: 1; text-align: center; }
        .score { font-size: 1.2rem; font-weight: bold; color: var(--light-blue); }
        .match-time { font-size: 0.7rem; color: #aaa; margin-top: 5px; }
        .league-name { font-size: 0.6rem; color: var(--accent-orange); margin-bottom: 5px; }

        .loading { text-align: center; padding: 50px; color: var(--light-blue); }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg);
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid #002a4d; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; text-decoration: none; font-size: 0.75rem; cursor: pointer; }
        .nav-item.active { color: var(--light-blue); }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 1.4rem;">⚽ هجمة ولقطة</h1>
</header>

<div id="matches-section" class="section-container active">
    <div id="matches-list">
        <div class="loading">جاري جلب أهم مباريات اليوم...</div>
    </div>
</div>

<div id="standings-section" class="section-container">
    <div style="text-align: center; padding: 20px;">جدول الترتيب متاح قريباً...</div>
</div>

<div id="more-section" class="section-container">
    <div style="padding: 40px 20px; text-align: center;">
        <a href="https://wa.me/201040077271" style="background: #25d366; color: white; padding: 18px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-weight: bold;">
            💬 واتساب الدعم الفني
        </a>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showSection('matches-section', this)"><span>⚽</span><span>المباريات</span></div>
    <div class="nav-item" onclick="showSection('standings-section', this)"><span>📊</span><span>الترتيب</span></div>
    <div class="nav-item" onclick="showSection('more-section', this)"><span>➕</span><span>المزيد</span></div>
</nav>

<script>
const API_KEYS = ["Df2a94b9b0f5437b9e1ea1180b53434c"];
// معرفات الدوريات المهمة (إنجلترا، إسبانيا، ألمانيا، إيطاليا، فرنسا، دوري الأبطال)
const IMPORTANT_LEAGUES = [2021, 2014, 2002, 2019, 2015, 2001];

async function loadMatches() {
    const matchesList = document.getElementById('matches-list');
    
    for (let key of API_KEYS) {
        try {
            const response = await fetch('https://api.football-data.org/v4/matches', {
                headers: { 'X-Auth-Token': key }
            });

            if (response.ok) {
                const data = await response.json();
                displayMatches(data.matches);
                return;
            }
        } catch (e) { console.error(e); }
    }
    matchesList.innerHTML = '<div style="text-align:center; color:red;">فشل في تحميل البيانات.</div>';
}

function displayMatches(matches) {
    const matchesList = document.getElementById('matches-list');
    // فلترة المباريات المهمة فقط
    const filtered = matches.filter(m => IMPORTANT_LEAGUES.includes(m.competition.id));

    if (filtered.length === 0) {
        matchesList.innerHTML = '<div style="text-align:center;">لا توجد مباريات كبرى اليوم.</div>';
        return;
    }

    matchesList.innerHTML = filtered.map(match => `
        <div class="match-card">
            <div class="team">
                <img src="${match.homeTeam.crest}" alt="">
                ${match.homeTeam.shortName}
            </div>
            <div class="score-info">
                <div class="league-name">${match.competition.name}</div>
                <div class="score">${match.score.fullTime.home ?? 0} - ${match.score.fullTime.away ?? 0}</div>
                <div class="match-time">${new Date(match.utcDate).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})}</div>
            </div>
            <div class="team">
                <img src="${match.awayTeam.crest}" alt="">
                ${match.awayTeam.shortName}
            </div>
        </div>
    `).join('');
}

function showSection(sectionId, element) {
    document.querySelectorAll('.section-container').forEach(sec => sec.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
    element.classList.add('active');
}

// تشغيل عند التحميل
loadMatches();
</script>

</body>
</html>
