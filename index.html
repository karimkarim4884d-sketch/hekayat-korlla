<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة مرتدة | بث مباشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-green: #00ff62;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --live-red: #ff3e3e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
        }

        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: var(--main-green); margin: 0; font-size: 28px; }

        .tools-container {
            display: flex; gap: 10px; margin-bottom: 15px; max-width: 800px; margin: 0 auto 15px auto;
        }

        input[type="text"], input[type="date"] {
            background: var(--card-bg); border: 1px solid #333; color: white;
            padding: 12px; border-radius: 8px; outline: none; flex: 1;
        }

        .tabs { display: flex; gap: 5px; max-width: 800px; margin: 0 auto 20px auto; }
        .tab-btn {
            flex: 1; background: var(--card-bg); color: white; border: none;
            padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold;
        }
        .tab-btn.active { background: var(--main-green); color: black; }

        #matchesContainer { max-width: 800px; margin: 0 auto; }

        .match-card {
            background: var(--card-bg); border-radius: 15px; padding: 18px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px; border-bottom: 4px solid #222; transition: 0.3s;
        }

        .team { width: 35%; text-align: center; }
        .team img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 8px; }
        .team span { display: block; font-size: 14px; font-weight: 600; }

        .info { width: 30%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .score { font-size: 26px; font-weight: 900; letter-spacing: 2px; color: var(--main-green); }
        .time { font-size: 16px; font-weight: bold; }
        .vs-text { color: #555; font-weight: bold; font-size: 14px; }
        .league { font-size: 10px; color: #888; }
        
        .status-badge {
            font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: bold;
            display: flex; align-items: center; gap: 4px;
        }
        .live { background: var(--live-red); color: white; animation: blink 1.2s infinite; }
        .finished { background: #333; color: #aaa; }

        @keyframes blink { 50% { opacity: 0.4; } }

        .wa-btn {
            position: fixed; bottom: 20px; left: 20px; background: #25d366;
            width: 60px; height: 60px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 30px;
            color: white; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<div class="header"><h1>هجمة مرتدة ⚽</h1></div>

<div class="tools-container">
    <input type="text" id="searchInput" placeholder="ابحث عن فريق..." onkeyup="searchMatches()">
    <input type="date" id="datePicker" onchange="fetchByDate(this.value)">
</div>

<div class="tabs">
    <button class="tab-btn" id="btn-yesterday" onclick="changeTab(-1, 'btn-yesterday')">أمس</button>
    <button class="tab-btn active" id="btn-today" onclick="changeTab(0, 'btn-today')">اليوم</button>
    <button class="tab-btn" id="btn-tomorrow" onclick="changeTab(1, 'btn-tomorrow')">غداً</button>
</div>

<div id="matchesContainer"></div>

<a href="https://wa.me/201040077271" class="wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script>
    const API_KEY = "Bf7d42ac856fecc0e1e6ad24debe9c5e";
    const IMPORTANT_LEAGUES = [2, 3, 39, 140, 78, 135, 61, 233, 848, 4, 301];

    async function loadMatches(dateString) {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = '<p style="text-align: center;">جاري تحديث النتائج...</p>';

        try {
            const response = await fetch(`https://v3.football.api-sports.io/fixtures?date=${dateString}`, {
                "method": "GET",
                "headers": {
                    "x-rapidapi-host": "v3.football.api-sports.io",
                    "x-rapidapi-key": API_KEY
                }
            });

            const data = await response.json();
            const matches = data.response.filter(m => IMPORTANT_LEAGUES.includes(m.league.id));
            renderMatches(matches);
        } catch (error) {
            container.innerHTML = '<p style="text-align:center; color:red;">خطأ في الاتصال بالسيرفر</p>';
        }
    }

    function renderMatches(matches) {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = '';

        if (matches.length === 0) {
            container.innerHTML = '<p style="text-align: center;">لا توجد مباريات هامة</p>';
            return;
        }

        matches.forEach(m => {
            const status = m.fixture.status.short;
            const homeGoals = m.goals.home !== null ? m.goals.home : 0;
            const awayGoals = m.goals.away !== null ? m.goals.away : 0;
            
            let centerHTML = '';
            
            if (status === 'NS') { // لم تبدأ
                const time = new Date(m.fixture.date).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
                centerHTML = `<div class="time">${time}</div><div class="vs-text">VS</div>`;
            } 
            else if (['1H', '2H', 'HT', 'ET', 'P'].includes(status)) { // مباشرة
                // جلب الدقيقة الحالية من API
                const elapsed = m.fixture.status.elapsed;
                const matchTime = status === 'HT' ? 'بين الشوطين' : `${elapsed}'`;
                
                centerHTML = `
                    <div class="score">${homeGoals} - ${awayGoals}</div>
                    <div class="status-badge live">
                        <i class="fas fa-circle" style="font-size: 8px;"></i>
                        مباشر | ${matchTime}
                    </div>`;
            } 
            else if (status === 'FT') { // منتهية
                centerHTML = `<div class="score">${homeGoals} - ${awayGoals}</div><div class="status-badge finished">منتهية</div>`;
            } 
            else { // حالات أخرى (ملغاة، مؤجلة...)
                centerHTML = `<div class="vs-text">${m.fixture.status.long}</div>`;
            }

            container.innerHTML += `
                <div class="match-card" data-name="${m.teams.home.name} ${m.teams.away.name}">
                    <div class="team">
                        <img src="${m.teams.home.logo}" alt="">
                        <span>${m.teams.home.name}</span>
                    </div>
                    <div class="info">
                        ${centerHTML}
                        <div class="league">${m.league.name}</div>
                    </div>
                    <div class="team">
                        <img src="${m.teams.away.logo}" alt="">
                        <span>${m.teams.away.name}</span>
                    </div>
                </div>
            `;
        });
    }

    function changeTab(offset, btnId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(btnId).classList.add('active');
        const date = new Date();
        date.setDate(date.getDate() + offset);
        loadMatches(date.toISOString().split('T')[0]);
    }

    function fetchByDate(date) {
        loadMatches(date);
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    }

    function searchMatches() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.match-card').forEach(card => {
            const names = card.getAttribute('data-name').toLowerCase();
            card.style.display = names.includes(query) ? "flex" : "none";
        });
    }

    // تحديث تلقائي كل دقيقتين للمباريات المباشرة
    setInterval(() => {
        const activeTab = document.querySelector('.tab-btn.active').id;
        if(activeTab === 'btn-today') {
            const today = new Date().toISOString().split('T')[0];
            loadMatches(today);
        }
    }, 120000);

    window.onload = () => loadMatches(new Date().toISOString().split('T')[0]);
</script>

</body>
</html>
